<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markus Stuhr</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020509;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .content {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
  .name {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 60px rgba(100,180,255,0.4);
    animation: breathe 5s ease-in-out infinite;
  }
  .tagline {
    font-size: clamp(0.6rem, 1.4vw, 0.85rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(100,180,255,0.55);
    margin-top: 1.2rem;
    animation: breathe 5s ease-in-out infinite 0.8s;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .cursor.north { background: #5bc4ff; box-shadow: 0 0 12px 4px rgba(91,196,255,0.85); }
  .cursor.south { background: #ff7b3d; box-shadow: 0 0 12px 4px rgba(255,123,61,0.85); }
  .cursor-ring {
    position: fixed;
    width: 34px; height: 34px;
    border: 1px solid rgba(100,180,255,0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99;
    transform: translate(-50%, -50%);
  }
  .hint {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(100,180,255,0.25);
    z-index: 10;
    pointer-events: none;
    animation: breathe 5s ease-in-out infinite;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="content">
  <div class="name">Markus Stuhr</div>
  <div class="tagline">Digital Creativity</div>
</div>

<div class="cursor north" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="hint">Klick — Polarität wechseln</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');

let W, H, filings = [];
let mouse = { x: -9999, y: -9999 };
let ringX = 0, ringY = 0;
let tick = 0, hueBase = 210;
let cursorSign = 1;
let shockwaves = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ringX = W / 2; ringY = H / 2;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

// 2 orbiting poles + 1 cursor pole
const poles = [
  { x: 0, y: 0, sign:  1, str: 28000 },
  { x: 0, y: 0, sign: -1, str: 28000 },
  { x: -9999, y: -9999, sign: 1, str: 22000 },
];

function moveCursor(x, y) {
  mouse.x = x; mouse.y = y;
  cursorEl.style.left = x + 'px';
  cursorEl.style.top  = y + 'px';
}

function triggerClick(x, y) {
  cursorSign *= -1;
  poles[2].sign = cursorSign;
  cursorEl.className = 'cursor ' + (cursorSign > 0 ? 'north' : 'south');
  shockwaves.push({ x, y, r: 5, alpha: 0.9 });
}

document.addEventListener('mousemove', e => moveCursor(e.clientX, e.clientY));
document.addEventListener('click',     e => triggerClick(e.clientX, e.clientY));

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  moveCursor(t.clientX, t.clientY);
  triggerClick(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  moveCursor(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  // Keep pole at last position — feels more natural on mobile
});

function fieldAt(x, y) {
  let fx = 0, fy = 0;
  for (const p of poles) {
    const dx = x - p.x, dy = y - p.y;
    const d2 = dx * dx + dy * dy + 150;
    const d = Math.sqrt(d2);
    fx += (dx / d) * (p.str / d2) * p.sign;
    fy += (dy / d) * (p.str / d2) * p.sign;
  }
  return [fx, fy];
}

class Filing {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.angle = Math.random() * Math.PI;
    this.len = 5 + Math.random() * 9;
    this.thick = 0.6 + Math.random() * 0.8;
    this.speed = 0.03 + Math.random() * 0.1;
    this.fx = 0; this.fy = 0;
  }

  update() {
    const [fx, fy] = fieldAt(this.x, this.y);
    this.fx = fx; this.fy = fy;

    // Align to field — filings are symmetric so angle is π-periodic
    const target = Math.atan2(fy, fx);
    let diff = target - this.angle;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    if (diff >  Math.PI / 2) diff -= Math.PI;
    if (diff < -Math.PI / 2) diff += Math.PI;
    this.angle += diff * 0.1;

    // Slow drift along field direction
    const str = Math.sqrt(fx * fx + fy * fy);
    const drift = Math.min(str * 0.25, 1.0) * this.speed;
    this.x += Math.cos(this.angle) * drift;
    this.y += Math.sin(this.angle) * drift;

    const pad = this.len + 2;
    if (this.x < -pad) this.x = W + pad;
    else if (this.x > W + pad) this.x = -pad;
    if (this.y < -pad) this.y = H + pad;
    else if (this.y > H + pad) this.y = -pad;
  }

  draw() {
    const str = Math.min(Math.sqrt(this.fx * this.fx + this.fy * this.fy) / 5, 1);
    const alpha = 0.07 + str * 0.78;
    const lgt = 22 + str * 58;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    // Soft glow
    ctx.fillStyle = `hsla(${hueBase},78%,${lgt}%,${alpha * 0.2})`;
    ctx.fillRect(-this.len / 2, -this.thick * 3, this.len, this.thick * 6);

    // Core rod
    ctx.fillStyle = `hsla(${hueBase},92%,${Math.min(90, lgt + 28)}%,${alpha})`;
    ctx.fillRect(-this.len / 2, -this.thick / 2, this.len, this.thick);

    ctx.restore();
  }
}

function init() {
  const n = Math.min(Math.floor(W * H / 2200), 750);
  filings = Array.from({ length: n }, () => new Filing());
}
init();

function updatePoles() {
  const t = tick * 0.0025;
  const r = Math.min(W, H) * 0.2;
  poles[0].x = W / 2 + Math.cos(t) * r;
  poles[0].y = H / 2 + Math.sin(t) * r;
  poles[1].x = W / 2 + Math.cos(t + Math.PI) * r;
  poles[1].y = H / 2 + Math.sin(t + Math.PI) * r;
  poles[2].x = mouse.x;
  poles[2].y = mouse.y;
}

function drawPoleAuras() {
  const defs = [
    { pole: poles[0], hue: hueBase },
    { pole: poles[1], hue: 22 },
    { pole: poles[2], hue: cursorSign > 0 ? hueBase : 22 },
  ];
  defs.forEach(({ pole, hue }) => {
    if (pole.x < -9000) return;
    const pulse = 0.5 + 0.5 * Math.sin(tick * 0.07);
    const r = 38 + pulse * 14;
    const g = ctx.createRadialGradient(pole.x, pole.y, 0, pole.x, pole.y, r);
    g.addColorStop(0,   `hsla(${hue},100%,68%,0.4)`);
    g.addColorStop(0.4, `hsla(${hue},90%,55%,0.12)`);
    g.addColorStop(1,   `hsla(${hue},80%,40%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(pole.x, pole.y, r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawShockwaves() {
  shockwaves = shockwaves.filter(s => {
    s.r += (190 - s.r) * 0.1;
    s.alpha *= 0.87;
    if (s.alpha < 0.01) return false;
    const hue = cursorSign > 0 ? hueBase : 22;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue},100%,70%,${s.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    return true;
  });
}

function animate() {
  tick++;
  hueBase = 210 + Math.sin(tick * 0.003) * 25;

  // Near-full clear so field pattern is legible, tiny persistence for smoothness
  ctx.fillStyle = 'rgba(2,5,9,0.92)';
  ctx.fillRect(0, 0, W, H);

  updatePoles();
  drawPoleAuras();
  filings.forEach(f => { f.update(); f.draw(); });
  drawShockwaves();

  ringX += (mouse.x - ringX) * 0.11;
  ringY += (mouse.y - ringY) * 0.11;
  ring.style.left = ringX + 'px';
  ring.style.top = ringY + 'px';

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
