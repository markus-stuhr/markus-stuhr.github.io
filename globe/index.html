<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailing Log – Markus Stuhr</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/globe.gl@2.41.5/dist/globe.gl.min.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020509;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Views ─────────────────────────────── */
  #globe-view, #map-view {
    position: fixed;
    inset: 0;
    transition: opacity 0.6s ease;
  }

  #globe-view { z-index: 1; }

  #map-view {
    z-index: 2;
    opacity: 0;
    pointer-events: none;
  }

  #map-view.visible {
    opacity: 1;
    pointer-events: all;
  }

  #map { width: 100%; height: 100%; }

  /* ── Header ─────────────────────────────── */
  #header {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  #header h1 {
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 200;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(0,0,0,0.9);
  }

  #header p {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  /* ── Hint (globe view) ───────────────────── */
  #hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  /* ── Spot popup (globe) ──────────────────── */
  #spot-popup {
    position: fixed;
    z-index: 30;
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 160, 255, 0.25);
    border-radius: 10px;
    padding: 16px 20px 14px;
    min-width: 200px;
    max-width: 260px;
    pointer-events: all;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 6px 32px rgba(0,0,0,0.7);
  }

  #spot-popup.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #popup-region {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
  }

  #popup-name {
    font-size: 1rem;
    font-weight: 400;
    color: #8ab4f8;
    margin-bottom: 6px;
  }

  #popup-meta {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  #popup-close {
    position: absolute;
    top: 8px; right: 12px;
    background: none; border: none;
    color: rgba(255,255,255,0.35);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  #popup-close:hover { color: #fff; }

  #zoom-btn {
    width: 100%;
    background: rgba(74, 159, 255, 0.15);
    border: 1px solid rgba(74, 159, 255, 0.4);
    border-radius: 6px;
    color: #8ab4f8;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  #zoom-btn:hover {
    background: rgba(74, 159, 255, 0.28);
    border-color: rgba(74, 159, 255, 0.7);
    color: #fff;
  }

  /* ── Back button (map view) ──────────────── */
  #back-globe {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 25;
    background: rgba(5, 15, 30, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    display: none;
    transition: color 0.15s;
  }
  #back-globe:hover { color: #fff; }
  @media (max-width: 480px) { #back-globe .back-label { display: none; } }

  /* ── Home link (globe view) ──────────────── */
  #back-home {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 20;
    color: rgba(255,255,255,0.35);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  #back-home:hover { color: #fff; }

  /* ── MapLibre overrides ──────────────────── */
  .maplibregl-popup-content {
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(100, 160, 255, 0.25);
    border-radius: 8px;
    padding: 14px 18px;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    min-width: 180px;
  }
  .maplibregl-popup-close-button {
    color: rgba(255,255,255,0.5);
    font-size: 1.1rem;
    padding: 4px 8px;
  }
  .popup-title {
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    color: #8ab4f8;
  }
  .popup-meta {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }
  .maplibregl-ctrl-group {
    background: rgba(5, 15, 30, 0.8) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
  }
  .maplibregl-ctrl button { color: #fff !important; }
  .maplibregl-ctrl button .maplibregl-ctrl-icon { filter: invert(1); }
  .maplibregl-ctrl-compass .maplibregl-ctrl-icon {
    filter: none !important;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='29' height='29' viewBox='0 0 29 29'%3E%3Cpath d='M14.5 3L17 14.5L14.5 12L12 14.5Z' fill='%23e74c3c'/%3E%3Cpath d='M14.5 26L17 14.5L14.5 17L12 14.5Z' fill='%23ffffff'/%3E%3C/svg%3E") !important;
  }
  .maplibregl-ctrl-attrib {
    background: rgba(0,0,0,0.5) !important;
    color: rgba(255,255,255,0.35) !important;
    font-size: 10px;
  }
  .maplibregl-ctrl-attrib a { color: rgba(255,255,255,0.35) !important; }

  /* ── Globe hit areas ────────────────────── */
  .globe-hit {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1.5px solid rgba(74, 159, 255, 0.3);
    background: rgba(74, 159, 255, 0.05);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .globe-hit.hovered {
    border-color: rgba(74, 159, 255, 0.65);
    background: rgba(74, 159, 255, 0.12);
  }

  /* ── Sail marker dot ─────────────────────── */
  .sail-marker {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a9fff;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 10px rgba(74,159,255,0.6), 0 0 20px rgba(74,159,255,0.3);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .sail-marker:hover { transform: scale(1.4); }

  /* ── Settings button & panel ─────────────── */
  #settings-btn {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 25;
    width: 36px;
    height: 36px;
    background: rgba(5, 15, 30, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    font-size: 16px;
  }
  #settings-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  #settings-panel {
    position: fixed;
    bottom: 68px;
    left: 24px;
    z-index: 25;
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 160, 255, 0.2);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 210px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.6);
    display: none;
  }

  #settings-panel h3 {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 12px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setting-label.disabled { color: rgba(255,255,255,0.3); }

  .setting-badge {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(74,159,255,0.15);
    border: 1px solid rgba(74,159,255,0.25);
    color: rgba(74,159,255,0.7);
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 34px;
    height: 18px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: rgba(74,159,255,0.7); }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
  .toggle.disabled { opacity: 0.3; pointer-events: none; }

  /* ── Style dropdown ──────────────────────── */
  #map-style-select {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    color: rgba(255,255,255,0.8);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 3px 8px;
    cursor: pointer;
    outline: none;
  }
  #map-style-select option { background: #0d1821; color: #fff; }
</style>
</head>
<body>

<a href="/" id="back-home">← Home</a>

<div id="header">
  <h1>Sailing Map</h1>
</div>


<!-- Globe.gl container -->
<div id="globe-view"></div>

<!-- MapLibre detail map -->
<div id="map-view">
  <div id="map"></div>
</div>

<!-- Globe spot popup -->
<div id="spot-popup">
  <button id="popup-close">×</button>
  <div id="popup-region"></div>
  <div id="popup-name"></div>
  <div id="popup-meta"></div>
  <button id="zoom-btn">Zur Karte →</button>
</div>

<!-- Map back button -->
<button id="back-globe">← <span class="back-label">Globus</span></button>

<!-- Settings -->
<button id="settings-btn" title="Layer">⚙</button>

<div id="settings-panel">
  <h3>Stil</h3>
  <div class="setting-row">
    <span class="setting-label">Kartenstil</span>
    <select id="map-style-select">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>
  </div>
  <h3 style="margin-top:12px">Layer</h3>
  <div class="setting-row">
    <span class="setting-label">Tiefenlinien</span>
    <label class="toggle"><input type="checkbox" id="toggle-contours" checked><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">Tiefenangaben</span>
    <label class="toggle"><input type="checkbox" id="toggle-depthlabels" checked><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">Seezeichen</span>
    <label class="toggle"><input type="checkbox" id="toggle-openseamap" checked><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">Fährverbindungen</span>
    <label class="toggle"><input type="checkbox" id="toggle-ferry" checked><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">AIS Schiffe <span id="ais-status" class="setting-badge">live</span></span>
    <label class="toggle"><input type="checkbox" id="toggle-ais"><span class="toggle-track"></span></label>
  </div>
</div>

<script>
const SPOTS = [
  {
    name: "Whitsundays",
    region: "Australien",
    lat: -20.3, lng: 148.9,
    zoom: 9,
    years: "2019",
    notes: "Great Barrier Reef, Whitehaven Beach"
  },
  {
    name: "Grenadinen",
    region: "Karibik",
    lat: 12.6, lng: -61.4,
    zoom: 8,
    years: "2018",
    notes: "St. Vincent bis Grenada"
  },
  {
    name: "Kroatische Inseln",
    region: "Mittelmeer",
    lat: 43.6, lng: 16.4,
    zoom: 8,
    years: "2015, 2017",
    notes: "Dalmatinische Küste, Split bis Dubrovnik"
  },
  {
    name: "Balearen",
    region: "Mittelmeer",
    lat: 39.6, lng: 2.9,
    zoom: 8,
    years: "2016",
    notes: "Mallorca, Menorca, Ibiza"
  },
  {
    name: "Türkische Ägäis",
    region: "Mittelmeer",
    lat: 37.1, lng: 27.2,
    zoom: 8,
    years: "2014",
    notes: "Bodrum bis Fethiye, Blaue Reise"
  }
];

// ── Globe.gl setup ────────────────────────────────────────
const globeEl = document.getElementById('globe-view');
const hitElements = new Map();

const globe = Globe({ animateIn: true })(globeEl)
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .atmosphereColor('#4a7aff')
  .atmosphereAltitude(0.18)
  .pointsData(SPOTS)
  .pointLat(d => d.lat)
  .pointLng(d => d.lng)
  .pointColor(() => '#4a9fff')
  .pointAltitude(0.012)
  .pointRadius(0.45)
  .pointResolution(12)
  .onPointClick(onSpotClick)
  .onPointHover(() => {})
  .htmlElementsData(SPOTS)
  .htmlLat(d => d.lat)
  .htmlLng(d => d.lng)
  .htmlAltitude(0.013)
  .htmlElement(d => {
    const el = document.createElement('div');
    el.className = 'globe-hit';
    hitElements.set(d.name, el);
    return el;
  });

// Proximity-based hover + click via mousemove/click on the globe container
globeEl.addEventListener('mousemove', ev => {
  let nearAny = false;
  SPOTS.forEach(spot => {
    const sc = globe.getScreenCoords(spot.lat, spot.lng, 0.013);
    const el = hitElements.get(spot.name);
    if (!el || !sc) return;
    const near = Math.hypot(ev.clientX - sc.x, ev.clientY - sc.y) < 34;
    el.classList.toggle('hovered', near);
    if (near) nearAny = true;
  });
  globeEl.style.cursor = nearAny ? 'pointer' : 'grab';
});

globeEl.addEventListener('click', ev => {
  SPOTS.forEach(spot => {
    const sc = globe.getScreenCoords(spot.lat, spot.lng, 0.013);
    if (!sc) return;
    if (Math.hypot(ev.clientX - sc.x, ev.clientY - sc.y) < 34) {
      onSpotClick(spot, ev, { x: ev.clientX, y: ev.clientY });
    }
  });
});

globeEl.addEventListener('touchend', ev => {
  const t = ev.changedTouches[0];
  SPOTS.forEach(spot => {
    const sc = globe.getScreenCoords(spot.lat, spot.lng, 0.013);
    if (!sc) return;
    if (Math.hypot(t.clientX - sc.x, t.clientY - sc.y) < 44) {
      onSpotClick(spot, ev, { x: t.clientX, y: t.clientY });
    }
  });
});

// Gentle auto-rotation
globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.5;
globe.controls().enableDamping = true;

// ── Popup logic ──────────────────────────────────────────
const popup    = document.getElementById('spot-popup');
const closeBtn = document.getElementById('popup-close');
const zoomBtn  = document.getElementById('zoom-btn');
let activeSpot = null;

function onSpotClick(spot, _ev, coords) {
  if (!spot) return;
  activeSpot = spot;

  document.getElementById('popup-region').textContent = spot.region;
  document.getElementById('popup-name').textContent   = spot.name;
  document.getElementById('popup-meta').innerHTML =
    `${spot.years}<br><span style="opacity:0.7">${spot.notes}</span>`;

  // Position popup near click, staying within viewport
  const vw = window.innerWidth, vh = window.innerHeight;
  const px = Math.min(Math.max(coords.x + 16, 10), vw - 280);
  const py = Math.min(Math.max(coords.y - 60, 10), vh - 200);
  popup.style.left = px + 'px';
  popup.style.top  = py + 'px';
  popup.classList.add('visible');
}

closeBtn.addEventListener('click', () => popup.classList.remove('visible'));

// ── View switching ────────────────────────────────────────
let mapInstance = null;

zoomBtn.addEventListener('click', () => {
  if (!activeSpot) return;
  popup.classList.remove('visible');
  showMap(activeSpot);
});

document.getElementById('back-globe').addEventListener('click', () => {
  document.getElementById('map-view').classList.remove('visible');
  document.getElementById('back-globe').style.display = 'none';
  document.getElementById('settings-btn').style.display = 'none';
  document.getElementById('settings-panel').style.display = 'none';
  document.getElementById('back-home').style.display = '';
  const aisToggle = document.getElementById('toggle-ais');
  if (aisToggle.checked) { aisToggle.checked = false; stopAIS(); }
  globe.controls().autoRotate = true;
});

// Settings toggle
const settingsBtn   = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
settingsBtn.addEventListener('click', e => {
  e.stopPropagation();
  settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', () => { settingsPanel.style.display = 'none'; });
settingsPanel.addEventListener('click', e => e.stopPropagation());

// ── Map style profiles ────────────────────────────────────
let currentMapStyle = 'dark';

const MAP_STYLES = {
  dark: {
    land: '#161c24',
    glacier: '#1e2a35',
    landShadows: 'none',
    islandLabelColor: '#0099cc',
    islandLabelHalo: 0,
    buildingColor: '#1e2a35',
    buildingOutline: '#263040',
    cityColor: '#7ab8d4',
    cityHalo: 'rgba(5,15,30,0.8)',
    cityHaloWidth: 1.5,
    townColor: '#5a9ab8',
    townHalo: 'rgba(5,15,30,0.8)',
    townHaloWidth: 1.2,
    contourColor: '#020304'
  },
  light: {
    land: '#faf3e0',
    glacier: '#f2ebd4',
    landShadows: 'none',
    islandLabelColor: '#005f88',
    islandLabelHalo: 0,
    buildingColor: '#ddd3be',
    buildingOutline: '#c4baa6',
    cityColor: '#d4a870',
    cityHalo: 'rgba(250,243,224,0.85)',
    cityHaloWidth: 1.5,
    townColor: '#c09050',
    townHalo: 'rgba(250,243,224,0.85)',
    townHaloWidth: 1.2,
    contourColor: 'hsl(36, 39%, 49%)'
  }
};

function applyMapStyle(name) {
  if (!mapInstance) return;
  const s = MAP_STYLES[name];
  mapInstance.setPaintProperty('Land', 'fill-color', s.land);
  mapInstance.setPaintProperty('Glacier', 'fill-color', s.glacier);
  ['Land shadow', 'Land shadow 1', 'Land shadow 2'].forEach(id => {
    try { mapInstance.setLayoutProperty(id, 'visibility', s.landShadows); } catch {}
  });
  mapInstance.setPaintProperty('Island labels', 'text-color', s.islandLabelColor);
  mapInstance.setPaintProperty('Island labels', 'text-halo-width', s.islandLabelHalo);
  try { mapInstance.setPaintProperty('ferry-routes', 'line-color', s.islandLabelColor); } catch {}
  if (s.contourColor !== undefined) {
    try {
      mapInstance.setPaintProperty('Contour', 'line-color', s.contourColor);
      mapInstance.setPaintProperty('Contour index', 'line-color', s.contourColor);
    } catch {}
  }
  try {
    mapInstance.setPaintProperty('buildings', 'fill-color', s.buildingColor);
    mapInstance.setPaintProperty('buildings-outline', 'line-color', s.buildingOutline);
    mapInstance.setPaintProperty('place-cities', 'text-color', s.cityColor);
    mapInstance.setPaintProperty('place-cities', 'text-halo-color', s.cityHalo);
    mapInstance.setPaintProperty('place-cities', 'text-halo-width', s.cityHaloWidth);
    mapInstance.setPaintProperty('place-towns', 'text-color', s.townColor);
    mapInstance.setPaintProperty('place-towns', 'text-halo-color', s.townHalo);
    mapInstance.setPaintProperty('place-towns', 'text-halo-width', s.townHaloWidth);
  } catch {}
}

document.getElementById('map-style-select').addEventListener('change', e => {
  currentMapStyle = e.target.value;
  applyMapStyle(currentMapStyle);
});

function applyLayerToggle(id, layers, visibility) {
  if (!mapInstance) return;
  layers.forEach(l => {
    try { mapInstance.setLayoutProperty(l, 'visibility', visibility ? 'visible' : 'none'); } catch {}
  });
}

document.getElementById('toggle-contours').addEventListener('change', e => {
  applyLayerToggle('contours', ['Depth contour'], e.target.checked);
});
document.getElementById('toggle-depthlabels').addEventListener('change', e => {
  applyLayerToggle('depthlabels', ['Depth labels', 'Undersea line labels', 'Undersea labels'], e.target.checked);
});
document.getElementById('toggle-openseamap').addEventListener('change', e => {
  applyLayerToggle('openseamap', ['openseamap'], e.target.checked);
});
document.getElementById('toggle-ferry').addEventListener('change', e => {
  applyLayerToggle('ferry', ['ferry-routes'], e.target.checked);
});
document.getElementById('toggle-ais').addEventListener('change', e => {
  e.target.checked ? startAIS() : stopAIS();
});

function showMap(spot) {
  document.getElementById('map-view').classList.add('visible');
  document.getElementById('back-globe').style.display = 'block';
  document.getElementById('settings-btn').style.display = 'flex';
  document.getElementById('back-home').style.display = 'none';
  globe.controls().autoRotate = false;

  if (!mapInstance) {
    mapInstance = new maplibregl.Map({
      container: 'map',
      style: 'https://api.maptiler.com/maps/ocean/style.json?key=lT9jK8r0OXrZinP9JSOT',
      center: [spot.lng, spot.lat],
      zoom: spot.zoom,
      attributionControl: true
    });

    mapInstance.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    mapInstance.on('load', () => {
      applyMapStyle(currentMapStyle);
      mapInstance.setPaintProperty('Ocean RGB', 'hillshade-exaggeration', 0);
      mapInstance.setPaintProperty('Terrain RGB', 'hillshade-exaggeration', 0);
      ['Depth labels', 'Undersea labels', 'Undersea line labels'].forEach(id => {
        try { mapInstance.setPaintProperty(id, 'text-opacity', 0.5); } catch {}
      });

      // OSM vector tiles: buildings + city labels
      mapInstance.addSource('osm', {
        type: 'vector',
        url: 'https://api.maptiler.com/tiles/v3/tiles.json?key=lT9jK8r0OXrZinP9JSOT'
      });

      const s = MAP_STYLES[currentMapStyle];

      mapInstance.addLayer({
        id: 'buildings',
        type: 'fill',
        source: 'osm',
        'source-layer': 'building',
        minzoom: 14,
        paint: {
          'fill-color': s.buildingColor,
          'fill-opacity': 0.9
        }
      });
      mapInstance.addLayer({
        id: 'buildings-outline',
        type: 'line',
        source: 'osm',
        'source-layer': 'building',
        minzoom: 14,
        paint: {
          'line-color': s.buildingOutline,
          'line-width': 0.5
        }
      });
      // Cities: rank-based zoom filter — only top cities at low zoom
      // rank 1-2 = capitals/megacities, 3-5 = large cities, 6+ = smaller
      mapInstance.addLayer({
        id: 'place-cities',
        type: 'symbol',
        source: 'osm',
        'source-layer': 'place',
        filter: ['all',
          ['==', ['get', 'class'], 'city'],
          ['<=', ['get', 'rank'], ['step', ['zoom'], 2, 5, 4, 7, 7, 9, 12]]
        ],
        minzoom: 4,
        layout: {
          'text-field': ['coalesce', ['get', 'name:en'], ['get', 'name']],
          'text-font': ['Noto Sans Regular', 'Roboto Regular'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 4, 11, 8, 14, 12, 18],
          'text-anchor': 'center',
          'text-max-width': 8
        },
        paint: {
          'text-color': s.cityColor,
          'text-halo-color': s.cityHalo,
          'text-halo-width': s.cityHaloWidth
        }
      });
      // Towns: only from zoom 11, villages from zoom 13
      mapInstance.addLayer({
        id: 'place-towns',
        type: 'symbol',
        source: 'osm',
        'source-layer': 'place',
        filter: ['all',
          ['in', ['get', 'class'], ['literal', ['town', 'village']]],
          ['<=', ['get', 'rank'], ['step', ['zoom'], 3, 10, 8, 12, 99]]
        ],
        minzoom: 9,
        layout: {
          'text-field': ['coalesce', ['get', 'name:en'], ['get', 'name']],
          'text-font': ['Noto Sans Regular', 'Roboto Regular'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 11, 10, 14, 12],
          'text-anchor': 'center',
          'text-max-width': 8
        },
        paint: {
          'text-color': s.townColor,
          'text-halo-color': s.townHalo,
          'text-halo-width': s.townHaloWidth
        }
      });

      // Ferry routes
      mapInstance.addLayer({
        id: 'ferry-routes',
        type: 'line',
        source: 'osm',
        'source-layer': 'transportation',
        filter: ['==', ['get', 'class'], 'ferry'],
        minzoom: 5,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': s.islandLabelColor,
          'line-width': ['interpolate', ['linear'], ['zoom'], 5, 1, 10, 2],
          'line-opacity': 0.2,
          'line-dasharray': [2, 3]
        }
      });

      // Nautical marks on top of buildings (OpenSeaMap)
      mapInstance.addSource('openseamap', {
        type: 'raster',
        tiles: ['https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© <a href="https://www.openseamap.org">OpenSeaMap</a>'
      });
      mapInstance.addLayer({
        id: 'openseamap',
        type: 'raster',
        source: 'openseamap',
        paint: { 'raster-opacity': 0.8 }
      });

      initAISLayer();
      addMapMarkers();
      mapInstance.flyTo({ center: [spot.lng, spot.lat], zoom: spot.zoom, duration: 1200 });
    });
  } else {
    mapInstance.flyTo({ center: [spot.lng, spot.lat], zoom: spot.zoom, duration: 1000 });
  }
}

function addMapMarkers() {
  SPOTS.forEach(spot => {
    const el = document.createElement('div');
    el.className = 'sail-marker';

    const pop = new maplibregl.Popup({ offset: 14, closeButton: true, maxWidth: '260px' })
      .setHTML(`
        <div class="popup-title">${spot.name}</div>
        <div class="popup-meta">
          <span style="opacity:0.65">${spot.region}</span><br>
          ${spot.years}<br>
          ${spot.notes}
        </div>
      `);

    new maplibregl.Marker({ element: el })
      .setLngLat([spot.lng, spot.lat])
      .setPopup(pop)
      .addTo(mapInstance);
  });
}

// ── AIS ship tracking ─────────────────────────────────────
const AIS_KEY = 'efd3db53b2e99f5de532758895d911dff887921e';
let aisSocket = null;
let aisEnabled = false;
let aisLayerReady = false;
let aisPendingStart = false;
const shipData = new Map();

function setAisStatus(text, color) {
  const el = document.getElementById('ais-status');
  if (!el) return;
  el.textContent = text;
  el.style.color = color || '';
  el.style.borderColor = color ? color.replace(')', ', 0.4)').replace('rgb', 'rgba') : '';
  el.style.background = color ? color.replace(')', ', 0.1)').replace('rgb', 'rgba') : '';
}

function initAISLayer() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
    <polygon points="12,2 19,20 12,16 5,20" fill="#4adfff" stroke="rgba(0,0,0,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
  const img = new Image(24, 24);
  img.onload = () => {
    mapInstance.addImage('ship-arrow', img);
    mapInstance.addSource('ais-ships', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] }
    });
    mapInstance.addLayer({
      id: 'ais-ships',
      type: 'symbol',
      source: 'ais-ships',
      layout: {
        'icon-image': 'ship-arrow',
        'icon-size': 0.7,
        'icon-rotate': ['get', 'heading'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
        'visibility': 'none'
      }
    });
    mapInstance.on('click', 'ais-ships', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup({ offset: 10, maxWidth: '240px' })
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-title">${p.name}</div>
          <div class="popup-meta">
            MMSI: ${p.mmsi}<br>
            Geschwindigkeit: ${(+p.sog).toFixed(1)} kn<br>
            Kurs: ${Math.round(+p.cog)}°
          </div>
        `)
        .addTo(mapInstance);
    });
    mapInstance.on('mouseenter', 'ais-ships', () => { mapInstance.getCanvas().style.cursor = 'pointer'; });
    mapInstance.on('mouseleave', 'ais-ships', () => { mapInstance.getCanvas().style.cursor = ''; });
    aisLayerReady = true;
    if (aisPendingStart) { aisPendingStart = false; startAIS(); }
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function startAIS() {
  if (!aisLayerReady) { aisPendingStart = true; setAisStatus('…', 'rgb(255,200,50)'); return; }
  aisEnabled = true;
  mapInstance.setLayoutProperty('ais-ships', 'visibility', 'visible');
  connectAIS();
  mapInstance.on('moveend', reconnectAIS);
}

function stopAIS() {
  aisEnabled = false;
  aisPendingStart = false;
  setAisStatus('live', '');
  if (aisSocket) { aisSocket.close(); aisSocket = null; }
  shipData.clear();
  if (mapInstance) {
    mapInstance.off('moveend', reconnectAIS);
    try {
      mapInstance.setLayoutProperty('ais-ships', 'visibility', 'none');
      mapInstance.getSource('ais-ships').setData({ type: 'FeatureCollection', features: [] });
    } catch {}
  }
}

let reconnectTimer = null;

function connectAIS() {
  if (!aisEnabled) return;
  setAisStatus('…', 'rgb(255,200,50)');
  const b = mapInstance.getBounds();
  aisSocket = new WebSocket('wss://stream.aisstream.io/v0/stream');
  aisSocket.onopen = () => {
    setAisStatus('verbunden', 'rgb(50,200,100)');
    aisSocket.send(JSON.stringify({
      APIKey: AIS_KEY,
      BoundingBoxes: [[[b.getSouth(), b.getWest()], [b.getNorth(), b.getEast()]]],
      FilterMessageTypes: ['PositionReport']
    }));
  };
  aisSocket.onmessage = evt => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.MessageType !== 'PositionReport') {
        // show unexpected server messages in status for debugging
        if (msg.error || msg.Error || msg.message) {
          setAisStatus(msg.error || msg.Error || msg.message, 'rgb(255,80,80)');
        }
        return;
      }
      const m = msg.MetaData || msg.Metadata;
      const p = msg.Message && msg.Message.PositionReport;
      if (!m || !p) return;
      shipData.set(m.MMSI, {
        mmsi: m.MMSI,
        name: (m.ShipName || '').trim() || `MMSI ${m.MMSI}`,
        lat: m.latitude, lng: m.longitude,
        heading: p.TrueHeading < 360 ? p.TrueHeading : (p.Cog || 0),
        sog: p.Sog || 0, cog: p.Cog || 0
      });
      setAisStatus(`${shipData.size} Schiffe`, 'rgb(74,223,255)');
      updateShipLayer();
    } catch {}
  };
  aisSocket.onerror = () => { setAisStatus('Fehler', 'rgb(255,80,80)'); aisSocket = null; };
  aisSocket.onclose = () => {
    aisSocket = null;
    if (aisEnabled) { setAisStatus('reconnect…', 'rgb(255,200,50)'); setTimeout(connectAIS, 5000); }
  };
}

function reconnectAIS() {
  // debounce: only reconnect 3s after the last map move
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    if (!aisEnabled) return;
    if (aisSocket) { aisSocket.close(); aisSocket = null; }
    shipData.clear();
    updateShipLayer();
    connectAIS();
  }, 3000);
}

function updateShipLayer() {
  const src = mapInstance && mapInstance.getSource('ais-ships');
  if (!src) return;
  src.setData({
    type: 'FeatureCollection',
    features: Array.from(shipData.values()).map(s => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
      properties: { mmsi: s.mmsi, name: s.name, heading: s.heading, sog: s.sog, cog: s.cog }
    }))
  });
}
</script>
