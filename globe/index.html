<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailing Log – Markus Stuhr</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/globe.gl@2.41.5/dist/globe.gl.min.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020509;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Views ─────────────────────────────── */
  #globe-view, #map-view {
    position: fixed;
    inset: 0;
    transition: opacity 0.6s ease;
  }

  #globe-view { z-index: 1; }

  #map-view {
    z-index: 2;
    opacity: 0;
    pointer-events: none;
  }

  #map-view.visible {
    opacity: 1;
    pointer-events: all;
  }

  #map { width: 100%; height: 100%; touch-action: none; }

  #map-fallback-notice {
    display: none;
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(5,15,30,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,180,0,0.35);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: rgba(255,200,80,0.9);
    pointer-events: none;
    white-space: nowrap;
  }
  .maplibregl-marker { touch-action: none; }

  /* ── Header ─────────────────────────────── */
  #header {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  #header h1 {
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 200;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(0,0,0,0.9);
  }

  #header p {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  /* ── Hint (globe view) ───────────────────── */
  #hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  /* ── Spot popup (globe) ──────────────────── */
  #spot-popup {
    position: fixed;
    z-index: 30;
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 160, 255, 0.25);
    border-radius: 10px;
    padding: 16px 20px 14px;
    min-width: 200px;
    max-width: 260px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 6px 32px rgba(0,0,0,0.7);
  }

  #spot-popup.visible {
    pointer-events: all;
    opacity: 1;
    transform: translateY(0);
  }

  #popup-region {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
  }

  #popup-name {
    font-size: 1rem;
    font-weight: 400;
    color: #8ab4f8;
    margin-bottom: 6px;
  }

  #popup-meta {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  #popup-close {
    position: absolute;
    top: 8px; right: 12px;
    background: none; border: none;
    color: rgba(255,255,255,0.35);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  #popup-close:hover { color: #fff; }

  #zoom-btn {
    width: 100%;
    background: rgba(74, 159, 255, 0.15);
    border: 1px solid rgba(74, 159, 255, 0.4);
    border-radius: 6px;
    color: #8ab4f8;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  #zoom-btn:hover {
    background: rgba(74, 159, 255, 0.28);
    border-color: rgba(74, 159, 255, 0.7);
    color: #fff;
  }

  /* ── Back button (map view) ──────────────── */
  #back-globe {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 25;
    background: rgba(5, 15, 30, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    display: none;
    transition: color 0.15s;
  }
  #back-globe:hover { color: #fff; }
  @media (max-width: 480px) { #back-globe .back-label { display: none; } }


  /* ── MapLibre overrides ──────────────────── */
  .maplibregl-popup-content {
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(100, 160, 255, 0.25);
    border-radius: 8px;
    padding: 14px 18px;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    min-width: 180px;
  }
  .maplibregl-popup-close-button {
    color: rgba(255,255,255,0.5);
    font-size: 1.1rem;
    padding: 4px 8px;
  }
  .popup-title {
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    color: #8ab4f8;
  }
  .popup-meta {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }
  .maplibregl-ctrl-group {
    background: rgba(5, 15, 30, 0.8) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
  }
  .maplibregl-ctrl button { color: #fff !important; }
  .maplibregl-ctrl button .maplibregl-ctrl-icon { filter: invert(1); }
  .maplibregl-ctrl-compass .maplibregl-ctrl-icon {
    filter: none !important;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='29' height='29' viewBox='0 0 29 29'%3E%3Cpath d='M14.5 3L17 14.5L14.5 12L12 14.5Z' fill='%23e74c3c'/%3E%3Cpath d='M14.5 26L17 14.5L14.5 17L12 14.5Z' fill='%23ffffff'/%3E%3C/svg%3E") !important;
  }
  .maplibregl-ctrl-attrib {
    background: rgba(0,0,0,0.5) !important;
    color: rgba(255,255,255,0.35) !important;
    font-size: 10px;
  }
  .maplibregl-ctrl-attrib a { color: rgba(255,255,255,0.35) !important; }

  /* ── Globe hit areas ────────────────────── */
  .globe-hit {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1.5px solid rgba(74, 159, 255, 0.3);
    background: rgba(74, 159, 255, 0.05);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .globe-hit.hovered {
    border-color: rgba(74, 159, 255, 0.65);
    background: rgba(74, 159, 255, 0.12);
  }
  .globe-hit.race {
    border-color: rgba(255, 107, 53, 0.35);
    background: rgba(255, 107, 53, 0.06);
  }
  .globe-hit.race.hovered {
    border-color: rgba(255, 107, 53, 0.75);
    background: rgba(255, 107, 53, 0.15);
  }

  /* ── Sail marker dot ─────────────────────── */
  .sail-marker {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a9fff;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 10px rgba(74,159,255,0.6), 0 0 20px rgba(74,159,255,0.3);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .sail-marker:hover { transform: scale(1.4); }

  /* ── Settings button & panel ─────────────── */
  #settings-btn {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 25;
    width: 36px;
    height: 36px;
    background: rgba(5, 15, 30, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    font-size: 16px;
  }
  #settings-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  #btn-3d {
    position: fixed;
    bottom: 145px;
    right: 10px;
    z-index: 20;
    width: 29px;
    height: 29px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 4px;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
    color: #333;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #btn-3d:hover { background: #fff; }
  #btn-3d.is3d  { background: #2e7eff; color: #fff; box-shadow: 0 0 0 2px rgba(46,126,255,0.5); }

  #settings-panel {
    position: fixed;
    bottom: 68px;
    left: 24px;
    z-index: 25;
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 160, 255, 0.2);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 210px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.6);
    display: none;
  }

  #settings-panel h3 {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 12px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setting-label.disabled { color: rgba(255,255,255,0.3); }

  .setting-badge {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(74,159,255,0.15);
    border: 1px solid rgba(74,159,255,0.25);
    color: rgba(74,159,255,0.7);
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 34px;
    height: 18px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: rgba(74,159,255,0.7); }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
  .toggle.disabled { opacity: 0.3; pointer-events: none; }

  /* ── Style dropdown ──────────────────────── */
  #map-style-select {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    color: rgba(255,255,255,0.8);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 3px 8px;
    cursor: pointer;
    outline: none;
  }
  #map-style-select option { background: #0d1821; color: #fff; }

  /* ── Race Timeline ─────────────────────────── */
  #race-timeline {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    z-index: 30;
    background: rgba(5, 15, 30, 0.93);
    backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: none;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    box-shadow: 0 -6px 28px rgba(0,0,0,0.45);
  }
  #race-timeline.visible { display: flex; }

  /* push nav controls up when timeline is visible */
  #map.has-timeline .maplibregl-ctrl-bottom-right { bottom: 60px; }

  #tl-play {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    background: rgba(74,159,255,0.14);
    border: 1px solid rgba(74,159,255,0.38);
    border-radius: 50%;
    color: #8ab4f8;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  #tl-play:hover {
    background: rgba(74,159,255,0.28);
    border-color: rgba(74,159,255,0.65);
  }

  #tl-time {
    font-size: 0.78rem;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.04em;
    min-width: 54px;
    flex-shrink: 0;
  }

  #tl-track {
    flex: 1;
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    cursor: pointer;
    margin: 0 4px;
  }
  /* enlarged hitbox so it's easy to grab */
  #tl-track::before {
    content: '';
    position: absolute;
    inset: -12px 0;
  }

  #tl-fill {
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    background: rgba(74,159,255,0.65);
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

  #tl-thumb {
    position: absolute;
    top: 50%;
    left: 0%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    background: #8ab4f8;
    border: 2px solid rgba(255,255,255,0.82);
    border-radius: 50%;
    pointer-events: none;
    transition: width 0.1s, height 0.1s;
  }
  #race-timeline.scrubbing #tl-thumb {
    width: 18px;
    height: 18px;
  }

  #tl-duration {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.28);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    margin-right: 2px;
  }

  #tl-speeds {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .tl-speed {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: rgba(255,255,255,0.38);
    font-size: 0.7rem;
    padding: 3px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tl-speed.active {
    background: rgba(74,159,255,0.2);
    border-color: rgba(74,159,255,0.45);
    color: #8ab4f8;
  }
  .tl-speed:hover:not(.active) {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.65);
  }

  @media (max-width: 480px) {
    #tl-duration { display: none; }
    #tl-speeds .tl-speed { padding: 3px 5px; font-size: 0.65rem; }
    #tl-time { min-width: 46px; font-size: 0.72rem; }
  }
</style>
</head>
<body>


<div id="header">
  <h1>Sailing Map</h1>
</div>


<!-- Globe.gl container -->
<div id="globe-view"></div>

<!-- MapLibre detail map -->
<div id="map-view">
  <div id="map"></div>
  <div id="map-fallback-notice">Tiefenkarte nicht verfügbar — vereinfachte Basiskarte</div>
</div>

<!-- Globe spot popup -->
<div id="spot-popup">
  <button id="popup-close">×</button>
  <div id="popup-region"></div>
  <div id="popup-name"></div>
  <div id="popup-meta"></div>
  <button id="zoom-btn">Open Map →</button>
</div>

<!-- Map back button -->
<button id="back-globe">← <span class="back-label">Globe</span></button>

<!-- Settings -->
<button id="settings-btn" title="Layer">⚙</button>
<button id="btn-3d" title="3D-Gelände">3D</button>

<div id="settings-panel">
  <h3>Style</h3>
  <div class="setting-row">
    <span class="setting-label">Map style</span>
    <select id="map-style-select">
      <option value="dark">Dark</option>
      <option value="light" selected>Light</option>
    </select>
  </div>
  <h3 style="margin-top:12px">Layers</h3>
  <div class="setting-row">
    <span class="setting-label">Depth contours</span>
    <label class="toggle"><input type="checkbox" id="toggle-contours"><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">Depth labels</span>
    <label class="toggle"><input type="checkbox" id="toggle-depthlabels"><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">Nav marks</span>
    <label class="toggle"><input type="checkbox" id="toggle-openseamap"><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">Ferry routes</span>
    <label class="toggle"><input type="checkbox" id="toggle-ferry"><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row" id="row-racetracks" style="display:none">
    <span class="setting-label">Race tracks</span>
    <label class="toggle"><input type="checkbox" id="toggle-racetracks" checked><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row" id="row-coursemarks" style="display:none">
    <span class="setting-label">Course marks</span>
    <label class="toggle"><input type="checkbox" id="toggle-coursemarks" checked><span class="toggle-track"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">AIS ships <span id="ais-status" class="setting-badge">live</span></span>
    <label class="toggle"><input type="checkbox" id="toggle-ais"><span class="toggle-track"></span></label>
  </div>
</div>

<!-- Race Timeline Player -->
<div id="race-timeline">
  <button id="tl-play">▶</button>
  <div id="tl-time">0:00:00</div>
  <div id="tl-track">
    <div id="tl-fill"></div>
    <div id="tl-thumb"></div>
  </div>
  <div id="tl-duration"></div>
  <div id="tl-speeds">
    <button class="tl-speed" data-speed="1">1×</button>
    <button class="tl-speed" data-speed="8">8×</button>
    <button class="tl-speed active" data-speed="16">16×</button>
  </div>
</div>

<script>
// Register Service Worker for tile caching (reduces MapTiler API requests)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/globe/sw.js')
    .catch(() => {}); // fail silently — map works without SW
}

const SPOTS = [
  {
    name: "Whitsundays",
    region: "Australia",
    lat: -20.3, lng: 148.9,
    zoom: 9,
    years: "2019",
    notes: "Great Barrier Reef, Whitehaven Beach"
  },
  {
    name: "Grenadinen",
    region: "Caribbean",
    lat: 12.6, lng: -61.4,
    zoom: 8,
    years: "2018",
    notes: "St. Vincent to Grenada"
  },
  {
    name: "Kroatische Inseln",
    region: "Mediterranean",
    lat: 43.6, lng: 16.4,
    zoom: 8,
    years: "2015, 2017",
    notes: "Dalmatian Coast, Split to Dubrovnik"
  },
  {
    name: "Balearen",
    region: "Mediterranean",
    lat: 39.6, lng: 2.9,
    zoom: 8,
    years: "2016",
    notes: "Mallorca, Menorca, Ibiza"
  },
  {
    name: "Türkische Ägäis",
    region: "Mediterranean",
    lat: 37.1, lng: 27.2,
    zoom: 8,
    years: "2014",
    notes: "Bodrum to Fethiye, Blue Cruise"
  }
];

const RACES = [
  {
    name: "North Sound Maxi Regatta",
    race: "Performance Race 1",
    region: "Caribbean — BVI",
    lat: 18.49, lng: -64.45,
    zoom: 13,
    date: "March 2026",
    boats: 3,
    geojson: 'race1.geojson',
    type: 'race',
    marks: [
      { name: "WB", lat: 18.4933,              lng: -64.5225              },
      { name: "Ba", lat: 18.4285,              lng: -64.4544              },
      { name: "GD", lat: 18.48167113165485,    lng: -64.45623204856257    },
      { name: "Ge", lat: 18.493179409525393,   lng: -64.45721020544745    },
      { name: "CI", lat: 18.49490428693168,    lng: -64.46363563888845    },
      { name: "TR", lat: 18.49,                lng: -64.4945              },
      { name: "WD", lat: 18.48303452621442,    lng: -64.47256675886582    },
      { name: "1",  lat: 18.52481,             lng: -64.39226             }
    ]
  }
];

const ALL_MARKERS = [
  ...SPOTS.map(s => ({ ...s, type: 'spot' })),
  ...RACES
];

// ── Globe.gl setup ────────────────────────────────────────
const globeEl = document.getElementById('globe-view');
const hitElements = new Map();

const globe = Globe({ animateIn: true })(globeEl)
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .atmosphereColor('#4a7aff')
  .atmosphereAltitude(0.18)
  .pointsData(ALL_MARKERS)
  .pointLat(d => d.lat)
  .pointLng(d => d.lng)
  .pointColor(d => d.type === 'race' ? '#ff6b35' : '#4a9fff')
  .pointAltitude(0.012)
  .pointRadius(0.45)
  .pointResolution(12)
  .onPointClick(onSpotClick)
  .onPointHover(() => {})
  .htmlElementsData(ALL_MARKERS)
  .htmlLat(d => d.lat)
  .htmlLng(d => d.lng)
  .htmlAltitude(0.013)
  .htmlElement(d => {
    const el = document.createElement('div');
    el.className = d.type === 'race' ? 'globe-hit race' : 'globe-hit';
    hitElements.set(d.name, el);
    return el;
  });

// Proximity-based hover + click via mousemove/click on the globe container
globeEl.addEventListener('mousemove', ev => {
  let nearAny = false;
  ALL_MARKERS.forEach(m => {
    const sc = globe.getScreenCoords(m.lat, m.lng, 0.013);
    const el = hitElements.get(m.name);
    if (!el || !sc) return;
    const near = Math.hypot(ev.clientX - sc.x, ev.clientY - sc.y) < 34;
    el.classList.toggle('hovered', near);
    if (near) nearAny = true;
  });
  globeEl.style.cursor = nearAny ? 'pointer' : 'grab';
});

globeEl.addEventListener('click', ev => {
  ALL_MARKERS.forEach(m => {
    const sc = globe.getScreenCoords(m.lat, m.lng, 0.013);
    if (!sc) return;
    if (Math.hypot(ev.clientX - sc.x, ev.clientY - sc.y) < 34) {
      onSpotClick(m, ev, { x: ev.clientX, y: ev.clientY });
    }
  });
});

globeEl.addEventListener('touchend', ev => {
  const t = ev.changedTouches[0];
  ALL_MARKERS.forEach(m => {
    const sc = globe.getScreenCoords(m.lat, m.lng, 0.013);
    if (!sc) return;
    if (Math.hypot(t.clientX - sc.x, t.clientY - sc.y) < 44) {
      onSpotClick(m, ev, { x: t.clientX, y: t.clientY });
    }
  });
});

// Gentle auto-rotation
globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.5;
globe.controls().enableDamping = true;

// ── Popup logic ──────────────────────────────────────────
const popup    = document.getElementById('spot-popup');
const closeBtn = document.getElementById('popup-close');
const zoomBtn  = document.getElementById('zoom-btn');
let activeSpot = null;

function onSpotClick(spot, _ev, coords) {
  if (!spot) return;
  activeSpot = spot;

  document.getElementById('popup-region').textContent = spot.region;
  document.getElementById('popup-name').textContent   = spot.name;

  if (spot.type === 'race') {
    document.getElementById('popup-meta').innerHTML =
      `<span style="color:#ff6b35;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase">Race</span><br>` +
      `${spot.race}<br>` +
      `<span style="opacity:0.7">${spot.date} · ${spot.boats} boats</span>`;
  } else {
    document.getElementById('popup-meta').innerHTML =
      `${spot.years}<br><span style="opacity:0.7">${spot.notes}</span>`;
  }

  const vw = window.innerWidth, vh = window.innerHeight;
  const px = Math.min(Math.max(coords.x + 16, 10), vw - 280);
  const py = Math.min(Math.max(coords.y - 60, 10), vh - 200);
  popup.style.left = px + 'px';
  popup.style.top  = py + 'px';
  popup.classList.add('visible');
}

closeBtn.addEventListener('click', () => popup.classList.remove('visible'));

function applyMapStyle(name) {
  if (!mapInstance || !usePremiumMap) return;
  const s = MAP_STYLES[name];
  document.querySelector('#header h1').style.color = s.headlineColor;
  mapInstance.setPaintProperty('Land', 'fill-color', s.land);
  mapInstance.setPaintProperty('Glacier', 'fill-color', s.glacier);
  ['Land shadow', 'Land shadow 1', 'Land shadow 2'].forEach(id => {
    try { mapInstance.setLayoutProperty(id, 'visibility', s.landShadows); } catch {}
  });
  mapInstance.setPaintProperty('Island labels', 'text-color', s.islandLabelColor);
  mapInstance.setPaintProperty('Island labels', 'text-halo-width', s.islandLabelHalo);
  try {
    mapInstance.setPaintProperty('ferry-routes', 'line-color', s.islandLabelColor);
    mapInstance.setPaintProperty('ferry-routes', 'line-opacity', 0.1);
  } catch {}
  if (s.contourColor !== undefined) {
    try {
      mapInstance.setPaintProperty('Contour', 'line-color', s.contourColor);
      mapInstance.setPaintProperty('Contour index', 'line-color', s.contourColor);
    } catch {}
  }
  try {
    mapInstance.setPaintProperty('buildings', 'fill-color', s.buildingColor);
    mapInstance.setPaintProperty('buildings-outline', 'line-color', s.buildingOutline);
    mapInstance.setPaintProperty('place-cities', 'text-color', s.cityColor);
    mapInstance.setPaintProperty('place-cities', 'text-halo-color', s.cityHalo);
    mapInstance.setPaintProperty('place-cities', 'text-halo-width', s.cityHaloWidth);
    mapInstance.setPaintProperty('place-towns', 'text-color', s.townColor);
    mapInstance.setPaintProperty('place-towns', 'text-halo-color', s.townHalo);
    mapInstance.setPaintProperty('place-towns', 'text-halo-width', s.townHaloWidth);
  } catch {}
}

function onMapLoaded(spot) {
  if (usePremiumMap) {
    // ── MapTiler ocean style: full setup ────────────────────────────────
    applyMapStyle(currentMapStyle);
    mapInstance.setPaintProperty('Ocean RGB', 'hillshade-exaggeration', 0);
    mapInstance.setPaintProperty('Terrain RGB', 'hillshade-exaggeration', 0);
    ['Depth labels', 'Undersea labels', 'Undersea line labels'].forEach(id => {
      try { mapInstance.setPaintProperty(id, 'text-opacity', 0.5); } catch {}
    });
    applyLayerToggle('contours',    ['Depth contour'], document.getElementById('toggle-contours').checked);
    applyLayerToggle('depthlabels', ['Depth labels', 'Undersea line labels', 'Undersea labels'], document.getElementById('toggle-depthlabels').checked);
    try {
      mapInstance.setPaintProperty('Depth contour', 'line-color', [
        'interpolate', ['linear', 2], ['zoom'],
        8,  ['case', ['>', ['get', 'depth'], -4000], 'hsl(212,56%,25%)', 'hsl(208,48%,71%)'],
        12, ['case', ['>', ['get', 'depth'], -4000], 'hsl(209,93%,12%)', 'hsl(210,14%,97%)']
      ]);
    } catch {}

    mapInstance.addSource('osm', {
      type: 'vector',
      url: `https://api.maptiler.com/tiles/v3/tiles.json?key=${MAPTILER_KEY}`
    });
    const s = MAP_STYLES[currentMapStyle];
    mapInstance.addLayer({ id: 'buildings', type: 'fill', source: 'osm',
      'source-layer': 'building', minzoom: 14,
      paint: { 'fill-color': s.buildingColor, 'fill-opacity': 0.9 } });
    mapInstance.addLayer({ id: 'buildings-outline', type: 'line', source: 'osm',
      'source-layer': 'building', minzoom: 14,
      paint: { 'line-color': s.buildingOutline, 'line-width': 0.5 } });
    mapInstance.addLayer({ id: 'place-cities', type: 'symbol', source: 'osm',
      'source-layer': 'place', minzoom: 4,
      filter: ['all', ['==', ['get', 'class'], 'city'],
        ['<=', ['get', 'rank'], ['step', ['zoom'], 2, 5, 4, 7, 7, 9, 12]]],
      layout: { 'text-field': ['coalesce', ['get', 'name:en'], ['get', 'name']],
        'text-font': ['Noto Sans Regular', 'Roboto Regular'],
        'text-size': ['interpolate', ['linear'], ['zoom'], 4, 11, 8, 14, 12, 18],
        'text-anchor': 'center', 'text-max-width': 8 },
      paint: { 'text-color': s.cityColor, 'text-halo-color': s.cityHalo, 'text-halo-width': s.cityHaloWidth } });
    mapInstance.addLayer({ id: 'place-towns', type: 'symbol', source: 'osm',
      'source-layer': 'place', minzoom: 9,
      filter: ['all', ['in', ['get', 'class'], ['literal', ['town', 'village']]],
        ['<=', ['get', 'rank'], ['step', ['zoom'], 3, 10, 8, 12, 99]]],
      layout: { 'text-field': ['coalesce', ['get', 'name:en'], ['get', 'name']],
        'text-font': ['Noto Sans Regular', 'Roboto Regular'],
        'text-size': ['interpolate', ['linear'], ['zoom'], 11, 10, 14, 12],
        'text-anchor': 'center', 'text-max-width': 8 },
      paint: { 'text-color': s.townColor, 'text-halo-color': s.townHalo, 'text-halo-width': s.townHaloWidth } });
    mapInstance.addLayer({ id: 'ferry-routes', type: 'line', source: 'osm',
      'source-layer': 'transportation', minzoom: 5,
      filter: ['==', ['get', 'class'], 'ferry'],
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': s.islandLabelColor,
        'line-width': ['interpolate', ['linear'], ['zoom'], 5, 1, 10, 2],
        'line-opacity': 0.15, 'line-dasharray': [2, 3] } });
    applyLayerToggle('ferry', ['ferry-routes'], document.getElementById('toggle-ferry').checked);

  } else {
    // ── Fallback style: disable MapTiler-only controls ───────────────────
    document.getElementById('map-fallback-notice').style.display = 'block';
    ['toggle-contours', 'toggle-depthlabels', 'toggle-ferry'].forEach(id => {
      const el = document.getElementById(id);
      el.checked = false; el.disabled = true;
      el.closest('.setting-row').querySelector('.setting-label').classList.add('disabled');
      el.closest('.toggle').classList.add('disabled');
    });
    document.getElementById('map-style-select').disabled = true;
  }

  // ── Always: OpenSeaMap + AIS + race tracks ───────────────────────────
  mapInstance.addSource('openseamap', {
    type: 'raster',
    tiles: ['https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png'],
    tileSize: 256,
    attribution: '© <a href="https://www.openseamap.org">OpenSeaMap</a>'
  });
  mapInstance.addLayer({ id: 'openseamap', type: 'raster', source: 'openseamap',
    paint: { 'raster-opacity': 0.8 } });
  applyLayerToggle('openseamap', ['openseamap'], document.getElementById('toggle-openseamap').checked);
  initAISLayer();
  if (spot.type === 'race' && spot.geojson) loadRaceTracks(spot);
  flyToSpot(spot, 1200);
}

function showMap(spot) {
  document.getElementById('map-view').classList.add('visible');
  document.getElementById('back-globe').style.display = 'block';
  document.getElementById('settings-btn').style.display = 'flex';
  document.getElementById('btn-3d').style.display = 'flex';
  const h1 = document.querySelector('#header h1');
  h1.textContent = spot.type === 'race' ? spot.name : 'Sailing Map';
  h1.style.textShadow = 'none';
  globe.controls().autoRotate = false;

  if (!mapInstance) {
    mapInstance = new maplibregl.Map({
      container: 'map',
      style: MAPTILER_STYLE,
      center: [spot.lng, spot.lat],
      zoom: spot.zoom,
      attributionControl: true
    });
    mapInstance.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    // If MapTiler quota/auth fails (403), silently switch to free fallback style
    mapInstance.on('error', e => {
      if (usePremiumMap && !mapInstance.isStyleLoaded() && e.error?.status >= 400) {
        usePremiumMap = false;
        mapInstance.once('style.load', () => onMapLoaded(spot));
        mapInstance.setStyle(FALLBACK_STYLE);
      }
    });

    mapInstance.on('load', () => onMapLoaded(spot));
  } else {
    flyToSpot(spot, 1000);
  }
}

// Fly to a spot — uses fitBounds on marks for race spots so the full
// course is always visible regardless of screen size.
function flyToSpot(spot, duration) {
  if (spot.type === 'race' && spot.marks && spot.marks.length > 1) {
    // Jump instantly to a rough marks-based view; loadRaceTracks will
    // fire a smooth fitBounds (marks + boat starts) once GeoJSON arrives.
    const pts = spot.marks.map(m => [m.lng, m.lat]);
    pts.push([spot.lng, spot.lat]);
    const bounds = pts.reduce(
      (b, p) => b.extend(p),
      new maplibregl.LngLatBounds(pts[0], pts[0])
    );
    mapInstance.fitBounds(bounds, { padding: 60, duration: 0, maxZoom: 14 });
  } else {
    mapInstance.flyTo({ center: [spot.lng, spot.lat], zoom: spot.zoom, duration });
  }
}

function loadRaceTracks(race) {
  fetch(race.geojson)
    .then(r => r.json())
    .then(data => {
      if (!mapInstance.getSource('race-tracks')) {
        // Static dashed layer — full route, never changes once set
        mapInstance.addSource('race-tracks-full', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features: [] }
        });
        mapInstance.addLayer({
          id: 'race-tracks-full',
          type: 'line',
          source: 'race-tracks-full',
          layout: { 'line-join': 'round', 'line-cap': 'butt' },
          paint: {
            'line-color': ['get', 'color'],
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1, 15, 2],
            'line-opacity': 0.2,
            'line-dasharray': [3, 3]
          }
        });
        // Growing solid past track — drawn on top of the dashed layer
        mapInstance.addSource('race-tracks', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features: [] }
        });
        mapInstance.addLayer({
          id: 'race-tracks-past',
          type: 'line',
          source: 'race-tracks',
          layout: { 'line-join': 'round', 'line-cap': 'round' },
          paint: {
            'line-color': ['get', 'color'],
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1.5, 15, 3],
            'line-opacity': 0.9
          }
        });
        document.getElementById('row-racetracks').style.display = '';
        document.getElementById('toggle-racetracks').checked = true;
      }
      initRaceTimeline(data);

      // Fit the initial view to marks + boat start positions (screen-size-responsive)
      const pts = [];
      if (race.marks) race.marks.forEach(m => pts.push([m.lng, m.lat]));
      data.features.forEach(f => {
        if (f.geometry.coordinates.length) pts.push(f.geometry.coordinates[0]);
      });
      if (pts.length > 1) {
        const bounds = pts.reduce(
          (b, p) => b.extend(p),
          new maplibregl.LngLatBounds(pts[0], pts[0])
        );
        mapInstance.fitBounds(bounds, { padding: 80, duration: 900, maxZoom: 14 });
      }
    });
  if (race.marks && race.marks.length) addCourseMarks(race.marks);
}

function addCourseMarks(marks) {
  const data = {
    type: 'FeatureCollection',
    features: marks.map(m => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [m.lng, m.lat] },
      properties: { name: m.name }
    }))
  };

  if (mapInstance.getSource('course-marks')) {
    mapInstance.getSource('course-marks').setData(data);
    return;
  }

  mapInstance.addSource('course-marks', { type: 'geojson', data });

  // Outer glow ring
  mapInstance.addLayer({
    id: 'course-marks-glow',
    type: 'circle',
    source: 'course-marks',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 7, 15, 13],
      'circle-color': 'rgba(255,180,0,0.18)',
      'circle-stroke-width': 0
    }
  });
  // Main buoy dot
  mapInstance.addLayer({
    id: 'course-marks',
    type: 'circle',
    source: 'course-marks',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 4, 15, 7],
      'circle-color': '#f5a623',
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.85)'
    }
  });
  // Name label above
  mapInstance.addLayer({
    id: 'course-mark-labels',
    type: 'symbol',
    source: 'course-marks',
    layout: {
      'text-field': ['get', 'name'],
      'text-size': 11,
      'text-anchor': 'bottom',
      'text-offset': [0, -0.75],
      'text-font': ['Noto Sans Regular', 'Roboto Regular'],
      'text-allow-overlap': true,
      'text-ignore-placement': true
    },
    paint: {
      'text-color': '#f5a623'
    }
  });

  document.getElementById('row-coursemarks').style.display = '';
  document.getElementById('toggle-coursemarks').checked = true;
}

document.getElementById('toggle-racetracks').addEventListener('change', e => {
  applyLayerToggle('racetracks', ['race-tracks-full', 'race-tracks-past', 'boat-positions', 'boat-labels'], e.target.checked);
});
document.getElementById('toggle-coursemarks').addEventListener('change', e => {

function addMapMarkers() {
  SPOTS.forEach(spot => {
    const el = document.createElement('div');
    el.className = 'sail-marker';

    const pop = new maplibregl.Popup({ offset: 14, closeButton: true, maxWidth: '260px' })
      .setHTML(`
        <div class="popup-title">${spot.name}</div>
        <div class="popup-meta">
          <span style="opacity:0.65">${spot.region}</span><br>
          ${spot.years}<br>
          ${spot.notes}
        </div>
      `);

    new maplibregl.Marker({ element: el })
      .setLngLat([spot.lng, spot.lat])
      .setPopup(pop)
      .addTo(mapInstance);
  });
}

const AIS_KEY = 'efd3db53b2e99f5de532758895d911dff887921e';
let aisSocket = null;
let aisEnabled = false;
let aisLayerReady = false;
let aisPendingStart = false;
const shipData = new Map();

function setAisStatus(text, color) {
  const el = document.getElementById('ais-status');
  if (!el) return;
  el.textContent = text;
  el.style.color = color || '';
  el.style.borderColor = color ? color.replace(')', ', 0.4)').replace('rgb', 'rgba') : '';
  el.style.background = color ? color.replace(')', ', 0.1)').replace('rgb', 'rgba') : '';
}

function initAISLayer() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
    <polygon points="12,2 19,20 12,16 5,20" fill="#4adfff" stroke="rgba(0,0,0,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
  const img = new Image(24, 24);
  img.onload = () => {
    mapInstance.addImage('ship-arrow', img);
    mapInstance.addSource('ais-ships', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] }
    });
    mapInstance.addLayer({
      id: 'ais-ships',
      type: 'symbol',
      source: 'ais-ships',
      layout: {
        'icon-image': 'ship-arrow',
        'icon-size': 0.7,
        'icon-rotate': ['get', 'heading'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
        'visibility': 'none'
      }
    });
    mapInstance.on('click', 'ais-ships', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup({ offset: 10, maxWidth: '240px' })
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-title">${p.name}</div>
          <div class="popup-meta">
            MMSI: ${p.mmsi}<br>
            Speed: ${(+p.sog).toFixed(1)} kn<br>
            Course: ${Math.round(+p.cog)}°
          </div>
        `)
        .addTo(mapInstance);
    });
    mapInstance.on('mouseenter', 'ais-ships', () => { mapInstance.getCanvas().style.cursor = 'pointer'; });
    mapInstance.on('mouseleave', 'ais-ships', () => { mapInstance.getCanvas().style.cursor = ''; });
    aisLayerReady = true;
    if (aisPendingStart) { aisPendingStart = false; startAIS(); }
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function startAIS() {
  if (!aisLayerReady) { aisPendingStart = true; setAisStatus('…', 'rgb(255,200,50)'); return; }
  aisEnabled = true;
  mapInstance.setLayoutProperty('ais-ships', 'visibility', 'visible');
  connectAIS();
  mapInstance.on('moveend', reconnectAIS);
}

function stopAIS() {
  aisEnabled = false;
  aisPendingStart = false;
  setAisStatus('live', '');
  if (aisSocket) { aisSocket.close(); aisSocket = null; }
  shipData.clear();
  if (mapInstance) {
    mapInstance.off('moveend', reconnectAIS);
    try {
      mapInstance.setLayoutProperty('ais-ships', 'visibility', 'none');
      mapInstance.getSource('ais-ships').setData({ type: 'FeatureCollection', features: [] });
    } catch {}
  }
}

let reconnectTimer = null;

function connectAIS() {
  if (!aisEnabled) return;
  setAisStatus('…', 'rgb(255,200,50)');
  const b = mapInstance.getBounds();
  aisSocket = new WebSocket('wss://stream.aisstream.io/v0/stream');
  aisSocket.onopen = () => {
    setAisStatus('connected', 'rgb(50,200,100)');
    aisSocket.send(JSON.stringify({
      APIKey: AIS_KEY,
      BoundingBoxes: [[[b.getSouth(), b.getWest()], [b.getNorth(), b.getEast()]]],
      FilterMessageTypes: ['PositionReport']
    }));
  };
  aisSocket.onmessage = evt => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.MessageType !== 'PositionReport') {
        // show unexpected server messages in status for debugging
        if (msg.error || msg.Error || msg.message) {
          setAisStatus(msg.error || msg.Error || msg.message, 'rgb(255,80,80)');
        }
        return;
      }
      const m = msg.MetaData || msg.Metadata;
      const p = msg.Message && msg.Message.PositionReport;
      if (!m || !p) return;
      shipData.set(m.MMSI, {
        mmsi: m.MMSI,
        name: (m.ShipName || '').trim() || `MMSI ${m.MMSI}`,
        lat: m.latitude, lng: m.longitude,
        heading: p.TrueHeading < 360 ? p.TrueHeading : (p.Cog || 0),
        sog: p.Sog || 0, cog: p.Cog || 0
      });
      setAisStatus(`${shipData.size} ships`, 'rgb(74,223,255)');
      updateShipLayer();
    } catch {}
  };
  aisSocket.onerror = () => { setAisStatus('error', 'rgb(255,80,80)'); aisSocket = null; };
  aisSocket.onclose = () => {
    aisSocket = null;
    if (aisEnabled) { setAisStatus('reconnecting…', 'rgb(255,200,50)'); setTimeout(connectAIS, 5000); }
  };
}

function reconnectAIS() {
  // debounce: only reconnect 3s after the last map move
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    if (!aisEnabled) return;
    if (aisSocket) { aisSocket.close(); aisSocket = null; }
    shipData.clear();
    updateShipLayer();
    connectAIS();
  }, 3000);
}

function updateShipLayer() {
  const src = mapInstance && mapInstance.getSource('ais-ships');
  if (!src) return;
  src.setData({
    type: 'FeatureCollection',
    features: Array.from(shipData.values()).map(s => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
      properties: { mmsi: s.mmsi, name: s.name, heading: s.heading, sog: s.sog, cog: s.cog }
    }))
  });
}

// ── Race Timeline ─────────────────────────────────────────
// Use DOM markers in Safari (avoids terrain-draping GPU lag in 3D);
// use symbol layers in all other browsers where terrain draping works correctly.
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

let raceGeoJSON   = null;
let raceStartMs   = 0;
let raceEndMs     = 0;
let raceCurrentMs = 0;
let racePlaying   = false;
let raceSpeed     = 16;
let raceRafId     = null;
let raceLastWall  = null;
let scrubbing     = false;
let raceTrackLos  = null;  // cached lo-indices per boat for split-track optimisation
let followedBoatIdx  = null; // index into raceGeoJSON.features, null = free camera
let followAnimating  = false; // true during the initial zoom-to-fit animation

// ── 3D Terrain ────────────────────────────────────────────
let is3D = false;

function enable3D(animate = true) {
  if (!mapInstance) return;
  // Terrain causes GPU elevation-lookup lag for symbol/line layers in Safari —
  // use pitch-only 3D on Safari; full terrain on all other browsers.
  if (!isSafari) {
    if (!mapInstance.getSource('terrain-dem')) {
      mapInstance.addSource('terrain-dem', {
        type: 'raster-dem',
        url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MAPTILER_KEY}`,
        tileSize: 256
      });
    }
    if (!mapInstance.getLayer('sky')) {
      mapInstance.addLayer({
        id: 'sky', type: 'sky',
        paint: {
          'sky-type': 'atmosphere',
          'sky-atmosphere-sun': [0, 90],
          'sky-atmosphere-sun-intensity': 12,
          'sky-opacity': 0.85
        }
      });
    }
    mapInstance.setTerrain({ source: 'terrain-dem', exaggeration: 1.5 });
  }
  const btn = document.getElementById('btn-3d');
  btn.textContent = '2D';
  btn.classList.add('is3d');
  is3D = true;
  if (animate) _animatePitch(60);
}

function disable3D() {
  if (!mapInstance) return;
  if (!isSafari) mapInstance.setTerrain(null);
  _animatePitch(0);
  const btn = document.getElementById('btn-3d');
  btn.textContent = '3D';
  btn.classList.remove('is3d');
  is3D = false;
}

// Animate to a target pitch. In follow mode we combine pitch + boat
// position into one easeTo (and pause follow during that animation so
// updateFollow doesn't cancel it frame-by-frame).
function _animatePitch(targetPitch) {
  if (followedBoatIdx !== null && raceGeoJSON) {
    const r = interpDisplay(raceGeoJSON.features[followedBoatIdx], raceCurrentMs);
    if (r) {
      followAnimating = true;
      // setTimeout instead of once('moveend'): easeTo cancels the previous updateFollow
      // easeTo synchronously, which emits moveend before our listener would be meaningful.
      mapInstance.easeTo({ center: r.pos, bearing: r.bearing, pitch: targetPitch, duration: 900 });
      setTimeout(() => { followAnimating = false; }, 950);
      return;
    }
  }
  mapInstance.easeTo({ pitch: targetPitch, duration: 900 });
}

document.getElementById('btn-3d').addEventListener('click', () => {
  is3D ? disable3D() : enable3D();
});

function formatRaceTime(ms) {
  const s  = Math.floor(ms / 1000);
  const h  = Math.floor(s / 3600);
  const m  = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// Haversine distance in nautical miles between two [lng,lat] points
function haversineNm(a, b) {
  const R = 3440.065; // Earth radius in nm
  const φ1 = a[1] * Math.PI / 180, φ2 = b[1] * Math.PI / 180;
  const Δφ = (b[1] - a[1]) * Math.PI / 180, Δλ = (b[0] - a[0]) * Math.PI / 180;
  const s = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
}

// Speed in knots at time t, using a ±30 s smoothing window
function calcSpeedKnots(f, t) {
  const times = f._dTimes, coords = f._dCoords;
  if (!times || times.length < 2) return null;
  const ta = Math.max(times[0], t - 30000);
  const tb = Math.min(times[times.length - 1], t + 30000);
  if (tb - ta < 5000) return null;
  const ra = interpPosAndBearing(times, coords, ta);
  const rb = interpPosAndBearing(times, coords, tb);
  if (!ra || !rb) return null;
  return haversineNm(ra.pos, rb.pos) / ((tb - ta) / 3600000);
}

// Compass bearing (degrees CW from North) between two [lng,lat] points
function calcBearing(from, to) {
  const φ1 = from[1] * Math.PI / 180;
  const φ2 = to[1]  * Math.PI / 180;
  const Δλ = (to[0] - from[0]) * Math.PI / 180;
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// Binary-search interpolation — returns {pos, bearing}
function interpPosAndBearing(times, coords, t) {
  if (!times || !times.length) return null;
  if (t <= times[0]) {
    return { pos: coords[0], bearing: coords.length > 1 ? calcBearing(coords[0], coords[1]) : 0 };
  }
  const last = times.length - 1;
  if (t >= times[last]) {
    return { pos: coords[last], bearing: last > 0 ? calcBearing(coords[last-1], coords[last]) : 0 };
  }
  let lo = 0, hi = last;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (times[mid] <= t) lo = mid; else hi = mid;
  }
  const frac = (t - times[lo]) / (times[hi] - times[lo]);
  const a = coords[lo], b = coords[hi];
  return {
    pos: [a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac],
    bearing: calcBearing(a, b)
  };
}

// Chaikin corner-cutting — each pass doubles the points; produces a
// parallel times array so the split-track binary search stays correct.
function chaikinSmooth(coords, times, iterations) {
  let c = coords.slice(), t = times.slice();
  for (let iter = 0; iter < iterations; iter++) {
    const nc = [c[0]], nt = [t[0]];
    for (let i = 0; i < c.length - 1; i++) {
      const a = c[i], b = c[i+1], ta = t[i], tb = t[i+1];
      nc.push([a[0]*0.75+b[0]*0.25, a[1]*0.75+b[1]*0.25]); nt.push(ta*0.75+tb*0.25);
      nc.push([a[0]*0.25+b[0]*0.75, a[1]*0.25+b[1]*0.75]); nt.push(ta*0.25+tb*0.75);
    }
    nc.push(c[c.length-1]); nt.push(t[t.length-1]);
    c = nc; t = nt;
  }
  return { coords: c, times: t };
}

// Per-point bearings from a window of neighbours — smooths out noise
// in direction while still responding to real course changes.
function computeSmoothedBearings(coords, win) {
  const n = coords.length;
  const b = new Array(n);
  for (let i = 0; i < n; i++) {
    b[i] = calcBearing(coords[Math.max(0, i - win)], coords[Math.min(n - 1, i + win)]);
  }
  return b;
}

// Smooth interpolation using pre-computed display arrays (_dCoords/_dTimes/_dBearings).
// Bearing is interpolated with wraparound so rotation never snaps through 0°/360°.
function interpDisplay(f, t) {
  const times = f._dTimes, coords = f._dCoords, bearings = f._dBearings;
  if (!times || !times.length) return null;
  if (t <= times[0]) return { pos: coords[0], bearing: bearings[0] };
  const last = times.length - 1;
  if (t >= times[last]) return { pos: coords[last], bearing: bearings[last] };
  let lo = 0, hi = last;
  while (hi - lo > 1) { const mid = (lo + hi) >> 1; if (times[mid] <= t) lo = mid; else hi = mid; }
  const frac = (t - times[lo]) / (times[hi] - times[lo]);
  const a = coords[lo], b = coords[hi];
  const pos = [a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac];
  const bA = bearings[lo], bB = bearings[hi];
  const bearing = (bA + (((bB - bA) + 540) % 360 - 180) * frac + 360) % 360;
  return { pos, bearing };
}

function updateBoatPositions() {
  const src = mapInstance && mapInstance.getSource('boat-positions');
  if (!src || !raceGeoJSON) return;
  // MapLibre renders setData() with ~1 rAF frame delay.
  // At high speeds this causes visible lag, so we look one frame ahead:
  // 1 frame ≈ 16 ms wall time × raceSpeed = race-time offset to compensate.
  const tDisplay = Math.min(raceCurrentMs + raceSpeed * 16, raceEndMs);
  src.setData({
    type: 'FeatureCollection',
    features: raceGeoJSON.features.map(f => {
      const r = interpDisplay(f, tDisplay);
      if (!r) return null;
      const spd = calcSpeedKnots(f, raceCurrentMs);
      return {
        type: 'Feature',
        geometry: { type: 'Point', coordinates: r.pos },
        properties: {
          color: f.properties.color,
          name: f.properties.name || f.properties.boat || '',
          speed: spd !== null ? spd.toFixed(1) + ' kn' : '',
          bearing: r.bearing
        }
      };
    }).filter(Boolean)
    // Red boat last → rendered on top → highest click priority
    .sort((a, b) => (a.properties.color === '#e74c3c' ? 1 : b.properties.color === '#e74c3c' ? -1 : 0))
  });
}

// Split each boat track at the current race time:
// coords[0..lo] → solid past line; coords[lo..end] → dashed future line.
// Only rebuilds GeoJSON when the segment index changes (every 5 race-seconds).
function updateRaceTracks() {
  const src = mapInstance && mapInstance.getSource('race-tracks');
  if (!src || !raceGeoJSON) return;

  const newLos = raceGeoJSON.features.map(f => {
    const times = f._dTimes || f.properties.times;
    if (!Array.isArray(times) || !times.length) return 0;
    if (raceCurrentMs <= times[0]) return 0;
    const last = times.length - 1;
    if (raceCurrentMs >= times[last]) return last;
    let lo = 0, hi = last;
    while (hi - lo > 1) { const mid = (lo + hi) >> 1; if (times[mid] <= raceCurrentMs) lo = mid; else hi = mid; }
    return lo;
  });

  // Skip rebuild if no segment boundary moved
  if (raceTrackLos && newLos.every((lo, i) => lo === raceTrackLos[i])) return;
  raceTrackLos = newLos;

  const features = [];
  raceGeoJSON.features.forEach((f, fi) => {
    const times  = f._dTimes  || f.properties.times;
    const coords = f._dCoords || f.geometry.coordinates;
    const color  = f.properties.color;
    if (!Array.isArray(times) || !times.length) return;

    const lo = raceTrackLos[fi];

    // Exact interpolated split point
    let split;
    if (lo >= times.length - 1) {
      split = coords[coords.length - 1];
    } else {
      const frac = Math.max(0, Math.min(1, (raceCurrentMs - times[lo]) / (times[lo + 1] - times[lo])));
      const a = coords[lo], b = coords[lo + 1];
      split = [a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac];
    }

    // Past segment (solid) — grows over the static dashed full-track layer
    const past = [...coords.slice(0, lo + 1), split];
    if (past.length >= 2) features.push({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: past },
      properties: { color }
    });
  });

  src.setData({ type: 'FeatureCollection', features });
}

function updateFollow() {
  if (followedBoatIdx === null || !raceGeoJSON || !mapInstance) return;
  // Don't cancel the initial zoom-to-fit or NavigationControl zoom animations
  if (followAnimating || mapInstance.isZooming()) return;
  const f = raceGeoJSON.features[followedBoatIdx];
  if (!f) return;
  const r = interpDisplay(f, raceCurrentMs);
  if (!r) return;
  mapInstance.easeTo({ center: r.pos, bearing: r.bearing, duration: 80, easing: x => x });
}

function updateTimelineUI() {
  const pct = ((raceCurrentMs - raceStartMs) / (raceEndMs - raceStartMs) * 100).toFixed(3) + '%';
  document.getElementById('tl-fill').style.width = pct;
  document.getElementById('tl-thumb').style.left = pct;
  document.getElementById('tl-time').textContent  = formatRaceTime(raceCurrentMs - raceStartMs);
}

function raceAnimStep(wallMs) {
  if (!racePlaying) return;
  if (raceLastWall !== null && !scrubbing) {
    raceCurrentMs += (wallMs - raceLastWall) * raceSpeed;
    if (raceCurrentMs >= raceEndMs) {
      raceCurrentMs = raceEndMs;
      racePlaying   = false;
      document.getElementById('tl-play').textContent = '▶';
    }
  }
  raceLastWall = wallMs;
  updateTimelineUI();
  updateBoatPositions();
  updateRaceTracks();
  updateFollow();
  if (racePlaying) raceRafId = requestAnimationFrame(raceAnimStep);
}

function setupBoatLayers() {
  if (!mapInstance.getSource('boat-positions')) {
    mapInstance.addSource('boat-positions', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    mapInstance.addLayer({
      id: 'boat-positions', type: 'symbol', source: 'boat-positions',
      layout: {
        'icon-image': 'boat-icon',
        'icon-size': ['interpolate', ['linear'], ['zoom'], 10, 0.7, 14, 1.1, 17, 1.8],
        'icon-rotate': ['get', 'bearing'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true, 'icon-ignore-placement': true
      },
      paint: { 'icon-color': ['get', 'color'] }
    });
    mapInstance.addLayer({
      id: 'boat-labels', type: 'symbol', source: 'boat-positions',
      layout: {
        'text-field': ['format', ['get', 'name'], {}, '\n', {}, ['get', 'speed'], {'font-scale': 0.85}],
        'text-size': 11, 'text-anchor': 'top', 'text-offset': [0, 1.3],
        'text-font': ['Noto Sans Regular', 'Roboto Regular'],
        'text-allow-overlap': true, 'text-ignore-placement': true
      },
      paint: { 'text-color': ['get', 'color'] }
    });
    mapInstance.on('click', 'boat-positions', e => {
      if (!raceGeoJSON || !e.features.length) return;
      // MapLibre returns features in source order (first = lowest z).
      // Take the last one — it's highest z (sorted last = rendered on top).
      const color = e.features[e.features.length - 1].properties.color;
      const idx = raceGeoJSON.features.findIndex(f => f.properties.color === color);
      if (idx < 0) return;
      followedBoatIdx = idx;
      const r = interpDisplay(raceGeoJSON.features[idx], raceCurrentMs);
      if (!r) return;
      const positions = raceGeoJSON.features.map(f => interpDisplay(f, raceCurrentMs)).filter(Boolean).map(x => x.pos);
      let targetZoom = mapInstance.getZoom();
      if (positions.length > 1) {
        const bounds = positions.reduce((b, p) => b.extend(p), new maplibregl.LngLatBounds(positions[0], positions[0]));
        const cam = mapInstance.cameraForBounds(bounds, { padding: 80 });
        if (cam) targetZoom = cam.zoom - 3;
      }
      // Switch to 3D if not already — skip the separate pitch animation and
      // fold pitch:60 into the single easeTo below to avoid two conflicting calls.
      if (!is3D) enable3D(false);
      followAnimating = true;
      mapInstance.easeTo({ center: r.pos, bearing: r.bearing, zoom: targetZoom, pitch: 60, duration: 900 });
      setTimeout(() => { followAnimating = false; }, 950);
    });
    mapInstance.on('mouseenter', 'boat-positions', () => { mapInstance.getCanvas().style.cursor = 'pointer'; });
    mapInstance.on('mouseleave', 'boat-positions', () => { mapInstance.getCanvas().style.cursor = ''; });
    mapInstance.on('dragstart', () => { followedBoatIdx = null; });
  }
  document.getElementById('race-timeline').classList.add('visible');
  document.getElementById('map').classList.add('has-timeline');
  document.getElementById('settings-btn').style.bottom   = '80px';
  document.getElementById('settings-panel').style.bottom = '124px';
  document.getElementById('btn-3d').style.bottom         = '205px';
  document.getElementById('tl-duration').textContent = formatRaceTime(raceEndMs - raceStartMs);
  updateTimelineUI();
  updateBoatPositions();
  updateRaceTracks();
}

function initRaceTimeline(geojson) {
  raceGeoJSON = geojson;

  // Derive time bounds from all boat tracks
  raceStartMs = Infinity;
  raceEndMs   = -Infinity;
  geojson.features.forEach(f => {
    const t = f.properties.times;
    if (t && t.length) {
      if (t[0]          < raceStartMs) raceStartMs = t[0];
      if (t[t.length-1] > raceEndMs)   raceEndMs   = t[t.length-1];
    }
  });
  raceCurrentMs = raceStartMs;

  // Pre-compute Chaikin-smoothed display data (3 passes → 8× denser ≈ 0.6 s resolution).
  // _dBearings: window-averaged directions so rotation is silky-smooth with no snapping.
  geojson.features.forEach(f => {
    const smooth   = chaikinSmooth(f.geometry.coordinates, f.properties.times, 3);
    f._dCoords     = smooth.coords;
    f._dTimes      = smooth.times;
    f._dBearings   = computeSmoothedBearings(smooth.coords, 4); // 4-point window ≈ 2.5 s
  });

  // Populate the static dashed layer with the full smoothed route once.
  const fullSrc = mapInstance && mapInstance.getSource('race-tracks-full');
  if (fullSrc) {
    fullSrc.setData({
      type: 'FeatureCollection',
      features: geojson.features.map(f => ({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: f._dCoords },
        properties: { color: f.properties.color }
      }))
    });
  }

  // SDF symbol layers for boats (all browsers — terrain disabled in Safari so no GPU lag)
  const BOAT_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="28" viewBox="0 0 16 28">
    <path d="M8,1 C11.5,6 13,13 12,20 C10.5,25.5 5.5,25.5 4,20 C3,13 4.5,6 8,1 Z" fill="white"/>
  </svg>`;
  if (mapInstance.hasImage('boat-icon')) { setupBoatLayers(); }
  else {
    const img = new Image(16, 28);
    img.onload = () => { mapInstance.addImage('boat-icon', img, { sdf: true }); setupBoatLayers(); };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(BOAT_SVG);
  }
}

function hideRaceTimeline() {
  racePlaying = false;
  if (raceRafId) { cancelAnimationFrame(raceRafId); raceRafId = null; }
  raceLastWall = null;
  raceGeoJSON  = null;
  raceTrackLos    = null;
  followedBoatIdx = null;
  followAnimating = false;
  const emptyFC = { type: 'FeatureCollection', features: [] };
  try { mapInstance.getSource('race-tracks-full').setData(emptyFC); } catch {}
  try { mapInstance.getSource('race-tracks').setData(emptyFC); } catch {}
  try { mapInstance.getSource('boat-positions').setData(emptyFC); } catch {} // Chrome path
  document.getElementById('tl-play').textContent = '▶';
  document.getElementById('race-timeline').classList.remove('visible');
  document.getElementById('map').classList.remove('has-timeline');
  document.getElementById('settings-btn').style.bottom   = '';
  document.getElementById('settings-panel').style.bottom = '';
  document.getElementById('btn-3d').style.bottom         = '';
  // Reset speed UI
  raceSpeed = 16;
  document.querySelectorAll('.tl-speed').forEach(b => b.classList.toggle('active', b.dataset.speed === '16'));
}

// ── Play / Pause ──────────────────────────────────────────
document.getElementById('tl-play').addEventListener('click', () => {
  if (!raceGeoJSON) return;
  racePlaying = !racePlaying;
  document.getElementById('tl-play').textContent = racePlaying ? '⏸' : '▶';
  if (racePlaying) {
    if (raceCurrentMs >= raceEndMs) raceCurrentMs = raceStartMs;
    raceLastWall = null;
    raceRafId = requestAnimationFrame(raceAnimStep);
  } else {
    if (raceRafId) { cancelAnimationFrame(raceRafId); raceRafId = null; }
    raceLastWall = null;
  }
});

// ── Speed buttons ─────────────────────────────────────────
document.querySelectorAll('.tl-speed').forEach(btn => {
  btn.addEventListener('click', () => {
    raceSpeed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.tl-speed').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── Scrubber ──────────────────────────────────────────────
const tlTrack = document.getElementById('tl-track');
const tlBar   = document.getElementById('race-timeline');

function scrubTo(clientX) {
  const rect = tlTrack.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  raceCurrentMs = raceStartMs + frac * (raceEndMs - raceStartMs);
  raceLastWall  = null; // prevent time-jump when releasing
  updateTimelineUI();
  if (!racePlaying) { updateBoatPositions(); updateRaceTracks(); updateFollow(); }
}

tlTrack.addEventListener('mousedown', e => {
  if (!raceGeoJSON) return;
  scrubbing = true;
  tlBar.classList.add('scrubbing');
  scrubTo(e.clientX);
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!scrubbing) return;
  scrubTo(e.clientX);
});
document.addEventListener('mouseup', () => {
  if (!scrubbing) return;
  scrubbing = false;
  raceLastWall = null;
  tlBar.classList.remove('scrubbing');
  updateBoatPositions();
});

tlTrack.addEventListener('touchstart', e => {
  if (!raceGeoJSON) return;
  scrubbing = true;
  tlBar.classList.add('scrubbing');
  scrubTo(e.touches[0].clientX);
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!scrubbing) return;
  scrubTo(e.touches[0].clientX);
}, { passive: true });
document.addEventListener('touchend', () => {
  if (!scrubbing) return;
  scrubbing = false;
  raceLastWall = null;
  tlBar.classList.remove('scrubbing');
  updateBoatPositions();
});
</script>
