<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Moonrunner — Markus Stuhr</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #020509;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
    touch-action: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    max-width: 100%;
  }
  #back {
    position: fixed;
    top: 1.2rem; left: 1.2rem;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(100,180,255,0.3);
    text-decoration: none;
    z-index: 10;
  }
  #back:hover { color: rgba(100,180,255,0.7); }
</style>
</head>
<body>

<a href="/" id="back">← zurück</a>
<div id="wrap"><canvas id="c"></canvas></div>

<script>
// Foreground canvas (full res) — astronaut + HUD
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Background canvas (low res, pixelated) — world
const bg = document.createElement('canvas');
const bx = bg.getContext('2d');
bx.imageSmoothingEnabled = false;

// ─── Dynamic dimensions ───────────────────────────────────────────
const SCALE = 2;   // world rendered at 1/SCALE → each world pixel = 2×2 screen pixels
let GW, GH, GROUND, SW, SH;
const PLANET  = {};
const GRAVITY = 0.48;
const JUMP_V  = -14;

let STARS   = [];
let PEBBLES = [];

function initSize() {
  SW = window.innerWidth;
  SH = window.innerHeight;
  GW = Math.ceil(SW / SCALE);   // game/world resolution
  GH = Math.ceil(SH / SCALE);

  // Foreground canvas: full screen resolution
  canvas.width  = SW; canvas.height = SH;
  canvas.style.width = SW + 'px'; canvas.style.height = SH + 'px';

  // Background (world) canvas: low resolution
  bg.width = GW; bg.height = GH;

  GROUND   = GH - Math.round(GH * 0.13);
  A.x      = GW / 2;
  if (!A.y || A.y > GROUND) A.y = GROUND;

  PLANET.x = GW * 0.72;
  PLANET.y = GH * 0.17;
  PLANET.r = Math.round(Math.min(GW, GH) * 0.065);

  STARS = Array.from({ length: Math.floor(GW * GH / 4000) + 40 }, () => ({
    x: Math.random() * GW,
    y: Math.random() * (GROUND - 20),
    r: Math.random() < 0.15 ? 1.5 : 0.8,
    spd: 0.15 + Math.random() * 0.5,
    a: 0.4 + Math.random() * 0.6,
  }));

  PEBBLES = Array.from({ length: Math.floor(GW / 22) }, () => ({
    ox: Math.random() * GW,
    oy: GROUND + 4 + Math.random() * 12,
    w: 2 + Math.random() * 5,
    h: 2 + Math.random() * 3,
  }));
}

// ─── State ───────────────────────────────────────────────────────
let state    = 'idle';
let score    = 0;
let hiScore  = parseInt(localStorage.getItem('ms_hi') || '0');
let speed    = 4;
let frame    = 0;
let tick     = 0;
let shakes   = 0;
let scrollX  = 0;

// ─── Astronaut ───────────────────────────────────────────────────
const A = { x: 0, y: 0, vy: 0, jumps: 0, walk: 0, walkT: 0 };

initSize();
window.addEventListener('resize', initSize);

// ─── Obstacles ───────────────────────────────────────────────────
let obstacles  = [];
let nextObs    = 90;

function spawnObstacle() {
  if (Math.random() < 0.55) {
    // Moon rock
    const h = 18 + Math.random() * 28;
    const w = h * (0.7 + Math.random() * 0.6);
    obstacles.push({ type: 'rock', x: GW + 10, y: GROUND - h, w, h });
  } else {
    // Crystal cluster
    const count = 2 + Math.floor(Math.random() * 3);
    const shards = [];
    let bx = 0;
    for (let i = 0; i < count; i++) {
      const bw = 7 + Math.random() * 7;
      const sh = 22 + Math.random() * 32;
      shards.push({ bx, bw, sh, tx: bx + bw / 2 + (Math.random() - 0.5) * 5 });
      bx += bw + 2 + Math.random() * 4;
    }
    const maxH = Math.max(...shards.map(s => s.sh));
    obstacles.push({ type: 'crystal', x: GW + 10, y: GROUND - maxH, w: bx, h: maxH, shards });
  }
}

// ─── Input ───────────────────────────────────────────────────────
function doJump() {
  if (state === 'idle')  { state = 'running'; return; }
  if (state === 'dead')  { restart(); return; }
  if (A.jumps < 2) { A.vy = JUMP_V * (A.jumps === 1 ? 0.82 : 1); A.jumps++; }
}

function restart() {
  A.y = GROUND; A.vy = 0; A.jumps = 0; A.walk = 0;
  obstacles = []; score = 0; speed = 4; frame = 0; nextObs = 90; scrollX = 0;
  state = 'running';
}

document.addEventListener('keydown',   e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }});
canvas.addEventListener('click',       () => doJump());
canvas.addEventListener('touchstart',  e => { e.preventDefault(); doJump(); }, { passive: false });

// ─── Drawing helpers (world canvas bx) ───────────────────────────
function fillRect(x, y, w, h, col) {
  bx.fillStyle = col;
  bx.fillRect(Math.round(x), Math.round(y), w, h);
}

// ─── Draw astronaut ───────────────────────────────────────────────
function drawAstronaut(cx, fy, wf, jumping, dead) {
  ctx.save();
  if (dead) {
    ctx.translate(cx, fy - 16);
    ctx.rotate(0.55);
    cx = 0; fy = 16;
  }

  const lf = Math.floor(wf / 5) % 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx, fy + 1, 13, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Legs ──
  ctx.fillStyle = '#8899bb';
  if (jumping) {
    // Tucked
    ctx.fillRect(cx - 9, fy - 14, 7, 9);
    ctx.fillRect(cx + 2,  fy - 14, 7, 9);
  } else {
    if (lf === 0) {
      ctx.fillRect(cx - 9, fy - 16, 7, 14);
      ctx.fillRect(cx + 2,  fy - 12, 7, 10);
    } else {
      ctx.fillRect(cx - 9, fy - 12, 7, 10);
      ctx.fillRect(cx + 2,  fy - 16, 7, 14);
    }
  }
  // Boots
  ctx.fillStyle = '#667788';
  if (jumping) {
    ctx.fillRect(cx - 10, fy - 8,  9, 4);
    ctx.fillRect(cx + 1,  fy - 8,  9, 4);
  } else {
    ctx.fillRect(cx - 10, fy - 4,  9, 4);
    ctx.fillRect(cx + 1,  fy - 4,  9, 4);
  }

  // ── Body ──
  ctx.fillStyle = '#deeeff';
  ctx.fillRect(cx - 11, fy - 32, 22, 17);

  // Chest panel detail
  ctx.fillStyle = '#5588aa';
  ctx.fillRect(cx - 4, fy - 31, 3, 11);
  ctx.fillRect(cx + 1,  fy - 31, 3, 11);
  ctx.fillStyle = '#77aacc';
  ctx.fillRect(cx - 4, fy - 31, 3, 2);
  ctx.fillRect(cx + 1,  fy - 31, 3, 2);

  // Life support pack (back)
  ctx.fillStyle = '#667788';
  ctx.fillRect(cx + 11, fy - 31, 7, 13);
  ctx.fillStyle = '#8899aa';
  ctx.fillRect(cx + 12, fy - 29, 5, 8);
  ctx.fillStyle = '#44cc88';  // status LED
  ctx.fillRect(cx + 13, fy - 21, 2, 2);

  // ── Arms ──
  const armOff = jumping ? -4 : (lf === 0 ? -2 : 3);
  ctx.fillStyle = '#ccddf0';
  ctx.fillRect(cx - 16, fy - 31, 6, 11);
  ctx.fillRect(cx + 10, fy - 31 - armOff, 6, 11);
  // Gloves
  ctx.fillStyle = '#99aabb';
  ctx.fillRect(cx - 16, fy - 20, 6, 4);
  ctx.fillRect(cx + 10, fy - 20 - armOff, 6, 4);

  // ── Helmet ──
  ctx.fillStyle = '#eaf3ff';
  ctx.beginPath();
  ctx.arc(cx, fy - 41, 13, 0, Math.PI * 2);
  ctx.fill();

  // Collar ring
  ctx.fillStyle = '#ccdde8';
  ctx.fillRect(cx - 11, fy - 31, 22, 4);

  // Visor (dark, slightly angled)
  ctx.fillStyle = '#0d2a45';
  ctx.beginPath();
  ctx.ellipse(cx + 1, fy - 41, 9, 7, 0.05, 0, Math.PI * 2);
  ctx.fill();
  // Visor tint overlay
  ctx.fillStyle = 'rgba(30,100,180,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx + 1, fy - 41, 9, 7, 0.05, 0, Math.PI * 2);
  ctx.fill();
  // Visor shine
  ctx.fillStyle = 'rgba(160,230,255,0.55)';
  ctx.fillRect(cx - 6, fy - 47, 5, 3);
  ctx.fillRect(cx - 6, fy - 43, 2, 1);

  // ── Antenna ──
  ctx.fillStyle = '#99aabb';
  ctx.fillRect(cx + 6, fy - 56, 2, 9);
  const blink = Math.floor(tick / 22) % 2;
  ctx.fillStyle = blink ? '#ff4455' : '#882233';
  ctx.fillRect(cx + 5, fy - 58, 4, 4);
  if (blink) {
    ctx.fillStyle = 'rgba(255,60,70,0.4)';
    ctx.beginPath();
    ctx.arc(cx + 7, fy - 56, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ─── Draw moon rock (world canvas) ───────────────────────────────
function drawRock(obs) {
  const { x, y, w, h } = obs;
  bx.fillStyle = '#4a4a5a';
  bx.beginPath();
  bx.moveTo(x + w * 0.08, y + h);
  bx.lineTo(x,             y + h * 0.55);
  bx.lineTo(x + w * 0.12, y + h * 0.18);
  bx.lineTo(x + w * 0.38, y);
  bx.lineTo(x + w * 0.65, y + h * 0.05);
  bx.lineTo(x + w,        y + h * 0.42);
  bx.lineTo(x + w * 0.92, y + h);
  bx.closePath();
  bx.fill();
  bx.fillStyle = '#6a6a7a';
  bx.beginPath();
  bx.moveTo(x + w * 0.12, y + h * 0.18);
  bx.lineTo(x + w * 0.38, y);
  bx.lineTo(x + w * 0.55, y + h * 0.22);
  bx.lineTo(x + w * 0.28, y + h * 0.38);
  bx.closePath();
  bx.fill();
  bx.fillStyle = '#2a2a38';
  bx.fillRect(x + w * 0.08, y + h * 0.82, w * 0.84, h * 0.18);
}

// ─── Draw crystal (world canvas) ──────────────────────────────────
function drawCrystal(obs) {
  const { x, y, w, h, shards } = obs;
  const COLS = ['#1a5599', '#2266bb', '#0e4488', '#3399cc'];
  shards.forEach((s, i) => {
    bx.fillStyle = COLS[i % COLS.length];
    bx.beginPath();
    bx.moveTo(x + s.bx,        GROUND);
    bx.lineTo(x + s.tx,        GROUND - s.sh);
    bx.lineTo(x + s.bx + s.bw, GROUND);
    bx.closePath();
    bx.fill();
    bx.fillStyle = 'rgba(150,220,255,0.28)';
    bx.beginPath();
    bx.moveTo(x + s.bx + s.bw * 0.4, GROUND);
    bx.lineTo(x + s.tx + 1,           GROUND - s.sh);
    bx.lineTo(x + s.tx + 3,           GROUND - s.sh);
    bx.lineTo(x + s.bx + s.bw * 0.6, GROUND);
    bx.closePath();
    bx.fill();
    bx.fillStyle = 'rgba(100,200,255,0.5)';
    bx.fillRect(x + s.tx - 1, GROUND - s.sh, 3, 4);
  });
}

// ─── Draw background (world canvas) ──────────────────────────────
function drawBG() {
  const sky = bx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#010408');
  sky.addColorStop(1, '#040c18');
  bx.fillStyle = sky;
  bx.fillRect(0, 0, GW, GROUND);

  STARS.forEach(s => {
    bx.fillStyle = `rgba(210,235,255,${s.a})`;
    bx.fillRect(Math.round(s.x), Math.round(s.y), Math.ceil(s.r * 2), Math.ceil(s.r * 2));
  });

  bx.fillStyle = '#181f2e';
  bx.beginPath();
  bx.arc(PLANET.x, PLANET.y, PLANET.r, 0, Math.PI * 2);
  bx.fill();
  bx.fillStyle = '#222d3e';
  bx.beginPath();
  bx.arc(PLANET.x - 8, PLANET.y - 6, PLANET.r * 0.72, 0, Math.PI * 2);
  bx.fill();
  bx.save();
  bx.strokeStyle = 'rgba(90,150,220,0.22)';
  bx.lineWidth = 5;
  bx.beginPath();
  bx.ellipse(PLANET.x, PLANET.y, PLANET.r + 20, 7, -0.18, 0, Math.PI * 2);
  bx.stroke();
  bx.restore();
}

// ─── Draw ground (world canvas) ───────────────────────────────────
function drawGround() {
  const grd = bx.createLinearGradient(0, GROUND, 0, GH);
  grd.addColorStop(0,   '#383845');
  grd.addColorStop(0.2, '#26262f');
  grd.addColorStop(1,   '#111118');
  bx.fillStyle = grd;
  bx.fillRect(0, GROUND, GW, GH - GROUND);
  fillRect(0, GROUND, GW, 2, '#55556a');
  PEBBLES.forEach(p => {
    const gx = ((p.ox - scrollX) % (GW + 20) + GW + 20) % (GW + 20) - 10;
    fillRect(gx, p.oy, p.w, p.h, 'rgba(80,80,100,0.45)');
  });
}

// ─── Draw HUD (foreground canvas, screen coords) ──────────────────
function drawHUD() {
  ctx.fillStyle = 'rgba(100,180,255,0.45)';
  ctx.font = '10px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText('HI ' + String(hiScore).padStart(5, '0'), SW - 16, 28);
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = 'bold 13px "Courier New"';
  ctx.fillText(String(score).padStart(5, '0'), SW - 16, 46);
  ctx.textAlign = 'left';

  if (state === 'idle') {
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = 'bold 13px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('MOONRUNNER', SW / 2, SH / 2 - 18);
    ctx.fillStyle = 'rgba(100,180,255,0.6)';
    ctx.font = '10px "Courier New"';
    ctx.fillText('SPACE / TAP UM ZU STARTEN', SW / 2, SH / 2 + 2);
    ctx.fillStyle = 'rgba(100,180,255,0.35)';
    ctx.font = '9px "Courier New"';
    ctx.fillText('DOPPELSPRUNG MÖGLICH', SW / 2, SH / 2 + 18);
    ctx.textAlign = 'left';
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(255,80,80,0.85)';
    ctx.font = 'bold 12px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('HOUSTON, WIR HABEN EIN PROBLEM.', SW / 2, SH / 2 - 14);
    ctx.fillStyle = 'rgba(100,180,255,0.6)';
    ctx.font = '9px "Courier New"';
    ctx.fillText('SPACE / TAP — NOCHMAL', SW / 2, SH / 2 + 6);
    ctx.textAlign = 'left';
  }
}

// ─── Collision ────────────────────────────────────────────────────
function hits(obs) {
  const ax = A.x - 9,  ay = A.y - 30;
  const aw = 18,       ah = 28;
  return ax < obs.x + obs.w - 5 &&
         ax + aw > obs.x + 5   &&
         ay < obs.y + obs.h    &&
         ay + ah > obs.y + 4;
}

// ─── Game loop ────────────────────────────────────────────────────
function loop() {
  tick++;

  // ── Update ──
  if (state === 'running') {
    frame++;
    score = Math.floor(frame / 6);
    speed = Math.min(4 + score * 0.004 + Math.floor(score / 150) * 0.4, 15);

    STARS.forEach(s => {
      s.x -= s.spd * (speed / 5);
      if (s.x < 0) { s.x = GW; s.y = Math.random() * (GROUND - 20); }
    });

    A.vy += GRAVITY;
    A.y  += A.vy;
    if (A.y >= GROUND) { A.y = GROUND; A.vy = 0; A.jumps = 0; }
    if (A.y === GROUND) { A.walkT++; if (A.walkT > 3) { A.walkT = 0; A.walk++; } }

    nextObs--;
    if (nextObs <= 0) {
      spawnObstacle();
      nextObs = Math.max(38, 75 + Math.random() * 55 - score * 0.04);
    }
    scrollX += speed;
    obstacles.forEach(o => { o.x -= speed; });
    obstacles = obstacles.filter(o => o.x + o.w > -10);

    for (const o of obstacles) {
      if (hits(o)) {
        state = 'dead'; shakes = 10;
        if (score > hiScore) { hiScore = score; localStorage.setItem('ms_hi', hiScore); }
        break;
      }
    }
  }

  // ── Draw world to low-res bg canvas ──
  bx.clearRect(0, 0, GW, GH);
  drawBG();
  drawGround();
  obstacles.forEach(o => o.type === 'rock' ? drawRock(o) : drawCrystal(o));

  // ── Blit world to foreground canvas (2x, pixelated) ──
  let sx = 0, sy = 0;
  if (shakes > 0) { sx = (Math.random()-0.5)*6; sy = (Math.random()-0.5)*4; shakes--; }
  ctx.clearRect(0, 0, SW, SH);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bg, 0, 0, SW, SH);   // scale 2x, crisp pixels

  // ── Edge fade (smooth, on fg canvas) ──
  const fadeL = ctx.createLinearGradient(0, 0, SW * 0.15, 0);
  fadeL.addColorStop(0, 'rgba(2,5,9,1)'); fadeL.addColorStop(1, 'rgba(2,5,9,0)');
  const fadeR = ctx.createLinearGradient(SW, 0, SW * 0.85, 0);
  fadeR.addColorStop(0, 'rgba(2,5,9,1)'); fadeR.addColorStop(1, 'rgba(2,5,9,0)');
  const fadeT = ctx.createLinearGradient(0, 0, 0, SH * 0.15);
  fadeT.addColorStop(0, 'rgba(2,5,9,1)'); fadeT.addColorStop(1, 'rgba(2,5,9,0)');
  const fadeB = ctx.createLinearGradient(0, SH, 0, SH * 0.85);
  fadeB.addColorStop(0, 'rgba(2,5,9,1)'); fadeB.addColorStop(1, 'rgba(2,5,9,0)');
  [fadeL, fadeR, fadeT, fadeB].forEach(f => { ctx.fillStyle = f; ctx.fillRect(0, 0, SW, SH); });

  // ── Astronaut: full resolution, screen coordinates ──
  drawAstronaut(A.x * SCALE, A.y * SCALE, A.walk, A.jumps > 0, state === 'dead');

  ctx.restore();

  // ── HUD: always on top, no shake ──
  drawHUD();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
