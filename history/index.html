<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Erdgeschichte — 4,6 Milliarden Jahre</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #06060f; }
canvas { display: block; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
canvas.dragging { cursor: grabbing; }

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
  z-index: 10;
}
#title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 21px;
  font-weight: normal;
  color: rgba(190, 210, 255, 0.92);
  letter-spacing: 0.06em;
}
#subtitle {
  font-family: system-ui, sans-serif;
  font-size: 10px;
  color: rgba(150, 175, 225, 0.45);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 4px;
}
#progress {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(160, 190, 255, 0.4);
  text-align: right;
  line-height: 1.7;
}
#hint {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: system-ui, sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.22);
  pointer-events: none;
  letter-spacing: 0.07em;
  white-space: nowrap;
  transition: opacity 1.5s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header">
  <div>
    <div id="title">Erdgeschichte</div>
    <div id="subtitle">4,6 Milliarden Jahre</div>
  </div>
  <div id="progress"></div>
</div>
<div id="hint">← ziehen zum Navigieren →</div>

<script>
'use strict';

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.moveTo(x+r, y); this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y, x+w, y+r); this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h); this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r); this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y, x+r, y); this.closePath(); return this;
  };
}

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const progEl = document.getElementById('progress');

// ─── DATA ─────────────────────────────────────────────────────────────

const EONS = [
  { name: 'Hadaikum',      start: 4600e6, end: 4000e6, hex: '#8b1a1a' },
  { name: 'Archaikum',     start: 4000e6, end: 2500e6, hex: '#703010' },
  { name: 'Proterozoikum', start: 2500e6, end:  541e6, hex: '#3a1a70' },
  { name: 'Paläozoikum',   start:  541e6, end:  252e6, hex: '#0d4a2a' },
  { name: 'Mesozoikum',    start:  252e6, end:   66e6, hex: '#0e3d0e' },
  { name: 'Känozoikum',    start:   66e6, end:      0, hex: '#0d2a50' },
];

// t = years ago, s: 1 = above, -1 = below
const EVENTS = [
  { t: 4600e6, label: 'Entstehung der Erde',       desc: 'Akkretion aus dem protosolaren Nebel',              hex: '#ff6b6b', s:  1 },
  { t: 4530e6, label: 'Mondbildung',               desc: 'Kollision mit Protoplanet Theia',                   hex: '#ffa37a', s: -1 },
  { t: 4400e6, label: 'Erste Ozeane',              desc: 'Flüssiges Wasser an der Oberfläche',                hex: '#48dbfb', s:  1 },
  { t: 3800e6, label: 'Erstes Leben',              desc: 'Prokaryoten — Einzeller ohne Zellkern',             hex: '#1dd1a1', s: -1 },
  { t: 2700e6, label: 'Stromatolithen',            desc: 'Erste sichtbare Lebensstrukturen aus Bakterien',    hex: '#26de81', s:  1 },
  { t: 2400e6, label: 'Sauerstoffkatastrophe',     desc: 'Cyanobakterien erzeugen O₂ — vergiften Ur-Atm.',   hex: '#feca57', s: -1 },
  { t: 2100e6, label: 'Erste Eukaryoten',          desc: 'Zellen mit Zellkern und Organellen',               hex: '#ff9ff3', s:  1 },
  { t:  800e6, label: 'Erste Vielzeller',          desc: 'Komplexe mehrzellige Organismen entstehen',        hex: '#a29bfe', s: -1 },
  { t:  700e6, label: 'Schneeball-Erde',           desc: 'Die Erde gefriert vollständig von Pol zu Pol',     hex: '#c8eeff', s:  1 },
  { t:  541e6, label: 'Kambrische Explosion',      desc: 'Alle heutigen Tierstämme entstehen auf einmal',    hex: '#fd9644', s: -1 },
  { t:  470e6, label: 'Erste Landpflanzen',        desc: 'Moose und Farne besiedeln das Festland',           hex: '#26de81', s:  1 },
  { t:  375e6, label: 'Erste Landwirbeltiere',     desc: 'Tiktaalik — Fisch auf dem Weg ans Land',           hex: '#fd9644', s: -1 },
  { t:  305e6, label: 'Karbonische Wälder',        desc: 'Riesige Kohlenwälder, erste Reptilien',            hex: '#2ecc71', s:  1 },
  { t:  252e6, label: 'Perm-Extinktion',           desc: '96 % aller Arten sterben aus',                     hex: '#e74c3c', s: -1 },
  { t:  230e6, label: 'Erste Dinosaurier',         desc: 'Eoraptor und frühe Saurischia erscheinen',         hex: '#2bcbba', s:  1 },
  { t:  200e6, label: 'Trias-Extinktion',          desc: '50 % aller Arten sterben aus',                     hex: '#e74c3c', s: -1 },
  { t:  150e6, label: 'Archaeopteryx',             desc: 'Übergang Dinosaurier → Vögel',                     hex: '#a29bfe', s:  1 },
  { t:   66e6, label: 'K-Pg Extinktion',           desc: 'Asteroideneinschlag — Ende der Dinosaurier',       hex: '#e74c3c', s: -1 },
  { t:   55e6, label: 'Erste Primaten',            desc: 'Unsere ältesten Vorfahren erscheinen',             hex: '#fd9644', s:  1 },
  { t:    7e6, label: 'Erste Hominiden',           desc: 'Trennung von der Schimpansen-Linie',               hex: '#ffd32a', s: -1 },
  { t:    2e6, label: 'Homo erectus',              desc: 'Erste Nutzung von Feuer, Steinwerkzeug',           hex: '#ffd32a', s:  1 },
  { t: 300000, label: 'Homo sapiens',              desc: 'Moderner Mensch entsteht in Afrika',               hex: '#f9ca24', s: -1 },
  { t:  70000, label: 'Toba-Katastrophe',          desc: 'Supervulkan bringt Menschheit fast zum Aussterben',hex: '#e74c3c', s:  1 },
  { t:  40000, label: 'Höhlenmalerei',             desc: 'Erste figurative Kunst — Lascaux, Altamira',       hex: '#a29bfe', s: -1 },
  { t:  12000, label: 'Landwirtschaft',            desc: 'Neolithische Revolution im Fruchtbaren Halbmond',  hex: '#26de81', s:  1 },
  { t:   5000, label: 'Erste Schrift',             desc: 'Keilschrift in Mesopotamien',                      hex: '#a29bfe', s: -1 },
  { t:   2500, label: 'Antike Hochkulturen',       desc: 'Griechenland, Rom, Persien, Han-Dynastie',         hex: '#fd9644', s:  1 },
  { t:    520, label: 'Wissenschaftl. Revolution', desc: 'Kopernikus, Galilei, Newton',                      hex: '#48dbfb', s: -1 },
  { t:     75, label: 'Raumfahrt',                 desc: 'Sputnik 1957 · Apollo 11 1969',                    hex: '#74b9ff', s:  1 },
  { t:      0, label: 'Heute',                     desc: 'Gegenwart',                                        hex: '#ffffff', s: -1 },
];

// ─── LAYOUT ───────────────────────────────────────────────────────────

const SPACING  = 210;  // px between events
const MARGIN_L = 260;  // left margin before first event
const MARGIN_R = 260;  // right margin after last event

function totalContentWidth() {
  return MARGIN_L + (EVENTS.length - 1) * SPACING + MARGIN_R;
}

// screen x of event at index i
function evX(i) {
  return MARGIN_L + i * SPACING - scrollX;
}

// ─── SCROLL STATE ─────────────────────────────────────────────────────

let scrollX = 0;

function clampScroll() {
  const maxScroll = Math.max(0, totalContentWidth() - canvas.width);
  scrollX = Math.max(0, Math.min(maxScroll, scrollX));
}

// ─── HELPERS ─────────────────────────────────────────────────────────

function rgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const t = cur ? cur + ' ' + w : w;
    if (cur && ctx.measureText(t).width > maxW) { lines.push(cur); cur = w; }
    else cur = t;
  }
  if (cur) lines.push(cur);
  return lines;
}

function fmt(y) {
  if (y === 0) return 'heute';
  if (y >= 1e9) return (y/1e9).toFixed(y>=10e9?0:2).replace(/\.?0+$/,'') + ' Mrd. J.';
  if (y >= 1e6) return (y/1e6).toFixed(y>=200e6?0:1).replace(/\.?0+$/,'') + ' Mio. J.';
  if (y >= 1e3) return (y/1e3).toFixed(y>=100e3?0:1).replace(/\.?0+$/,'') + ' Tsd. J.';
  return Math.round(y) + ' J. v. h.';
}

function getEon(t) {
  for (const e of EONS) if (t >= e.end && t <= e.start) return e;
  return EONS[EONS.length - 1];
}

// ─── STARS ────────────────────────────────────────────────────────────

let starCache = null;
function getStars() {
  if (starCache) return starCache;
  let s = 98765;
  const rng = () => { s = (s*1664525+1013904223)>>>0; return s/4294967296; };
  starCache = Array.from({length:300}, () => ({rx:rng(),ry:rng(),r:rng()*1.2+0.15,a:rng()*0.35+0.05}));
  return starCache;
}

// ─── DRAW ─────────────────────────────────────────────────────────────

function draw() {
  const W = canvas.width, H = canvas.height;
  const TY = H / 2;

  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, W, H);

  for (const st of getStars()) {
    ctx.beginPath();
    ctx.arc(st.rx * W, st.ry * H, st.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${st.a})`;
    ctx.fill();
  }

  drawEonBands(W, H, TY);
  drawTimeline(W, TY);
  drawEvents(W, H, TY);
  updateUI(W);
}

function drawEonBands(W, H, TY) {
  const bandH = H * 0.54;
  const bandTop = TY - bandH / 2;

  // Find eon groups: contiguous runs of same eon among events
  let prevEon = null, groupStart = -1;
  const groups = [];

  for (let i = 0; i < EVENTS.length; i++) {
    const eon = getEon(EVENTS[i].t);
    if (eon !== prevEon) {
      if (prevEon) groups.push({ eon: prevEon, from: groupStart, to: i - 1 });
      prevEon = eon;
      groupStart = i;
    }
  }
  if (prevEon) groups.push({ eon: prevEon, from: groupStart, to: EVENTS.length - 1 });

  for (const g of groups) {
    const x1 = evX(g.from) - SPACING / 2;
    const x2 = evX(g.to)   + SPACING / 2;
    if (x1 > W + 4 || x2 < -4) continue;

    const cx1 = Math.max(x1, 0), cx2 = Math.min(x2, W);
    if (cx2 <= cx1) continue;

    const { r, b, g: gv } = rgb(g.eon.hex);

    const vg = ctx.createLinearGradient(0, bandTop, 0, bandTop + bandH);
    vg.addColorStop(0,    `rgba(${r},${gv},${b},0)`);
    vg.addColorStop(0.1,  `rgba(${r},${gv},${b},0.24)`);
    vg.addColorStop(0.9,  `rgba(${r},${gv},${b},0.24)`);
    vg.addColorStop(1,    `rgba(${r},${gv},${b},0)`);
    ctx.fillStyle = vg;
    ctx.fillRect(cx1, bandTop, cx2 - cx1, bandH);

    // Left boundary
    if (x1 > 1 && x1 < W - 1) {
      ctx.beginPath();
      ctx.moveTo(x1, bandTop + bandH * 0.08);
      ctx.lineTo(x1, bandTop + bandH * 0.92);
      ctx.strokeStyle = `rgba(${r},${gv},${b},0.35)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Eon label
    const visW = cx2 - cx1;
    if (visW > 60) {
      ctx.save();
      ctx.font = `bold ${Math.max(9, Math.min(12, visW / 8))}px system-ui`;
      ctx.fillStyle = `rgba(${r},${gv},${b},0.45)`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(g.eon.name.toUpperCase(), cx1 + visW / 2, bandTop + 9);
      ctx.restore();
    }
  }
}

function drawTimeline(W, TY) {
  const lg = ctx.createLinearGradient(0, 0, W, 0);
  lg.addColorStop(0,    'rgba(80,120,255,0)');
  lg.addColorStop(0.03, 'rgba(90,130,255,0.7)');
  lg.addColorStop(0.97, 'rgba(130,180,255,0.7)');
  lg.addColorStop(1,    'rgba(130,180,255,0)');

  ctx.save();
  ctx.shadowColor = 'rgba(100,150,255,0.4)';
  ctx.shadowBlur  = 12;
  ctx.beginPath();
  ctx.moveTo(0, TY);
  ctx.lineTo(W, TY);
  ctx.strokeStyle = lg;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawEvents(W, H, TY) {
  const CW = 160, CH = 66;
  const STEM = H * 0.13 + 16;

  for (let i = 0; i < EVENTS.length; i++) {
    const ev = EVENTS[i];
    const x  = evX(i);
    if (x < -CW - 20 || x > W + CW + 20) continue;

    const above    = ev.s === 1;
    const stemEndY = above ? TY - STEM : TY + STEM;
    const cardY    = above ? stemEndY - CH : stemEndY;
    const { r, g, b } = rgb(ev.hex);

    // Dot on timeline
    ctx.save();
    ctx.shadowColor = ev.hex;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(x, TY, 4, 0, Math.PI * 2);
    ctx.fillStyle = ev.hex;
    ctx.fill();
    ctx.restore();

    // Stem
    ctx.save();
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.moveTo(x, TY + (above ? -5 : 5));
    ctx.lineTo(x, stemEndY);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.28)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Card shadow
    ctx.save();
    ctx.shadowColor = `rgba(${r},${g},${b},0.22)`;
    ctx.shadowBlur  = 14;
    ctx.beginPath();
    ctx.roundRect(x - CW/2, cardY, CW, CH, 7);
    ctx.fillStyle = 'rgba(7,7,18,0.9)';
    ctx.fill();
    ctx.restore();

    // Card border
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(x - CW/2, cardY, CW, CH, 7);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.4)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    // Text
    ctx.save();
    ctx.textAlign = 'center';
    let ty = cardY + 9;

    ctx.font = 'bold 11px system-ui';
    ctx.fillStyle = ev.hex;
    ctx.textBaseline = 'top';
    for (const line of wrapText(ctx, ev.label, CW - 14)) {
      ctx.fillText(line, x, ty); ty += 13;
    }
    ty += 2;

    ctx.font = '9.5px system-ui';
    ctx.fillStyle = 'rgba(200,215,245,0.6)';
    for (const line of wrapText(ctx, ev.desc, CW - 14)) {
      if (ty > cardY + CH - 13) break;
      ctx.fillText(line, x, ty); ty += 11;
    }

    ctx.font = '8px "Courier New", monospace';
    ctx.fillStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(fmt(ev.t), x + CW/2 - 6, cardY + CH - 5);
    ctx.restore();
  }
}

function updateUI(W) {
  // Which event is roughly in the center of the screen?
  const centerX = scrollX + W / 2;
  const idx = Math.round((centerX - MARGIN_L) / SPACING);
  const i = Math.max(0, Math.min(EVENTS.length - 1, idx));
  const ev = EVENTS[i];
  const eon = getEon(ev.t);
  const pct = Math.round(scrollX / Math.max(1, totalContentWidth() - W) * 100);

  progEl.innerHTML =
    `<div>${fmt(ev.t)}</div>` +
    `<div style="color:rgba(160,185,255,0.28);font-size:10px;margin-top:2px">${eon.name}</div>`;
}

// ─── INTERACTION ─────────────────────────────────────────────────────

let drag = null;

canvas.addEventListener('mousedown', e => {
  drag = { sx: e.clientX, sScroll: scrollX };
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  scrollX = drag.sScroll - (e.clientX - drag.sx);
  clampScroll(); draw();
});
window.addEventListener('mouseup', () => {
  drag = null;
  canvas.classList.remove('dragging');
});

// Touch
let touch = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touch = { sx: e.touches[0].clientX, sScroll: scrollX };
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch) return;
  scrollX = touch.sScroll - (e.touches[0].clientX - touch.sx);
  clampScroll(); draw();
}, { passive: false });
canvas.addEventListener('touchend', () => { touch = null; });

// Keyboard arrow keys
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { scrollX += 150; clampScroll(); draw(); }
  if (e.key === 'ArrowLeft')  { scrollX -= 150; clampScroll(); draw(); }
});

setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);

// ─── INIT ─────────────────────────────────────────────────────────────

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  clampScroll();
  draw();
}
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
