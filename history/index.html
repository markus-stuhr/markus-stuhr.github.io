<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Erdgeschichte — 4,6 Milliarden Jahre</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #06060f;
  font-family: system-ui, -apple-system, sans-serif;
}

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

#scroller {
  width: 100%; height: 100%;
  overflow-x: scroll;
  overflow-y: hidden;
  scrollbar-width: none;
  position: relative;
  z-index: 1;
}
#scroller::-webkit-scrollbar { display: none; }

#stage {
  height: 100%;
  position: relative;
}

#tl-line {
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 2px;
  transform: translateY(-1px);
  background: linear-gradient(to right,
    transparent 0%,
    rgba(90,130,255,.7) 1.5%,
    rgba(130,180,255,.7) 98.5%,
    transparent 100%
  );
  box-shadow: 0 0 14px rgba(100,150,255,.38);
  pointer-events: none;
}

.eon-band  { position: absolute; pointer-events: none; }
.eon-label {
  position: absolute;
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  white-space: nowrap; pointer-events: none;
}

.stem {
  position: absolute;
  width: 0;
  border-left: 1px dashed;
  pointer-events: none;
}

.dot {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 2;
}

.card {
  position: absolute;
  width: 158px;
  border-radius: 7px;
  border: 1px solid;
  padding: 9px 10px 7px;
  background: rgba(7,7,18,.91);
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.card:hover {
  transform: translateY(-2px);
}
.card-title { font-size: 11px; font-weight: 700; line-height: 1.35; margin-bottom: 4px; }
.card-desc  { font-size: 9.5px; color: rgba(200,215,245,.62); line-height: 1.42; margin-bottom: 5px; }
.card-year  { font-family: 'Courier New', monospace; font-size: 8px; text-align: right; }
.card-wiki  {
  font-size: 8.5px; text-align: right; margin-top: 4px;
  opacity: .45; letter-spacing: .04em;
}

/* ── MODAL ── */
#modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(4, 4, 14, .65);
  align-items: center;
  justify-content: center;
}
#modal-backdrop.open { display: flex; }

#modal {
  width: min(620px, 92vw);
  max-height: 82vh;
  background: rgba(10, 10, 24, .97);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,.7);
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

#modal-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
#modal-thumb {
  width: 72px; height: 72px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255,255,255,.05);
  display: none;
}
#modal-thumb.loaded { display: block; }

#modal-header-text { flex: 1; min-width: 0; }
#modal-eon   { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .5; margin-bottom: 5px; }
#modal-title { font-family: Georgia, serif; font-size: 20px; font-weight: normal; color: rgba(220,235,255,.95); line-height: 1.25; }
#modal-time  { font-family: 'Courier New', monospace; font-size: 10px; opacity: .45; margin-top: 5px; }

#modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.05);
  color: rgba(255,255,255,.6);
  font-size: 16px; line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
#modal-close:hover { background: rgba(255,255,255,.12); color: #fff; }

#modal-body {
  overflow-y: auto;
  padding: 20px 22px;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.12) transparent;
}
#modal-body::-webkit-scrollbar { width: 4px; }
#modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }

#modal-extract {
  font-size: 14px;
  color: rgba(210,225,250,.82);
  line-height: 1.72;
}

#modal-loading {
  font-size: 13px;
  color: rgba(255,255,255,.3);
  text-align: center;
  padding: 30px 0;
}

#modal-footer {
  padding: 14px 22px;
  border-top: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#modal-wiki-link {
  font-size: 12px;
  color: rgba(140,170,255,.75);
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: color .15s;
}
#modal-wiki-link:hover { color: rgba(180,210,255,1); }
#modal-wiki-logo { font-size: 17px; }

/* ── FIXED HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: flex-start;
  pointer-events: none; z-index: 10;
}
#title   { font-family: Georgia, serif; font-size: 21px; font-weight: normal; color: rgba(190,210,255,.92); letter-spacing: .06em; }
#subtitle { font-size: 10px; color: rgba(150,175,225,.42); letter-spacing: .14em; text-transform: uppercase; margin-top: 4px; }

#hint {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,255,255,.2); pointer-events: none;
  letter-spacing: .07em; white-space: nowrap; transition: opacity 1.5s; z-index: 10;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="scroller">
  <div id="stage"></div>
</div>

<!-- Modal -->
<div id="modal-backdrop">
  <div id="modal">
    <div id="modal-header">
      <img id="modal-thumb" alt="">
      <div id="modal-header-text">
        <div id="modal-eon"></div>
        <div id="modal-title"></div>
        <div id="modal-time"></div>
      </div>
      <button id="modal-close" aria-label="Schließen">✕</button>
    </div>
    <div id="modal-body">
      <div id="modal-loading">Lädt …</div>
      <div id="modal-extract"></div>
    </div>
    <div id="modal-footer">
      <a id="modal-wiki-link" target="_blank" rel="noopener">
        <span id="modal-wiki-logo">🌐</span>
        Vollständiger Wikipedia-Artikel
      </a>
    </div>
  </div>
</div>

<div id="header">
  <div>
    <div id="title">Erdgeschichte</div>
    <div id="subtitle">4,6 Milliarden Jahre</div>
  </div>
</div>
<div id="hint">← Trackpad seitlich scrollen · Karte anklicken für Details →</div>

<script>
'use strict';

// ── DATA ─────────────────────────────────────────────────────────────────

const EONS = [
  { name: 'Hadaikum',      start: 4600e6, end: 4000e6, hex: '#8b1a1a' },
  { name: 'Archaikum',     start: 4000e6, end: 2500e6, hex: '#703010' },
  { name: 'Proterozoikum', start: 2500e6, end:  541e6, hex: '#3a1a70' },
  { name: 'Paläozoikum',   start:  541e6, end:  252e6, hex: '#0d4a2a' },
  { name: 'Mesozoikum',    start:  252e6, end:   66e6, hex: '#0e3d0e' },
  { name: 'Känozoikum',    start:   66e6, end:      0, hex: '#0d2a50' },
];

// wiki = German Wikipedia article title
const EVENTS = [
  { t: 4600e6, label: 'Entstehung der Erde',       desc: 'Akkretion aus dem protosolaren Nebel',               hex: '#ff6b6b', s:  1, wiki: 'Entstehung_der_Erde' },
  { t: 4530e6, label: 'Mondbildung',               desc: 'Kollision mit Protoplanet Theia',                    hex: '#ffa37a', s: -1, wiki: 'Entstehung_des_Mondes' },
  { t: 4400e6, label: 'Erste Ozeane',              desc: 'Flüssiges Wasser an der Oberfläche',                 hex: '#48dbfb', s:  1, wiki: 'Urozean' },
  { t: 3800e6, label: 'Erstes Leben',              desc: 'Prokaryoten — Einzeller ohne Zellkern',              hex: '#1dd1a1', s: -1, wiki: 'Abiogenese' },
  { t: 2700e6, label: 'Stromatolithen',            desc: 'Erste sichtbare Lebensstrukturen',                   hex: '#26de81', s:  1, wiki: 'Stromatolithen' },
  { t: 2400e6, label: 'Sauerstoffkatastrophe',     desc: 'Cyanobakterien erzeugen O₂ — vergiften Ur-Atm.',    hex: '#feca57', s: -1, wiki: 'Sauerstoffkatastrophe' },
  { t: 2100e6, label: 'Erste Eukaryoten',          desc: 'Zellen mit Zellkern und Organellen',                hex: '#ff9ff3', s:  1, wiki: 'Eukaryoten' },
  { t:  800e6, label: 'Erste Vielzeller',          desc: 'Komplexe mehrzellige Organismen entstehen',         hex: '#a29bfe', s: -1, wiki: 'Vielzeller' },
  { t:  700e6, label: 'Schneeball-Erde',           desc: 'Die Erde gefriert vollständig von Pol zu Pol',      hex: '#c8eeff', s:  1, wiki: 'Schneeball_Erde' },
  { t:  541e6, label: 'Kambrische Explosion',      desc: 'Alle heutigen Tierstämme entstehen auf einmal',     hex: '#fd9644', s: -1, wiki: 'Kambrische_Explosion' },
  { t:  470e6, label: 'Erste Landpflanzen',        desc: 'Moose und Farne besiedeln das Festland',            hex: '#26de81', s:  1, wiki: 'Landpflanzen' },
  { t:  375e6, label: 'Erste Landwirbeltiere',     desc: 'Tiktaalik — Fisch auf dem Weg ans Land',            hex: '#fd9644', s: -1, wiki: 'Tiktaalik' },
  { t:  305e6, label: 'Karbonische Wälder',        desc: 'Riesige Kohlenwälder, erste Reptilien',             hex: '#2ecc71', s:  1, wiki: 'Karbon' },
  { t:  252e6, label: 'Perm-Extinktion',           desc: '96 % aller Arten sterben aus',                      hex: '#e74c3c', s: -1, wiki: 'Perm-Trias-Massenaussterben' },
  { t:  230e6, label: 'Erste Dinosaurier',         desc: 'Eoraptor und frühe Saurischia erscheinen',          hex: '#2bcbba', s:  1, wiki: 'Dinosaurier' },
  { t:  200e6, label: 'Trias-Extinktion',          desc: '50 % aller Arten sterben aus',                      hex: '#e74c3c', s: -1, wiki: 'Trias-Jura-Massenaussterben' },
  { t:  150e6, label: 'Archaeopteryx',             desc: 'Übergang Dinosaurier → Vögel',                      hex: '#a29bfe', s:  1, wiki: 'Archaeopteryx' },
  { t:   66e6, label: 'K-Pg Extinktion',           desc: 'Asteroideneinschlag — Ende der Dinosaurier',        hex: '#e74c3c', s: -1, wiki: 'Kreide-Paläogen-Grenze' },
  { t:   55e6, label: 'Erste Primaten',            desc: 'Unsere ältesten Vorfahren erscheinen',              hex: '#fd9644', s:  1, wiki: 'Primaten' },
  { t:    7e6, label: 'Erste Hominiden',           desc: 'Trennung von der Schimpansen-Linie',                hex: '#ffd32a', s: -1, wiki: 'Hominidae' },
  { t:    2e6, label: 'Homo erectus',              desc: 'Erste Nutzung von Feuer, Steinwerkzeug',            hex: '#ffd32a', s:  1, wiki: 'Homo_erectus' },
  { t: 300000, label: 'Homo sapiens',              desc: 'Moderner Mensch entsteht in Afrika',                hex: '#f9ca24', s: -1, wiki: 'Homo_sapiens' },
  { t:  70000, label: 'Toba-Katastrophe',          desc: 'Supervulkan bringt Menschheit fast zum Aussterben', hex: '#e74c3c', s:  1, wiki: 'Toba-Katastrophe' },
  { t:  40000, label: 'Höhlenmalerei',             desc: 'Erste figurative Kunst — Lascaux, Altamira',        hex: '#a29bfe', s: -1, wiki: 'Höhlenmalerei' },
  { t:  12000, label: 'Landwirtschaft',            desc: 'Neolithische Revolution im Fruchtbaren Halbmond',   hex: '#26de81', s:  1, wiki: 'Neolithische_Revolution' },
  { t:   5000, label: 'Erste Schrift',             desc: 'Keilschrift in Mesopotamien',                       hex: '#a29bfe', s: -1, wiki: 'Keilschrift' },
  { t:   2500, label: 'Antike Hochkulturen',       desc: 'Griechenland, Rom, Persien, Han-Dynastie',          hex: '#fd9644', s:  1, wiki: 'Antike' },
  { t:    520, label: 'Wissenschaftl. Revolution', desc: 'Kopernikus, Galilei, Newton',                       hex: '#48dbfb', s: -1, wiki: 'Wissenschaftliche_Revolution' },
  { t:     75, label: 'Raumfahrt',                 desc: 'Sputnik 1957 · Apollo 11 1969',                     hex: '#74b9ff', s:  1, wiki: 'Raumfahrt' },
  { t:      0, label: 'Heute',                     desc: 'Gegenwart',                                         hex: '#ffffff', s: -1, wiki: 'Gegenwart' },
];

// ── LAYOUT ───────────────────────────────────────────────────────────────

const SPACING = 210;
const MARGIN  = 220;
const CARD_W  = 158;
const CARD_H  = 65;

function evX(i)   { return MARGIN + i * SPACING; }
function stageW() { return MARGIN + (EVENTS.length - 1) * SPACING + MARGIN; }

// ── HELPERS ──────────────────────────────────────────────────────────────

function parseHex(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgba(hex, a) {
  const [r,g,b] = parseHex(hex); return `rgba(${r},${g},${b},${a})`;
}
function getEon(t) {
  for (const e of EONS) if (t >= e.end && t <= e.start) return e;
  return EONS[EONS.length - 1];
}
function fmt(y) {
  if (y === 0) return 'heute';
  if (y >= 1e9) return (y/1e9).toFixed(y>=10e9?0:2).replace(/\.?0+$/,'') + ' Mrd. J.';
  if (y >= 1e6) return (y/1e6).toFixed(y>=200e6?0:1).replace(/\.?0+$/,'') + ' Mio. J.';
  if (y >= 1e3) return (y/1e3).toFixed(y>=100e3?0:1).replace(/\.?0+$/,'') + ' Tsd. J.';
  return Math.round(y) + ' J. v. h.';
}

// ── STARS ────────────────────────────────────────────────────────────────

(function() {
  const c = document.getElementById('stars');
  const cx = c.getContext('2d');
  let seed = 55555;
  const rng = () => { seed = (seed*1664525+1013904223)>>>0; return seed/4294967296; };
  const pts = Array.from({length:280}, () => [rng(), rng(), rng()*1.3+0.15, rng()*0.38+0.05]);
  function draw() {
    c.width = window.innerWidth; c.height = window.innerHeight;
    for (const [rx,ry,r,a] of pts) {
      cx.beginPath(); cx.arc(rx*c.width, ry*c.height, r, 0, Math.PI*2);
      cx.fillStyle = `rgba(255,255,255,${a})`; cx.fill();
    }
  }
  draw();
  window.addEventListener('resize', draw);
})();

// ── BUILD STAGE ──────────────────────────────────────────────────────────

const stage = document.getElementById('stage');
const refsAbove = [], refsBelow = [], refsDot = [], refsEon = [];

function build() {
  stage.innerHTML = '';
  refsAbove.length = refsBelow.length = refsDot.length = refsEon.length = 0;
  stage.style.width = stageW() + 'px';

  // Timeline line
  const line = document.createElement('div');
  line.id = 'tl-line';
  stage.appendChild(line);

  // Eon bands
  let prevEon = null, gStart = 0;
  const groups = [];
  for (let i = 0; i <= EVENTS.length; i++) {
    const eon = i < EVENTS.length ? getEon(EVENTS[i].t) : null;
    if (eon !== prevEon) {
      if (prevEon) groups.push({ eon: prevEon, from: gStart, to: i - 1 });
      prevEon = eon; gStart = i;
    }
  }
  for (const g of groups) {
    const x1 = evX(g.from) - SPACING / 2;
    const x2 = evX(g.to)   + SPACING / 2;
    const w  = x2 - x1;
    const band = document.createElement('div');
    band.className = 'eon-band';
    band.style.left = x1 + 'px';
    band.style.width = w + 'px';
    stage.appendChild(band);

    const lbl = document.createElement('div');
    lbl.className = 'eon-label';
    lbl.textContent = g.eon.name.toUpperCase();
    lbl.style.left = (x1 + w / 2) + 'px';
    lbl.style.transform = 'translateX(-50%)';
    lbl.style.color = rgba(g.eon.hex, 0.45);
    stage.appendChild(lbl);

    refsEon.push({ band, lbl, hex: g.eon.hex });
  }

  // Events
  for (let i = 0; i < EVENTS.length; i++) {
    const ev = EVENTS[i];
    const x  = evX(i);
    const above = ev.s === 1;

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.left = x + 'px';
    dot.style.background = ev.hex;
    dot.style.boxShadow  = `0 0 8px ${ev.hex}`;
    stage.appendChild(dot);
    refsDot.push(dot);

    const stem = document.createElement('div');
    stem.className = 'stem';
    stem.style.left = x + 'px';
    stem.style.borderLeftColor = rgba(ev.hex, 0.3);
    stage.appendChild(stem);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.left        = (x - CARD_W / 2) + 'px';
    card.style.borderColor = rgba(ev.hex, 0.38);
    card.style.boxShadow   = `0 0 16px ${rgba(ev.hex, 0.18)}`;
    card.innerHTML =
      `<div class="card-title" style="color:${ev.hex}">${ev.label}</div>` +
      `<div class="card-desc">${ev.desc}</div>` +
      `<div class="card-year" style="color:${rgba(ev.hex, 0.55)}">${fmt(ev.t)}</div>` +
      `<div class="card-wiki" style="color:${rgba(ev.hex, 0.5)}">Wikipedia →</div>`;
    card.addEventListener('click', () => openModal(ev));
    stage.appendChild(card);

    (above ? refsAbove : refsBelow).push({ stem, card });
  }

  reposition();
}

function reposition() {
  const H    = window.innerHeight;
  const TY   = H / 2;
  const STEM = Math.round(H * 0.13 + 14);

  for (const dot of refsDot)              dot.style.top = TY + 'px';
  for (const { stem, card } of refsAbove) {
    stem.style.top = (TY - STEM) + 'px'; stem.style.height = STEM + 'px';
    card.style.top = (TY - STEM - CARD_H) + 'px';
  }
  for (const { stem, card } of refsBelow) {
    stem.style.top = TY + 'px'; stem.style.height = STEM + 'px';
    card.style.top = (TY + STEM) + 'px';
  }

  const bandH = Math.round(H * 0.54);
  for (const { band, lbl, hex } of refsEon) {
    const [r,g,b] = parseHex(hex);
    const top = TY - bandH / 2;
    band.style.top    = top + 'px';
    band.style.height = bandH + 'px';
    band.style.background =
      `linear-gradient(to bottom,transparent,rgba(${r},${g},${b},.23) 12%,rgba(${r},${g},${b},.23) 88%,transparent)`;
    lbl.style.top = (top + 9) + 'px';
  }
}

// ── MODAL ────────────────────────────────────────────────────────────────

const backdrop   = document.getElementById('modal-backdrop');
const modalTitle = document.getElementById('modal-title');
const modalEon   = document.getElementById('modal-eon');
const modalTime  = document.getElementById('modal-time');
const modalThumb = document.getElementById('modal-thumb');
const modalLoad  = document.getElementById('modal-loading');
const modalText  = document.getElementById('modal-extract');
const modalLink  = document.getElementById('modal-wiki-link');

function openModal(ev) {
  // Reset
  modalTitle.textContent = ev.label;
  modalTitle.style.color = ev.hex;
  modalEon.textContent   = getEon(ev.t).name.toUpperCase();
  modalEon.style.color   = ev.hex;
  modalTime.textContent  = fmt(ev.t);
  modalThumb.classList.remove('loaded');
  modalThumb.src = '';
  modalLoad.style.display  = 'block';
  modalText.style.display  = 'none';
  modalText.textContent    = '';
  modalLink.href = `https://de.wikipedia.org/wiki/${ev.wiki}`;

  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch Wikipedia summary
  fetch(`https://de.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(ev.wiki)}`)
    .then(r => r.json())
    .then(data => {
      modalLoad.style.display = 'none';
      modalText.style.display = 'block';
      modalText.textContent   = data.extract || 'Kein Text verfügbar.';

      if (data.thumbnail?.source) {
        modalThumb.src = data.thumbnail.source;
        modalThumb.onload = () => modalThumb.classList.add('loaded');
      }
    })
    .catch(() => {
      modalLoad.style.display = 'none';
      modalText.style.display = 'block';
      modalText.textContent   = 'Artikel konnte nicht geladen werden.';
    });
}

function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ─────────────────────────────────────────────────────────────────

build();
window.addEventListener('resize', reposition);
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 6000);
</script>
</body>
</html>
