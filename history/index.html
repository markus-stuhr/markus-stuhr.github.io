<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Erdgeschichte — 4,6 Milliarden Jahre</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #06060f; }
canvas { display: block; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
canvas.dragging { cursor: grabbing; }

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
  z-index: 10;
}
#title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 21px;
  font-weight: normal;
  color: rgba(190, 210, 255, 0.92);
  letter-spacing: 0.06em;
}
#subtitle {
  font-family: system-ui, sans-serif;
  font-size: 10px;
  color: rgba(150, 175, 225, 0.45);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 4px;
}
#range-info {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: rgba(160, 190, 255, 0.45);
  text-align: right;
  line-height: 1.6;
}
#hint {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: system-ui, sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.22);
  pointer-events: none;
  letter-spacing: 0.07em;
  white-space: nowrap;
  transition: opacity 1.5s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header">
  <div>
    <div id="title">Erdgeschichte</div>
    <div id="subtitle">4,6 Milliarden Jahre</div>
  </div>
  <div id="range-info"></div>
</div>
<div id="hint">← ziehen zum Navigieren &nbsp;·&nbsp; Scrollen / Pinch zum Zoomen →</div>

<script>
'use strict';

// ─── polyfill roundRect ───────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const rangeInfo = document.getElementById('range-info');

// ─── DATA ─────────────────────────────────────────────────────────────

// Geological eons / eras (years ago)
const EONS = [
  { name: 'Hadaikum',      start: 4600e6, end: 4000e6, hex: '#8b1a1a' },
  { name: 'Archaikum',     start: 4000e6, end: 2500e6, hex: '#703010' },
  { name: 'Proterozoikum', start: 2500e6, end:  541e6, hex: '#3a1a70' },
  { name: 'Paläozoikum',   start:  541e6, end:  252e6, hex: '#0d4a2a' },
  { name: 'Mesozoikum',    start:  252e6, end:   66e6, hex: '#0e3d0e' },
  { name: 'Känozoikum',    start:   66e6, end:      1, hex: '#0d2a50' },
];

// Events — t = years ago, side: 1 = above timeline, -1 = below
const EVENTS = [
  { t: 4600e6, label: 'Entstehung der Erde',        desc: 'Akkretion aus dem protosolaren Nebel',           hex: '#ff6b6b', s: 1  },
  { t: 4530e6, label: 'Mondbildung',                desc: 'Kollision mit dem Protoplaneten Theia',          hex: '#ffa37a', s: -1 },
  { t: 4400e6, label: 'Erste Ozeane',               desc: 'Flüssiges Wasser an der Oberfläche',             hex: '#48dbfb', s: 1  },
  { t: 3800e6, label: 'Erstes Leben',               desc: 'Prokaryoten — Einzeller ohne Zellkern',          hex: '#1dd1a1', s: -1 },
  { t: 2700e6, label: 'Stromatolithen',             desc: 'Erste sichtbare Lebensstrukturen aus Bakterien', hex: '#26de81', s: 1  },
  { t: 2400e6, label: 'Sauerstoffkatastrophe',      desc: 'Cyanobakterien vergiften die Ur-Atmosphäre mit O₂', hex: '#feca57', s: -1 },
  { t: 2100e6, label: 'Erste Eukaryoten',           desc: 'Zellen mit Zellkern und Organellen',            hex: '#ff9ff3', s: 1  },
  { t:  800e6, label: 'Erste Vielzeller',           desc: 'Komplexe mehrzellige Organismen entstehen',     hex: '#a29bfe', s: -1 },
  { t:  700e6, label: 'Schneeball-Erde',            desc: 'Die Erde gefriert von Pol zu Pol',              hex: '#c8eeff', s: 1  },
  { t:  541e6, label: 'Kambrische Explosion',       desc: 'Explosion der Tiervielfalt — alle Tierstämme',  hex: '#fd9644', s: -1 },
  { t:  470e6, label: 'Erste Landpflanzen',         desc: 'Moose und Farne besiedeln das Festland',        hex: '#26de81', s: 1  },
  { t:  375e6, label: 'Erste Landwirbeltiere',      desc: 'Tiktaalik — Fisch auf dem Weg ans Land',        hex: '#fd9644', s: -1 },
  { t:  305e6, label: 'Karbonische Wälder',         desc: 'Riesige Kohlenwälder & erste Reptilien',       hex: '#2ecc71', s: 1  },
  { t:  252e6, label: 'Perm-Extinktion',            desc: '96 % aller Arten sterben aus — größtes Massensterben', hex: '#e74c3c', s: -1 },
  { t:  230e6, label: 'Erste Dinosaurier',          desc: 'Eoraptor und erste Saurischia',                 hex: '#2bcbba', s: 1  },
  { t:  200e6, label: 'Trias-Extinktion',           desc: '50 % aller Arten sterben aus',                  hex: '#e74c3c', s: -1 },
  { t:  150e6, label: 'Archaeopteryx',              desc: 'Übergang Dinosaurier → Vögel',                  hex: '#a29bfe', s: 1  },
  { t:   66e6, label: 'K-Pg Extinktion',            desc: 'Asteroideneinschlag — Ende der Dinosaurier',    hex: '#e74c3c', s: -1 },
  { t:   55e6, label: 'Erste Primaten',             desc: 'Unsere ältesten Vorfahren erscheinen',          hex: '#fd9644', s: 1  },
  { t:    7e6, label: 'Erste Hominiden',            desc: 'Trennung von der Schimpansen-Linie',            hex: '#ffd32a', s: -1 },
  { t:    2e6, label: 'Homo erectus',               desc: 'Erste Nutzung von Feuer, Steinwerkzeug',        hex: '#ffd32a', s: 1  },
  { t: 300000, label: 'Homo sapiens',               desc: 'Moderner Mensch entsteht in Afrika',            hex: '#f9ca24', s: -1 },
  { t:  70000, label: 'Toba-Katastrophe',           desc: 'Supervulkan bringt Menschheit fast zum Aussterben', hex: '#e74c3c', s: 1  },
  { t:  40000, label: 'Höhlenmalerei',              desc: 'Erste figurative Kunst — Lascaux, Altamira',    hex: '#a29bfe', s: -1 },
  { t:  12000, label: 'Landwirtschaft',             desc: 'Neolithische Revolution im Fruchtbaren Halbmond', hex: '#26de81', s: 1  },
  { t:   5000, label: 'Erste Schrift',              desc: 'Keilschrift in Mesopotamien',                   hex: '#a29bfe', s: -1 },
  { t:   2500, label: 'Antike Hochkulturen',        desc: 'Griechenland, Rom, Persien, Han-Dynastie',      hex: '#fd9644', s: 1  },
  { t:    520, label: 'Wissenschaftl. Revolution',  desc: 'Kopernikus, Galilei, Newton',                   hex: '#48dbfb', s: -1 },
  { t:     75, label: 'Raumfahrt',                  desc: 'Sputnik 1957 · Apollo 11 1969',                 hex: '#74b9ff', s: 1  },
];

// ─── VIEW STATE ───────────────────────────────────────────────────────
// Log10 scale. Left = past (large log), right = present (small log)

const LOG_ORIGIN  = Math.log10(4600e6); // ≈ 9.663
const LOG_PRESENT = Math.log10(0.5);    // ≈ -0.301

let logCenter = (LOG_ORIGIN + LOG_PRESENT) / 2;
let logRange  = (LOG_ORIGIN - LOG_PRESENT) * 1.08;

const MIN_LOG_RANGE = 0.35;
const MAX_LOG_RANGE = (LOG_ORIGIN - LOG_PRESENT) * 1.15;

// ─── COORDINATES ─────────────────────────────────────────────────────

function yearsToX(yrs) {
  const lv = Math.log10(Math.max(yrs, 0.4));
  const lL = logCenter + logRange * 0.5; // left = past
  return canvas.width * (lL - lv) / logRange;
}

function xToLog(x) {
  return logCenter + logRange * 0.5 - (x / canvas.width) * logRange;
}

function clampView() {
  logRange = Math.max(MIN_LOG_RANGE, Math.min(MAX_LOG_RANGE, logRange));
  const lL = LOG_ORIGIN + 0.25;
  const lR = LOG_PRESENT - 0.25;
  const span = lL - lR;
  if (logRange >= span) {
    logCenter = (lL + lR) / 2;
  } else {
    logCenter = Math.max(lR + logRange / 2, Math.min(lL - logRange / 2, logCenter));
  }
}

// ─── FORMATTING ──────────────────────────────────────────────────────

function fmt(y) {
  if (y >= 1e9) return (y / 1e9).toFixed(y >= 10e9 ? 0 : 2).replace(/\.?0+$/, '') + ' Mrd. J.';
  if (y >= 1e6) return (y / 1e6).toFixed(y >= 200e6 ? 0 : 1).replace(/\.?0+$/, '') + ' Mio. J.';
  if (y >= 1e3) return (y / 1e3).toFixed(y >= 100e3 ? 0 : 1).replace(/\.?0+$/, '') + ' Tsd. J.';
  if (y >= 1)   return Math.round(y) + ' J. v. h.';
  return 'heute';
}

// ─── HELPERS ─────────────────────────────────────────────────────────

function rgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const t = cur ? cur + ' ' + w : w;
    if (cur && ctx.measureText(t).width > maxW) { lines.push(cur); cur = w; }
    else cur = t;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ─── STARS ───────────────────────────────────────────────────────────

let starCache = null;
function stars() {
  if (starCache) return starCache;
  let s = 98765;
  const rng = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  starCache = Array.from({ length: 280 }, () => ({ rx: rng(), ry: rng(), r: rng()*1.3+0.15, a: rng()*0.4+0.05 }));
  return starCache;
}

// ─── DRAW ─────────────────────────────────────────────────────────────

function draw() {
  const W = canvas.width, H = canvas.height;
  const TY = H / 2;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const st of stars()) {
    ctx.beginPath();
    ctx.arc(st.rx * W, st.ry * H, st.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${st.a})`;
    ctx.fill();
  }

  drawEons(W, H, TY);
  drawTicks(W, TY);
  drawTimeline(W, TY);
  drawEvents(W, H, TY);
  updateUI();
}

function drawEons(W, H, TY) {
  const bandH = H * 0.54;
  const bandTop = TY - bandH / 2;

  for (const eon of EONS) {
    const x1 = yearsToX(eon.start);
    const x2 = yearsToX(Math.max(eon.end, 0.4));
    if (x1 > W + 4 || x2 < -4) continue;

    const cx1 = Math.max(x1, 0), cx2 = Math.min(x2, W);
    if (cx2 <= cx1) continue;

    const { r, g, b } = rgb(eon.hex);
    const alpha = 0.26;

    // Vertical gradient (fade at top and bottom edges of band)
    const vg = ctx.createLinearGradient(0, bandTop, 0, bandTop + bandH);
    vg.addColorStop(0,    `rgba(${r},${g},${b},0)`);
    vg.addColorStop(0.12, `rgba(${r},${g},${b},${alpha})`);
    vg.addColorStop(0.88, `rgba(${r},${g},${b},${alpha})`);
    vg.addColorStop(1,    `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = vg;
    ctx.fillRect(cx1, bandTop, cx2 - cx1, bandH);

    // Left boundary line (= start = past edge)
    if (x1 > 1 && x1 < W - 1) {
      ctx.beginPath();
      ctx.moveTo(x1, bandTop);
      ctx.lineTo(x1, bandTop + bandH);
      ctx.strokeStyle = `rgba(${r},${g},${b},0.4)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Eon label — only when enough space
    const visW = cx2 - cx1;
    if (visW > 65) {
      const fs = Math.max(9, Math.min(12, visW / 12));
      ctx.save();
      ctx.font = `bold ${fs}px system-ui`;
      ctx.fillStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(eon.name.toUpperCase(), cx1 + visW / 2, bandTop + 9);
      ctx.restore();
    }
  }
}

function drawTicks(W, TY) {
  const lL = logCenter + logRange * 0.5;
  const lR = logCenter - logRange * 0.5;
  const minY = Math.pow(10, lR);
  const maxY = Math.pow(10, lL);

  // Collect candidates: 1×10^n, 2×10^n, 5×10^n
  const candidates = [];
  for (let exp = Math.floor(lR) - 1; exp <= Math.ceil(lL) + 1; exp++) {
    for (const m of [1, 2, 5]) {
      const v = m * Math.pow(10, exp);
      if (v >= minY * 0.4 && v <= maxY * 2.5) candidates.push({ v, major: m === 1 });
    }
  }

  // Thin by minimum pixel gap
  const shown = [];
  for (const c of candidates) {
    const x = yearsToX(c.v);
    if (x < -10 || x > W + 10) continue;
    const gap = c.major ? 48 : 28;
    if (shown.some(t => Math.abs(yearsToX(t.v) - x) < gap)) continue;
    shown.push(c);
  }

  for (const t of shown) {
    const x = yearsToX(t.v);
    const tickH = t.major ? 13 : 5;
    ctx.beginPath();
    ctx.moveTo(x, TY - tickH);
    ctx.lineTo(x, TY + tickH);
    ctx.strokeStyle = t.major ? 'rgba(170,195,255,0.32)' : 'rgba(170,195,255,0.1)';
    ctx.lineWidth = t.major ? 1.5 : 0.8;
    ctx.stroke();

    if (t.major) {
      ctx.save();
      ctx.font = '9.5px "Courier New", monospace';
      ctx.fillStyle = 'rgba(170,195,255,0.38)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(fmt(t.v), x, TY + 17);
      ctx.restore();
    }
  }
}

function drawTimeline(W, TY) {
  // Outer glow
  ctx.save();
  ctx.shadowColor = 'rgba(100,150,255,0.45)';
  ctx.shadowBlur = 14;

  const lg = ctx.createLinearGradient(0, 0, W, 0);
  lg.addColorStop(0,    'rgba(80,120,255,0)');
  lg.addColorStop(0.04, 'rgba(90,130,255,0.75)');
  lg.addColorStop(0.96, 'rgba(130,180,255,0.75)');
  lg.addColorStop(1,    'rgba(130,180,255,0)');

  ctx.beginPath();
  ctx.moveTo(0, TY);
  ctx.lineTo(W, TY);
  ctx.strokeStyle = lg;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // "Heute" dot
  const hx = yearsToX(0.5);
  if (hx >= -12 && hx <= W + 12) {
    ctx.save();
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(hx, TY, 5, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.font = 'bold 9.5px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('HEUTE', hx, TY - 9);
    ctx.restore();
  }
}

function drawEvents(W, H, TY) {
  const CW = 155, CH = 64;
  const STEM = H * 0.135 + 18;

  for (const ev of EVENTS) {
    const x = yearsToX(ev.t);
    if (x < -CW - 10 || x > W + CW + 10) continue;

    const above = ev.s === 1;
    const stemEndY = above ? TY - STEM : TY + STEM;
    const cardY = above ? stemEndY - CH : stemEndY;
    const { r, g, b } = rgb(ev.hex);

    // Dot
    ctx.save();
    ctx.shadowColor = ev.hex;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, TY, 4, 0, Math.PI*2);
    ctx.fillStyle = ev.hex;
    ctx.fill();
    ctx.restore();

    // Stem
    ctx.save();
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.moveTo(x, TY + (above ? -5 : 5));
    ctx.lineTo(x, stemEndY);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.28)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Card shadow + background
    ctx.save();
    ctx.shadowColor = `rgba(${r},${g},${b},0.25)`;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.roundRect(x - CW/2, cardY, CW, CH, 7);
    ctx.fillStyle = 'rgba(7, 7, 18, 0.9)';
    ctx.fill();
    ctx.restore();

    // Card border
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(x - CW/2, cardY, CW, CH, 7);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.42)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    // Text
    ctx.save();
    ctx.textAlign = 'center';
    let ty = cardY + 9;

    ctx.font = 'bold 11px system-ui';
    ctx.fillStyle = ev.hex;
    ctx.textBaseline = 'top';
    const titleLines = wrapText(ctx, ev.label, CW - 14);
    for (const line of titleLines) { ctx.fillText(line, x, ty); ty += 13; }

    ty += 2;

    ctx.font = '9.5px system-ui';
    ctx.fillStyle = 'rgba(200, 215, 245, 0.6)';
    const descLines = wrapText(ctx, ev.desc, CW - 14);
    for (const line of descLines) {
      if (ty > cardY + CH - 13) break;
      ctx.fillText(line, x, ty);
      ty += 11;
    }

    // Year badge (bottom right)
    ctx.font = '8px "Courier New", monospace';
    ctx.fillStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(fmt(ev.t), x + CW/2 - 6, cardY + CH - 5);
    ctx.restore();
  }
}

function updateUI() {
  const minY = Math.pow(10, logCenter - logRange * 0.5);
  const maxY = Math.pow(10, logCenter + logRange * 0.5);
  const centerY = Math.pow(10, logCenter);

  let eonName = '';
  for (const e of EONS) {
    if (centerY >= e.end && centerY <= e.start) { eonName = e.name; break; }
  }

  rangeInfo.innerHTML =
    `<div>${fmt(maxY)} &mdash; ${fmt(minY)}</div>` +
    (eonName ? `<div style="color:rgba(160,185,255,0.28);font-size:10px;margin-top:2px">${eonName}</div>` : '');
}

// ─── INTERACTION ─────────────────────────────────────────────────────

let drag = null;

canvas.addEventListener('mousedown', e => {
  drag = { sx: e.clientX, slc: logCenter };
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  logCenter = drag.slc - ((e.clientX - drag.sx) / canvas.width) * logRange;
  clampView(); draw();
});
window.addEventListener('mouseup', () => {
  drag = null;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.13 : 1 / 1.13;
  const ml = xToLog(e.clientX);
  logRange = Math.max(MIN_LOG_RANGE, Math.min(MAX_LOG_RANGE, logRange * factor));
  logCenter = ml + logRange * (e.clientX / canvas.width - 0.5);
  clampView(); draw();
}, { passive: false });

// Touch
let touch = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    touch = { type: 'drag', sx: e.touches[0].clientX, slc: logCenter };
  } else if (e.touches.length >= 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    touch = { type: 'pinch', sd: Math.abs(dx), slr: logRange, slc: logCenter, ml: xToLog(mx), mx };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch) return;
  if (touch.type === 'drag' && e.touches.length === 1) {
    logCenter = touch.slc - ((e.touches[0].clientX - touch.sx) / canvas.width) * logRange;
    clampView(); draw();
  } else if (touch.type === 'pinch' && e.touches.length >= 2) {
    const dx = Math.abs(e.touches[1].clientX - e.touches[0].clientX);
    const f = touch.sd / dx;
    logRange = Math.max(MIN_LOG_RANGE, Math.min(MAX_LOG_RANGE, touch.slr * f));
    logCenter = touch.ml + logRange * (touch.mx / canvas.width - 0.5);
    clampView(); draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { touch = null; });

// Fade out hint after 5 s
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);

// ─── INIT ─────────────────────────────────────────────────────────────

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
