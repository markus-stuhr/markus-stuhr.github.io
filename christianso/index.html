<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Das Geheimnis von Christiansø — Prolog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #07090d; color: #e8e2d0;
    font-family: 'Courier New', monospace; overflow: hidden; user-select: none; -webkit-user-select: none; }
  #game { display: flex; flex-direction: column; height: 100%; width: 100%; }
  #stageWrap { position: relative; flex: 1 1 auto; background: #000; overflow: hidden; }
  canvas#scene { position: absolute; image-rendering: pixelated; image-rendering: crisp-edges;
    left: 50%; top: 50%; transform: translate(-50%, -50%); cursor: pointer; }

  #caption { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%);
    max-width: 90%; text-align: center; font-size: 16px; color: #f4e9c8;
    text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
    pointer-events: none; line-height: 1.3; display: none; }

  #dialog { position: absolute; left: 0; right: 0; bottom: 0; background: rgba(8,6,4,.88);
    border-top: 2px solid #5a4020; padding: 6px 10px; display: none; }
  #dialog .npcsay { color: #f4e9c8; font-size: 15px; margin-bottom: 6px; min-height: 1px; }
  .dline { color: #8fd6ff; padding: 4px 6px; cursor: pointer; font-size: 15px; }
  .dline:hover { background: #2a3d4d; color: #fff; }

  #sentence { height: 30px; line-height: 30px; text-align: center; font-size: 16px;
    background: #140f0a; color: #f0d890; border-top: 2px solid #3a2f22;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px; }

  #ui { display: flex; height: 132px; background: #140f0a; border-top: 2px solid #3a2f22; }
  #verbs { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 4px; padding: 6px; width: 48%; }
  .verb { background: #2a2018; color: #d8c8a0; border: 1px solid #4a3a28; border-radius: 3px;
    display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; }
  .verb:hover { background: #4a3618; color: #fff; }
  .verb.active { background: #6b4a1e; color: #fff; border-color: #f0d890; }
  .verb.hl { background: #c9a227; color: #1a1208; border-color: #f5dd6b; }
  .verb.hl.active { background: #d8b53a; color: #1a1208; }
  #inv { width: 52%; padding: 6px; display: grid; grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 58px; gap: 4px; overflow-y: auto; border-left: 2px solid #3a2f22; align-content: start; }
  .invItem { background: #2a2018; border: 1px solid #4a3a28; border-radius: 3px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 10px; text-align: center; padding: 2px; color: #d8c8a0; }
  .invItem:hover { background: #4a3618; color: #fff; }
  .invItem.sel { outline: 2px solid #f0d890; outline-offset: -2px; }
  .invIcon { width: 26px; height: 26px; border-radius: 3px; margin-bottom: 3px; }

  #overlay { position: absolute; inset: 0; background: #07090d; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px; z-index: 5; }
  #overlay h1 { font-size: 26px; color: #f0d890; margin-bottom: 12px; letter-spacing: 1px; }
  #overlay p { font-size: 15px; color: #b8ad95; max-width: 460px; margin-bottom: 8px; line-height: 1.5; }
  #overlay button { margin-top: 18px; background: #6b4a1e; color: #fff; border: 1px solid #f0d890;
    border-radius: 4px; padding: 10px 22px; font-family: inherit; font-size: 16px; cursor: pointer; }
  #overlay button:hover { background: #8a611f; }
  .hint { font-size: 13px; color: #6f6552; margin-top: 14px; }
</style>
</head>
<body>
<div id="game">
  <div id="stageWrap">
    <canvas id="scene" width="320" height="180"></canvas>
    <div id="caption"></div>
    <div id="dialog"><div class="npcsay"></div><div class="dopts"></div></div>
    <div id="overlay">
      <h1>Das Geheimnis von Christiansø</h1>
      <p><b>Prolog — Gudhjem</b></p>
      <p>Mads Møller will mit der Fähre nach Christiansø. Aber erst braucht er ein Ticket …</p>
      <p class="hint">Wähle ein Verb, dann klicke ein Objekt oder eine Person.<br>Ohne Verb läuft Mads einfach zum angeklickten Punkt.</p>
      <button id="startBtn">Los geht's</button>
    </div>
  </div>
  <div id="sentence">Gehe zu</div>
  <div id="ui">
    <div id="verbs"></div>
    <div id="inv"></div>
  </div>
</div>

<script>
"use strict";
//============================================================================
// Christiansø Adventure — Engine v0.1 (Vertical Slice: Gudhjem-Prolog)
// Vanilla JS. Hybrid-Rendering: Szene auf Canvas (320x180, pixelated),
// UI (Verben/Inventar/Dialog) als DOM. Daten-getriebene Räume/Hotspots/Items.
//============================================================================

const VW = 320, VH = 180;          // virtuelle Auflösung
const WALK_TOP = 138, WALK_BOT = 168;  // begehbares Band (Boden)

const cv = document.getElementById('scene');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const elCaption = document.getElementById('caption');
const elSentence = document.getElementById('sentence');
const elVerbs = document.getElementById('verbs');
const elInv = document.getElementById('inv');
const elDialog = document.getElementById('dialog');
const elDsay = elDialog.querySelector('.npcsay');
const elDopts = elDialog.querySelector('.dopts');
const elOverlay = document.getElementById('overlay');

const VERBS = ['Gib','Nimm','Benutze','Öffne','Schau an','Drücke','Schließe','Ziehe','Rede mit'];
const TWO_OBJ = { 'Benutze': 'mit', 'Gib': 'an' };
const DEBUG_HS = false;  // Hotspot-Rechtecke einzeichnen (zum Ausrichten); für Release auf false

//---------------------------------------------------------------------------
// Spielzustand
//---------------------------------------------------------------------------
const state = {
  room: 'harbor',
  verb: 'Gehe zu',
  obj1: null,                 // erstes Objekt bei Zwei-Objekt-Verben
  inv: ['schein'],
  flags: { boughtHerring: false, hasChange: false, gullDistracted: false, gaveEgg: false, hasTicket: false },
  mode: 'title',              // 'title' | 'play' | 'dialog' | 'cutscene'
  player: { x: 64, y: 156, tx: 64, ty: 156, scale: 1, onArrive: null, facing: 1 },
};

//---------------------------------------------------------------------------
// Items
//---------------------------------------------------------------------------
const ITEMS = {
  schein:     { name: '500-Kronen-Schein', color: '#2e8b57',
                look: 'Ein knisternder 500-Kronen-Schein. Viel zu groß, um damit eine Fährfahrt zu bezahlen.' },
  hering:     { name: 'Magnet-Hering', color: '#7fa7c4',
                look: 'Ein kitschiger Kühlschrankmagnet in Heringsform. "Hilsen fra Bornholm". Wunderschön hässlich. Und magnetisch.' },
  wechselgeld:{ name: 'Wechselgeld', color: '#d4af37',
                look: 'Eine Handvoll Münzen. Genau richtig für ein Fährticket.' },
  ticket:     { name: 'Fährticket', color: '#e0d5b8',
                look: 'Ein Ticket nach Christiansø. Einfache Fahrt — Rückfahrt: ungewiss.' },
  raeucherhering: { name: 'Räucherhering', color: '#b8843a',
                look: 'Ein echter, goldbraun geräucherter Hering vom Haken. Riecht streng genug, um eine Möwe um den Verstand zu bringen.' },
  ei:         { name: 'Möwen-Ei', color: '#efe7d2',
                look: 'Ein noch warmes Möwen-Ei. Genau die „Sonne", die Aksels Frühstück fehlt.' },
};

//---------------------------------------------------------------------------
// Hilfen
//---------------------------------------------------------------------------
let capTimer = null;
function say(text, who) {
  const full = who ? `${who}: „${text}"` : text;
  elCaption.textContent = full;
  elCaption.style.display = 'block';
  if (capTimer) clearTimeout(capTimer);
  if (state.mode !== 'dialog') {
    const dur = Math.max(1800, Math.min(6000, full.length * 55));
    capTimer = setTimeout(() => { elCaption.style.display = 'none'; }, dur);
  }
}
function hasItem(id) { return state.inv.includes(id); }
function addItem(id) { if (!hasItem(id)) state.inv.push(id); renderInv(); }
function removeItem(id) { state.inv = state.inv.filter(i => i !== id); renderInv(); }

//---------------------------------------------------------------------------
// Puzzle-Aktionen (von Dialog UND Geben-Verb aus erreichbar)
//---------------------------------------------------------------------------
function buyHerring() {
  if (state.flags.boughtHerring || !hasItem('schein')) return;
  state.flags.boughtHerring = true;
  state.flags.hasChange = true;
  removeItem('schein');
  addItem('hering');
  addItem('wechselgeld');
  say('Ein Auge fürs Schöne! Der magnetische Hering — mein Bestseller. Hier ist Ihr Wechselgeld.', 'Bodil');
}
function buyTicket() {
  if (!state.flags.hasChange || !state.flags.gaveEgg || state.flags.hasTicket) return;
  state.flags.hasTicket = true;
  removeItem('wechselgeld');
  addItem('ticket');
  say('40 Kroner, passend, sehr schön. Die Fähre legt gleich ab — beeil dich, Junge!', 'Aksel');
}
function giveEgg() {
  if (!hasItem('ei') || state.flags.gaveEgg) return;
  state.flags.gaveEgg = true;
  removeItem('ei');
  say('Aaah — die Sonne über Gudhjem! Jetzt ist es ein anständiges Frühstück. Also gut, dein Ticket sollst du haben.', 'Aksel');
}
function lureGull() {
  if (state.flags.gullDistracted || !hasItem('raeucherhering')) return;
  state.flags.gullDistracted = true;
  removeItem('raeucherhering');
  say('Die Möwe stürzt sich gierig auf den Hering und segelt damit davon. Das Nest ist frei!');
}
function takeEgg() {
  if (!state.flags.gullDistracted) { say('Die Möwe verteidigt ihr Nest mit dem Schnabel. Autsch. So komme ich nicht ran.'); return; }
  if (hasItem('ei') || state.flags.gaveEgg) { say('Das Nest ist leer. War ja klar.'); return; }
  addItem('ei');
  say('Ich angle das Ei aus dem verlassenen Nest. Pscht.');
}
function board() {
  if (!state.flags.hasTicket) { say('Erst ein Ticket. So einfach komme ich hier nicht weg.'); return; }
  runCrossing();
}

//---------------------------------------------------------------------------
// Dialoge (dynamisch nach Flags aufgebaut)
//---------------------------------------------------------------------------
const DIALOGS = {
  bodil: () => {
    const o = [];
    o.push({ t: 'Was haben Sie denn so?', run: () =>
      reopen('Souvenirs vom Feinsten, junger Mann! Trolle, Postkarten, eine Klippe in einer Schneekugel. Aber der magnetische Hering — DAS ist Kunst. Und magnetisch! Nur… 500 Kronen.', 'bodil') });
    if (!state.flags.boughtHerring && hasItem('schein'))
      o.push({ t: 'Ich nehme den magnetischen Hering. (500 Kr)', run: () => { buyHerring(); closeDialog(); } });
    if (state.flags.boughtHerring)
      o.push({ t: 'Diese Möwe auf dem Kassendach…', run: () =>
        reopen('Die fette Plage! Sitzt da auf ihrem Nest und faucht jeden an. Geh ihr bloß nicht zu nah — außer du hast was Fischiges, das mag sie lieber als alles andere.', 'bodil') });
    o.push({ t: '(Gehen)', run: closeDialog });
    return o;
  },
  aksel: () => {
    const o = [];
    if (state.flags.hasTicket) {
      o.push({ t: 'Wann legen wir ab?', run: () =>
        reopen('Sobald du an Bord bist! Worauf wartest du?', 'aksel') });
    } else if (!state.flags.hasChange) {
      o.push({ t: 'Ein Ticket nach Christiansø, bitte.', run: () =>
        reopen('Gern — 40 Kroner. Aber pass auf: für so einen großen Schein hab ich keinen Øre Wechselgeld!', 'aksel') });
      o.push({ t: 'Wo bekomme ich Wechselgeld?', run: () =>
        reopen('Der Souvenirstand am Kai nimmt deinen großen Schein bestimmt nur zu gern.', 'aksel') });
    } else if (!state.flags.gaveEgg) {
      o.push({ t: 'Ich hätte das passende Geld — also: ein Ticket?', run: () =>
        reopen('Geduld, Junge! Erst esse ich mein Sol over Gudhjem in Ruhe zu Ende. Bloß… die Sonne fehlt — das rohe Eigelb! Bring mir ein Ei, dann legen wir ab.', 'aksel') });
      o.push({ t: 'Woher soll ich ein Ei nehmen?', run: () =>
        reopen('Auf dem Kassendach am Kai nistet eine fette Möwe. Mutig genug? Aber pass auf ihren Schnabel auf — die rückt ihr Nest nur für etwas Fischiges.', 'aksel') });
      if (hasItem('ei'))
        o.push({ t: 'Hier — ein frisches Ei. Die „Sonne".', run: () => { giveEgg(); closeDialog(); } });
    } else {
      o.push({ t: 'So, jetzt aber das Ticket!', run: () => { buyTicket(); closeDialog(); } });
    }
    o.push({ t: '(Gehen)', run: closeDialog });
    return o;
  },
};
let curNpc = null;
function openDialog(npc) {
  curNpc = npc;
  state.mode = 'dialog';
  elDsay.textContent = '';
  renderDialog();
  elDialog.style.display = 'block';
  elCaption.style.display = 'none';
}
function reopen(line, npc) { elDsay.textContent = `${npcName(npc)}: „${line}"`; renderDialog(); }
function renderDialog() {
  elDopts.innerHTML = '';
  DIALOGS[curNpc]().forEach(opt => {
    const d = document.createElement('div');
    d.className = 'dline';
    d.textContent = '• ' + opt.t;
    d.onclick = opt.run;
    elDopts.appendChild(d);
  });
}
function closeDialog() {
  elDialog.style.display = 'none';
  curNpc = null;
  if (state.mode === 'dialog') state.mode = 'play';
}
function npcName(n) { return n === 'bodil' ? 'Bodil' : n === 'aksel' ? 'Aksel' : ''; }

//---------------------------------------------------------------------------
// Räume
//---------------------------------------------------------------------------
const ROOMS = {
  harbor: {
    draw: drawHarbor,
    bg: 'art/gudhjem_harbor.png',
    overlay: drawHarborOverlay,
    hotspots: [
      { id: 'ferry', name: 'Fähre', rect: [0, 100, 132, 78], walk: { x: 118, y: 170 }, dv: 'Benutze',
        look: 'Die kleine Christiansø-Fähre. Sie schaukelt einladend. Ohne Ticket komme ich da nicht rauf.',
        onUse: board },
      { id: 'kasse', name: 'Billettluge', rect: [152, 96, 68, 58], walk: { x: 186, y: 168 },
        look: 'Die Fährkasse mit Tafeln und Klappfenster. Ein Schild: „Bin in der Räucherei. — Der Fährmann."',
        onOpen: () => say('Das Klappfenster ist zu. Der Fährmann sitzt in der Räucherei.') },
      { id: 'gull', name: 'Möwe', rect: [156, 74, 60, 16], walk: { x: 186, y: 168 }, dv: 'Nimm',
        look: () => state.flags.gullDistracted
          ? 'Das verlassene Möwennest auf dem Dach der Kasse. Ein Ei liegt noch darin… falls ich es noch nicht habe.'
          : 'Eine fette Möwe thront auf dem Dach der Kasse und bewacht ihr Nest. Sie mustert mich angriffslustig. In dem Nest: ein Ei.',
        onTake: takeEgg },
      { id: 'crate', name: 'Holzkiste', rect: [284, 150, 34, 28], walk: { x: 286, y: 172 }, dv: 'Schau an',
        look: 'Eine alte Holzkiste. Aufschrift: „VORSICHT — GEHEIM". Ich hebe gespannt den Deckel… leer. Bis auf eine tote Spinne.',
        onTake: () => say('Viel zu schwer. Und leer. Lohnt nicht.') },
      { id: 'doorShop', name: 'Tür zum Souvenirladen', rect: [248, 52, 30, 40], walk: { x: 258, y: 140 },
        door: { room: 'souvenir', x: 158, y: 165 },
        look: 'Ganz hinten, die Treppe hoch: ein Lädchen. Über der Tür ein verblasstes Schild „Souvenirer".' },
      { id: 'doorSmoke', name: 'Tür zur Räucherei', rect: [298, 100, 20, 54], walk: { x: 300, y: 172 },
        door: { room: 'roegeri', x: 30, y: 158 },
        look: 'Das Häuschen mit dem rußigen Räucherofen davor. Hier wird geräuchert — und hier steckt der Fährmann.' },
      { id: 'doorLocked', name: 'Tür', rect: [230, 62, 24, 42], walk: { x: 240, y: 150 },
        locked: true,
        look: 'Eine schlichte Holztür am gelben Haus. Ich klopfe. Nichts rührt sich. Hier macht niemand auf.' },
    ],
  },
  roegeri: {
    draw: drawRoegeri,
    hotspots: [
      { id: 'toHarbor', name: 'Tür nach draußen', rect: [0, 70, 34, 100], walk: { x: 26, y: 158 },
        look: 'Zurück hinaus auf den Kai.',
        exit: { room: 'harbor', x: 290, y: 170 } },
      { id: 'aksel', name: 'Aksel', npc: true, rect: [150, 98, 32, 58], walk: { x: 162, y: 162 },
        look: 'Skipper Aksel, der Fährmann. Genießt sein „Sol over Gudhjem", als hinge sein Leben daran.',
        talk: () => openDialog('aksel') },
      { id: 'plate', name: 'Sol over Gudhjem', rect: [150, 124, 26, 12], walk: { x: 150, y: 162 },
        look: () => state.flags.gaveEgg
          ? 'Aksels Sol over Gudhjem — jetzt mit glänzendem Eigelb obendrauf. Vollständig.'
          : 'Geräucherter Hering auf Roggenbrot. Aber das rohe Eigelb obendrauf fehlt — so ist es kein echtes „Sol over Gudhjem".' },
      { id: 'rack', name: 'Räucherhaken', rect: [198, 92, 44, 42], walk: { x: 208, y: 160 }, dv: 'Nimm',
        look: 'Ein Haken voller goldbraun geräucherter Heringe. Der Duft ist betörend — und unwiderstehlich fischig.',
        onTake: () => { if (!hasItem('raeucherhering')) { addItem('raeucherhering');
            say('Ich schnappe mir einen Räucherhering vom Haken. Aksel schaut kurz, brummt aber nur.'); }
          else say('Einen Hering hab ich schon. Mehr brauche ich nicht.'); } },
      { id: 'chimney', name: 'Räucherschornsteine', rect: [40, 40, 80, 60], walk: { x: 90, y: 158 },
        look: 'Die berühmten weißen Schornsteine. Es riecht köstlich nach Rauch und Hering.' },
    ],
  },
  souvenir: {
    draw: drawSouvenir,
    hotspots: [
      { id: 'toHarborS', name: 'Tür nach draußen', rect: [0, 70, 34, 100], walk: { x: 26, y: 158 },
        look: 'Zurück hinaus auf den Kai.',
        exit: { room: 'harbor', x: 262, y: 150 } },
      { id: 'bodil', name: 'Bodil', npc: true, rect: [150, 96, 30, 60], walk: { x: 164, y: 162 },
        look: 'Bodil, die Souvenirhändlerin. Strahlt jeden potenziellen Käufer an wie eine Leuchtboje.',
        talk: () => openDialog('bodil') },
      { id: 'shelf', name: 'Souvenir-Regal', rect: [118, 86, 124, 46], walk: { x: 200, y: 162 }, dv: 'Schau an',
        look: 'Regale voller Trolle, Schneekugeln, Klippen in Plastik — und mittendrin der magnetische Hering.',
        onUse: () => openDialog('bodil') },
    ],
  },
};
function room() { return ROOMS[state.room]; }

// Hintergrund-Bilder vorladen (Räume ohne bg zeichnen prozedural als Fallback)
const IMG = {};
function preloadBackgrounds() {
  for (const id in ROOMS) {
    const r = ROOMS[id];
    if (r.bg) { const im = new Image(); im.onload = () => { IMG[id] = im; }; im.src = r.bg; }
  }
}

//---------------------------------------------------------------------------
// Zwei-Objekt-Kombinationen (Benutze … mit …, Gib … an …)
//---------------------------------------------------------------------------
function combine(verb, a, b) {
  const ids = [a.id, b.id];
  const has = id => ids.includes(id);
  // Gib Schein an Bodil/Regal  → Hering kaufen
  if (verb === 'Gib' && has('schein') && (has('bodil') || has('shelf'))) {
    if (!state.flags.boughtHerring) { buyHerring(); return true; }
  }
  // Benutze Räucherhering mit Möwe  → ablenken
  if (verb === 'Benutze' && has('raeucherhering') && has('gull')) { lureGull(); return true; }
  // Gib Ei an Aksel  → Sol vervollständigen
  if (verb === 'Gib' && has('ei') && has('aksel')) {
    if (!state.flags.gaveEgg) { giveEgg(); return true; }
  }
  // Gib Wechselgeld an Aksel  → Ticket (nur wenn das Ei schon übergeben ist)
  if (verb === 'Gib' && has('wechselgeld') && has('aksel')) {
    if (state.flags.gaveEgg && !state.flags.hasTicket) { buyTicket(); return true; }
    if (!state.flags.gaveEgg) { say('„Erst die Sonne, dann das Geschäft!", brummt Aksel. Er will sein Ei.'); return true; }
  }
  // Gib/Benutze Ticket an/mit Fähre  → einsteigen
  if (has('ticket') && has('ferry')) { board(); return true; }
  // Späßchen
  if (has('hering') && has('ferry')) { say('Der Magnet-Hering klebt kurz am Rumpf. Dann fällt er ab. Wie alles in meinem Leben.'); return true; }
  if (has('hering') && has('gull')) { say('Die Möwe beäugt den Magnet-Hering, schnaubt verächtlich und bleibt sitzen. Eine Kunstkennerin.'); return true; }
  if (has('hering') && has('kasse')) { say('Der Hering klebt an der Blechluge. Sehr dekorativ, aber öffnet sie nicht.'); return true; }
  if (has('raeucherhering') && has('aksel')) { say('„Untersteh dich, mir mein Frühstück zu klauen!", knurrt Aksel.'); return true; }
  return false;
}

//---------------------------------------------------------------------------
// Interaktion ausführen
//---------------------------------------------------------------------------
function targetLook(t) {
  if (t.type === 'item') return ITEMS[t.id].look;
  const l = t.hs.look;
  return (typeof l === 'function' ? l() : l) || 'Nichts Besonderes.';
}
function perform(verb, t) {
  switch (verb) {
    case 'Schau an': say(targetLook(t)); break;
    case 'Rede mit':
      if (t.type === 'hotspot' && t.hs.talk) t.hs.talk();
      else say('Das hat mir nichts zu sagen.');
      break;
    case 'Nimm':
      if (t.type === 'item') say('Hab ich schon.');
      else if (t.hs && t.hs.onTake) t.hs.onTake();
      else say('Das lässt sich nicht einfach einstecken.');
      break;
    case 'Öffne':
      if (t.type === 'hotspot' && t.hs.locked) { say('Ich rüttle an der Tür. Abgeschlossen — hier macht niemand auf.'); break; }
      if (t.type === 'hotspot' && t.hs.door) {
        if (!state.flags['open_' + t.hs.id]) { state.flags['open_' + t.hs.id] = true; say('Die Tür schwingt knarrend auf.'); }
        else say('Die Tür steht bereits offen.');
        break;
      }
      if (t.type === 'hotspot' && t.hs.onOpen) t.hs.onOpen();
      else say('Das kann ich nicht öffnen.');
      break;
    case 'Schließe': say('Muss ich nicht schließen.'); break;
    case 'Drücke': say('Ich drücke dagegen. Es passiert nichts Spannendes.'); break;
    case 'Ziehe': say('Ich ziehe daran. Es bleibt, wo es ist.'); break;
    case 'Benutze':
      if (t.type === 'hotspot' && t.hs.onUse) { t.hs.onUse(); }
      else { say('Das müsste ich mit etwas benutzen.'); }
      break;
    default: // 'Gehe zu'
      if (t.type === 'hotspot' && t.hs.locked) say('Abgeschlossen. Da komme ich nicht rein.');
      else if (t.type === 'hotspot' && t.hs.door) {
        if (state.flags['open_' + t.hs.id]) doExit(t.hs.door);
        else say('Die Tür ist zu. Ich sollte sie erst öffnen.');
      }
      else if (t.type === 'hotspot' && t.hs.exit) doExit(t.hs.exit);
      else if (t.type === 'hotspot' && t.hs.npc) {/* nur hinlaufen */}
      break;
  }
}

function resolveTarget(t) {
  // t: {type:'hotspot'|'item', id, name, hs?, walk?}
  const v = state.verb;
  // Zwei-Objekt-Verb: erstes Objekt merken
  if (TWO_OBJ[v] && !state.obj1) {
    state.obj1 = t;
    renderInv();
    updateSentence(null);
    return;
  }
  // Zwei-Objekt-Verb: zweites Objekt → kombinieren
  if (TWO_OBJ[v] && state.obj1) {
    const a = state.obj1, b = t;
    walkThen(b, () => {
      if (!combine(v, a, b)) say('Das ergibt keinen Sinn.');
    });
    resetVerb();
    return;
  }
  // Ein-Objekt
  walkThen(t, () => perform(v, t));
  resetVerb();
}

function walkThen(t, cb) {
  // Items: keine Bewegung nötig. Hotspots: zum walk-Punkt laufen.
  if (t.type === 'hotspot' && t.walk) moveTo(t.walk.x, t.walk.y, cb);
  else cb();
}

function doExit(ex) {
  // erst hinlaufen ist bereits passiert; Raum wechseln
  state.room = ex.room;
  state.player.x = state.player.tx = ex.x;
  state.player.y = state.player.ty = ex.y;
  state.player.onArrive = null;
  elCaption.style.display = 'none';
}

//---------------------------------------------------------------------------
// Bewegung
//---------------------------------------------------------------------------
function moveTo(x, y, cb) {
  const p = state.player;
  p.tx = clamp(x, 8, VW - 8);
  p.ty = clamp(y, WALK_TOP, WALK_BOT);
  p.onArrive = cb || null;
  if (x > p.x) p.facing = 1; else if (x < p.x) p.facing = -1;
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

//---------------------------------------------------------------------------
// Verben / Sentence / Inventar
//---------------------------------------------------------------------------
function renderVerbs() {
  elVerbs.innerHTML = '';
  VERBS.forEach(v => {
    const d = document.createElement('div');
    d.className = 'verb' + (state.verb === v ? ' active' : '');
    d.textContent = v;
    d.onclick = () => { state.verb = v; state.obj1 = null; renderVerbs(); renderInv(); updateSentence(null); };
    elVerbs.appendChild(d);
  });
}
function resetVerb() { state.verb = 'Gehe zu'; state.obj1 = null; renderVerbs(); renderInv(); updateSentence(null); }

// Passendes Standard-Verb eines Hotspots (für Hover-Highlight & Rechtsklick)
function defaultVerb(hs) {
  if (hs.door || hs.locked) return state.flags['open_' + hs.id] ? 'Gehe zu' : 'Öffne';
  return hs.dv || (hs.npc ? 'Rede mit' : hs.exit ? 'Gehe zu' : 'Schau an');
}
function highlightVerb(name) {
  [...elVerbs.children].forEach(el => el.classList.toggle('hl', !!name && el.textContent === name));
}
// Rechtsklick: Standard-Verb direkt am Ziel ausführen (ohne Zwei-Objekt-Auswahl)
function execDefault(t, verb) {
  walkThen(t, () => perform(verb, t));
}

function renderInv() {
  elInv.innerHTML = '';
  state.inv.forEach(id => {
    const it = ITEMS[id];
    const d = document.createElement('div');
    d.className = 'invItem' + (state.obj1 && state.obj1.type === 'item' && state.obj1.id === id ? ' sel' : '');
    const ic = document.createElement('div');
    ic.className = 'invIcon';
    ic.style.background = it.color;
    d.appendChild(ic);
    const lbl = document.createElement('div');
    lbl.textContent = it.name;
    d.appendChild(lbl);
    d.onclick = () => { if (state.mode === 'play') resolveTarget({ type: 'item', id, name: it.name }); };
    d.oncontextmenu = (e) => { e.preventDefault(); if (state.mode === 'play') perform('Schau an', { type: 'item', id, name: it.name }); };
    d.onmouseenter = () => { updateSentence({ name: it.name }); highlightVerb('Schau an'); };
    d.onmouseleave = () => { updateSentence(null); highlightVerb(null); };
    elInv.appendChild(d);
  });
}

function updateSentence(hover) {
  const v = state.verb;
  let s = v;
  if (TWO_OBJ[v] && state.obj1) {
    s = `${v} ${state.obj1.name} ${TWO_OBJ[v]}`;
    if (hover) s += ' ' + hover.name;
  } else if (hover) {
    s = `${v} ${hover.name}`;
  }
  elSentence.textContent = s;
}

//---------------------------------------------------------------------------
// Maus / Hit-Test
//---------------------------------------------------------------------------
let scale = 1, offX = 0, offY = 0;
function resize() {
  const wrap = document.getElementById('stageWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  scale = Math.max(1, Math.floor(Math.min(w / VW, h / VH)));
  if (scale * VH > h || scale * VW > w) scale = Math.min(w / VW, h / VH);
  cv.style.width = (VW * scale) + 'px';
  cv.style.height = (VH * scale) + 'px';
  const r = cv.getBoundingClientRect();
  offX = r.left; offY = r.top;
}
window.addEventListener('resize', resize);

function toVirtual(e) {
  const r = cv.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return { x: cx / scale, y: cy / scale };
}
function hotspotAt(x, y) {
  // bei Überlappung den kleinsten (spezifischsten) Hotspot wählen
  let best = null, bestArea = Infinity;
  for (const hs of room().hotspots) {
    const [rx, ry, rw, rh] = hs.rect;
    if (x >= rx && x <= rx + rw && y >= ry && y <= ry + rh) {
      const a = rw * rh;
      if (a < bestArea) { bestArea = a; best = hs; }
    }
  }
  return best;
}

cv.addEventListener('mousemove', e => {
  if (state.mode !== 'play') return;
  const p = toVirtual(e);
  const hs = hotspotAt(p.x, p.y);
  updateSentence(hs ? { name: hs.name } : null);
  highlightVerb(hs ? defaultVerb(hs) : null);   // passendes Verb gelb hinterlegen
});
cv.addEventListener('mouseleave', () => { updateSentence(null); highlightVerb(null); });
cv.addEventListener('click', e => {
  if (state.mode !== 'play') return;
  const p = toVirtual(e);
  const hs = hotspotAt(p.x, p.y);
  if (hs) {
    resolveTarget({ type: 'hotspot', id: hs.id, name: hs.name, hs, walk: hs.walk });
  } else {
    // leerer Boden → laufen (Verb zurücksetzen)
    moveTo(p.x, p.y, null);
    if (state.verb !== 'Gehe zu') resetVerb();
  }
});
// Rechtsklick = markiertes Standard-Verb direkt ausführen.
// Auf mousedown (Taste 2) statt contextmenu, da manche eingebetteten
// Preview-Umgebungen das contextmenu-Event abfangen.
function rightAction(e) {
  e.preventDefault();
  if (state.mode !== 'play') return;
  const p = toVirtual(e);
  const hs = hotspotAt(p.x, p.y);
  if (!hs) return;
  execDefault({ type: 'hotspot', id: hs.id, name: hs.name, hs, walk: hs.walk }, defaultVerb(hs));
}
cv.addEventListener('mousedown', e => { if (e.button === 2) rightAction(e); });
cv.addEventListener('contextmenu', e => e.preventDefault());   // natives Menü unterdrücken

//---------------------------------------------------------------------------
// Rendering der Räume (Platzhalter-Pixelgrafik)
//---------------------------------------------------------------------------
function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x | 0, y | 0, w | 0, h | 0); }
function label(t, x, y, c) { ctx.fillStyle = c || '#000'; ctx.font = '6px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.fillText(t, x, y); ctx.textAlign = 'left'; }

function drawWater(t) {
  rect(0, 92, VW, 50, '#2b6a8a');
  for (let i = 0; i < 7; i++) {
    const yy = 100 + i * 6;
    ctx.fillStyle = i % 2 ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.08)';
    const off = (t * 8 + i * 13) % 24;
    for (let x = -24 + off; x < VW; x += 24) ctx.fillRect(x, yy, 12, 2);
  }
}
function drawPerson(x, y, sc, c, facing) {
  const w = 9 * sc, h = 22 * sc, hs = 7 * sc;
  rect(x - w / 2, y - h * 0.42, w * 0.42, h * 0.42, c.legs);
  rect(x + w * 0.06, y - h * 0.42, w * 0.42, h * 0.42, c.legs);
  rect(x - w / 2, y - h, w, h * 0.6, c.body);
  rect(x - hs / 2, y - h - hs * 0.85, hs, hs, c.skin);
  rect(x - hs / 2, y - h - hs * 0.85, hs, hs * 0.4, c.hair);
  // Blickrichtung: kleine Nase
  rect(x + facing * (hs * 0.4), y - h - hs * 0.35, sc, sc, c.skin);
}
function drawGull(x, y) {
  rect(x - 5, y - 3, 10, 6, '#f4f4f4');   // Körper
  rect(x - 8, y - 4, 4, 3, '#e2e2e2');    // Flügel

  rect(x - 2, y - 6, 4, 4, '#f4f4f4');    // Kopf

}

  // Fähre

  } else if (!hasItem('ei') && !state.flags.gaveEgg) {

  }
  // Flaschenpost am Kai (kleine falsche Spur)

  // Souvenirstand + Sonnenschirm

  rect(256, 96, 3, 18, '#6b4f2a'); rect(238, 90, 40, 8, '#c0392b'); // Schirm
  label('SOUVENIRS', 258, 150, '#f0e0b0');
  // Bodil
  drawPerson(206, 156, 1, { legs: '#3a2f50', body: '#b0476b', skin: '#e8c0a0', hair: '#caa', }, -1);
  // Gasse zum Røgeri
  rect(292, 96, 28, 46, '#6b5e44'); rect(296, 96, 20, 46, '#7c6e50');
  rect(294, 96, 24, 8, '#3a2a22'); label('→ RØGERI', 306, 112, '#f0e0b0');
}

function drawRoegeri(t) {
  rect(0, 0, VW, 110, '#caa882');                // warme Wand
  rect(0, 0, VW, 60, '#b89a72');
  rect(0, 140, VW, 40, '#5a4326');               // Boden
  rect(0, 138, VW, 4, '#7a5f3a');
  // Schornsteine
  for (let i = 0; i < 3; i++) {

    // Rauch
    for (let s = 0; s < 4; s++) {

  rect(150, 124, 24, 8, '#caa'); rect(156, 125, 6, 5, '#e8a83a'); // Eigelb auf Brot
  label('SOL OVER GUDHJEM', 163, 150, '#5a4326');
  // Aksel sitzt
  drawPerson(162, 156, 1, { legs: '#2f3f50', body: '#3a6ea5', skin: '#e0b890', hair: '#ddd' }, -1);
  // Tür zum Hafen

// Dynamische Objekte über dem Hafen-Foto (Möwe / Ei auf dem Kassendach)
function drawHarborOverlay(t) {
  const gx = 186, gy = 80;
  if (!state.flags.gullDistracted) drawGull(gx, gy + Math.sin(t * 3) * 0.8);
  else if (!hasItem('ei') && !state.flags.gaveEgg) { rect(gx - 4, gy - 1, 9, 5, '#efe7d2'); rect(gx - 6, gy + 3, 13, 2, '#5a4326'); }
}

// Souvenirladen (Platzhalter-Interieur, bis es ein echtes Bild gibt)
function drawSouvenir(t) {
  rect(0, 0, VW, 142, '#7a5a48'); rect(0, 0, VW, 70, '#8a6a54');     // Wand
  rect(0, 140, VW, 40, '#4a382a');                                    // Boden
  rect(0, 138, VW, 4, '#5f4836');
  rect(2, 96, 30, 46, '#3a2a1e'); rect(6, 100, 22, 42, '#241810');    // Tür nach draußen

    rect(122 + i * 15, 92 + r * 22, 10, 12, ['#d4af37','#7fa7c4','#c0392b','#2e8b57','#b56bb0','#e08a3a','#dfe6ea','#6bbf8a'][(i + r) % 8]);
  label('SOUVENIRER', 180, 128, '#e8d8b0');

}

function drawDebugHotspots(rm) {
  ctx.strokeStyle = 'rgba(255,0,255,0.9)';
  ctx.lineWidth = 0.5;
  for (const hs of rm.hotspots) {
    const [rx, ry, rw, rh] = hs.rect;
    ctx.strokeRect(rx + 0.25, ry + 0.25, rw, rh);
    label(hs.id, rx + rw / 2, ry - 1, '#ff0');
  }
}

//---------------------------------------------------------------------------
// Cutscene: Überfahrt
//---------------------------------------------------------------------------
let crossT = 0, crossCaps = [], crossCapIdx = 0, crossCapTimer = 0;
function runCrossing() {
  closeDialog();
  state.mode = 'cutscene';
  elCaption.style.display = 'none';
  crossT = 0; crossCapIdx = 0; crossCapTimer = 0;
  crossCaps = [
    'Die Fähre tuckert aus dem Hafen von Gudhjem.',
    'Möwen kreisen. Bornholm wird kleiner.',
    'Ein alter Mitfahrer murmelt: „Auf Christiansø… da gehen nachts die Lichter aus. Und wieder an."',
    'Am Horizont taucht eine winzige Festungsinsel auf.',
    'Christiansø.',
  ];
}
function drawCrossing(dt) {
  crossT += dt;
  // Himmel + Meer
  rect(0, 0, VW, 100, '#bcd9ec'); rect(0, 0, VW, 46, '#cfe6f2');
  rect(0, 100, VW, 80, '#2b6a8a');
  drawWaterBand(crossT);
  // Insel taucht auf (ab Hälfte)
  const prog = Math.min(1, crossT / 14);
  if (prog > 0.45) {
    const ix = 230, iy = 96, sz = (prog - 0.45) * 90;
    rect(ix - sz, iy - sz * 0.5, sz * 2, sz * 0.5, '#6b7a5a');
    rect(ix - 6, iy - sz * 0.5 - 14, 5, 14, '#888');  // Turm
    rect(ix + 6, iy - sz * 0.5 - 10, 5, 10, '#888');
  }
  // Boot fährt nach rechts durchs Bild
  const bx = -40 + prog * (VW + 20);
  rect(bx, 118, 60, 22, '#34536b'); rect(bx + 6, 106, 38, 14, '#dfe6ea'); rect(bx + 18, 98, 3, 9, '#888');
  rect(bx, 138, 60, 4, '#22323f');
  drawPerson(bx + 30, 122, 0.8, { legs: '#553', body: '#a33', skin: '#e8c0a0', hair: '#642' }, 1);
  // Möwen
  for (let i = 0; i < 4; i++) {
    const gx = (crossT * 18 + i * 80) % (VW + 40) - 20, gy = 26 + i * 9 + Math.sin(crossT * 2 + i) * 3;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
    ctx.moveTo(gx, gy); ctx.lineTo(gx + 4, gy - 3); ctx.lineTo(gx + 8, gy); ctx.stroke();
  }
  // Untertitel
  crossCapTimer += dt;
  if (crossCapIdx < crossCaps.length && crossCapTimer > 2.6) { crossCapTimer = 0; crossCapIdx++; }
  const cap = crossCaps[Math.min(crossCapIdx, crossCaps.length - 1)];
  elCaption.textContent = cap; elCaption.style.display = 'block';
  if (crossT > 15) endProlog();
}
function drawWaterBand(t) {
  for (let i = 0; i < 12; i++) {
    const yy = 104 + i * 6;
    ctx.fillStyle = i % 2 ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.08)';
    const off = (t * 14 + i * 13) % 24;
    for (let x = -24 + off; x < VW; x += 24) ctx.fillRect(x, yy, 12, 2);
  }
}

function endProlog() {
  state.mode = 'end';
  elCaption.style.display = 'none';
  elOverlay.innerHTML =
    '<h1>Ankunft auf Christiansø</h1>' +
    '<p><b>Prolog abgeschlossen.</b></p>' +
    '<p>Die Fähre legt wieder ab. Mads steht allein im Hafen — und sein Abenteuer beginnt.</p>' +
    '<p class="hint">🎣 Engine-Test erfolgreich: Räume, Laufen, Verben, Inventar, Puzzle-Logik, Dialoge & Cutscene laufen.<br>Der Magnet-Hering ist im Gepäck — sein großer Auftritt kommt erst in Akt 3.</p>' +
    '<button id="againBtn">Nochmal von vorn</button>';
  elOverlay.style.display = 'flex';
  document.getElementById('againBtn').onclick = () => location.reload();
}

//---------------------------------------------------------------------------
// Haupt-Loop
//---------------------------------------------------------------------------
let last = 0;
function loop(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000 || 0); last = ts;
  ctx.clearRect(0, 0, VW, VH);
  const t = ts / 1000;

  if (state.mode === 'cutscene') {
    drawCrossing(dt);
  } else if (state.mode !== 'title' && state.mode !== 'end') {
    // Raum: echtes Hintergrundbild (+ Overlay für dynamische Objekte), sonst prozedural
    const rm = room();
    if (rm.bg && IMG[state.room]) { ctx.drawImage(IMG[state.room], 0, 0, VW, VH); if (rm.overlay) rm.overlay(t); }
    else rm.draw(t);
    if (DEBUG_HS) drawDebugHotspots(rm);
    // Spieler bewegen
    const p = state.player;
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const dist = Math.hypot(dx, dy);
    const spd = 60 * dt;
    if (dist > 1) {
      p.x += dx / dist * Math.min(spd, dist);
      p.y += dy / dist * Math.min(spd, dist);
    } else if (p.onArrive) {
      const cb = p.onArrive; p.onArrive = null; cb();
    }
    p.scale = 0.85 + (clamp(p.y, WALK_TOP, WALK_BOT) - WALK_TOP) / (WALK_BOT - WALK_TOP) * 0.3;
    drawPerson(p.x, p.y, p.scale, { legs: '#3a3550', body: '#b5482f', skin: '#e8c0a0', hair: '#5a3a22' }, p.facing);
  }
  requestAnimationFrame(loop);
}

//---------------------------------------------------------------------------
// Start
//---------------------------------------------------------------------------
document.getElementById('startBtn').onclick = () => {
  elOverlay.style.display = 'none';
  state.mode = 'play';
  resize();
};
preloadBackgrounds();
renderVerbs();
renderInv();
resize();
requestAnimationFrame(loop);
