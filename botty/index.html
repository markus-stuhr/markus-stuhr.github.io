<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botty — RAG Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 16px 24px 10px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.3rem; font-weight: 600; color: #a78bfa; letter-spacing: 0.05em; flex: 1; }

    #settings-btn {
      background: none;
      border: 1px solid #2a2a3e;
      color: #666;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #settings-btn:hover { border-color: #7c3aed; color: #a78bfa; }

    /* Settings panel */
    #settings-panel {
      width: 100%;
      max-width: 800px;
      background: #12121e;
      border-bottom: 1px solid #1e1e2e;
      padding: 16px 24px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #settings-panel.open { display: flex; }
    #settings-panel label { font-size: 0.78rem; color: #888; }
    #settings-panel input {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 7px 12px;
      font-size: 0.85rem;
      width: 100%;
      font-family: monospace;
    }
    #settings-panel input:focus { outline: none; border-color: #7c3aed; }
    #save-keys-btn {
      align-self: flex-start;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 7px 16px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #save-keys-btn:hover { background: #6d28d9; }

    /* Ingest panel */
    #ingest-panel {
      width: 100%;
      max-width: 800px;
      background: #0e0e1a;
      border-bottom: 1px solid #1e1e2e;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #ingest-source {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 6px 10px;
      font-size: 0.82rem;
      width: 130px;
      flex-shrink: 0;
    }
    #ingest-text {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 6px 10px;
      font-size: 0.82rem;
      resize: none;
      height: 36px;
      font-family: inherit;
    }
    #ingest-source:focus, #ingest-text:focus { outline: none; border-color: #7c3aed; }
    #ingest-btn {
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #a78bfa;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    #ingest-btn:hover { background: #2a2a3e; }
    #kb-stats { font-size: 0.72rem; color: #444; white-space: nowrap; }

    /* Chat */
    #chat-area {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 20px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; flex-direction: column; max-width: 85%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: #4c1d95; color: #ede9fe; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #1a1a2e; color: #d4d4e8; border-bottom-left-radius: 4px; border: 1px solid #2a2a3e; }

    .sources { font-size: 0.7rem; color: #555; margin-top: 4px; padding: 0 4px; }
    .sources span {
      background: #1e1e2e; border: 1px solid #2e2e4e;
      border-radius: 6px; padding: 2px 6px; margin-right: 4px; display: inline-block;
    }

    .typing { display: flex; gap: 5px; padding: 14px; }
    .typing span { width: 7px; height: 7px; background: #555; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* Input */
    #input-area { width: 100%; max-width: 800px; padding: 10px 24px 18px; }
    #input-row {
      display: flex; gap: 10px;
      background: #1a1a2e; border: 1px solid #2a2a3e;
      border-radius: 16px; padding: 8px 8px 8px 16px; align-items: flex-end;
    }
    #input-row:focus-within { border-color: #7c3aed; }
    #msg-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e0e0e0; font-size: 0.92rem; resize: none;
      min-height: 24px; max-height: 120px; font-family: inherit; line-height: 1.5;
    }
    #send-btn {
      background: #7c3aed; border: none; border-radius: 10px;
      width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #2a2a3e; cursor: default; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }

    #status-bar { font-size: 0.7rem; color: #444; text-align: center; margin-top: 5px; min-height: 14px; }
    #status-bar.error { color: #f87171; }
    #status-bar.ok    { color: #4ade80; }

    .welcome { text-align: center; color: #2a2a3e; margin: auto; padding: 40px 20px; }
    .welcome h2 { font-size: 2.5rem; margin-bottom: 8px; }
    .welcome p { font-size: 0.85rem; color: #333; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <h1>botty</h1>
  <button id="settings-btn">⚙ API Keys</button>
</header>

<div id="settings-panel">
  <div>
    <label>Jina AI API Key (Embeddings)</label>
    <input type="password" id="jina-key" placeholder="jina_...">
  </div>
  <div>
    <label>OpenRouter API Key (LLM)</label>
    <input type="password" id="or-key" placeholder="sk-or-...">
  </div>
  <button id="save-keys-btn">Speichern</button>
</div>

<div id="ingest-panel">
  <input id="ingest-source" placeholder="Quelle / Titel" value="doc">
  <textarea id="ingest-text" placeholder="Text hier einfügen und mit ↵ bestätigen…"></textarea>
  <button id="ingest-btn">+ Einlesen</button>
  <span id="kb-stats">0 Chunks</span>
</div>

<div id="chat-area">
  <div class="welcome" id="welcome">
    <h2>🤖</h2>
    <p>1. API Keys eintragen (⚙ oben rechts)<br>
       2. Text einlesen (Leiste oben)<br>
       3. Fragen stellen</p>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="Frag mich etwas…"></textarea>
    <button id="send-btn" disabled title="Senden">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="status-bar"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const JINA_URL = 'https://api.jina.ai/v1/embeddings';
const OR_URL   = 'https://openrouter.ai/api/v1/chat/completions';
const LLM      = 'google/gemma-4-31b-it:free';
const TOP_K    = 3;

// ── State (in-memory + localStorage for persistence) ─────────────────────────
let jinaKey = localStorage.getItem('botty_jina') || '';
let orKey   = localStorage.getItem('botty_or')   || '';
let chunks  = JSON.parse(localStorage.getItem('botty_chunks') || '[]');
// chunk: { source, content, vector: number[] }

// ── DOM refs ──────────────────────────────────────────────────────────────────
const chatArea    = document.getElementById('chat-area');
const welcome     = document.getElementById('welcome');
const msgInput    = document.getElementById('msg-input');
const sendBtn     = document.getElementById('send-btn');
const statusBar   = document.getElementById('status-bar');
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const jinaInput   = document.getElementById('jina-key');
const orInput     = document.getElementById('or-key');
const saveKeysBtn = document.getElementById('save-keys-btn');
const ingestText  = document.getElementById('ingest-text');
const ingestSrc   = document.getElementById('ingest-source');
const ingestBtn   = document.getElementById('ingest-btn');
const kbStats     = document.getElementById('kb-stats');

// ── Init ──────────────────────────────────────────────────────────────────────
jinaInput.value = jinaKey;
orInput.value   = orKey;
updateStats();
updateSendBtn();

if (!jinaKey || !orKey) {
  settingsPanel.classList.add('open');
  setStatus('Bitte API Keys eintragen ↑', 'error');
}

// ── Settings ──────────────────────────────────────────────────────────────────
settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));

saveKeysBtn.addEventListener('click', () => {
  jinaKey = jinaInput.value.trim();
  orKey   = orInput.value.trim();
  localStorage.setItem('botty_jina', jinaKey);
  localStorage.setItem('botty_or',   orKey);
  settingsPanel.classList.remove('open');
  updateSendBtn();
  setStatus('Keys gespeichert ✓', 'ok');
  setTimeout(() => setStatus(''), 2000);
});

// ── Ingest ────────────────────────────────────────────────────────────────────
ingestBtn.addEventListener('click', ingest);
ingestText.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ingest(); }
});

async function ingest() {
  const text   = ingestText.value.trim();
  const source = ingestSrc.value.trim() || 'doc';
  if (!text) return;
  if (!jinaKey) { setStatus('Jina API Key fehlt', 'error'); return; }

  ingestBtn.disabled = true;
  setStatus('Einlesen…');

  const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  try {
    const vectors = await embed(paragraphs);
    paragraphs.forEach((content, i) => {
      chunks.push({ source, content, vector: vectors[i] });
    });
    saveChunks();
    ingestText.value = '';
    updateStats();
    setStatus(`${paragraphs.length} Chunks eingelesen ✓`, 'ok');
    setTimeout(() => setStatus(''), 2000);
  } catch (e) {
    setStatus('Fehler beim Einlesen: ' + e.message, 'error');
  } finally {
    ingestBtn.disabled = false;
  }
}

// ── Embedding via Jina AI ─────────────────────────────────────────────────────
async function embed(texts) {
  const res = await fetch(JINA_URL, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${jinaKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'jina-embeddings-v3', input: texts, task: 'retrieval.query' }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.detail || `Jina ${res.status}`);
  }
  const data = await res.json();
  return data.data.map(d => d.embedding);
}

// ── Cosine similarity ─────────────────────────────────────────────────────────
function cosine(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9);
}

// ── Retrieve top-K chunks ─────────────────────────────────────────────────────
async function retrieve(query) {
  if (!chunks.length) return [];
  const [qVec] = await embed([query]);
  return chunks
    .map(c => ({ ...c, score: cosine(qVec, c.vector) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, TOP_K);
}

// ── LLM via OpenRouter ────────────────────────────────────────────────────────
async function ask(question, context) {
  const system = context.length
    ? 'Du bist ein hilfreicher Assistent. Beantworte die Frage ausschließlich auf Basis des folgenden Kontexts. Wenn der Kontext keine Antwort enthält, sage das ehrlich.\n\nKontext:\n' +
      context.map(c => `[${c.source}]\n${c.content}`).join('\n\n---\n\n')
    : 'Du bist ein hilfreicher Assistent. Es sind noch keine Dokumente im System. Bitte den Nutzer, erst etwas einzulesen.';

  const res = await fetch(OR_URL, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${orKey}`,
      'Content-Type': 'application/json',
      'HTTP-Referer': 'https://markusstuhr.de/botty',
      'X-Title': 'Botty RAG',
    },
    body: JSON.stringify({
      model: LLM,
      messages: [
        { role: 'system', content: system },
        { role: 'user',   content: question },
      ],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `OpenRouter ${res.status}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

async function send() {
  const text = msgInput.value.trim();
  if (!text || sendBtn.disabled) return;

  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  setStatus('');

  addMsg('user', text);
  addTyping();

  try {
    setStatus('Suche relevante Chunks…');
    const context = await retrieve(text);
    setStatus('Generiere Antwort…');
    const answer  = await ask(text, context);
    removeTyping();
    const sources = [...new Set(context.map(c => c.source))];
    addMsg('bot', answer, sources);
    setStatus('');
  } catch (e) {
    removeTyping();
    addMsg('bot', 'Fehler: ' + e.message);
    setStatus(e.message, 'error');
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addMsg(role, text, sources = []) {
  welcome?.remove();
  const msg    = document.createElement('div');
  msg.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);
  if (sources.length) {
    const src = document.createElement('div');
    src.className = 'sources';
    src.innerHTML = 'Quelle: ' + sources.map(s => `<span>${s}</span>`).join('');
    msg.appendChild(src);
  }
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg bot'; el.id = 'typing';
  el.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() { document.getElementById('typing')?.remove(); }

function setStatus(msg, cls = '') {
  statusBar.textContent = msg;
  statusBar.className   = cls;
}

function updateSendBtn() { sendBtn.disabled = !(jinaKey && orKey); }

function updateStats() {
  kbStats.textContent = chunks.length === 0
    ? '0 Chunks'
    : `${chunks.length} Chunks · ${[...new Set(chunks.map(c => c.source))].length} Quellen`;
}

function saveChunks() {
  try { localStorage.setItem('botty_chunks', JSON.stringify(chunks)); } catch {}
}
</script>

</body>
</html>
