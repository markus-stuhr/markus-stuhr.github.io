<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botty — RAG Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 20px 24px 12px;
      border-bottom: 1px solid #1e1e2e;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.05em;
    }

    header p {
      font-size: 0.8rem;
      color: #555;
      margin-top: 2px;
    }

    #chat-area {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: #4c1d95;
      color: #ede9fe;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #1a1a2e;
      color: #d4d4e8;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a3e;
    }

    .sources {
      font-size: 0.72rem;
      color: #666;
      margin-top: 4px;
      padding: 0 4px;
    }

    .sources span {
      background: #1e1e2e;
      border: 1px solid #2e2e4e;
      border-radius: 6px;
      padding: 2px 6px;
      margin-right: 4px;
      display: inline-block;
    }

    .typing { display: flex; gap: 5px; padding: 14px; }
    .typing span {
      width: 7px; height: 7px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 12px 24px 20px;
    }

    #input-row {
      display: flex;
      gap: 10px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      align-items: flex-end;
    }

    #input-row:focus-within { border-color: #7c3aed; }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.5;
    }

    #send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #2a2a3e; cursor: default; }

    #send-btn svg { width: 16px; height: 16px; fill: white; }

    #status-bar {
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      margin-top: 6px;
    }

    #status-bar.error { color: #f87171; }
    #status-bar.ok    { color: #4ade80; }

    .welcome {
      text-align: center;
      color: #333;
      font-size: 0.9rem;
      margin: auto;
      padding: 40px 20px;
    }

    .welcome h2 { font-size: 2rem; color: #2a2a3e; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <h1>botty</h1>
  <p>RAG Chatbot · powered by Jina AI + OpenRouter</p>
</header>

<div id="chat-area">
  <div class="welcome" id="welcome">
    <h2>🤖</h2>
    <p>Stell mir eine Frage.<br>Ich suche relevante Wissensfragmente und antworte damit.</p>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="Frag mich etwas…" autofocus></textarea>
    <button id="send-btn" title="Senden">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="status-bar">Verbinde mit Backend…</div>
</div>

<script>
  const BACKEND_URL = 'https://botty-backend.up.railway.app';  // ← nach Deploy anpassen

  const chatArea  = document.getElementById('chat-area');
  const welcome   = document.getElementById('welcome');
  const input     = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('send-btn');
  const statusBar = document.getElementById('status-bar');

  // Backend health check
  async function checkHealth() {
    try {
      const res = await fetch(`${BACKEND_URL}/health`, { signal: AbortSignal.timeout(5000) });
      if (res.ok) {
        statusBar.textContent = 'Backend verbunden ✓';
        statusBar.className = 'ok';
      } else throw new Error();
    } catch {
      statusBar.textContent = 'Backend nicht erreichbar — lokal starten? cd botty/backend && uvicorn main:app';
      statusBar.className = 'error';
    }
  }

  checkHealth();

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  function addMessage(role, text, sources = []) {
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);

    if (sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.innerHTML = 'Quellen: ' + sources.map(s => `<span>${s}</span>`).join('');
      msg.appendChild(src);
    }

    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'typing-indicator';
    msg.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    statusBar.textContent = '';
    statusBar.className = '';

    addMessage('user', text);
    addTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addMessage('bot', `Fehler: ${err.detail || res.statusText}`);
        return;
      }

      const data = await res.json();
      addMessage('bot', data.answer, data.sources || []);

    } catch (e) {
      removeTyping();
      addMessage('bot', `Netzwerkfehler: ${e.message}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
