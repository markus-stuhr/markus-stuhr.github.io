<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MUKKE — Player &amp; Visualizer</title>
<style>
  :root {
    --bg: #0a0a12;
    --panel: #14141f;
    --panel2: #1c1c2b;
    --border: #2e2e45;
    --accent: #00e878;
    --accent2: #ffd23f;
    --text: #c8c8dc;
    --dim: #6a6a85;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Courier New", monospace;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- Visualizer canvas ---- */
  #vizWrap { flex: 1; position: relative; min-height: 0; }
  #viz { width: 100%; height: 100%; display: block; cursor: pointer; }
  #vizLabel {
    position: absolute; top: 10px; left: 12px;
    font-size: 11px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; pointer-events: none;
    transition: opacity 1s; opacity: 0;
  }
  #trackTitle {
    position: absolute; top: 10px; right: 12px; max-width: 60%;
    font-size: 12px; color: var(--accent); text-align: right;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    pointer-events: none; text-shadow: 0 0 8px rgba(0,232,120,.5);
  }

  /* ---- Empty state / drop hint ---- */
  #emptyState {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 20px; pointer-events: none;
  }
  #emptyState h1 {
    font-size: clamp(28px, 7vw, 52px); letter-spacing: 8px; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,232,120,.4);
  }
  #emptyState p { color: var(--dim); font-size: 13px; line-height: 1.7; }
  #emptyState .btn { pointer-events: auto; }

  #dropOverlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,232,120,.08);
    border: 3px dashed var(--accent);
    font-size: 22px; letter-spacing: 4px; color: var(--accent);
    pointer-events: none;
  }
  body.dragging #dropOverlay { display: flex; }

  /* ---- Controls ---- */
  #controls {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 6px;
    flex-shrink: 0;
  }
  #seekRow { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--dim); }
  #seek { flex: 1; }
  #btnRow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 3px;
    line-height: 1;
    touch-action: manipulation;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { color: var(--accent); border-color: var(--accent); font-weight: bold; min-width: 52px; }
  .btn.small { font-size: 11px; padding: 6px 10px; }

  #volWrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  #vol { width: 90px; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    height: 18px; background: transparent; cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px; background: var(--border); border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; margin-top: -5px;
    background: var(--accent); border-radius: 50%;
  }
  input[type=range]::-moz-range-track { height: 4px; background: var(--border); border-radius: 2px; }
  input[type=range]::-moz-range-thumb { width: 14px; height: 14px; background: var(--accent); border: none; border-radius: 50%; }

  /* ---- Playlist ---- */
  #playlist {
    background: var(--panel);
    border-top: 1px solid var(--border);
    max-height: 30vh; overflow-y: auto;
    display: none; flex-shrink: 0;
  }
  #playlist.open { display: block; }
  .plItem {
    padding: 8px 12px; font-size: 12px; cursor: pointer;
    display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid rgba(46,46,69,.4);
    white-space: nowrap; overflow: hidden;
  }
  .plItem:hover { background: var(--panel2); }
  .plItem.active { color: var(--accent); background: var(--panel2); }
  .plItem .num { color: var(--dim); min-width: 24px; }
  .plItem .name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .plItem .del { color: var(--dim); padding: 2px 6px; }
  .plItem .del:hover { color: #ff5566; }

  #fileInput { display: none; }

  @media (max-width: 600px) {
    .btn { padding: 10px 12px; }
    #vol { width: 60px; }
    #trackTitle { font-size: 10px; }
  }
</style>
</head>
<body>

<div id="vizWrap">
  <canvas id="viz"></canvas>
  <div id="vizLabel"></div>
  <div id="trackTitle"></div>
  <div id="emptyState">
    <h1>MUKKE</h1>
    <p>Musikdateien hier reinziehen<br>oder unten „+ Dateien“ drücken.<br><br>MP3 · OGG · WAV · FLAC · M4A/AAC · OPUS</p>
    <button class="btn primary" onclick="document.getElementById('fileInput').click()">+ Dateien laden</button>
  </div>
</div>

<div id="controls">
  <div id="seekRow">
    <span id="tCur">0:00</span>
    <input type="range" id="seek" min="0" max="1000" value="0">
    <span id="tDur">0:00</span>
  </div>
  <div id="btnRow">
    <button class="btn" id="btnPrev" title="Zurück">|◀</button>
    <button class="btn primary" id="btnPlay" title="Play/Pause">▶</button>
    <button class="btn" id="btnNext" title="Weiter">▶|</button>
    <button class="btn small" id="btnShuffle" title="Shuffle">🔀</button>
    <button class="btn small" id="btnViz" title="Visualisierung wechseln (auch: Klick auf die Anzeige)">VIZ</button>
    <button class="btn small" id="btnList" title="Playlist ein/aus">LISTE</button>
    <button class="btn small" onclick="document.getElementById('fileInput').click()">+ Dateien</button>
    <div id="volWrap">
      <span style="font-size:11px;color:var(--dim)">VOL</span>
      <input type="range" id="vol" min="0" max="100" value="80">
    </div>
  </div>
</div>

<div id="playlist"></div>

<div id="dropOverlay">DROP IT</div>
<input type="file" id="fileInput" accept="audio/*,.mp3,.ogg,.oga,.wav,.flac,.m4a,.aac,.opus,.webm" multiple>
<audio id="audio"></audio>

<script>
"use strict";

/* ================= Audio-Setup ================= */
const audio = document.getElementById('audio');
let actx = null, analyser = null, freqData = null, timeData = null;

function ensureAudioGraph() {
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const src = actx.createMediaElementSource(audio);
  analyser = actx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  src.connect(analyser);
  analyser.connect(actx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
}

/* ================= Playlist ================= */
let tracks = [];      // {name, url}
let current = -1;
let shuffle = false;

const playlistEl = document.getElementById('playlist');
const trackTitleEl = document.getElementById('trackTitle');
const emptyState = document.getElementById('emptyState');

function addFiles(fileList) {
  const files = Array.from(fileList).filter(f =>
    f.type.startsWith('audio/') || /\.(mp3|ogg|oga|wav|flac|m4a|aac|opus|webm)$/i.test(f.name));
  if (!files.length) return;
  const startEmpty = tracks.length === 0;
  for (const f of files) {
    tracks.push({ name: f.name.replace(/\.[^.]+$/, ''), url: URL.createObjectURL(f) });
  }
  renderPlaylist();
  emptyState.style.display = 'none';
  if (startEmpty) playTrack(0);
}

function renderPlaylist() {
  playlistEl.innerHTML = '';
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'plItem' + (i === current ? ' active' : '');
    div.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span><span class="name"></span><span class="del">✕</span>`;
    div.querySelector('.name').textContent = t.name;
    div.querySelector('.name').parentElement.addEventListener('click', e => {
      if (e.target.classList.contains('del')) { removeTrack(i); }
      else playTrack(i);
    });
    playlistEl.appendChild(div);
  });
}

function removeTrack(i) {
  URL.revokeObjectURL(tracks[i].url);
  tracks.splice(i, 1);
  if (i === current) {
    current = -1;
    audio.pause();
    if (tracks.length) playTrack(Math.min(i, tracks.length - 1));
    else { audio.removeAttribute('src'); audio.load(); trackTitleEl.textContent = ''; emptyState.style.display = ''; updatePlayBtn(); }
  } else if (i < current) current--;
  renderPlaylist();
}

function playTrack(i) {
  if (i < 0 || i >= tracks.length) return;
  ensureAudioGraph();
  current = i;
  audio.src = tracks[i].url;
  audio.play().catch(()=>{});
  trackTitleEl.textContent = tracks[i].name;
  document.title = tracks[i].name + ' — MUKKE';
  renderPlaylist();
}

function nextTrack() {
  if (!tracks.length) return;
  if (shuffle && tracks.length > 1) {
    let n; do { n = Math.floor(Math.random() * tracks.length); } while (n === current);
    playTrack(n);
  } else playTrack((current + 1) % tracks.length);
}
function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  playTrack((current - 1 + tracks.length) % tracks.length);
}

audio.addEventListener('ended', nextTrack);

/* ================= Controls ================= */
const btnPlay = document.getElementById('btnPlay');
const seek = document.getElementById('seek');
const tCur = document.getElementById('tCur');
const tDur = document.getElementById('tDur');
let seeking = false;

function fmt(s) {
  if (!isFinite(s)) return '0:00';
  s = Math.floor(s);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}
function updatePlayBtn() { btnPlay.textContent = (audio.paused ? '▶' : '❚❚'); }

btnPlay.addEventListener('click', () => {
  if (!tracks.length) { document.getElementById('fileInput').click(); return; }
  ensureAudioGraph();
  if (current < 0) { playTrack(0); return; }
  if (audio.paused) audio.play().catch(()=>{}); else audio.pause();
});
audio.addEventListener('play', updatePlayBtn);
audio.addEventListener('pause', updatePlayBtn);

document.getElementById('btnNext').addEventListener('click', nextTrack);
document.getElementById('btnPrev').addEventListener('click', prevTrack);
document.getElementById('btnShuffle').addEventListener('click', function() {
  shuffle = !shuffle;
  this.style.color = shuffle ? 'var(--accent)' : '';
  this.style.borderColor = shuffle ? 'var(--accent)' : '';
});
document.getElementById('btnList').addEventListener('click', () => playlistEl.classList.toggle('open'));

seek.addEventListener('input', () => { seeking = true; });
seek.addEventListener('change', () => {
  if (audio.duration) audio.currentTime = seek.value / 1000 * audio.duration;
  seeking = false;
});
audio.addEventListener('timeupdate', () => {
  tCur.textContent = fmt(audio.currentTime);
  tDur.textContent = fmt(audio.duration);
  if (!seeking && audio.duration) seek.value = audio.currentTime / audio.duration * 1000;
});

const vol = document.getElementById('vol');
vol.addEventListener('input', () => { audio.volume = vol.value / 100; });
audio.volume = 0.8;

document.getElementById('fileInput').addEventListener('change', e => {
  addFiles(e.target.files);
  e.target.value = '';
});

/* Drag & Drop */
let dragCount = 0;
window.addEventListener('dragenter', e => { e.preventDefault(); dragCount++; document.body.classList.add('dragging'); });
window.addEventListener('dragleave', e => { e.preventDefault(); if (--dragCount <= 0) { dragCount = 0; document.body.classList.remove('dragging'); } });
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  dragCount = 0;
  document.body.classList.remove('dragging');
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});

/* Default-Tracks — Dateien, die mit im mukke/-Ordner liegen */
const DEFAULT_TRACKS = [];
(function loadDefaults() {
  if (!DEFAULT_TRACKS.length) return;
  for (const f of DEFAULT_TRACKS) {
    tracks.push({ name: f.replace(/\.[^.]+$/, ''), url: encodeURI(f) });
  }
  emptyState.style.display = 'none';
  /* Track 0 vorbereiten, aber nicht abspielen (Autoplay-Policy) —
     erster Klick auf ▶ startet ihn */
  current = 0;
  audio.src = tracks[0].url;
  trackTitleEl.textContent = tracks[0].name;
  document.title = tracks[0].name + ' — MUKKE';
  renderPlaylist();
})();

/* Keyboard */
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
  else if (e.key === 'v' || e.key === 'V') nextViz();
  else if (e.key === 'ArrowRight') audio.currentTime = Math.min((audio.currentTime||0) + 5, audio.duration||0);
  else if (e.key === 'ArrowLeft') audio.currentTime = Math.max((audio.currentTime||0) - 5, 0);
  else if (e.key === 'n') nextTrack();
  else if (e.key === 'p') prevTrack();
});

/* ================= Visualizer ================= */
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
const vizLabel = document.getElementById('vizLabel');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const r = canvas.parentElement.getBoundingClientRect();
  W = Math.floor(r.width); H = Math.floor(r.height);
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* Hilfswerte: Bass-Energie & Gesamtenergie */
function energy(lo, hi) {
  let s = 0;
  for (let i = lo; i < hi; i++) s += freqData[i];
  return s / ((hi - lo) * 255);
}

/* ---- 1. Spektrum-Balken (Winamp-Klassiker) ---- */
const peaks = [];
function drawBars() {
  const n = Math.min(64, Math.floor(W / 12));
  const binCount = analyser ? analyser.frequencyBinCount : 1024;
  const barW = W / n;
  if (peaks.length !== n) { peaks.length = 0; for (let i = 0; i < n; i++) peaks.push(0); }
  for (let i = 0; i < n; i++) {
    /* logarithmische Bin-Verteilung — Bässe links breit, Höhen rechts */
    const f0 = Math.floor(Math.pow(i / n, 1.6) * binCount * 0.7);
    const f1 = Math.max(f0 + 1, Math.floor(Math.pow((i + 1) / n, 1.6) * binCount * 0.7));
    let v = 0;
    for (let j = f0; j < f1; j++) v = Math.max(v, freqData[j]);
    v /= 255;
    const h = v * (H - 30);
    const x = i * barW;
    /* Segmente wie beim Original */
    const seg = 6;
    const nSeg = Math.floor(h / seg);
    for (let s = 0; s < nSeg; s++) {
      const yy = H - 10 - s * seg;
      const frac = s * seg / (H - 30);
      ctx.fillStyle = frac > 0.75 ? '#ff3b4d' : frac > 0.5 ? '#ffd23f' : '#00e878';
      ctx.fillRect(x + 1, yy - seg + 1, barW - 2, seg - 2);
    }
    /* Peak-Kappe */
    if (h > peaks[i]) peaks[i] = h; else peaks[i] = Math.max(0, peaks[i] - H * 0.004);
    ctx.fillStyle = '#e8e8ff';
    ctx.fillRect(x + 1, H - 12 - peaks[i], barW - 2, 3);
  }
}

/* ---- 2. Oszilloskop ---- */
function drawScope() {
  const mid = H / 2;
  ctx.strokeStyle = 'rgba(0,232,120,0.15)';
  ctx.lineWidth = 8;
  scopePath(mid);
  ctx.strokeStyle = '#00e878';
  ctx.lineWidth = 2;
  scopePath(mid);
}
function scopePath(mid) {
  ctx.beginPath();
  const n = timeData.length;
  for (let i = 0; i < n; i++) {
    const x = i / (n - 1) * W;
    const y = mid + (timeData[i] - 128) / 128 * H * 0.42;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

/* ---- 3. Kreis-Spektrum ---- */
let circRot = 0;
function drawCircle() {
  const cx = W / 2, cy = H / 2;
  const base = Math.min(W, H) * 0.18;
  const bass = energy(1, 12);
  circRot += 0.002 + bass * 0.01;
  const n = 128;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(circRot);
  for (let i = 0; i < n; i++) {
    const v = freqData[Math.floor(Math.pow(i / n, 1.4) * analyser.frequencyBinCount * 0.6)] / 255;
    const a = i / n * Math.PI * 2;
    const r0 = base * (1 + bass * 0.4);
    const r1 = r0 + v * Math.min(W, H) * 0.3;
    const hue = 140 - v * 140 + 360; /* grün → gelb → rot */
    ctx.strokeStyle = `hsl(${(hue + i / n * 40) % 360} 90% ${45 + v * 25}%)`;
    ctx.lineWidth = Math.PI * 2 * r0 / n * 0.7;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r0, Math.sin(a) * r0);
    ctx.lineTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.stroke();
  }
  ctx.restore();
  /* Puls-Kern */
  ctx.beginPath();
  ctx.arc(cx, cy, base * 0.55 * (1 + bass * 0.5), 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,232,120,${0.15 + bass * 0.5})`;
  ctx.fill();
}

/* ---- 4. Partikel ---- */
const parts = [];
function drawParticles() {
  const bass = energy(1, 12);
  const mids = energy(12, 80);
  /* nachschieben */
  const want = 4 + Math.floor(bass * 30);
  for (let k = 0; k < want && parts.length < 500; k++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 0.5 + bass * 8 + Math.random() * 2;
    parts.push({
      x: W / 2, y: H / 2,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, size: 2 + bass * 8 + Math.random() * 3,
      hue: bass > 0.55 ? 0 + Math.random() * 40 : 140 + Math.random() * 60
    });
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 1.01; p.vy *= 1.01;
    p.life -= 0.012;
    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) { parts.splice(i, 1); continue; }
    ctx.fillStyle = `hsla(${p.hue} 90% 60% / ${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  /* Kern pulsiert mit Mitten */
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 10 + mids * 60 + bass * 40, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,210,63,${0.2 + mids * 0.6})`;
  ctx.lineWidth = 3;
  ctx.stroke();
}

/* ---- 5. Sternenflug ---- */
const stars = [];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 300; i++) {
    stars.push({ x: (Math.random() - 0.5), y: (Math.random() - 0.5), z: Math.random() });
  }
}
initStars();
function drawStars() {
  const bass = energy(1, 12);
  const speed = 0.004 + bass * 0.05;
  const f = Math.min(W, H);
  for (const s of stars) {
    s.z -= speed;
    if (s.z <= 0.02) { s.x = Math.random() - 0.5; s.y = Math.random() - 0.5; s.z = 1; }
    const px = W / 2 + s.x / s.z * f;
    const py = H / 2 + s.y / s.z * f;
    if (px < 0 || px > W || py < 0 || py > H) continue;
    const sz = (1 - s.z) * (2 + bass * 5);
    const b = Math.min(1, (1 - s.z) * 1.5);
    ctx.fillStyle = bass > 0.5
      ? `rgba(255,${Math.floor(210 - bass * 100)},80,${b})`
      : `rgba(${Math.floor(120 + b * 135)},255,${Math.floor(160 + b * 95)},${b})`;
    ctx.fillRect(px - sz / 2, py - sz / 2, sz, sz);
  }
}

/* ---- Beat-Erkennung (für die neuen Modi) ---- */
let bassAvg = 0, lastBass = 0, beatPulse = 0, beatCooldown = 0, beatHit = false;
function detectBeat() {
  const b = energy(1, 12);
  bassAvg = bassAvg * 0.97 + b * 0.03;
  beatHit = false;
  if (beatCooldown > 0) beatCooldown--;
  /* Flanken-Erkennung: Bass steigt an UND liegt über dem gleitenden Mittel —
     funktioniert auch bei durchgehend lauten Tracks, wo eine absolute
     Schwelle nie mehr anschlagen würde */
  if (beatCooldown === 0 && b > 0.15 && b > bassAvg * 1.06 && b - lastBass > 0.012) {
    beatHit = true; beatPulse = 1; beatCooldown = 14;
  }
  lastBass = b;
  beatPulse *= 0.9;
}

/* ---- 6. Synthwave-Grid ---- */
let gridOff = 0;
function drawGrid() {
  const bass = energy(1, 12), mids = energy(12, 80);
  const horizon = H * 0.5;
  /* Retro-Sonne */
  const sunR = Math.min(W, H) * (0.16 + bass * 0.06 + beatPulse * 0.04);
  const sunY = horizon - sunR * 0.25;
  const g = ctx.createLinearGradient(0, sunY - sunR, 0, sunY + sunR);
  g.addColorStop(0, '#ffd23f');
  g.addColorStop(1, '#ff2e88');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(W / 2, sunY, sunR, 0, Math.PI * 2); ctx.fill();
  /* Sonnen-Streifen */
  ctx.fillStyle = 'rgba(10,10,18,0.95)';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(W / 2 - sunR, sunY + sunR * (0.1 + i * 0.2), sunR * 2, 2 + i * 2.5);
  }
  /* Spektrum-Gebirge am Horizont (Bässe in der Mitte) */
  ctx.beginPath();
  ctx.moveTo(0, horizon);
  const n = 64;
  for (let i = 0; i <= n; i++) {
    const fi = Math.abs(i - n / 2) / (n / 2);
    const v = freqData[Math.floor(Math.pow(fi, 1.5) * analyser.frequencyBinCount * 0.5)] / 255;
    ctx.lineTo(i / n * W, horizon - v * H * 0.28);
  }
  ctx.lineTo(W, horizon);
  ctx.closePath();
  ctx.fillStyle = 'rgba(10,10,18,0.88)';
  ctx.fill();
  ctx.strokeStyle = '#ff2e88';
  ctx.lineWidth = 2;
  ctx.stroke();
  /* Gitter-Boden, scrollt auf den Betrachter zu */
  gridOff = (gridOff + 0.006 + bass * 0.05 + mids * 0.01) % 1;
  ctx.strokeStyle = '#00d9ff';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 14; i++) {
    const t = Math.pow((i + gridOff) / 14, 2.4);
    const y = horizon + t * (H - horizon);
    ctx.globalAlpha = 0.1 + t * 0.8;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.globalAlpha = 0.35;
  for (let i = -10; i <= 10; i++) {
    ctx.beginPath();
    ctx.moveTo(W / 2 + i * W * 0.012, horizon);
    ctx.lineTo(W / 2 + i * W * 0.16, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

/* ---- 7. Feuer (Demoscene-Klassiker) ---- */
const fireW = 144, fireH = 90;
const fireCv = document.createElement('canvas');
fireCv.width = fireW; fireCv.height = fireH;
const fireCtx = fireCv.getContext('2d');
const heat = new Float32Array(fireW * fireH);
const fireImg = fireCtx.createImageData(fireW, fireH);
function drawFire() {
  const total = energy(1, 200);
  /* unterste Zeile anheizen — Spektrum über die Breite, Bässe in der Mitte */
  for (let x = 0; x < fireW; x++) {
    const fi = Math.abs(x - fireW / 2) / (fireW / 2);
    const v = freqData[Math.floor(Math.pow(fi, 1.4) * analyser.frequencyBinCount * 0.4)] / 255;
    heat[(fireH - 1) * fireW + x] = Math.min(1, v * 1.3 + Math.random() * 0.25 - 0.08 + beatPulse * 0.5);
  }
  /* Hitze steigt auf */
  const decay = 0.94 + total * 0.045;
  for (let y = 0; y < fireH - 1; y++) {
    const row = y * fireW, below = (y + 1) * fireW;
    const below2 = Math.min(fireH - 1, y + 2) * fireW;
    for (let x = 0; x < fireW; x++) {
      const l = heat[below + (x > 0 ? x - 1 : 0)];
      const r = heat[below + (x < fireW - 1 ? x + 1 : fireW - 1)];
      heat[row + x] = (l + heat[below + x] + r + heat[below2 + x]) / 4 * decay;
    }
  }
  /* Palette: schwarz → rot → gelb → weiß */
  const d = fireImg.data;
  for (let i = 0; i < heat.length; i++) {
    const h3 = heat[i] * 3;
    d[i * 4]     = Math.min(255, h3 * 255);
    d[i * 4 + 1] = Math.min(255, Math.max(0, h3 - 1) * 255);
    d[i * 4 + 2] = Math.min(255, Math.max(0, h3 - 2) * 255);
    d[i * 4 + 3] = 255;
  }
  fireCtx.putImageData(fireImg, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(fireCv, 0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
}

/* ---- 8. Kaleidoskop ---- */
let kalRot = 0;
function drawKaleido() {
  const bass = energy(1, 12), mids = energy(12, 80);
  kalRot += 0.004 + mids * 0.025;
  const R = Math.min(W, H) * 0.48;
  const seg = 8, n = 60;
  ctx.save();
  ctx.translate(W / 2, H / 2);
  for (let s = 0; s < seg; s++) {
    ctx.save();
    ctx.rotate(kalRot + s * Math.PI * 2 / seg);
    if (s % 2) ctx.scale(1, -1);
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const t = i / (n - 1);
      const v = timeData[Math.floor(t * (timeData.length - 1))] / 128 - 1;
      const a = v * (Math.PI / seg) * 0.9;
      const r = 20 + t * R;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.strokeStyle = `hsla(${(kalRot * 130 + s * 12) % 360} 95% 60% / 0.85)`;
    ctx.lineWidth = 2 + bass * 5;
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
  /* Beat-Burst im Zentrum */
  if (beatPulse > 0.15) {
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, beatPulse * R * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(kalRot * 130) % 360} 95% 70% / ${beatPulse * 0.4})`;
    ctx.fill();
  }
}

/* ---- 9. Blitzgewitter ---- */
const bolts = [];
function spawnBolt() {
  const sx = Math.random() * W;
  const tx = sx + (Math.random() - 0.5) * W * 0.4;
  const ty = H * (0.55 + Math.random() * 0.4);
  const segs = 12 + Math.floor(Math.random() * 8);
  const pts = [[sx, 0]];
  for (let i = 1; i <= segs; i++) {
    const t = i / segs;
    pts.push([sx + (tx - sx) * t + (Math.random() - 0.5) * W * 0.07, t * ty + (Math.random() - 0.5) * H * 0.02]);
  }
  bolts.push({ pts, life: 1 });
  /* kurze Verästelung */
  if (Math.random() < 0.7) {
    const j = 3 + Math.floor(Math.random() * (segs - 5));
    const [bx, by] = pts[j];
    const bpts = [[bx, by]];
    const dir = Math.random() < 0.5 ? -1 : 1;
    for (let i = 1; i <= 4; i++) {
      bpts.push([bx + dir * i * W * 0.03 + (Math.random() - 0.5) * W * 0.02, by + i * H * 0.05]);
    }
    bolts.push({ pts: bpts, life: 0.7 });
  }
}
function drawLightning() {
  if (beatHit) {
    const nB = 1 + Math.floor(Math.random() * 2);
    for (let k = 0; k < nB; k++) spawnBolt();
  }
  /* Himmel flackert mit dem Beat */
  if (beatPulse > 0.05) {
    ctx.fillStyle = `rgba(190,215,255,${beatPulse * 0.15})`;
    ctx.fillRect(0, 0, W, H);
  }
  /* dezente Waveform als Grundrauschen unten */
  ctx.strokeStyle = 'rgba(0,232,120,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < timeData.length; i += 4) {
    const x = i / (timeData.length - 1) * W;
    const y = H * 0.88 + (timeData[i] - 128) / 128 * H * 0.1;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.stroke();
  /* Blitze: Glow + Kern */
  for (let i = bolts.length - 1; i >= 0; i--) {
    const bl = bolts[i];
    bl.life -= 0.05;
    if (bl.life <= 0) { bolts.splice(i, 1); continue; }
    for (const [wd, al] of [[7, 0.12], [3, 0.4], [1.2, 1]]) {
      ctx.strokeStyle = `rgba(185,215,255,${al * bl.life})`;
      ctx.lineWidth = wd;
      ctx.beginPath();
      bl.pts.forEach((p, j) => j ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
      ctx.stroke();
    }
  }
}

/* ---- 10. Tunnel ---- */
const rings = [];
let tunnelT = 0;
function drawTunnel() {
  const bass = energy(1, 12);
  tunnelT += 0.02 + bass * 0.08;
  if (!rings.length || rings[rings.length - 1].z < 0.93) {
    rings.push({ z: 1, hue: (tunnelT * 40) % 360, w: 1 + bass * 8 });
  }
  /* Fluchtpunkt schlingert leicht */
  const cx = W / 2 + Math.cos(tunnelT * 0.7) * W * 0.06;
  const cy = H / 2 + Math.sin(tunnelT * 0.9) * H * 0.06;
  const f = Math.min(W, H);
  const wob = bass * 12;
  for (let i = rings.length - 1; i >= 0; i--) {
    const rg = rings[i];
    rg.z -= 0.004 + bass * 0.018;
    const r = (1 - rg.z) / Math.max(rg.z, 0.03) * f * 0.18;
    if (rg.z <= 0.04 || r > f * 1.6) { rings.splice(i, 1); continue; }
    ctx.strokeStyle = `hsla(${rg.hue} 90% ${50 + bass * 20}% / ${Math.min(1, (1 - rg.z) * 2.5)})`;
    ctx.lineWidth = 1 + rg.w * (1 - rg.z) * 2.5;
    ctx.beginPath();
    for (let a = 0; a <= 40; a++) {
      const ang = a / 40 * Math.PI * 2;
      const rr = r + Math.sin(ang * 6 + tunnelT * 3) * wob * (1 - rg.z);
      const x = cx + Math.cos(ang) * rr, y = cy + Math.sin(ang) * rr;
      a ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
}

/* ---- 11. Orbits — Kreise für einzelne Frequenzbänder ---- */
function drawOrbits() {
  const bands = 8;
  const t = performance.now() / 1000;
  for (let i = 0; i < bands; i++) {
    /* logarithmische Bandaufteilung: links Sub-Bass, rechts Höhen */
    const lo = Math.floor(Math.pow(i / bands, 1.8) * 400) + 1;
    const hi = Math.floor(Math.pow((i + 1) / bands, 1.8) * 400) + 2;
    let v = energy(lo, hi) * (1 + i * 0.35);   /* Höhen sind leiser → anheben */
    v = Math.min(1, v);
    const x = (i + 0.5) / bands * W;
    const y = H / 2 + Math.sin(t * (0.6 + i * 0.25) + i * 2) * H * 0.12;
    const rMax = Math.min(W / bands * 0.75, H * 0.3);
    const r = rMax * (0.12 + v * 0.88);
    const hue = i / bands * 300;
    /* Glow */
    const g = ctx.createRadialGradient(x, y, 0, x, y, r * 1.6);
    g.addColorStop(0, `hsla(${hue} 95% 65% / ${0.25 + v * 0.5})`);
    g.addColorStop(0.6, `hsla(${hue} 95% 55% / ${0.12 + v * 0.25})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r * 1.6, 0, Math.PI * 2); ctx.fill();
    /* Kern + Ring */
    ctx.beginPath(); ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue} 95% ${55 + v * 30}% / 0.9)`;
    ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue} 95% 70% / ${0.4 + v * 0.6})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    /* Beat: Schockring um alle Kreise */
    if (beatPulse > 0.2) {
      ctx.beginPath(); ctx.arc(x, y, r + (1 - beatPulse) * rMax * 0.8, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${hue} 95% 75% / ${beatPulse * 0.5})`;
      ctx.lineWidth = 2 * beatPulse + 0.5;
      ctx.stroke();
    }
  }
}

/* ---- 12. Echo-Welle — Waveform zieht eine Spur hinter sich her ---- */
const waveHist = [];
function drawEchoWave() {
  const bass = energy(1, 12);
  /* aktuelle Waveform (runtergerechnet) in die Historie schieben */
  const n = 96;
  const snap = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    snap[i] = timeData[Math.floor(i / (n - 1) * (timeData.length - 1))] / 128 - 1;
  }
  waveHist.unshift(snap);
  if (waveHist.length > 26) waveHist.pop();
  /* von hinten (alt, klein, blass) nach vorn (neu, groß, hell) */
  for (let h = waveHist.length - 1; h >= 0; h--) {
    const t = waveHist.length > 1 ? h / (waveHist.length - 1) : 0;   /* 0 = neueste */
    const w = waveHist[h];
    const yBase = H * 0.7 - t * H * 0.42;
    const amp = H * 0.22 * (1 - t * 0.55) * (1 + bass * 0.4);
    const span = W * (1 - t * 0.45);
    ctx.strokeStyle = `hsla(${160 + t * 130} 90% ${62 - t * 30}% / ${(1 - t) * 0.95 + 0.05})`;
    ctx.lineWidth = 2.5 - t * 1.7;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const x = W / 2 + (i / (n - 1) - 0.5) * span;
      const y = yBase + w[i] * amp;
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.stroke();
  }
}

/* ---- 13. Spektrogramm-Wasserfall ---- */
const specW = 240, specH = 128;
const specCv = document.createElement('canvas');
specCv.width = specW; specCv.height = specH;
const sctx = specCv.getContext('2d');
function drawSpectrogram() {
  /* alles 2px nach links schieben, rechts neue Spalte anfügen */
  sctx.drawImage(specCv, -2, 0);
  for (let y = 0; y < specH; y++) {
    const fi = 1 - y / specH;   /* oben = hohe Frequenzen */
    const bin = Math.floor(Math.pow(fi, 2.2) * analyser.frequencyBinCount * 0.6);
    const v = freqData[bin] / 255;
    sctx.fillStyle = v < 0.02
      ? '#0a0a12'
      : `hsl(${260 - v * 260} 90% ${v * 58}%)`;
    sctx.fillRect(specW - 2, y, 2, 1);
  }
  ctx.drawImage(specCv, 0, 0, W, H);
}

/* ---- 14. Lissajous — XY-Oszilloskop mit Neon-Spur ---- */
let lisOff = 256, lisHue = 0;
function drawLissajous() {
  const bass = energy(1, 12), mids = energy(12, 80);
  /* Versatz zwischen X- und Y-Signal wandert mit den Mitten → Figur morpht */
  const target = 128 + Math.floor(mids * 700);
  lisOff += (target - lisOff) * 0.04;
  const off = Math.floor(lisOff);
  const cx = W / 2, cy = H / 2, S = Math.min(W, H) * 0.42;
  lisHue = (lisHue + 0.8 + bass * 4) % 360;
  ctx.strokeStyle = `hsla(${lisHue} 95% 60% / 0.55)`;
  ctx.lineWidth = 1.5 + bass * 3;
  ctx.beginPath();
  for (let i = 0; i < timeData.length - off; i += 2) {
    const x = cx + (timeData[i] / 128 - 1) * S;
    const y = cy + (timeData[i + off] / 128 - 1) * S;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.stroke();
}

/* ---- 15. Galaxie ---- */
const gal = [];
let galRot = 0;
(function initGalaxy() {
  for (let i = 0; i < 420; i++) {
    const r = Math.pow(Math.random(), 0.7);
    gal.push({
      r,
      ang: r * 4.5 + (i % 3) * Math.PI * 2 / 3 + (Math.random() - 0.5) * 0.5,
    });
  }
})();
function drawGalaxy() {
  const bass = energy(1, 12);
  galRot += 0.002 + bass * 0.015;
  const f = Math.min(W, H);
  for (const p of gal) {
    /* jeder Stern hängt an einem Frequenz-Bin — innen Bass, außen Höhen */
    const v = freqData[Math.floor(p.r * 320) + 1] / 255;
    const ang = p.ang + galRot * (1.6 - p.r);   /* innen rotiert schneller */
    const R = p.r * f * 0.46 * (1 + bass * 0.12);
    const x = W / 2 + Math.cos(ang) * R;
    const y = H / 2 + Math.sin(ang) * R * 0.62;   /* elliptisch geneigt */
    const s = 1 + v * 5 * (1 - p.r * 0.4);
    ctx.fillStyle = `hsla(${40 + p.r * 220} 90% ${45 + v * 40}% / ${0.3 + v * 0.7})`;
    ctx.fillRect(x - s / 2, y - s / 2, s, s);
  }
  /* Galaxienkern */
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 8 + bass * 26 + beatPulse * 10, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,220,150,${0.25 + bass * 0.5})`;
  ctx.fill();
}

/* ---- 16. Fontänen — Spektrum-Springbrunnen mit Gravitation ---- */
const fount = [];
function drawFountains() {
  const nB = 6;
  for (let b = 0; b < nB; b++) {
    const lo = Math.floor(Math.pow(b / nB, 1.8) * 300) + 1;
    const hi = Math.floor(Math.pow((b + 1) / nB, 1.8) * 300) + 2;
    const v = Math.min(1, energy(lo, hi) * (1 + b * 0.3));
    const x0 = (b + 0.5) / nB * W;
    const count = Math.floor(v * 6);
    for (let k = 0; k < count && fount.length < 900; k++) {
      fount.push({
        x: x0 + (Math.random() - 0.5) * W * 0.04, y: H,
        vx: (Math.random() - 0.5) * 2,
        vy: -(4 + v * 11) * (H / 700) * (0.7 + Math.random() * 0.5),
        hue: b / nB * 300, life: 1, s: 1.5 + v * 3
      });
    }
  }
  const g = 0.18 * (H / 700);
  for (let i = fount.length - 1; i >= 0; i--) {
    const p = fount[i];
    p.x += p.vx; p.y += p.vy; p.vy += g; p.life -= 0.008;
    if (p.y > H + 10 || p.life <= 0) { fount.splice(i, 1); continue; }
    ctx.fillStyle = `hsla(${p.hue} 90% 62% / ${p.life})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
  }
}

/* ---- 17. Feuerwerk — Raketen auf den Beat ---- */
const fw = [];
let fwIdle = 0;
function drawFireworks() {
  /* ohne Beat trotzdem alle ~2 s eine Rakete, damit der Himmel nie leer bleibt */
  fwIdle++;
  if (beatHit || fwIdle > 120) {
    fwIdle = 0;
    fw.push({
      type: 'r',
      x: W * (0.15 + Math.random() * 0.7), y: H,
      vx: (Math.random() - 0.5) * 1.5,
      vy: -(H * 0.011 + Math.random() * H * 0.004),
      hue: Math.random() * 360,
      fuse: 35 + Math.random() * 20, life: 1
    });
  }
  const g = H * 0.00022;
  for (let i = fw.length - 1; i >= 0; i--) {
    const p = fw[i];
    if (p.type === 'r') {
      p.x += p.vx; p.y += p.vy; p.vy += g; p.fuse--;
      /* Funkenschweif */
      ctx.fillStyle = `hsla(${p.hue} 60% 70% / 0.7)`;
      ctx.fillRect(p.x - 1 + (Math.random() - 0.5) * 3, p.y + 4, 2, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
      if (p.fuse <= 0 || p.vy > -0.5) {
        /* Explosion */
        const nS = 45 + Math.floor(Math.random() * 30);
        for (let k = 0; k < nS; k++) {
          const a = Math.random() * Math.PI * 2;
          const sp = (1 + Math.random() * 3.5) * (H / 700);
          fw.push({
            type: 's', x: p.x, y: p.y,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            hue: p.hue + (Math.random() - 0.5) * 40, life: 1
          });
        }
        fw.splice(i, 1);
      }
    } else {
      p.x += p.vx; p.y += p.vy; p.vy += g * 1.6;
      p.vx *= 0.985; p.vy *= 0.985;
      p.life -= 0.014;
      if (p.life <= 0 || p.y > H + 10) { fw.splice(i, 1); continue; }
      /* Funkeln */
      ctx.fillStyle = `hsla(${p.hue} 95% ${55 + Math.random() * 30}% / ${p.life * (0.6 + Math.random() * 0.4)})`;
      const s = 1 + p.life * 2;
      ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
    }
  }
}

/* ---- 18. Schwarm — Boids, der Bass sprengt sie auseinander ---- */
const boids = [];
(function initBoids() {
  for (let i = 0; i < 90; i++) {
    boids.push({
      x: Math.random(), y: Math.random(),
      vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2
    });
  }
})();
function drawSwarm() {
  const bass = energy(1, 12), mids = energy(12, 80);
  const t = performance.now() / 1000;
  /* Zielpunkt wandert in einer Lissajous-Bahn */
  const tgx = 0.5 + Math.sin(t * 0.31) * 0.32;
  const tgy = 0.5 + Math.sin(t * 0.43 + 1) * 0.32;
  /* Schwarm-Mittel */
  let cx = 0, cy = 0, avx = 0, avy = 0;
  for (const b of boids) { cx += b.x; cy += b.y; avx += b.vx; avy += b.vy; }
  cx /= boids.length; cy /= boids.length; avx /= boids.length; avy /= boids.length;
  const maxSp = (2.5 + mids * 6) / 1000;
  for (const b of boids) {
    /* Kohäsion + Ziel + Ausrichtung */
    b.vx += (cx - b.x) * 0.0015 + (tgx - b.x) * 0.0025 + (avx - b.vx) * 0.02;
    b.vy += (cy - b.y) * 0.0015 + (tgy - b.y) * 0.0025 + (avy - b.vy) * 0.02;
    /* Separation */
    for (const o of boids) {
      const dx = b.x - o.x, dy = b.y - o.y;
      const d2 = dx * dx + dy * dy;
      if (d2 > 0 && d2 < 0.0012) { b.vx += dx * 0.02; b.vy += dy * 0.02; }
    }
    /* Beat: Explosion vom Schwarmzentrum weg */
    if (beatHit) {
      const dx = b.x - cx, dy = b.y - cy;
      const d = Math.hypot(dx, dy) || 0.01;
      b.vx += dx / d * bass * 0.02;
      b.vy += dy / d * bass * 0.02;
    }
    const sp = Math.hypot(b.vx, b.vy) || 1e-6;
    const lim = maxSp * 60;
    if (sp > lim) { b.vx = b.vx / sp * lim; b.vy = b.vy / sp * lim; }
    b.x += b.vx * 0.016; b.y += b.vy * 0.016;
    b.x = (b.x + 1) % 1; b.y = (b.y + 1) % 1;
    /* Dreieck in Flugrichtung */
    const px = b.x * W, py = b.y * H;
    const a = Math.atan2(b.vy, b.vx);
    const s = 4 + mids * 6;
    ctx.fillStyle = `hsla(${170 + mids * 130 + sp / lim * 40} 90% 60% / 0.9)`;
    ctx.beginPath();
    ctx.moveTo(px + Math.cos(a) * s * 1.6, py + Math.sin(a) * s * 1.6);
    ctx.lineTo(px + Math.cos(a + 2.5) * s, py + Math.sin(a + 2.5) * s);
    ctx.lineTo(px + Math.cos(a - 2.5) * s, py + Math.sin(a - 2.5) * s);
    ctx.closePath();
    ctx.fill();
  }
}

/* ---- 19. Strudel — Partikel-Sog ins Zentrum ---- */
const vort = [];
function drawVortex() {
  const bass = energy(1, 12);
  const total = energy(1, 200);
  const maxR = Math.min(W, H) * 0.52;
  /* außen nachschieben, Menge ∝ Gesamtenergie */
  const want = 2 + Math.floor(total * 14);
  for (let k = 0; k < want && vort.length < 700; k++) {
    vort.push({ r: maxR * (0.9 + Math.random() * 0.2), ang: Math.random() * Math.PI * 2, sp: 0.6 + Math.random() * 0.8 });
  }
  for (let i = vort.length - 1; i >= 0; i--) {
    const p = vort[i];
    p.r -= (0.6 + bass * 4) * (maxR / 400) * p.sp;
    p.ang += (0.015 + bass * 0.04) * (maxR / Math.max(p.r, 20)) * 0.9;
    if (p.r < 6) { vort.splice(i, 1); continue; }
    const v = freqData[Math.floor(p.r / maxR * 300) + 1] / 255;
    const x = W / 2 + Math.cos(p.ang) * p.r;
    const y = H / 2 + Math.sin(p.ang) * p.r * 0.85;
    const s = 1 + v * 4 + (1 - p.r / maxR) * 1.5;
    ctx.fillStyle = `hsla(${200 + (1 - p.r / maxR) * 160} 90% ${50 + v * 35}% / ${0.4 + v * 0.6})`;
    ctx.fillRect(x - s / 2, y - s / 2, s, s);
  }
  /* Auge des Strudels */
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 5 + bass * 22, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${0.25 + bass * 0.5})`;
  ctx.lineWidth = 2;
  ctx.stroke();
}

/* ---- 20. Gravitation — Attraktoren sammeln Moleküle ein, Nachschub von außen ---- */
const gravP = [];
const gravGlow = [0, 0, 0];
function gravSpawn(p) {
  /* neues Molekül rückt von einem zufälligen Rand nach */
  const side = Math.floor(Math.random() * 4);
  if (side === 0)      { p.x = Math.random(); p.y = 0;    p.vx = 0; p.vy = 0.003; }
  else if (side === 1) { p.x = Math.random(); p.y = 1;    p.vx = 0; p.vy = -0.003; }
  else if (side === 2) { p.x = 0; p.y = Math.random();    p.vx = 0.003; p.vy = 0; }
  else                 { p.x = 1; p.y = Math.random();    p.vx = -0.003; p.vy = 0; }
  p.m = 0.4 + Math.random() * 1.2;   /* individuelle "Masse" — sonst kollabieren alle auf dieselbe Bahn */
}
(function initGrav() {
  for (let i = 0; i < 420; i++) {
    gravP.push({ x: Math.random(), y: Math.random(), vx: 0, vy: 0, m: 0.4 + Math.random() * 1.2 });
  }
})();
function drawGravity() {
  const t = performance.now() / 1000;
  /* 3 Attraktoren: Bass / Mitten / Höhen, wandern auf eigenen Bahnen */
  const attr = [
    { x: 0.5 + Math.sin(t * 0.37) * 0.3,     y: 0.5 + Math.cos(t * 0.29) * 0.3,     s: energy(1, 12),   hue: 0   },
    { x: 0.5 + Math.sin(t * 0.23 + 2) * 0.32, y: 0.5 + Math.cos(t * 0.41 + 1) * 0.3, s: energy(12, 80),  hue: 140 },
    { x: 0.5 + Math.sin(t * 0.31 + 4) * 0.3,  y: 0.5 + Math.cos(t * 0.19 + 3) * 0.32, s: energy(80, 400) * 2, hue: 210 },
  ];
  for (const p of gravP) {
    let ax = 0, ay = 0, strongest = 0, hue = 0;
    for (const a of attr) {
      const dx = a.x - p.x, dy = a.y - p.y;
      const d2 = Math.max(dx * dx + dy * dy, 0.002);
      const f = a.s * 0.00045 / d2 * p.m;
      ax += dx * f; ay += dy * f;
      if (a.s / d2 > strongest) { strongest = a.s / d2; hue = a.hue; }
    }
    p.vx = (p.vx + ax + (Math.random() - 0.5) * 0.0005) * 0.96;
    p.vy = (p.vy + ay + (Math.random() - 0.5) * 0.0005) * 0.96;
    /* Tempolimit — sonst schleudern Partikel nahe am Attraktor quer über den Screen */
    const spd = Math.hypot(p.vx, p.vy);
    if (spd > 0.014) { p.vx = p.vx / spd * 0.014; p.vy = p.vy / spd * 0.014; }
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > 1) { p.vx *= -0.8; p.x = Math.max(0, Math.min(1, p.x)); }
    if (p.y < 0 || p.y > 1) { p.vy *= -0.8; p.y = Math.max(0, Math.min(1, p.y)); }
    /* Einsammeln: nah genug an einer Kugel → verschluckt, Nachschub vom Rand */
    let eaten = false;
    for (let ai = 0; ai < 3; ai++) {
      const a = attr[ai];
      const dx = a.x - p.x, dy = a.y - p.y;
      const cr = 0.028 + a.s * 0.032;
      if (dx * dx + dy * dy < cr * cr) {
        gravGlow[ai] = Math.min(1, gravGlow[ai] + 0.2);
        gravSpawn(p);
        eaten = true;
        break;
      }
    }
    if (eaten) continue;
    const sp = Math.min(1, Math.hypot(p.vx, p.vy) * 120);
    ctx.fillStyle = `hsla(${hue + sp * 50} 90% ${50 + sp * 38}% / ${0.55 + sp * 0.45})`;
    const s = 2 + sp * 3;
    ctx.fillRect(p.x * W - s / 2, p.y * H - s / 2, s, s);
  }
  /* Attraktoren als glühende Kerne — blitzen beim Einsammeln auf */
  for (let ai = 0; ai < 3; ai++) {
    const a = attr[ai];
    const r = 4 + a.s * 28 + gravGlow[ai] * 22;
    const g = ctx.createRadialGradient(a.x * W, a.y * H, 0, a.x * W, a.y * H, r);
    g.addColorStop(0, `hsla(${a.hue} 90% ${70 + gravGlow[ai] * 25}% / ${0.5 + a.s * 0.5})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(a.x * W, a.y * H, r, 0, Math.PI * 2); ctx.fill();
    gravGlow[ai] *= 0.93;
  }
}

/* ---- Modus-Verwaltung ---- */
const modes = [
  { name: 'Spektrum', fn: drawBars,          fade: 1.0  },
  { name: 'Oszilloskop', fn: drawScope,      fade: 0.35 },
  { name: 'Kreis', fn: drawCircle,           fade: 0.25 },
  { name: 'Partikel', fn: drawParticles,     fade: 0.18 },
  { name: 'Sternenflug', fn: drawStars,      fade: 0.4  },
  { name: 'Synthwave', fn: drawGrid,         fade: 0.55 },
  { name: 'Feuer', fn: drawFire,             fade: 1.0  },
  { name: 'Kaleidoskop', fn: drawKaleido,    fade: 0.14 },
  { name: 'Blitzgewitter', fn: drawLightning, fade: 0.3 },
  { name: 'Tunnel', fn: drawTunnel,          fade: 0.28 },
  { name: 'Orbits', fn: drawOrbits,          fade: 0.3  },
  { name: 'Echo-Welle', fn: drawEchoWave,    fade: 0.5  },
  { name: 'Spektrogramm', fn: drawSpectrogram, fade: 1.0 },
  { name: 'Lissajous', fn: drawLissajous,    fade: 0.08 },
  { name: 'Galaxie', fn: drawGalaxy,         fade: 0.25 },
  { name: 'Fontänen', fn: drawFountains,     fade: 0.25 },
  { name: 'Feuerwerk', fn: drawFireworks,    fade: 0.18 },
  { name: 'Schwarm', fn: drawSwarm,          fade: 0.2  },
  { name: 'Strudel', fn: drawVortex,         fade: 0.2  },
  { name: 'Gravitation', fn: drawGravity,    fade: 0.15 },
];
let mode = 0;
let labelTimer = null;

function showLabel() {
  vizLabel.textContent = '♪ ' + modes[mode].name;
  vizLabel.style.opacity = 1;
  clearTimeout(labelTimer);
  labelTimer = setTimeout(() => vizLabel.style.opacity = 0, 1800);
}
function nextViz() {
  mode = (mode + 1) % modes.length;
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  showLabel();
}
canvas.addEventListener('click', nextViz);
document.getElementById('btnViz').addEventListener('click', nextViz);
showLabel();

/* ---- Render-Loop ---- */
function loop() {
  requestAnimationFrame(loop);
  if (analyser) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    detectBeat();
  }
  /* Fade statt hartem Clear → Nachleuchten */
  ctx.fillStyle = `rgba(10,10,18,${modes[mode].fade})`;
  ctx.fillRect(0, 0, W, H);
  if (analyser) modes[mode].fn();
}
loop();
</script>
