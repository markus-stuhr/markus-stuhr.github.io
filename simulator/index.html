<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 1px;
      pointer-events: none;
    }
    #hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 22px 30px;
      font-family: monospace;
      color: rgba(255,255,255,0.85);
      pointer-events: none;
      gap: 20px;
    }
    .panel {
      background: rgba(8, 22, 40, 0.55);
      border: 1px solid rgba(120,170,220,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }
    .panel .label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(150,190,230,0.6);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .panel .value { font-size: 22px; font-weight: bold; }
    .panel .value small { font-size: 12px; font-weight: normal; opacity: 0.6; }
    #markArrow { transition: none; color: #66ff99; }
    #race {
      position: fixed;
      top: 42px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-family: monospace;
      color: rgba(255,255,255,0.9);
      pointer-events: none;
    }
    #raceTime { font-size: 34px; font-weight: bold; letter-spacing: 2px; }
    #raceBest { font-size: 12px; color: rgba(150,190,230,0.7); letter-spacing: 1px; margin-top: 2px; }
    #raceMsg {
      margin-top: 8px; font-size: 13px; letter-spacing: 1px;
      color: #66ff99; min-height: 18px;
    }
    .steerbtn {
      position: fixed; bottom: 92px;
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(8, 22, 40, 0.5);
      border: 1px solid rgba(150,190,230,0.35);
      color: rgba(255,255,255,0.85);
      font-size: 42px; line-height: 1; font-family: sans-serif;
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
      touch-action: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 4px;
    }
    .steerbtn:active { background: rgba(60,120,180,0.6); }
    #btnLeft { left: 22px; }
    #btnRight { right: 22px; }

    /* --- Start menu --- */
    body.menu #hud, body.menu #race, body.menu #info, body.menu .steerbtn { display: none; }
    #menu {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    #menu.hidden { display: none; }
    .menu-card {
      background: rgba(255,255,255,0.95);
      border-radius: 22px;
      padding: 30px 34px 26px;
      width: min(360px, 86vw);
      box-shadow: 0 20px 60px rgba(0,28,56,0.4);
      color: #14242f; text-align: center;
    }
    .menu-card h1 { font-size: 25px; letter-spacing: 0.3px; margin-bottom: 22px; font-weight: 700; }
    .menu-section { margin-bottom: 18px; text-align: left; }
    .sec-label {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #6b7c89; margin-bottom: 7px;
    }
    .seg { display: flex; gap: 8px; }
    .seg button {
      flex: 1; padding: 9px 0; border-radius: 10px;
      border: 1.5px solid #ccd6de; background: #fff; color: #20303c;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .12s, border-color .12s, color .12s;
    }
    .seg button:hover:not(:disabled) { border-color: #5aa0d8; }
    .seg button.active { background: #1d6fb8; border-color: #1d6fb8; color: #fff; }
    .seg button:disabled { opacity: 0.4; cursor: not-allowed; }
    #startBtn {
      margin-top: 8px; width: 100%; padding: 13px 0;
      border: none; border-radius: 12px;
      background: #16a35a; color: #fff;
      font-size: 16px; font-weight: 700; letter-spacing: 1px;
      cursor: pointer; font-family: inherit;
    }
    #startBtn:hover { background: #128a4b; }
    #countdown {
      position: fixed; inset: 0; z-index: 15; display: none;
      align-items: center; justify-content: center; pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #fff; font-size: 22vh; font-weight: 800;
      text-shadow: 0 6px 40px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
<div id="info">← → / A D steuern &nbsp;·&nbsp; Geschwindigkeit kommt vom Wind &nbsp;·&nbsp; R = Neustart</div>
<div id="hud">
  <div class="panel"><div class="label">TWS</div><div class="value"><span id="tws">0</span><small> kn</small></div></div>
  <div class="panel"><div class="label">TWA</div><div class="value"><span id="twd">0°</span></div></div>
  <div class="panel"><div class="label">VMG</div><div class="value"><span id="vmg">0</span><small> %</small></div></div>
  <div class="panel"><div class="label">%Speed</div><div class="value"><span id="vmgspeed">0.0</span><small> kn</small></div></div>
  <div class="panel"><div class="label">Marke <span id="markNum">1/4</span></div><div class="value"><span id="markDist">—</span><small> m</small></div></div>
  <div class="panel"><div class="label">Speed</div><div class="value"><span id="sog">0.0</span><small> kn</small></div></div>
</div>
<div id="race">
  <div id="raceTime">00:00.0</div>
  <div id="raceBest">Best —</div>
  <div id="raceMsg">Steuere durch die Marken in der Reihenfolge</div>
</div>
<button id="btnLeft" class="steerbtn">‹</button>
<button id="btnRight" class="steerbtn">›</button>
<div id="menu">
  <div class="menu-card">
    <h1>Racing Simulator</h1>
    <div class="menu-section">
      <div class="sec-label">Modus</div>
      <div class="seg" id="segMode">
        <button data-value="race" class="active">Race</button>
        <button data-value="replay" disabled>Replay</button>
      </div>
    </div>
    <div class="menu-section">
      <div class="sec-label">Windstärke</div>
      <div class="seg" id="segWind">
        <button data-value="10">10 kn</button>
        <button data-value="15">15 kn</button>
        <button data-value="20" class="active">20 kn</button>
        <button data-value="25">25 kn</button>
      </div>
    </div>
    <div class="menu-section">
      <div class="sec-label">Wellenstärke</div>
      <div class="seg" id="segWave">
        <button data-value="0.5">Ruhig</button>
        <button data-value="1" class="active">Mittel</button>
        <button data-value="1.6">Hoch</button>
      </div>
    </div>
    <button id="startBtn">Start</button>
  </div>
</div>
<div id="countdown"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fc6ea); // daytime sky
scene.fog = new THREE.FogExp2(0x9fc6ea, 0.0045); // fade the sea into the sky colour, not white

// --- Camera ---
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- Lights ---
const sun = new THREE.DirectionalLight(0xfff4e0, 1.5);
sun.position.set(50, 70, 30);
scene.add(sun);
// Daylight ambient: bright sky above, sea-tinted bounce below
scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x2a5a86, 1.1));

// --- Water texture (procedural, tileable) ---
function makeWaterTexture() {
  const S = 256;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1d6486';
  ctx.fillRect(0, 0, S, S);
  // soft lighter/darker patches; draw wrapped copies so the tile seams match
  for (let i = 0; i < 140; i++) {
    const x = Math.random() * S, y = Math.random() * S;
    const r = 12 + Math.random() * 40;
    const light = Math.random() > 0.5;
    for (const dx of [-S, 0, S]) for (const dy of [-S, 0, S]) {
      const g = ctx.createRadialGradient(x + dx, y + dy, 0, x + dx, y + dy, r);
      const a = 0.07 + Math.random() * 0.07;
      g.addColorStop(0, light ? `rgba(95,185,215,${a})` : `rgba(8,42,62,${a})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x + dx, y + dy, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// --- Ocean (follows the boat; texture & waves live in world space so motion shows) ---
const OCEAN_SIZE = 600;
const OCEAN_SEGS = 120;
const TILE = 28; // world units per texture tile
const oceanGeo = new THREE.PlaneGeometry(OCEAN_SIZE, OCEAN_SIZE, OCEAN_SEGS, OCEAN_SEGS);
oceanGeo.rotateX(-Math.PI / 2);

const waterTex = makeWaterTexture();
waterTex.repeat.set(OCEAN_SIZE / TILE, OCEAN_SIZE / TILE);

const oceanMat = new THREE.MeshPhongMaterial({
  color: 0xc3e4ef,        // slight blue-turquoise tint over the texture
  map: waterTex,
  specular: 0x88b8cc,
  shininess: 90,
  side: THREE.FrontSide,
  transparent: true,   // let the submerged hull/keel show through faintly
  opacity: 0.88,
  depthWrite: false,   // don't let wave crests occlude the wind ring / shadow on the surface
});

const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.renderOrder = -1; // draw before other transparent objects (e.g. wind disc)
scene.add(ocean);

// Cache local x/z; waves are computed from WORLD coords (local + ocean offset)
const posAttr = oceanGeo.attributes.position;
const baseX = new Float32Array(posAttr.count);
const baseZ = new Float32Array(posAttr.count);
for (let i = 0; i < posAttr.count; i++) {
  baseX[i] = posAttr.getX(i);
  baseZ[i] = posAttr.getZ(i);
}

let waveAmp = 1;   // slowly drifts within ±25% of waveBase (see updateEnvironment)
let waveBase = 1;  // base sea state chosen in the start menu
function waveHeight(x, z, t) {
  return (Math.sin(x * 0.08 + t * 0.9) * 0.5
    + Math.sin(z * 0.12 + t * 0.7) * 0.35
    + Math.sin((x + z) * 0.05 + t * 1.1) * 0.25) * waveAmp;
}

// Slowly varying sea state + wind speed, both swinging within ±25% of nominal.
function updateEnvironment(t) {
  const gust = 0.5 * Math.sin(t * 0.13) + 0.3 * Math.sin(t * 0.31 + 1.3) + 0.2 * Math.sin(t * 0.07 + 2.1);
  wind.tws = wind.baseTws * (1 + 0.25 * gust);
  const shift = 0.5 * Math.sin(t * 0.06 + 1.1) + 0.3 * Math.sin(t * 0.17 + 3.3) + 0.2 * Math.sin(t * 0.04 + 0.5);
  wind.from = wind.baseFrom + (20 * Math.PI / 180) * shift; // wind veers/backs within ±20°
  const swell = 0.5 * Math.sin(t * 0.09 + 0.6) + 0.3 * Math.sin(t * 0.23 + 2.4) + 0.2 * Math.sin(t * 0.05 + 4.0);
  waveAmp = waveBase * (1 + 0.25 * swell);
}

function animateWaves(t) {
  const ox = ocean.position.x, oz = ocean.position.z;
  for (let i = 0; i < posAttr.count; i++) {
    posAttr.setY(i, waveHeight(baseX[i] + ox, baseZ[i] + oz, t));
  }
  posAttr.needsUpdate = true;
  oceanGeo.computeVertexNormals();
  // Slide the texture so it stays put in world space -> visible motion past the boat
  waterTex.offset.set(ox / TILE, -oz / TILE);
}

// --- Boat ---
const boatGroup = new THREE.Group();

// Hull — lofted from cross-section "stations" running bow (−z) to stern (+z)
const HULL_ZBOW = -2.15, HULL_ZSTERN = 1.95, HULL_MAXBEAM = 0.52; // LOA ~4.1, beamy aft
const hullHalfBeam = (s) => {
  let b = s < 0.5
    ? HULL_MAXBEAM * Math.pow(s / 0.5, 0.6)                  // fine, almost plumb bow
    : HULL_MAXBEAM * (1 - 0.04 * ((s - 0.5) / 0.5));         // carry beam to a wide transom
  return Math.max(0.03, b);
};
const hullDepth = (s) => {
  let d = 0.42;                                              // deep forward: plumb stem reaches the waterline
  if (s > 0.55) d *= 1 - 0.42 * ((s - 0.55) / 0.45);         // flatten toward the broad transom
  return d;
};
const hullDeckY = (s) => 0.30 + 0.16 * Math.pow(1 - s, 2) + 0.03 * s; // low, nearly flat sheer

function buildHull() {
  const NS = 18, NA = 12;          // stations along length, arc points per section
  const zBow = HULL_ZBOW, zStern = HULL_ZSTERN;
  const halfBeam = hullHalfBeam, depth = hullDepth, deckY = hullDeckY;

  const pos = [];
  const idx = (i, j) => i * (NA + 1) + j;
  for (let i = 0; i < NS; i++) {
    const s = i / (NS - 1);
    const z = zBow + (zStern - zBow) * s;
    const hb = halfBeam(s), dp = depth(s), dy = deckY(s);
    for (let j = 0; j <= NA; j++) {
      const a = (Math.PI * j) / NA;     // 0 = starboard deck edge, PI = port deck edge
      pos.push(hb * Math.cos(a), dy - dp * Math.sin(a), z);
    }
  }

  const faces = [];
  // hull skin
  for (let i = 0; i < NS - 1; i++)
    for (let j = 0; j < NA; j++) {
      const a = idx(i, j), b = idx(i + 1, j), c = idx(i + 1, j + 1), d = idx(i, j + 1);
      faces.push(a, b, d, b, c, d);
    }
  // deck: span the two deck edges (j=0 starboard, j=NA port) along the length
  for (let i = 0; i < NS - 1; i++) {
    const a = idx(i, 0), b = idx(i, NA), c = idx(i + 1, NA), d = idx(i + 1, 0);
    faces.push(a, b, c, a, c, d);
  }
  // transom cap at the stern: duplicate the last ring into its own flat,
  // straight-cut face (separate verts so smooth shading doesn't round it off)
  const last = NS - 1;
  let cx = 0, cy = 0, cz = 0;
  for (let j = 0; j <= NA; j++) { cx += pos[idx(last, j) * 3]; cy += pos[idx(last, j) * 3 + 1]; cz += pos[idx(last, j) * 3 + 2]; }
  cx /= (NA + 1); cy /= (NA + 1); cz /= (NA + 1);
  const base = pos.length / 3;
  for (let j = 0; j <= NA; j++) pos.push(pos[idx(last, j) * 3], pos[idx(last, j) * 3 + 1], pos[idx(last, j) * 3 + 2]);
  const cI = pos.length / 3; pos.push(cx, cy, cz);
  for (let j = 0; j < NA; j++) faces.push(cI, base + j + 1, base + j);
  faces.push(cI, base, base + NA); // close across the deck edge

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setIndex(faces);
  g.computeVertexNormals();
  return g;
}
const hullMat = new THREE.MeshPhongMaterial({ color: 0x1a2733, flatShading: false, side: THREE.DoubleSide, specular: 0x556677, shininess: 60 });
const hull = new THREE.Mesh(buildHull(), hullMat);
boatGroup.add(hull);

// Teak deck panel, inset from the dark deck edge (margin tapers to 0 at the stern)
{
  const NSD = 26, bowStart = 0.04, sideMargin = 0.07;
  const pts = [];
  for (let k = 0; k <= NSD; k++) {
    const s = bowStart + (1 - bowStart) * (k / NSD);
    const z = HULL_ZBOW + (HULL_ZSTERN - HULL_ZBOW) * s;
    const hb = hullHalfBeam(s);
    const edge = Math.max(0, hb - sideMargin);  // constant dark border to the stern; teak pinches at the bow tip
    const dy = hullDeckY(s) + 0.006;
    pts.push(edge, dy, z, -edge, dy, z); // starboard, port
  }
  const tf = [];
  for (let k = 0; k < NSD; k++) {
    const a = 2 * k, b = 2 * k + 1, c = 2 * k + 3, d = 2 * k + 2;
    tf.push(a, b, c, a, c, d);
  }
  const tg = new THREE.BufferGeometry();
  tg.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  tg.setIndex(tf);
  tg.computeVertexNormals();
  const teak = new THREE.Mesh(tg, new THREE.MeshPhongMaterial({ color: 0xb08a4f, side: THREE.DoubleSide, shininess: 22 }));
  boatGroup.add(teak);
}

// Bowsprit / prod — the pointed spar reaching forward from the bow
const spritGeo = new THREE.CylinderGeometry(0.018, 0.028, 0.8, 8);
spritGeo.rotateX(Math.PI / 2);
spritGeo.translate(0, 0.40, HULL_ZBOW - 0.3);    // short, thin prod forward of the stem
const sprit = new THREE.Mesh(spritGeo, new THREE.MeshPhongMaterial({ color: 0x23282e }));
boatGroup.add(sprit);

// Gold cove line along the sheer on both sides of the hull
function goldStripe(side) {
  const pts = [];
  for (let k = 0; k <= 24; k++) {
    const s = k / 24, z = HULL_ZBOW + (HULL_ZSTERN - HULL_ZBOW) * s;
    pts.push(new THREE.Vector3(side * hullHalfBeam(s) * 0.99, hullDeckY(s) - 0.06, z));
  }
  const tube = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 48, 0.009, 6, false);
  return new THREE.Mesh(tube, new THREE.MeshPhongMaterial({ color: 0xd8b24a, emissive: 0x2e2408, shininess: 90 }));
}
boatGroup.add(goldStripe(1));
boatGroup.add(goldStripe(-1));

// Deep fin keel, sitting just aft of the mast: tapered chord, slightly raked aft,
// reaching to a torpedo ballast bulb (shape after the reference silhouette)
const keelGeo = new THREE.BufferGeometry();
keelGeo.setAttribute('position', new THREE.Float32BufferAttribute([
  // front face (x = +0.03): top-fwd, top-aft, bot-aft, bot-fwd
   0.03, -0.06, -0.15,   0.03, -0.06,  0.05,   0.03, -0.84, 0.06,   0.03, -0.84, -0.04, // 0,1,2,3
  // back face (x = -0.03)
  -0.03, -0.06, -0.15,  -0.03, -0.06,  0.05,  -0.03, -0.84, 0.06,  -0.03, -0.84, -0.04, // 4,5,6,7
], 3));
keelGeo.setIndex([
  0,1,2, 0,2,3,            // front
  4,6,5, 4,7,6,            // back
  0,4,1, 1,4,5,            // top edge
  3,2,7, 7,2,6,            // bottom edge
  0,3,4, 4,3,7,            // forward edge
  1,5,2, 2,5,6,            // aft edge
]);
keelGeo.computeVertexNormals();
const keel = new THREE.Mesh(keelGeo, new THREE.MeshPhongMaterial({ color: 0x4a4a4a }));
boatGroup.add(keel);
// Torpedo ballast bulb at the keel foot
const bulb = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.1, 0.75, 5, 10),
  new THREE.MeshPhongMaterial({ color: 0x333333 })
);
bulb.rotation.x = Math.PI / 2;
bulb.position.set(0, -0.86, 0.01);
boatGroup.add(bulb);

// Rig group — scaled up 20% relative to the hull (keeps mast:boom etc. ratios)
const rigGroup = new THREE.Group();
rigGroup.scale.setScalar(1.2);
boatGroup.add(rigGroup);

// Mast — carbon rig (height ~1.2 x LOA: 37 m mast on a 100 ft hull)
const MAST_Z = -0.15;
const mastGeo = new THREE.CylinderGeometry(0.0245, 0.035, 4.75, 8);
const mastMat = new THREE.MeshPhongMaterial({ color: 0x23282e });
const mast = new THREE.Mesh(mastGeo, mastMat);
mast.position.set(0, 2.68, MAST_Z);
rigGroup.add(mast);

// Sail — mounted on a pivot at the mast so it can be trimmed (swing around y)
const sailPivot = new THREE.Group();
sailPivot.position.set(0, 0, MAST_Z);
rigGroup.add(sailPivot);

// Mainsail: luff up the mast (x=0,z=0), foot running aft to the clew.
// Lives in the y-z plane so rotating the pivot swings the boom out to leeward.
const sailGeo = new THREE.PlaneGeometry(1, 1, 6, 6); // subdivided so we can belly/luff it
const sailMat = new THREE.MeshPhongMaterial({
  color: 0x3b424a,             // dark grey racing sails
  side: THREE.DoubleSide,
  specular: 0x222222,
  shininess: 16,
});
const sail = new THREE.Mesh(sailGeo, sailMat);
sailPivot.add(sail);

// Boom: a real spar from the gooseneck at the mast aft to the clew. The sail's
// foot sits along it, and it swings out with the sailPivot when trimmed.
const BOOM_Y = 0.7, BOOM_LEN = 1.45; // lower boom (deck gap ~66%); mast ~3.5x the boom
const boomGeo = new THREE.CylinderGeometry(0.0385, 0.0385, BOOM_LEN, 10);
boomGeo.rotateX(Math.PI / 2);            // lay the spar along z
boomGeo.translate(0, BOOM_Y, BOOM_LEN / 2); // gooseneck at the mast (z≈0) -> clew aft
const boom = new THREE.Mesh(boomGeo, new THREE.MeshPhongMaterial({ color: 0x23282e }));
sailPivot.add(boom);
// Gooseneck fitting where the boom meets the mast
const gooseneck = new THREE.Mesh(
  new THREE.SphereGeometry(0.035, 8, 8),
  new THREE.MeshPhongMaterial({ color: 0x333333 })
);
gooseneck.position.set(0, BOOM_Y, 0.02);
sailPivot.add(gooseneck);

// Shape the flat plane into a triangular sail in the y-z plane.
// We map the unit plane's (x,y) corners to sail (z,y): tack, head, clew.
// Tack and clew sit on the boom so the foot runs right along the spar.
// Square-top main: a quadrilateral (tack, clew, head-aft, head-fwd) with a
// nearly straight leech and a squared headboard rather than a pointed top.
const TACK = new THREE.Vector3(0, BOOM_Y, 0);

function updateOpponent(o, dt) {
  const st = o.state, group = o.group;
  const bx = group.position.x, bz = group.position.z;

  // Course progress
  if (!st.done) {
    const m = COURSE[st.nextMark];
    if (Math.hypot(m.x - bx, m.z - bz) < MARK_RADIUS) {
      st.nextMark++;
      if (st.nextMark >= COURSE.length) st.done = true;
    }
  }

  // Pick a desired heading toward the next mark, tacking upwind when needed
  let desiredH = st.heading;
  if (!st.done) {
    const m = COURSE[st.nextMark];
    const bearing = Math.atan2(m.x - bx, -(m.z - bz)); // heading that points at the mark
    const twaDirect = normAngle(wind.from - bearing) * 180 / Math.PI;
    const NOGO = 42;
    if (Math.abs(twaDirect) >= NOGO) {
      desiredH = bearing;                       // can lay it directly
    } else {                                    // upwind: beat on the favoured tack
      const hS = wind.from - NOGO * Math.PI / 180;
      const hP = wind.from + NOGO * Math.PI / 180;
      desiredH = Math.abs(normAngle(hS - bearing)) < Math.abs(normAngle(hP - bearing)) ? hS : hP;
    }
  }

  // Collision avoidance: bend the desired heading away from any boat that is
  // close and roughly ahead (the player and the other opponents).
  {
    const AVOID_R = 18;            // start avoiding within 18 m
    const others = [{ x: boatGroup.position.x, z: boatGroup.position.z }];
    OPPONENTS.forEach(p => { if (p !== o) others.push({ x: p.group.position.x, z: p.group.position.z }); });
    let avoid = 0;
    for (const ob of others) {
      const dx = ob.x - bx, dz = ob.z - bz;
      const d = Math.hypot(dx, dz);
      if (d < AVOID_R && d > 0.01) {
        const rel = normAngle(Math.atan2(dx, -dz) - st.heading); // bearing relative to our heading
        if (Math.abs(rel) < Math.PI * 0.55) {                    // only worry about boats ahead
          const strength = (1 - d / AVOID_R) * Math.cos(rel);
          avoid += (rel <= 0 ? 1 : -1) * strength;               // turn away from the obstacle's side
        }
      }
    }
    desiredH = normAngle(desiredH + Math.max(-0.9, Math.min(0.9, avoid)));
  }

  // Helm: steer toward the desired heading
  const err = normAngle(desiredH - st.heading);
  const rudTarget = Math.max(-st.maxRudder, Math.min(st.maxRudder, err * 2.2));
  st.rudder += (rudTarget - st.rudder) * (1 - Math.pow(0.02, dt));

  // Same sailing physics as the player
  const twa2 = normAngle(wind.from - st.heading) * 180 / Math.PI;
  const eff2 = sailEfficiency(twa2);
  const target = st.maxSpeed * (wind.tws / wind.maxTws) * eff2 * (st.done ? 0 : 1);
  st.speed += (target - st.speed) * (target > st.speed ? 0.85 : 0.45) * dt;
  const steerage = 0.35 + 0.65 * Math.min(Math.abs(st.speed) / st.maxSpeed, 1);
  st.heading = normAngle(st.heading + st.rudder * 1.3 * steerage * dt);
  group.position.x += Math.sin(st.heading) * st.speed * dt;
  group.position.z -= Math.cos(st.heading) * st.speed * dt;
  group.rotation.y = -st.heading;

  // Sit on the waves + heel + sail trim
  const h = st.heading;
  const fwdX = Math.sin(h), fwdZ = -Math.cos(h), rgtX = Math.cos(h), rgtZ = Math.sin(h);
  const hC = waveHeight(bx, bz, t);
  const hF = waveHeight(bx + fwdX * 1.9, bz + fwdZ * 1.9, t);
  const hA = waveHeight(bx - fwdX * 1.9, bz - fwdZ * 1.9, t);
  const hR = waveHeight(bx + rgtX * 0.46, bz + rgtZ * 0.46, t);
  const hL = waveHeight(bx - rgtX * 0.46, bz - rgtZ * 0.46, t);
  group.position.y = hC - 0.06;
  group.rotation.x = Math.atan2(hF - hA, 3.8);
  const heelMag = MAX_HEEL * (wind.tws / wind.maxTws) * eff2 * Math.sin(Math.abs(twa2 * DEG));
  o.heel += (Math.sign(twa2) * heelMag - o.heel) * (1 - Math.pow(0.08, dt));
  group.rotation.z = Math.atan2(hR - hL, 1.0) + o.heel;

  const side = twa2 >= 0 ? -1 : 1;
  const sheet = Math.min(Math.abs(twa2) * 0.5, 80) * DEG;
  const targetSail = eff2 <= 0.02 ? Math.sin(t * 14) * 6 * DEG : side * sheet;
  o.sailAngle += (targetSail - o.sailAngle) * (1 - Math.pow(0.02, dt));
  o.mainPivot.rotation.y = o.sailAngle;
  o.jibPivot.quaternion.setFromAxisAngle(oppJibAxis, o.sailAngle * 0.85);
}

{
  const seg = 120;
  const g = new THREE.RingGeometry(RING_R - 0.30, RING_R - 0.08, seg, 1); // narrow band
  const pos = g.attributes.position;
  // colour ramp by efficiency: red (no-go) -> orange -> dark green (close-hauled) -> bright green (reach)
  const stops = [
    [0.00, new THREE.Color(0xff3b2f)], // red (no-go)
    [0.33, new THREE.Color(0xffd23b)], // yellow
    [0.66, new THREE.Color(0x66ff88)], // light green
    [1.00, new THREE.Color(0x148a39)], // dark green (fastest)
  ];
  const tmp = new THREE.Color();
  const rampColor = (e) => {
    for (let s = 1; s < stops.length; s++) {
      if (e <= stops[s][0]) {
        const f = (e - stops[s - 1][0]) / (stops[s][0] - stops[s - 1][0]);
        return tmp.copy(stops[s - 1][1]).lerp(stops[s][1], f);
      }
    }
    return tmp.copy(stops[stops.length - 1][1]);
  };
  const colors = [];
  for (let i = 0; i < pos.count; i++) {
    const phi = Math.atan2(pos.getY(i), pos.getX(i));   // from +x toward +y
    let diff = phi - Math.PI / 2;                        // relative to wind source
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));   // wrap to -PI..PI
    const twa = Math.abs(diff) * 180 / Math.PI;          // 0 (into wind) .. 180 (downwind)
    const c = rampColor(sailEfficiency(twa));
    colors.push(c.r, c.g, c.b);
  }
  g.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  g.rotateX(-Math.PI / 2);
  const polar = new THREE.Mesh(g, new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false,
  }));
  windRing.add(polar);
}

// Angle ticks only near the rim (inner ~80% stays clear): long every 30°,
// short every 10° (two minor ticks between each major one).
{
  const rOut = RING_R + 0.04;
  const rMajor = RING_R * 0.78;   // long ticks reach in to ~78% of the radius
  const rMinor = RING_R * 0.90;   // short ticks only in the outer band
  const major = [], minor = [];
  for (let deg = 0; deg < 360; deg += 10) {
    const a = deg * Math.PI / 180;          // from the bow (local -z)
    const dx = Math.sin(a), dz = -Math.cos(a);
    const beam = (deg === 90 || deg === 270); // exactly starboard / port: long beam lines
    const arr = (deg % 30 === 0) ? major : minor;
    const rIn = beam ? (2 * rMajor - rOut) : (deg % 30 === 0) ? rMajor : rMinor; // beam lines twice as long, reaching toward the boat
    arr.push(dx * rIn, 0.01, dz * rIn, dx * rOut, 0.01, dz * rOut);
  }
  const mk = (verts, opacity) => {
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    windRing.add(new THREE.LineSegments(lg, new THREE.LineBasicMaterial({
      color: 0xffffff, transparent: true, opacity, depthWrite: false,
    })));
  };
  mk(major, 0.35);
  mk(minor, 0.2);
}

// --- Compass ring: an outer ring fixed to the WORLD (North up). It stays put
// while the boat-fixed inner ring turns, so it reads cardinal directions. ---
const compassRing = new THREE.Group(); // world -z is North
{
  const CR = RING_R + 0.22;                 // just outside the polar ring
  const major = [], minor = [];
  for (let i = 0; i < 16; i++) {
    const a = i * (Math.PI * 2 / 16);        // 0 = North, clockwise
    const dx = Math.sin(a), dz = -Math.cos(a); // a=0 -> -z (N); a=90° -> +x (E)
    const cardinal = (i % 4 === 0);
    const rOut = CR + (cardinal ? 0.5 : 0.3);
    (cardinal ? major : minor).push(dx * CR, 0.01, dz * CR, dx * rOut, 0.01, dz * rOut);
  }
  const mkLines = (verts, opacity, w) => {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    compassRing.add(new THREE.LineSegments(g, new THREE.LineBasicMaterial({
      color: 0xeef4ff, transparent: true, opacity, depthWrite: false,
    })));
  };
  mkLines(major, 0.5);
  mkLines(minor, 0.25);

  // Cardinal labels N / O / S / W lying flat in the ring plane (small, North-up)
  function makeLabel(txt, color) {
    const s = 64, c = document.createElement('canvas');
    c.width = c.height = s;
    const ctx = c.getContext('2d');
    ctx.fillStyle = color; ctx.font = 'bold 46px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(txt, s / 2, s / 2 + 2);
    const tex = new THREE.CanvasTexture(c);
    const g = new THREE.PlaneGeometry(0.5, 0.5);
    g.rotateX(-Math.PI / 2);                 // lie flat; texture top points North (-z)
    const m = new THREE.Mesh(g, new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide,
    }));
    m.renderOrder = 6;

  }
  const labels = [['N', 0, '#eef4ff'], ['O', 4, '#eef4ff'], ['S', 8, '#eef4ff'], ['W', 12, '#eef4ff']];
  const rLabel = CR + 0.7;
  labels.forEach(([txt, i, col]) => {

    const m = makeLabel(txt, col);
    m.position.set(Math.sin(a) * rLabel, 0.04, -Math.cos(a) * rLabel);

// Normalize radians to [-PI, PI]
function normAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

// Sail efficiency vs. true wind angle (|TWA| in degrees). Simplified polar:
// narrow no-go (<22°), a strong close-hauled groove, peak on the reach, easing downwind.
function sailEfficiency(twaDeg) {
  const a = Math.abs(twaDeg);
  if (a < 22) return 0;                               // narrow no-go (in irons)
  if (a < 32) return ((a - 22) / 10) * 0.45;          // quick ramp out of the no-go
  if (a < 50) return 0.45 + ((a - 32) / 18) * 0.25;   // close-hauled groove (~0.45–0.70)
  if (a <= 110) return 0.70 + ((a - 50) / 60) * 0.30; // build to full power on the reach
  return 1.0 - ((a - 110) / 70) * 0.30;               // ease off running downwind
}

let twaDeg = 0;   // exposed for HUD
let currentEff = 0; // exposed for sail visuals

function updateBoat(dt) {
  const left = keys['ArrowLeft'] || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];

  // Keys move the rudder; it self-centres when released.
  let rudderTarget = 0;
  if (left)  rudderTarget -= boat.maxRudder;
  if (right) rudderTarget += boat.maxRudder;
  boat.rudder += (rudderTarget - boat.rudder) * (1 - Math.pow(0.02, dt)); // eases like a tiller

  // The rudder only bites when the boat has way on. Bow turns with the helm,
  // scaled by speed (a little authority even when nearly stopped).
  const speedNorm = Math.min(Math.abs(boat.speed) / boat.maxSpeed, 1);
  const steerage = 0.35 + 0.65 * speedNorm;
  boat.heading += boat.rudder * 1.3 * steerage * dt;
  boat.heading = normAngle(boat.heading);

  // True wind angle = angle between bow and the direction the wind comes from
  twaDeg = normAngle(wind.from - boat.heading) * 180 / Math.PI;

  // Target speed from point of sail and wind strength
  const eff = sailEfficiency(twaDeg);
  currentEff = eff;
  const target = boat.maxSpeed * (wind.tws / wind.maxTws) * eff;

  // Ease toward target; the hull carries way (momentum), so it coasts down
  // slowly — e.g. it keeps gliding through the no-go zone during a tack.
  const responsiveness = target > boat.speed ? 0.85 : 0.45;
  boat.speed += (target - boat.speed) * responsiveness * dt;

  // Move along heading (0 = -Z). The hull must face the SAME direction it
  // travels, so the mesh yaw is -heading (Three.js Y-rotation is mirrored
  // in x relative to our movement convention).
  boatGroup.position.x += Math.sin(boat.heading) * boat.speed * dt;
  boatGroup.position.z -= Math.cos(boat.heading) * boat.speed * dt;
  boatGroup.rotation.y = -boat.heading;
}

// --- Regatta race logic ---
const elRaceTime = document.getElementById('raceTime');
const elRaceBest = document.getElementById('raceBest');
const elRaceMsg = document.getElementById('raceMsg');
const elMarkNum = document.getElementById('markNum');
const elMarkDist = document.getElementById('markDist');
const elVmg = document.getElementById('vmg');
const elVmgSpeed = document.getElementById('vmgspeed');

const race = {
  state: 'pre',     // 'pre' | 'racing' | 'done'
  nextMark: 0,
  time: 0,
};
let bestTime = parseFloat(localStorage.getItem('sim_best_time')) || null;

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1).padStart(4, '0');
  return `${String(m).padStart(2, '0')}:${sec}`;
}

function updateRace(dt) {
  // The clock starts as soon as the boat gets underway, not only at the first mark.
  if (race.state === 'pre' && Math.abs(boat.speed) > 0.3) { race.state = 'racing'; race.time = 0; }
  if (race.state === 'racing') race.time += dt;

  if (race.state !== 'done') {
    const mark = COURSE[race.nextMark];
    const dx = mark.x - boatGroup.position.x;
    const dz = mark.z - boatGroup.position.z;
    const dist = Math.hypot(dx, dz);

    // Reached the current mark?
    if (dist < MARK_RADIUS) {
      if (race.state === 'pre') { race.state = 'racing'; race.time = 0; }
      race.nextMark++;
      if (race.nextMark >= COURSE.length) {
        race.state = 'done';
        elRaceMsg.textContent = '🏁 Zieldurchgang!';
        if (bestTime === null || race.time < bestTime) {
          bestTime = race.time;
          localStorage.setItem('sim_best_time', String(bestTime));
          elRaceMsg.textContent = '🏁 Neue Bestzeit!';
        }
      } else {
        elRaceMsg.textContent = race.state === 'racing'
          ? `Marke ${race.nextMark} von ${COURSE.length}`
          : elRaceMsg.textContent;
      }
    }

    // Distance + VMG toward the next mark
    if (race.state !== 'done') {
      elMarkNum.textContent = `${race.nextMark + 1}/${COURSE.length}`;
      elMarkDist.textContent = Math.round(dist);
      const bearing = Math.atan2(dx, -dz);            // world bearing to mark (0 = -z)
      const rel = normAngle(bearing - boat.heading);  // course error to the mark
      // VMG = share of boat speed actually closing on the mark (100% = straight at it)
      elVmg.textContent = Math.round(Math.cos(rel) * 100);
      // %Speed = actual velocity made good toward the mark (speed × VMG), in kn
      elVmgSpeed.textContent = (Math.abs(boat.speed) * 1.4 * Math.cos(rel)).toFixed(1);
    } else {
      elMarkDist.textContent = '—';
      elVmg.textContent = '—';
      elVmgSpeed.textContent = '—';
    }
  }

  // Highlight only the next mark: show its beam, pulse its colour.
  buoys.forEach((b, i) => {
    const active = i === race.nextMark && race.state !== 'done';
    b.beam.visible = active;
    b.zone.visible = active;   // rounding-radius circle only on the current target
    b.ring.visible = active;
    const emis = active ? (0.4 + 0.3 * Math.sin(t * 4)) : 0.1;
    b.ball.material.emissive.setRGB(emis * 0.5, emis, emis * 0.6);
  });

  elRaceTime.textContent = fmtTime(race.time);
  elRaceBest.textContent = bestTime !== null ? `Best ${fmtTime(bestTime)}` : 'Best —';
}

// --- Sail / pennant / wake visuals ---
const DEG = Math.PI / 180;
let sailAngle = 0; // smoothed boom angle
let heelAngle = 0; // smoothed heel (lean to leeward)
const MAX_HEEL = 32 * DEG;

// Apparent wind angle relative to the bow (radians, + = wind on starboard).
// Combines the true wind with the boat's own motion, like the real thing.
function apparentWindAngle() {
  const twa = twaDeg * DEG;
  const boatKn = Math.abs(boat.speed) * 1.4;     // same knots scale as the HUD
  const ax = wind.tws * Math.sin(twa);            // athwartships component
  const ay = wind.tws * Math.cos(twa) + boatKn;   // fore-aft component (boat adds headwind)
  return Math.atan2(ax, ay);
}

function updateVisuals(dt) {
  // Textbook trim: ease the boom until the sail is at its optimal angle of
  // attack to the APPARENT wind (just shy of luffing), then hold.
  const AOA = 15 * DEG;            // optimal angle of attack of the sail
  const awa = apparentWindAngle();
  let boomMag = Math.min(Math.max(Math.abs(awa) - AOA, 0), 85 * DEG);
  // Boom eases to leeward (away from the wind). Wind on starboard (twaDeg>0)
  // -> boom swings to port, which is a negative pivot rotation (clew to -x).
  const side = twaDeg >= 0 ? -1 : 1;
  let targetAngle = side * boomMag;

  const luffing = currentEff <= 0.02; // in irons / pinching
  if (luffing) {
    // Sail can't fill: sit near centreline and shiver
    targetAngle = Math.sin(t * 14) * 6 * DEG;
  }
  sailAngle += (targetAngle - sailAngle) * (1 - Math.pow(0.02, dt));
  sailPivot.rotation.y = sailAngle;
  // Jib swings around the forestay to the SAME (leeward) side as the main,
  // trimmed a touch tighter.
  jibPivot.quaternion.setFromAxisAngle(jibAxis, sailAngle * 0.85);

  // Heel: lean to leeward, driven by wind strength and point of sail. Greatest
  // on a beam reach, fading to nothing dead downwind or head-to-wind.
  const heelMag = MAX_HEEL * (wind.tws / wind.maxTws) * currentEff * Math.sin(Math.abs(twaDeg * DEG));
  const heelTarget = Math.sign(twaDeg) * heelMag; // wind on stbd -> heel to port (leeward)
  heelAngle += (heelTarget - heelAngle) * (1 - Math.pow(0.08, dt));

  // Belly the sail along its foot when powered up; flutter the leech when luffing.
  // The draft bows to LEEWARD, so its sign flips with the tack.
  const lee = twaDeg >= 0 ? -1 : 1; // local -x is to leeward when wind is on starboard
  const headY = 5.05, footY = 0.7;
  for (let i = 0; i < sailPos.count; i++) {
    const u = (i % 7) / 6;          // 0 at mast, 1 at clew (plane was 6 segments wide)
    const bx = sailBase[i * 3];
    const by = sailBase[i * 3 + 1];
    const bz = sailBase[i * 3 + 2];
    const vNorm = (by - footY) / (headY - footY); // 0 at foot, 1 at head
    const vTaper = 1 - 0.55 * vNorm;               // draft eases off toward the head
    let bulge;
    if (luffing) {
      bulge = Math.sin(t * 18 + by * 2 + bz) * 0.18 * u; // ripple, strongest at the leech
    } else {
      bulge = Math.sin(u * Math.PI) * 0.32 * currentEff * vTaper * lee; // fullest mid-foot, to leeward
    }
    sailPos.setX(i, bx + bulge);
  }
  sailPos.needsUpdate = true;
  sailGeo.computeVertexNormals();

  // Jib gets the same treatment: belly to leeward when powered, shiver when luffing.
  const jibHeadY = JIB_HEAD.y;
  for (let i = 0; i < jibPos.count; i++) {
    const u = (i % 6) / 5;          // 0 at luff (forestay), 1 at clew
    const bx = jibBase[i * 3];
    const by = jibBase[i * 3 + 1];
    const bz = jibBase[i * 3 + 2];
    const vTaper = 1 - 0.5 * (by / jibHeadY);          // ease draft toward the head
    let bulge;
    if (luffing) {
      bulge = Math.sin(t * 18 + by * 2 + bz) * 0.14 * u;
    } else {
      bulge = Math.sin(u * Math.PI) * 0.34 * currentEff * vTaper * lee;
    }
    jibPos.setX(i, bx + bulge);
  }
  jibPos.needsUpdate = true;
  jibGeo.computeVertexNormals();

  // Masthead pennant streams downwind: the tip points away from the wind source.
  // Target = -twaDeg so it lines up opposite the wind-from marker on the disc.
  const pennantTarget = -twaDeg * DEG;
  let pd = pennantTarget - pennantPivot.rotation.y;
  pd = Math.atan2(Math.sin(pd), Math.cos(pd)); // shortest way round (avoid 360° spins)
  pennantPivot.rotation.y += pd * (1 - Math.pow(0.05, dt));
  // Flutter: a travelling wave runs out to the free tip
  for (let i = 0; i < pennPos.count; i++) {
    const f = pennFrac[i];
    pennPos.setX(i, Math.sin(t * 9 - f * 7) * 0.065 * f);
  }
  pennPos.needsUpdate = true;

  // Rudder swings with the helm (mirrors the deflection at the stern).
  rudderPivot.rotation.y = boat.rudder;
}

// --- Mark bearing indicators on the compass ring ---
// One small triangle per mark, sitting at the world bearing and pointing outward.
const markTriGeo = new THREE.BufferGeometry();
markTriGeo.setAttribute('position', new THREE.Float32BufferAttribute([
  0, 0, 0.20,    // tip (points outward, +z before rotation)
  -0.13, 0, -0.11,
  0.13, 0, -0.11,
], 3));
markTriGeo.setIndex([0, 1, 2, 2, 1, 0]);
const markOutlineGeo = new THREE.BufferGeometry();
markOutlineGeo.setAttribute('position', new THREE.Float32BufferAttribute([
  0, 0, 0.20,  -0.13, 0, -0.11,  0.13, 0, -0.11,
], 3));
const markPointers = COURSE.map((m, i) => {
  const tri = new THREE.Mesh(markTriGeo, new THREE.MeshBasicMaterial({
    color: 0xff9933, transparent: true, depthWrite: false, side: THREE.DoubleSide,
  }));
  tri.renderOrder = 6;
  compassRing.add(tri);
  const outline = new THREE.LineLoop(markOutlineGeo, new THREE.LineBasicMaterial({
    color: 0x33ff88, transparent: true, opacity: 0.7, depthWrite: false,
  }));
  outline.renderOrder = 6;
  outline.visible = false;
  compassRing.add(outline);
  const label = makeTextSprite(String(i + 1));
  label.scale.set(0.42, 0.42, 0.42);
  label.renderOrder = 7;
  compassRing.add(label);
  return { tri, outline, label };
});

// Opponent indicators on the compass: a triangle each, like the mark pointers
OPPONENTS.forEach(o => {
  const dot = new THREE.Mesh(markTriGeo, new THREE.MeshBasicMaterial({
    color: o.dotColor, transparent: true, depthWrite: false, side: THREE.DoubleSide,
  }));
  dot.renderOrder = 6;
  compassRing.add(dot);
  o.dot = dot;
});

function updateMarkPointers() {
  const bx = boatGroup.position.x, bz = boatGroup.position.z;
  const R = RING_R + 0.45; // on the compass band
  markPointers.forEach((p, i) => {
    const tri = p.tri, outline = p.outline, label = p.label;
    const next = i === race.nextMark;
    const passed = i < race.nextMark;
    if (race.state === 'done') { tri.visible = false; outline.visible = false; label.visible = false; return; }
    const dx = COURSE[i].x - bx, dz = COURSE[i].z - bz;
    const len = Math.hypot(dx, dz) || 1;
    const ux = dx / len, uz = dz / len;
    const ang = Math.atan2(ux, uz);            // tip points outward
    // Already-rounded marks show as a hollow outline triangle; others stay filled green.
    tri.visible = !passed;
    outline.visible = passed;
    label.visible = next; // only the current target shows its number
    tri.position.set(ux * R, 0.05, uz * R);   // compass is world-aligned (rot 0)
    tri.rotation.y = ang;
    outline.position.set(ux * R, 0.05, uz * R);
    outline.rotation.y = ang;
    label.position.set(ux * (R + 0.35), 0.3, uz * (R + 0.35)); // number just outside the triangle
    tri.material.color.setHex(0x33ff88); // all buoy arrows green
    tri.scale.setScalar(next ? 2.0 : 1.0);
    tri.renderOrder = next ? 8 : 6; // current target always draws over the other arrows
    tri.material.opacity = 0.95;
    label.material.opacity = 0.95;
  });

  // opponent boat bearings
  OPPONENTS.forEach(o => {
    const odx = o.group.position.x - bx, odz = o.group.position.z - bz;
    const ol = Math.hypot(odx, odz) || 1;
    const oux = odx / ol, ouz = odz / ol;
    o.dot.position.set(oux * R, 0.06, ouz * R);
    o.dot.rotation.y = Math.atan2(oux, ouz); // tip points outward, like the marks
  });
}

function spawnFoam(t, x, z, perpX, perpZ) {
  const i = wakeNext % WAKE_N; wakeNext++;
  const lat = (Math.random() * 2 - 1) * 0.08;      // tiny jitter: stay almost on the centreline
  const px = x + perpX * lat, pz = z + perpZ * lat;
  wakePos[i * 3] = px; wakePos[i * 3 + 1] = waveHeight(px, pz, t) + 0.05; wakePos[i * 3 + 2] = pz;
  const drift = (Math.random() * 2 - 1) * 0.04;    // barely any outward spread
  wakeVX[i] = perpX * drift; wakeVZ[i] = perpZ * drift;
  wakeBorn[i] = t;
  wakeBase[i] = 1.0 + Math.random() * 0.7;
}

function updateWake(t, dt) {
  const h = boat.heading;
  const sternX = boatGroup.position.x - Math.sin(h) * 1.9;
  const sternZ = boatGroup.position.z + Math.cos(h) * 1.9;
  const perpX = Math.cos(h), perpZ = Math.sin(h);   // athwartships (starboard)
  const speed = Math.abs(boat.speed);

  // spawn along the path so density is speed-independent
  if (!wakeSeeded) { wakeLastX = sternX; wakeLastZ = sternZ; wakeSeeded = true; }
  if (speed > 0.4) {
    let d = Math.hypot(sternX - wakeLastX, sternZ - wakeLastZ);
    while (d > 0.18) {
      const f = 0.18 / d;
      wakeLastX += (sternX - wakeLastX) * f;
      wakeLastZ += (sternZ - wakeLastZ) * f;
      spawnFoam(t, wakeLastX, wakeLastZ, perpX, perpZ);
      d = Math.hypot(sternX - wakeLastX, sternZ - wakeLastZ);
    }
  } else { wakeLastX = sternX; wakeLastZ = sternZ; }

  // age + drift every particle
  for (let i = 0; i < WAKE_N; i++) {
    const age = t - wakeBorn[i];
    if (age < 0 || age > WAKE_LIFE) { wakeAlphaA[i] = 0; continue; }
    wakePos[i * 3] += wakeVX[i] * dt;
    wakePos[i * 3 + 2] += wakeVZ[i] * dt;
    wakePos[i * 3 + 1] = waveHeight(wakePos[i * 3], wakePos[i * 3 + 2], t) + 0.05;
    const f = age / WAKE_LIFE;
    wakeAlphaA[i] = (1 - f) * 0.7;
    wakeSizeA[i] = wakeBase[i] * (0.5 + f * 1.8);   // grows as it dissipates
  }
  wakeGeo.attributes.position.needsUpdate = true;
  wakeGeo.attributes.size.needsUpdate = true;
  wakeGeo.attributes.alpha.needsUpdate = true;
}

// --- Camera (chase + mouse orbit) ---
const CAM_BACK = 16;
const CAM_HEIGHT = 7;
const CAM_DIST = Math.hypot(CAM_BACK, CAM_HEIGHT);
const CAM_BASE_ELEV = Math.atan2(CAM_HEIGHT, CAM_BACK);
let camYaw = 0, camPitch = 0; // orbit offset from the astern view (drag to change)
let camZoom = 1;              // distance multiplier (mouse wheel)

(function initOrbit() {
  let dragging = false, lastX = 0, lastY = 0;
  const el = renderer.domElement;
  el.style.cursor = 'grab';
  el.addEventListener('pointerdown', (e) => {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    el.style.cursor = 'grabbing'; el.setPointerCapture?.(e.pointerId);
  });
  const end = () => { dragging = false; el.style.cursor = 'grab'; };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    camYaw   -= (e.clientX - lastX) * 0.006;
    camPitch += (e.clientY - lastY) * 0.005;
    camPitch = Math.max(-0.3, Math.min(1.0, camPitch)); // keep elevation sensible
    lastX = e.clientX; lastY = e.clientY;
  });
  el.addEventListener('wheel', (e) => {
    e.preventDefault();
    camZoom *= Math.exp(e.deltaY * 0.0012);             // scroll up = closer, down = farther
    camZoom = Math.max(0.15, Math.min(6, camZoom));     // very near .. far away
  }, { passive: false });
})();

// --- On-screen steering buttons (touch / click) drive the same keys ---
(function initTouchSteer() {
  const bind = (id, code) => {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); keys[code] = true; };
    const up = (e) => { e.preventDefault(); keys[code] = false; };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointerleave', up);
    el.addEventListener('pointercancel', up);
  };
  bind('btnLeft', 'ArrowLeft');
  bind('btnRight', 'ArrowRight');
})();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// --- Game state & start menu ---
// 'menu'      : empty animated sea behind the overlay, sim hidden
// 'countdown' : race scene placed but frozen, 3-2-1 shown
// 'racing'    : full simulation running
let gameState = 'menu';
let countdownTimer = 0;
let menuYaw = 0;

// Show / hide all the race-world objects (the menu shows only the empty sea).
function setWorldVisible(v) {
  boatGroup.visible = v;
  boatShadow.visible = v;
  windRing.visible = v;
  windNeedle.visible = v;
  compassRing.visible = v;
  wakePoints.visible = v;
  playerTrack.line.visible = v;
  buoys.forEach(b => { b.grp.visible = v; });
  OPPONENTS.forEach(o => { o.group.visible = v; o.track.line.visible = v; });
}

// Segmented button group: returns a getter for the currently selected value.
function wireSeg(id) {
  const seg = document.getElementById(id);
  seg.addEventListener('click', (e) => {
    const b = e.target.closest('button');
    if (!b || b.disabled) return;
    seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  });
  return () => parseFloat(seg.querySelector('.active').dataset.value);
}
const getWind = wireSeg('segWind');
const getWave = wireSeg('segWave');
wireSeg('segMode'); // Race is fixed; Replay is disabled for now

function startGame() {
  const windVal = getWind();
  waveBase = getWave();
  wind.baseTws = windVal;
  wind.maxTws = windVal * 1.25;   // full power at the top of the gusts
  wind.from = wind.baseFrom;
  restartRace();
  setWorldVisible(true);
  document.body.classList.remove('menu');
  document.getElementById('menu').classList.add('hidden');
  // Freeze the scene and run a 3-2-1 countdown before the boats move.
  gameState = 'countdown';
  countdownTimer = 3;
  const cd = document.getElementById('countdown');
  cd.style.display = 'flex';
  cd.textContent = '3';
}
document.getElementById('startBtn').addEventListener('click', startGame);

// --- Animate ---
const clock = new THREE.Clock();
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Menu: just the empty sea, slowly drifting, behind the overlay.
  if (gameState === 'menu') {
    t += dt;
    menuYaw += dt * 0.04;
    ocean.position.set(0, 0, 0);
    stars.position.set(0, 0, 0);
    updateEnvironment(t);
    animateWaves(t);
    camera.position.set(Math.sin(menuYaw) * 3, 5.5, Math.cos(menuYaw) * 3);
    camera.lookAt(Math.sin(menuYaw + 0.5) * 60, 3, Math.cos(menuYaw + 0.5) * 60);
    renderer.render(scene, camera);
    return;
  }

  // Countdown: tick the 3-2-1 timer; the scene stays frozen until it ends.
  if (gameState === 'countdown') {
    countdownTimer -= dt;
    const n = Math.ceil(countdownTimer);
    document.getElementById('countdown').textContent = n > 0 ? String(n) : 'Los!';
    if (countdownTimer <= 0) {
      gameState = 'racing';
      document.getElementById('countdown').style.display = 'none';
    }
  }

  const moving = gameState === 'racing';
  if (moving) t += dt; // frozen sea & boats during the countdown

  updateEnvironment(t);
  if (moving) updateBoat(dt);

  // Ocean & stars follow the boat so the sea is effectively infinite
  ocean.position.x = boatGroup.position.x;
  ocean.position.z = boatGroup.position.z;
  stars.position.x = boatGroup.position.x;
  stars.position.z = boatGroup.position.z;

  animateWaves(t);
  updateVisuals(dt);   // sails trim/fill even during the countdown
  updateRace(dt);      // clock only advances once the boat is moving
  updateHUD();
  updateMarkPointers();
  updateWake(t, dt);
  if (moving) OPPONENTS.forEach(o => updateOpponent(o, dt));
  if (moving) {
    recordTrack(playerTrack, boatGroup.position.x, boatGroup.position.z);
    OPPONENTS.forEach(o => recordTrack(o.track, o.group.position.x, o.group.position.z));
  }
  updateTrackHeights(playerTrack);
  OPPONENTS.forEach(o => updateTrackHeights(o.track));

  // Sit the boat on the actual wave surface: sample the wave at the hull
  // centre (float height) and fore/aft + port/stbd (pitch & roll).
  {
    const bx = boatGroup.position.x, bz = boatGroup.position.z;
    const h = boat.heading;
    const fwdX = Math.sin(h), fwdZ = -Math.cos(h); // bow direction
    const rgtX = Math.cos(h), rgtZ = Math.sin(h);  // starboard direction
    const L = 1.9, B = 0.46;                        // half length / half beam

    const hC = waveHeight(bx, bz, t);
    const hF = waveHeight(bx + fwdX * L, bz + fwdZ * L, t);
    const hA = waveHeight(bx - fwdX * L, bz - fwdZ * L, t);
    const hR = waveHeight(bx + rgtX * B, bz + rgtZ * B, t);
    const hL = waveHeight(bx - rgtX * B, bz - rgtZ * B, t);

    boatGroup.position.y = hC - 0.06;               // waterline partway up the hull
    boatGroup.rotation.x = Math.atan2(hF - hA, 2 * L); // bow up when the sea ahead is higher
    boatGroup.rotation.z = Math.atan2(hR - hL, 2 * B) + heelAngle; // wave roll + wind heel

    // Polar ring is fixed to the boat (red at the bow); the needle shows the wind.
    windRing.position.set(bx, hC + 0.05, bz); // sit on the water surface
    windRing.rotation.y = boatGroup.rotation.y;     // ring turns with the boat
    windNeedle.position.set(bx, hC + 0.07, bz);
    windNeedle.rotation.y = -wind.from;             // needle points to the wind source
    // Compass follows the boat's position but stays aligned to North (rotation 0)
    compassRing.position.set(bx, hC + 0.05, bz);

    // Soft shadow on the water: flat, aligned with the hull, nudged away from the sun
    boatShadow.position.set(bx - 0.5, hC + 0.04, bz - 0.3);
    boatShadow.rotation.y = boatGroup.rotation.y;
  }

  // Buoys bob up and down on the waves at their own positions
  buoys.forEach((b, i) => {
    const m = COURSE[i];
    b.grp.position.y = waveHeight(m.x, m.z, t);
    // Drape the rounding-radius circle onto the wave surface (only the visible one)
    if (b.zone.visible) {
      [b.zone, b.ring].forEach((mesh) => {
        const p = mesh.geometry.attributes.position;
        for (let k = 0; k < p.count; k++) {
          const wy = waveHeight(m.x + p.getX(k), m.z + p.getZ(k), t);
          p.setY(k, wy - b.grp.position.y); // mesh.position.y keeps it just above water
        }
        p.needsUpdate = true;
      });
    }
  });

  // Chase camera: astern by default, orbited around the boat by mouse drag.
  {
    const h = boat.heading;
    const elev = CAM_BASE_ELEV + camPitch;
    const horiz = CAM_DIST * camZoom * Math.cos(elev);
    const vert = CAM_DIST * camZoom * Math.sin(elev);
    // astern horizontal unit vector, rotated by the orbit yaw
    const ax = -Math.sin(h), az = Math.cos(h);
    const cy = Math.cos(camYaw), sy = Math.sin(camYaw);
    const dirX = ax * cy + az * sy;
    const dirZ = -ax * sy + az * cy;
    camera.position.set(
      boatGroup.position.x + dirX * horiz,
      boatGroup.position.y + vert,
      boatGroup.position.z + dirZ * horiz
    );
    camera.lookAt(boatGroup.position.x, boatGroup.position.y + 1.5, boatGroup.position.z);
  }

  renderer.render(scene, camera);
}

// Start on the menu: empty sea behind the overlay.
document.body.classList.add('menu');
setWorldVisible(false);
animate();
</script>
</body>
</html>
