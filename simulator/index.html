<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="info">SAILING SIMULATOR — coming soon</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1628);
scene.fog = new THREE.FogExp2(0x0a1628, 0.008);

// --- Camera ---
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- Lights ---
const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
sun.position.set(50, 60, 30);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x112244, 1.2));

// --- Ocean ---
const OCEAN_SIZE = 300;
const OCEAN_SEGS = 80;
const oceanGeo = new THREE.PlaneGeometry(OCEAN_SIZE, OCEAN_SIZE, OCEAN_SEGS, OCEAN_SEGS);
oceanGeo.rotateX(-Math.PI / 2);

const oceanMat = new THREE.MeshPhongMaterial({
  color: 0x0d3b6e,
  specular: 0x4488cc,
  shininess: 80,
  wireframe: false,
  side: THREE.FrontSide,
});

const ocean = new THREE.Mesh(oceanGeo, oceanMat);
scene.add(ocean);

// Vertex positions for wave animation
const posAttr = oceanGeo.attributes.position;
const baseY = new Float32Array(posAttr.count);
for (let i = 0; i < posAttr.count; i++) {
  baseY[i] = posAttr.getY(i);
}

function animateWaves(t) {
  for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const z = posAttr.getZ(i);
    const y = baseY[i]
      + Math.sin(x * 0.08 + t * 0.9) * 0.5
      + Math.sin(z * 0.12 + t * 0.7) * 0.35
      + Math.sin((x + z) * 0.05 + t * 1.1) * 0.25;
    posAttr.setY(i, y);
  }
  posAttr.needsUpdate = true;
  oceanGeo.computeVertexNormals();
}

// --- Boat (placeholder) ---
const boatGroup = new THREE.Group();

// Hull
const hullGeo = new THREE.BoxGeometry(1.2, 0.5, 3.5);
const hullMat = new THREE.MeshPhongMaterial({ color: 0xd4b483 });
const hull = new THREE.Mesh(hullGeo, hullMat);
hull.position.y = 0.1;
boatGroup.add(hull);

// Mast
const mastGeo = new THREE.CylinderGeometry(0.04, 0.04, 5, 8);
const mastMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
const mast = new THREE.Mesh(mastGeo, mastMat);
mast.position.set(0, 2.85, 0);
boatGroup.add(mast);

// Sail
const sailGeo = new THREE.BufferGeometry();
const sailVerts = new Float32Array([
  0, 0.2, 0,
  0, 4.8, 0,
  1.8, 0.4, -0.3,
]);
sailGeo.setAttribute('position', new THREE.BufferAttribute(sailVerts, 3));
sailGeo.setIndex([0, 1, 2, 2, 1, 0]);
sailGeo.computeVertexNormals();
const sailMat = new THREE.MeshPhongMaterial({
  color: 0xf5f0e8,
  side: THREE.DoubleSide,
  specular: 0x333333,
  shininess: 20,
});
const sail = new THREE.Mesh(sailGeo, sailMat);
sail.position.set(0, 0.6, 0);
boatGroup.add(sail);

boatGroup.position.set(0, 0.3, 0);
scene.add(boatGroup);

// --- Horizon stars ---
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 800; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI * 0.45;
  const r = 200;
  starVerts.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi) + 10,
    r * Math.sin(phi) * Math.sin(theta)
  );
}
starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starVerts), 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: true });
scene.add(new THREE.Points(starGeo, starMat));

// --- Camera orbit ---
let camAngle = 0;
const CAM_RADIUS = 22;
const CAM_HEIGHT = 8;

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// --- Animate ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  animateWaves(t);

  // Gently bob the boat
  boatGroup.position.y = 0.3
    + Math.sin(t * 0.9) * 0.18
    + Math.sin(t * 0.6) * 0.1;
  boatGroup.rotation.z = Math.sin(t * 0.7) * 0.04;
  boatGroup.rotation.x = Math.sin(t * 0.5) * 0.025;

  // Slow camera orbit
  camAngle += 0.0015;
  camera.position.x = Math.sin(camAngle) * CAM_RADIUS;
  camera.position.z = Math.cos(camAngle) * CAM_RADIUS;
  camera.position.y = CAM_HEIGHT + Math.sin(t * 0.3) * 0.5;
  camera.lookAt(0, 1, 0);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
