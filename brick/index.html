<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Builder – Markus Stuhr</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
  }

  /* Toolbar */
  #toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 7px 12px;
    z-index: 100;
  }

  .separator { width: 1px; height: 24px; background: rgba(255,255,255,0.12); }

  /* Mode buttons */
  .tool-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    padding: 5px 13px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    user-select: none;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.15); }
  .tool-btn.active {
    background: rgba(255,200,0,0.22);
    border-color: rgba(255,200,0,0.55);
    color: #ffd700;
  }

  /* Custom dropdown */
  .dd-wrap {
    position: relative;
    user-select: none;
  }
  .dd-trigger {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 13px;
    color: #fff;
    white-space: nowrap;
    transition: background 0.15s;
    min-width: 90px;
  }
  .dd-trigger:hover { background: rgba(255,255,255,0.14); }
  .dd-trigger .dd-label { font-size: 10px; color: rgba(255,255,255,0.45); margin-right: 2px; }
  .dd-trigger .dd-value { flex: 1; }
  .dd-trigger .dd-arrow { font-size: 9px; color: rgba(255,255,255,0.4); }

  .dd-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: rgba(15,15,25,0.97);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 6px;
    z-index: 300;
    min-width: 130px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .dd-menu.open { display: block; }

  /* Size grid dropdown */
  .dd-menu.grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 4px; min-width: 180px; }
  .dd-menu.grid.open { display: grid; }

  .dd-item {
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #ccc;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .dd-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .dd-item.selected { background: rgba(255,200,0,0.18); color: #ffd700; }

  /* Color dropdown items */
  .dd-color-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #ccc;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .dd-color-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .dd-color-item.selected { background: rgba(255,200,0,0.15); color: #ffd700; }
  .dd-color-swatch {
    width: 16px; height: 16px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Color dropdown — scrollable */
  #dd-color-menu { max-height: 320px; overflow-y: auto; min-width: 180px; }
  #dd-color-menu::-webkit-scrollbar { width: 4px; }
  #dd-color-menu::-webkit-scrollbar-track { background: transparent; }
  #dd-color-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* Color trigger swatch */
  #dd-color-trigger .color-preview {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* Info overlay */
  #info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Brick count */
  #brick-count {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    z-index: 100;
  }
  #brick-count span { color: #ffd700; font-weight: bold; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="toolbar">
  <!-- Day/Night toggle -->
  <button id="btn-daynight" onclick="toggleDayNight()" title="Tag/Nacht" style="background:none;border:none;cursor:pointer;font-size:20px;padding:2px 4px;line-height:1;user-select:none;">☀️</button>

  <div class="separator"></div>

  <!-- Mode -->
  <button class="tool-btn active" id="btn-place" onclick="setMode('place')">Platzieren</button>
  <button class="tool-btn" id="btn-remove" onclick="setMode('remove')">Entfernen</button>

  <div class="separator"></div>

  <!-- Brick Type dropdown -->
  <div class="dd-wrap" id="dd-type">
    <div class="dd-trigger" id="dd-type-trigger" onclick="toggleDD('dd-type')">
      <span class="dd-label">TYP</span>
      <span class="dd-value" id="dd-type-value">Brick</span>
      <span class="dd-arrow">▾</span>
    </div>
    <div class="dd-menu" id="dd-type-menu">
      <div class="dd-item selected" data-type="brick" onclick="setType('brick')">Brick</div>
      <div class="dd-item" data-type="plate" onclick="setType('plate')">Plate</div>
    </div>
  </div>

  <!-- Brick Size dropdown -->
  <div class="dd-wrap" id="dd-size">
    <div class="dd-trigger" id="dd-size-trigger" onclick="toggleDD('dd-size')">
      <span class="dd-label">GRÖSSE</span>
      <span class="dd-value" id="dd-size-value">1×1</span>
      <span class="dd-arrow">▾</span>
    </div>
    <div class="dd-menu grid" id="dd-size-menu">
      <div class="dd-item selected" data-w="1" data-d="1" onclick="setSize(1,1)">1×1</div>
      <div class="dd-item" data-w="1" data-d="2" onclick="setSize(1,2)">1×2</div>
      <div class="dd-item" data-w="1" data-d="3" onclick="setSize(1,3)">1×3</div>
      <div class="dd-item" data-w="1" data-d="4" onclick="setSize(1,4)">1×4</div>
      <div class="dd-item" data-w="1" data-d="6" onclick="setSize(1,6)">1×6</div>
      <div class="dd-item" data-w="1" data-d="8" onclick="setSize(1,8)">1×8</div>
      <div class="dd-item" data-w="2" data-d="2" onclick="setSize(2,2)">2×2</div>
      <div class="dd-item" data-w="2" data-d="3" onclick="setSize(2,3)">2×3</div>
      <div class="dd-item" data-w="2" data-d="4" onclick="setSize(2,4)">2×4</div>
      <div class="dd-item" data-w="2" data-d="6" onclick="setSize(2,6)">2×6</div>
      <div class="dd-item" data-w="2" data-d="8" onclick="setSize(2,8)">2×8</div>
      <div class="dd-item" data-w="4" data-d="4" onclick="setSize(4,4)">4×4</div>
    </div>
  </div>

  <!-- Color dropdown -->
  <div class="dd-wrap" id="dd-color">
    <div class="dd-trigger" id="dd-color-trigger" onclick="toggleDD('dd-color')">
      <span class="dd-label">FARBE</span>
      <div class="color-preview" id="dd-color-preview"></div>
      <span class="dd-value" id="dd-color-value">Red</span>
      <span class="dd-arrow">▾</span>
    </div>
    <div class="dd-menu" id="dd-color-menu"></div>
  </div>

</div>

<div id="info">Linksklick: Brick setzen &nbsp;|&nbsp; Rechtsklick: Brick entfernen &nbsp;|&nbsp; WASD: Kamera bewegen &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; Ctrl+Z/Y: Undo/Redo</div>
<div id="brick-count">Steine: <span id="count">0</span></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ─── Constants ───────────────────────────────────────────────────────────────
const STUD        = 1.0;   // 1 stud = 1 unit
const BRICK_H     = 1.2;   // standard brick height
const PLATE_H_VAL = 0.4;   // plate height (1/3 of brick)
const STUD_R      = 0.3;   // stud radius
const STUD_H      = 0.18;  // stud height
const GRID        = 32;    // baseplate size in studs

// ─── Colors (Rebrickable palette) ────────────────────────────────────────────
const COLORS = [
  // Reds
  { name: 'Red',              hex: '#B40000' },
  { name: 'Dark Red',         hex: '#720E0F' },
  { name: 'Coral',            hex: '#FF698F' },
  { name: 'Salmon',           hex: '#FF9494' },
  // Oranges & Yellows
  { name: 'Orange',           hex: '#FE8A18' },
  { name: 'Dark Orange',      hex: '#A95500' },
  { name: 'Yellow',           hex: '#F2CD37' },
  { name: 'Bright Light Yellow', hex: '#FFE001' },
  { name: 'Tan',              hex: '#DFC176' },
  { name: 'Dark Tan',         hex: '#958A73' },
  // Greens
  { name: 'Green',            hex: '#257A3E' },
  { name: 'Dark Green',       hex: '#184632' },
  { name: 'Bright Green',     hex: '#4B9F4A' },
  { name: 'Lime',             hex: '#BBE90B' },
  { name: 'Olive Green',      hex: '#9B9A5A' },
  { name: 'Sand Green',       hex: '#A0BCAC' },
  // Blues
  { name: 'Blue',             hex: '#0055BF' },
  { name: 'Dark Blue',        hex: '#003380' },
  { name: 'Medium Blue',      hex: '#5A93DB' },
  { name: 'Bright Light Blue',hex: '#9FC3E9' },
  { name: 'Sky Blue',         hex: '#7DBFDD' },
  { name: 'Dark Azure',       hex: '#078BC9' },
  { name: 'Cyan',             hex: '#00B0F0' },
  // Purples & Pinks
  { name: 'Purple',           hex: '#8320B7' },
  { name: 'Dark Purple',      hex: '#2E1A47' },
  { name: 'Medium Lavender',  hex: '#AC78BA' },
  { name: 'Lavender',         hex: '#E1D5ED' },
  { name: 'Magenta',          hex: '#C870A0' },
  { name: 'Pink',             hex: '#FC97AC' },
  // Browns
  { name: 'Brown',            hex: '#583927' },
  { name: 'Dark Brown',       hex: '#352100' },
  { name: 'Reddish Brown',    hex: '#82422A' },
  // Grays & Whites
  { name: 'White',            hex: '#FFFFFF' },
  { name: 'Light Bluish Gray',hex: '#AFB5C7' },
  { name: 'Dark Bluish Gray', hex: '#595D6B' },
  { name: 'Light Gray',       hex: '#9C9C9C' },
  { name: 'Dark Gray',        hex: '#6B5A5A' },
  { name: 'Black',            hex: '#1B2A34' },
  // Light
  { name: 'Licht (Weiß)',     hex: '#LIGHT_W', emissive: '#ffffff', emissiveColor: '#ffffff' },
  { name: 'Licht (Warm)',     hex: '#LIGHT_O', emissive: '#ffaa33', emissiveColor: '#ffaa33' },
  { name: 'Licht (Kalt)',     hex: '#LIGHT_B', emissive: '#aaccff', emissiveColor: '#aaccff' },
  // Special
  { name: 'Gold',             hex: '#DBAC34' },
  { name: 'Silver',           hex: '#A5A9B4' },
  { name: 'Trans-Clear',      hex: '#FCFCFC' },
  { name: 'Trans-Red',        hex: '#C91A09' },
  { name: 'Trans-Blue',       hex: '#0020A0' },
  { name: 'Trans-Yellow',     hex: '#F8F177' },
  { name: 'Trans-Green',      hex: '#84B68D' },
  { name: 'Trans-Orange',     hex: '#F08F1C' },
];

// ─── State ───────────────────────────────────────────────────────────────────
let mode         = 'place';
let currentColor = COLORS[0].hex;
let currentW     = 1;
let currentD     = 1;
let currentType  = 'brick'; // 'brick' | 'plate'
let bricks       = [];
let undoStack    = [];
let redoStack    = [];
let ghostMesh    = null;
let ghostValid   = false;


// ─── Scene Setup ─────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.018);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(20, 22, 28);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping     = true;
controls.dampingFactor     = 0.08;
controls.maxPolarAngle     = Math.PI / 2.05;
controls.minDistance       = 5;
controls.maxDistance       = 120;
controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
controls.mouseButtons.MIDDLE = THREE.MOUSE.DOLLY;

// ─── Lighting ────────────────────────────────────────────────────────────────
renderer.shadowMap.type = THREE.VSMShadowMap; // smoother penumbra

const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);

// Sun — warm directional, shadows
const sun = new THREE.DirectionalLight(0xfff4d6, 2.2);
sun.position.set(28, 45, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 180;
sun.shadow.camera.left = sun.shadow.camera.bottom = -40;
sun.shadow.camera.right = sun.shadow.camera.top   =  40;
sun.shadow.bias         = -0.0005;
sun.shadow.normalBias   = 0.02;
sun.shadow.radius       = 2;
scene.add(sun);

// ─── Environment Map (for transmission / reflections) ────────────────────────
{
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  // Simple procedural room environment
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xdde8f0);
  const envAmbient = new THREE.AmbientLight(0xffffff, 1);
  envScene.add(envAmbient);
  const envTex = pmrem.fromScene(new RoomEnvironment()).texture;
  scene.environment = envTex;
  pmrem.dispose();
}

// ─── Baseplate ───────────────────────────────────────────────────────────────
function buildBaseplate() {
  const group = new THREE.Group();

  // Slab
  const geo = new THREE.BoxGeometry(GRID * STUD, PLATE_H_VAL * 2, GRID * STUD);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x257a3e,
    roughness: 0.85,
    metalness: 0.0,
  });
  const slab = new THREE.Mesh(geo, mat);
  slab.receiveShadow = true;
  slab.position.y = -PLATE_H_VAL;
  group.add(slab);

  // Studs on baseplate
  const studGeo = new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 12);
  const studMat = new THREE.MeshStandardMaterial({ color: 0x1e6633, roughness: 0.7 });
  for (let x = 0; x < GRID; x++) {
    for (let z = 0; z < GRID; z++) {
      const s = new THREE.Mesh(studGeo, studMat);
      s.position.set(
        (x - GRID / 2 + 0.5) * STUD,
        STUD_H / 2,
        (z - GRID / 2 + 0.5) * STUD
      );
      s.receiveShadow = true;
      group.add(s);
    }
  }

  // Grid lines (subtle)
  const lineMat = new THREE.LineBasicMaterial({ color: 0x1e6633, transparent: true, opacity: 0.3 });
  for (let i = 0; i <= GRID; i++) {
    const pos = (i - GRID / 2) * STUD;
    const hLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-GRID / 2 * STUD, 0.02, pos),
      new THREE.Vector3( GRID / 2 * STUD, 0.02, pos),
    ]);
    const vLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(pos, 0.02, -GRID / 2 * STUD),
      new THREE.Vector3(pos, 0.02,  GRID / 2 * STUD),
    ]);
    group.add(new THREE.Line(hLine, lineMat));
    group.add(new THREE.Line(vLine, lineMat));
  }

  scene.add(group);
}
buildBaseplate();

// ─── Brick Geometry ──────────────────────────────────────────────────────────
function typeHeight(type) {
  return type === 'plate' ? PLATE_H_VAL : BRICK_H;
}

function getStudGeo() {
  return new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 12);
}

const LIGHT_COLORS = {
  '#LIGHT_W': { color: '#ffffff', emissive: '#ffffff', pointColor: 0xffffff },
  '#LIGHT_O': { color: '#ffcc77', emissive: '#ffaa33', pointColor: 0xffaa33 },
  '#LIGHT_B': { color: '#cce0ff', emissive: '#aaccff', pointColor: 0xaaccff },
};
const TRANS_HEXES = new Set(['#FCFCFC','#C91A09','#0020A0','#F8F177','#84B68D','#F08F1C']);

function isLightColor(hex) { return hex in LIGHT_COLORS; }
function isTransColor(hex) { return TRANS_HEXES.has(hex.toUpperCase()) || TRANS_HEXES.has(hex); }

function makeMat(color, isGhost) {
  if (isGhost) {
    const c = isLightColor(color) ? LIGHT_COLORS[color].color : color;
    return new THREE.MeshStandardMaterial({
      color: new THREE.Color(c), roughness: 0.45, metalness: 0.05,
      transparent: true, opacity: 0.4,
    });
  }
  if (isLightColor(color)) {
    const lc = LIGHT_COLORS[color];
    return new THREE.MeshStandardMaterial({
      color: new THREE.Color(lc.color),
      emissive: new THREE.Color(lc.emissive),
      emissiveIntensity: 6.0,
      roughness: 0.2,
      metalness: 0.0,
    });
  }
  if (isTransColor(color)) {
    return new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(color),
      roughness: 0.05, metalness: 0.0,
      transmission: 0.88, thickness: 0.8, ior: 1.46,
      transparent: true, opacity: 0.92,
    });
  }
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    roughness: 0.42, metalness: 0.0,
  });
}

function createBrickMesh(w, d, color, isGhost = false, type = 'brick') {
  const group = new THREE.Group();
  group.userData.brickType = type;

  const fullH = typeHeight(type);
  const bw = w * STUD - 0.01;
  const bd = d * STUD - 0.01;
  const bh = fullH - 0.01;
  const trans = !isGhost && isTransColor(color);

  const mat     = makeMat(color, isGhost);
  const studMat = makeMat(color, isGhost);

  const isLight = !isGhost && isLightColor(color);
  const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mat);
  body.castShadow    = !isGhost && !isLight;
  body.receiveShadow = !isGhost;
  if (trans) body.renderOrder = 1; // render after opaque
  body.position.y = bh / 2;
  group.add(body);

  const sGeo = getStudGeo();
  for (let sx = 0; sx < w; sx++) {
    for (let sz = 0; sz < d; sz++) {
      const stud = new THREE.Mesh(sGeo, studMat);
      stud.position.set(
        (sx - (w - 1) / 2) * STUD,
        fullH - 0.01 + STUD_H / 2,
        (sz - (d - 1) / 2) * STUD
      );
      stud.castShadow = !isGhost && !isLight;
      if (trans) stud.renderOrder = 1;
      group.add(stud);
    }
  }

  // Licht-Steine bekommen einen PointLight
  if (!isGhost && isLightColor(color)) {
    const lc = LIGHT_COLORS[color];
    const pt = new THREE.PointLight(lc.pointColor, 12, 28, 1.5);
    pt.position.set(0, fullH + 0.5, 0);
    pt.castShadow = true;
    pt.shadow.mapSize.set(512, 512);
    pt.shadow.bias = -0.002;
    group.add(pt);
  }

  return group;
}

// ─── Ghost Cursor ────────────────────────────────────────────────────────────
function updateGhost(w, d, color, type) {
  if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; }
  ghostMesh = createBrickMesh(w, d, color, true, type);
  ghostMesh.visible = false;
  scene.add(ghostMesh);
}
updateGhost(currentW, currentD, currentColor, currentType);

// ─── Raycasting helpers ───────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

// Invisible floor plane for raycasting
const floorPlanes = [];
function getFloorPlane(y) {
  if (!floorPlanes[y]) {
    const geo = new THREE.PlaneGeometry(1000, 1000);
    geo.rotateX(-Math.PI / 2);
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide }));
    mesh.position.y = y;
    mesh.userData.isFloor = true;
    scene.add(mesh);
    floorPlanes[y] = mesh;
  }
  return floorPlanes[y];
}
getFloorPlane(0); // always have layer 0

function snapToGrid(pos, w, d) {
  // Offset so brick center aligns to stud grid
  const halfW = (w % 2 === 0) ? 0 : 0.5;
  const halfD = (d % 2 === 0) ? 0 : 0.5;
  return {
    x: Math.round(pos.x - halfW) + halfW,
    z: Math.round(pos.z - halfD) + halfD,
  };
}

function getTopLayerAt(gx, gz, w, d) {
  let maxY = 0;
  for (const b of bricks) {
    if (rectsOverlap(gx, gz, w, d, b.gx, b.gz, b.w, b.d)) {
      const top = b.mesh.position.y + typeHeight(b.type);
      if (top > maxY) maxY = top;
    }
  }
  return maxY;
}

function rectsOverlap(ax, az, aw, ad, bx, bz, bw, bd) {
  return !(ax + aw / 2 <= bx - bw / 2 ||
           ax - aw / 2 >= bx + bw / 2 ||
           az + ad / 2 <= bz - bd / 2 ||
           az - ad / 2 >= bz + bd / 2);
}

function isOnBaseplate(gx, gz, w, d) {
  const half = GRID / 2;
  return (gx - w / 2 >= -half && gx + w / 2 <= half &&
          gz - d / 2 >= -half && gz + d / 2 <= half);
}

// ─── Mouse tracking for ghost ────────────────────────────────────────────────
let lastGhostX = null, lastGhostZ = null;

function updateMousePos(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
}

function updateGhostFromMouse() {
  if (mode !== 'place') {
    if (ghostMesh) ghostMesh.visible = false;
    return;
  }
  raycaster.setFromCamera(mouse, camera);

  // Raycast against placed bricks + floor
  const brickMeshes = bricks.map(b => b.mesh).flatMap(g => {
    const arr = [];
    g.traverse(c => { if (c.isMesh) arr.push(c); });
    return arr;
  });
  const floorMesh = getFloorPlane(0);

  const hits = raycaster.intersectObjects([floorMesh, ...brickMeshes], false);
  if (!hits.length) { if (ghostMesh) ghostMesh.visible = false; return; }

  const hit = hits[0];
  let baseY = 0;
  // If we hit a brick top face, figure out the layer
  if (!hit.object.userData.isFloor) {
    // find owning brick
    for (const b of bricks) {
      let found = false;
      b.mesh.traverse(c => { if (c === hit.object) found = true; });
      if (found) { baseY = b.mesh.position.y + typeHeight(b.type); break; }
    }
    // make sure we only land on top
    if (Math.abs(hit.normal.y) < 0.5) { if (ghostMesh) ghostMesh.visible = false; return; }
  }

  const snap = snapToGrid(hit.point, currentW, currentD);
  const stackY = getTopLayerAt(snap.x, snap.z, currentW, currentD);
  const y = Math.max(baseY, stackY);

  if (!isOnBaseplate(snap.x, snap.z, currentW, currentD)) {
    if (ghostMesh) ghostMesh.visible = false;
    return;
  }

  lastGhostX = snap.x;
  lastGhostZ = snap.z;
  if (ghostMesh) {
    ghostMesh.position.set(snap.x, y, snap.z);
    ghostMesh.visible = true;
    ghostValid = true;
  }
}

// ─── Place / Remove ───────────────────────────────────────────────────────────
function placeBrick() {
  if (!ghostMesh || !ghostMesh.visible || !ghostValid) return;
  const gx = lastGhostX, gz = lastGhostZ;
  const y  = ghostMesh.position.y;

  const mesh = createBrickMesh(currentW, currentD, currentColor, false, currentType);
  mesh.position.set(gx, y, gz);
  scene.add(mesh);

  const entry = { mesh, gx, gz, w: currentW, d: currentD, color: currentColor, type: currentType };
  bricks.push(entry);
  undoStack.push({ action: 'place', entry });
  redoStack.length = 0;
  updateCount();
}

function removeBrickAt(e) {
  raycaster.setFromCamera(mouse, camera);
  const brickMeshes = [];
  const meshToBrick = new Map();
  for (const b of bricks) {
    b.mesh.traverse(c => {
      if (c.isMesh) {
        brickMeshes.push(c);
        meshToBrick.set(c, b);
      }
    });
  }
  const hits = raycaster.intersectObjects(brickMeshes, false);
  if (!hits.length) return;
  const brick = meshToBrick.get(hits[0].object);
  if (!brick) return;

  scene.remove(brick.mesh);
  bricks = bricks.filter(b => b !== brick);
  undoStack.push({ action: 'remove', entry: brick });
  redoStack.length = 0;
  updateCount();
}

function undoLast() {
  if (!undoStack.length) return;
  const cmd = undoStack.pop();
  if (cmd.action === 'place') {
    scene.remove(cmd.entry.mesh);
    bricks = bricks.filter(b => b !== cmd.entry);
  } else if (cmd.action === 'remove') {
    scene.add(cmd.entry.mesh);
    bricks.push(cmd.entry);
  }
  redoStack.push(cmd);
  updateCount();
}

function redoLast() {
  if (!redoStack.length) return;
  const cmd = redoStack.pop();
  if (cmd.action === 'place') {
    scene.add(cmd.entry.mesh);
    bricks.push(cmd.entry);
  } else if (cmd.action === 'remove') {
    scene.remove(cmd.entry.mesh);
    bricks = bricks.filter(b => b !== cmd.entry);
  }
  undoStack.push(cmd);
  updateCount();
}

function updateCount() {
  document.getElementById('count').textContent = bricks.length;
}

// ─── Events ──────────────────────────────────────────────────────────────────
renderer.domElement.addEventListener('mousemove', e => {
  updateMousePos(e);
  updateGhostFromMouse();
});

renderer.domElement.addEventListener('click', e => {
  if (e.button !== 0) return;
  if (mode === 'place') placeBrick();
});

renderer.domElement.addEventListener('contextmenu', e => {
  e.preventDefault();
  updateMousePos(e);
  if (mode === 'place' || mode === 'remove') removeBrickAt(e);
});

const keys = {};
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoLast(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redoLast(); return; }
  if (['w','a','s','d','W','A','S','D'].includes(e.key)) { keys[e.key.toLowerCase()] = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Day / Night ─────────────────────────────────────────────────────────────
let isNight = false;
window.toggleDayNight = function() {
  isNight = !isNight;
  document.getElementById('btn-daynight').textContent = isNight ? '🌙' : '☀️';
  if (isNight) {
    scene.background = new THREE.Color(0x010204);
    scene.fog = new THREE.FogExp2(0x010204, 0.016);
    ambient.intensity = 0.002;
    sun.intensity     = 0.0;
  } else {
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.018);
    ambient.intensity = 0.35;
    sun.intensity     = 2.2;
  }
};

// ─── Dropdown helper ─────────────────────────────────────────────────────────
window.toggleDD = function(id) {
  const wrap = document.getElementById(id);
  const menu = wrap.querySelector('.dd-menu');
  const isOpen = menu.classList.contains('open');
  // close all
  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
};

document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrap')) {
    document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  }
});

// ─── UI wiring ───────────────────────────────────────────────────────────────
window.setMode = function(m) {
  mode = m;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  if (ghostMesh) ghostMesh.visible = (m === 'place');
};

window.setType = function(t) {
  currentType = t;
  document.querySelectorAll('#dd-type-menu .dd-item').forEach(b => b.classList.remove('selected'));
  document.querySelector(`#dd-type-menu .dd-item[data-type="${t}"]`).classList.add('selected');
  document.getElementById('dd-type-value').textContent = t === 'brick' ? 'Brick' : 'Plate';
  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  updateGhost(currentW, currentD, currentColor, currentType);
};

window.setSize = function(w, d) {
  currentW = w; currentD = d;
  document.querySelectorAll('#dd-size-menu .dd-item').forEach(b => b.classList.remove('selected'));
  document.querySelector(`#dd-size-menu .dd-item[data-w="${w}"][data-d="${d}"]`).classList.add('selected');
  document.getElementById('dd-size-value').textContent = `${w}×${d}`;
  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  updateGhost(currentW, currentD, currentColor, currentType);
};


// ─── Color dropdown ───────────────────────────────────────────────────────────
const colorMenu = document.getElementById('dd-color-menu');
const colorPreview = document.getElementById('dd-color-preview');
const colorValueEl = document.getElementById('dd-color-value');

colorPreview.style.background = currentColor;
colorValueEl.textContent = COLORS[0].name;

COLORS.forEach((c) => {
  const item = document.createElement('div');
  item.className = 'dd-color-item' + (c.hex === currentColor ? ' selected' : '');
  item.innerHTML = `<div class="dd-color-swatch" style="background:${c.hex}"></div>${c.name}`;
  item.onclick = () => {
    currentColor = c.hex;
    colorPreview.style.background = c.hex;
    colorValueEl.textContent = c.name;
    document.querySelectorAll('.dd-color-item').forEach(i => i.classList.remove('selected'));
    item.classList.add('selected');
    document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
    updateGhost(currentW, currentD, currentColor, currentType);
  };
  colorMenu.appendChild(item);
});

// ─── Render Loop ──────────────────────────────────────────────────────────────
const PAN_SPEED = 0.18;

function animate() {
  requestAnimationFrame(animate);

  if (keys['w'] || keys['a'] || keys['s'] || keys['d']) {
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();
    const right = new THREE.Vector3();
    right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    const delta = new THREE.Vector3();
    if (keys['w']) delta.addScaledVector(forward,  PAN_SPEED);
    if (keys['s']) delta.addScaledVector(forward, -PAN_SPEED);
    if (keys['a']) delta.addScaledVector(right,   -PAN_SPEED);
    if (keys['d']) delta.addScaledVector(right,    PAN_SPEED);

    controls.target.add(delta);
    camera.position.add(delta);
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
