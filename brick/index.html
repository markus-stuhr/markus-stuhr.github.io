<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Builder – Markus Stuhr</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
  }

  /* Toolbar */
  #toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 7px 12px;
    z-index: 100;
  }

  .separator { width: 1px; height: 24px; background: rgba(255,255,255,0.12); }

  /* Mode buttons */
  .tool-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    padding: 5px 13px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    user-select: none;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.15); }
  .tool-btn.active {
    background: rgba(255,200,0,0.22);
    border-color: rgba(255,200,0,0.55);
    color: #ffd700;
  }

  /* Custom dropdown */
  .dd-wrap {
    position: relative;
    user-select: none;
  }
  .dd-trigger {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 13px;
    color: #fff;
    white-space: nowrap;
    transition: background 0.15s;
    min-width: 90px;
  }
  .dd-trigger:hover { background: rgba(255,255,255,0.14); }
  .dd-trigger .dd-label { font-size: 10px; color: rgba(255,255,255,0.45); margin-right: 2px; }
  .dd-trigger .dd-value { flex: 1; }
  .dd-trigger .dd-arrow { font-size: 9px; color: rgba(255,255,255,0.4); }

  .dd-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: rgba(15,15,25,0.97);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 6px;
    z-index: 300;
    min-width: 130px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .dd-menu.open { display: block; }

  /* Size grid dropdown */
  .dd-menu.grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 4px; min-width: 180px; }
  .dd-menu.grid.open { display: grid; }

  .dd-item {
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #ccc;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .dd-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .dd-item.selected { background: rgba(255,200,0,0.18); color: #ffd700; }

  /* Color dropdown items */
  .dd-color-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #ccc;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .dd-color-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .dd-color-item.selected { background: rgba(255,200,0,0.15); color: #ffd700; }
  .dd-color-swatch {
    width: 16px; height: 16px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Color dropdown — scrollable */
  #dd-color-menu { max-height: 320px; overflow-y: auto; min-width: 180px; }
  #dd-color-menu::-webkit-scrollbar { width: 4px; }
  #dd-color-menu::-webkit-scrollbar-track { background: transparent; }
  #dd-color-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* Color trigger swatch */
  #dd-color-trigger .color-preview {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* Info overlay */
  #info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Brick count */
  #brick-count {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    z-index: 100;
  }
  #brick-count span { color: #ffd700; font-weight: bold; }

  /* ── Part Browser ─────────────────────────────────────────────────────── */
  #part-browser {
    position: fixed;
    top: 0; left: 0;
    width: 320px; height: 100vh;
    background: rgba(10,10,18,0.96);
    backdrop-filter: blur(16px);
    border-right: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  }
  #part-browser.open { transform: translateX(0); }

  #pb-header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 14px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  #pb-header h3 { font-size: 13px; font-weight: 600; flex: 1; }
  #pb-close {
    background: none; border: none; color: rgba(255,255,255,0.4);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 2px;
  }
  #pb-close:hover { color: #fff; }

  #pb-search {
    margin: 10px 14px 8px;
    flex-shrink: 0;
  }
  #pb-search input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    color: #fff;
    outline: none;
  }
  #pb-search input::placeholder { color: rgba(255,255,255,0.3); }
  #pb-search input:focus { border-color: rgba(255,200,0,0.45); }

  #pb-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Category list */
  #pb-cats {
    width: 110px;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid rgba(255,255,255,0.07);
    padding: 4px 0;
  }
  #pb-cats::-webkit-scrollbar { width: 3px; }
  #pb-cats::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .pb-cat {
    padding: 7px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    line-height: 1.3;
    transition: background 0.1s, color 0.1s;
  }
  .pb-cat:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .pb-cat.active { background: rgba(255,200,0,0.15); color: #ffd700; }
  #pb-cats.kb-focus { border-right-color: rgba(255,200,0,0.4); }
  #pb-parts-list.kb-focus { outline: none; border-left: 1px solid rgba(255,200,0,0.4); margin-left: -1px; }

  /* Parts grid */
  #pb-parts {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #pb-parts::-webkit-scrollbar { width: 3px; }
  #pb-parts::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .pb-part {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 2px;
  }
  .pb-part:hover { background: rgba(255,255,255,0.08); }
  .pb-part.selected { background: rgba(255,200,0,0.15); }

  /* Stud preview (SVG) */
  .pb-preview {
    flex-shrink: 0;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .pb-preview svg { display: block; }

  .pb-info { flex: 1; min-width: 0; }
  .pb-dim { font-size: 12px; font-weight: 600; color: #fff; }
  .pb-name {
    font-size: 10px; color: rgba(255,255,255,0.4);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  #pb-loading {
    padding: 24px; text-align: center;
    color: rgba(255,255,255,0.3); font-size: 12px;
  }

  /* 3D preview at bottom */
  #pb-3d-wrap {
    flex-shrink: 0;
    height: 150px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.35);
    position: relative;
    overflow: hidden;
  }
  #pb-3d-label {
    position: absolute;
    bottom: 6px; left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    z-index: 1;
  }
  #pb-3d-canvas { display: block; }

  /* Toggle button */
  #btn-parts {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
    user-select: none;
    white-space: nowrap;
  }
  #btn-parts:hover { background: rgba(255,255,255,0.15); }
  #btn-parts.active {
    background: rgba(255,200,0,0.22);
    border-color: rgba(255,200,0,0.55);
    color: #ffd700;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<!-- Part Browser Sidebar -->
<div id="part-browser">
  <div id="pb-header">
    <h3>📦 Teile-Browser</h3>
    <button id="pb-close" onclick="togglePartBrowser()">✕</button>
  </div>
  <div id="pb-search"><input type="text" id="pb-search-input" placeholder="Suchen…" oninput="pbFilter(this.value)"></div>
  <div id="pb-body">
    <div id="pb-cats"></div>
    <div id="pb-parts"><div id="pb-loading">Lade Teile…</div></div>
  </div>
  <div id="pb-3d-wrap">
    <canvas id="pb-3d-canvas"></canvas>
    <div id="pb-3d-label">—</div>
  </div>
</div>

<div id="toolbar">
  <!-- Parts toggle -->
  <button id="btn-parts" onclick="togglePartBrowser()">📦 Teile</button>

  <div class="separator"></div>

  <!-- Day/Night toggle -->
  <button id="btn-daynight" onclick="toggleDayNight()" title="Tag/Nacht" style="background:none;border:none;cursor:pointer;font-size:20px;padding:2px 4px;line-height:1;user-select:none;">☀️</button>

  <div class="separator"></div>

  <!-- Mode -->
  <button class="tool-btn active" id="btn-place" onclick="setMode('place')">Platzieren</button>
  <button class="tool-btn" id="btn-remove" onclick="setMode('remove')">Entfernen</button>
  <button class="tool-btn" id="btn-clear" onclick="clearAll()" title="Alles löschen">🗑</button>

  <div class="separator"></div>

  <!-- Brick Type dropdown -->
  <div class="dd-wrap" id="dd-type">
    <div class="dd-trigger" id="dd-type-trigger" onclick="toggleDD('dd-type')">
      <span class="dd-label">TYP</span>
      <span class="dd-value" id="dd-type-value">Brick</span>
      <span class="dd-arrow">▾</span>
    </div>
    <div class="dd-menu" id="dd-type-menu">
      <div class="dd-item selected" data-type="brick" onclick="setType('brick')">Brick</div>
      <div class="dd-item" data-type="plate" onclick="setType('plate')">Plate</div>
    </div>
  </div>

  <!-- Brick Size dropdown -->
  <div class="dd-wrap" id="dd-size">
    <div class="dd-trigger" id="dd-size-trigger" onclick="toggleDD('dd-size')">
      <span class="dd-label">GRÖSSE</span>
      <span class="dd-value" id="dd-size-value">1×1</span>
      <span class="dd-arrow">▾</span>
    </div>
    <div class="dd-menu grid" id="dd-size-menu">
      <div class="dd-item selected" data-w="1" data-d="1" onclick="setSize(1,1)">1×1</div>
      <div class="dd-item" data-w="1" data-d="2" onclick="setSize(1,2)">1×2</div>
      <div class="dd-item" data-w="1" data-d="3" onclick="setSize(1,3)">1×3</div>
      <div class="dd-item" data-w="1" data-d="4" onclick="setSize(1,4)">1×4</div>
      <div class="dd-item" data-w="1" data-d="6" onclick="setSize(1,6)">1×6</div>
      <div class="dd-item" data-w="1" data-d="8" onclick="setSize(1,8)">1×8</div>
      <div class="dd-item" data-w="2" data-d="2" onclick="setSize(2,2)">2×2</div>
      <div class="dd-item" data-w="2" data-d="3" onclick="setSize(2,3)">2×3</div>
      <div class="dd-item" data-w="2" data-d="4" onclick="setSize(2,4)">2×4</div>
      <div class="dd-item" data-w="2" data-d="6" onclick="setSize(2,6)">2×6</div>
      <div class="dd-item" data-w="2" data-d="8" onclick="setSize(2,8)">2×8</div>
      <div class="dd-item" data-w="4" data-d="4" onclick="setSize(4,4)">4×4</div>
    </div>
  </div>

  <!-- Color dropdown -->
  <div class="dd-wrap" id="dd-color">
    <div class="dd-trigger" id="dd-color-trigger" onclick="toggleDD('dd-color')">
      <span class="dd-label">FARBE</span>
      <div class="color-preview" id="dd-color-preview"></div>
      <span class="dd-value" id="dd-color-value">Red</span>
      <span class="dd-arrow">▾</span>
    </div>
    <div class="dd-menu" id="dd-color-menu"></div>
  </div>

</div>

<div id="info">Linksklick: Brick setzen &nbsp;|&nbsp; Rechtsklick: Brick entfernen &nbsp;|&nbsp; WASD: Kamera bewegen &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; R: Drehen &nbsp;|&nbsp; Ctrl+Z/Y: Undo/Redo</div>
<div id="brick-count">Steine: <span id="count">0</span></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
let LDrawLoader = null;

// ─── Constants ───────────────────────────────────────────────────────────────
const STUD        = 1.0;   // 1 stud = 1 unit
const BRICK_H     = 1.2;   // standard brick height
const PLATE_H_VAL = 0.4;   // plate height (1/3 of brick)
const STUD_R      = 0.3;   // stud radius
const STUD_H      = 0.18;  // stud height
const GRID        = 32;    // baseplate size in studs

// ─── Colors (Rebrickable palette) ────────────────────────────────────────────
const COLORS = [
  // Reds
  { name: 'Red',              hex: '#B40000' },
  { name: 'Dark Red',         hex: '#720E0F' },
  { name: 'Coral',            hex: '#FF698F' },
  { name: 'Salmon',           hex: '#FF9494' },
  // Oranges & Yellows
  { name: 'Orange',           hex: '#FE8A18' },
  { name: 'Dark Orange',      hex: '#A95500' },
  { name: 'Yellow',           hex: '#F2CD37' },
  { name: 'Bright Light Yellow', hex: '#FFE001' },
  { name: 'Tan',              hex: '#DFC176' },
  { name: 'Dark Tan',         hex: '#958A73' },
  // Greens
  { name: 'Green',            hex: '#257A3E' },
  { name: 'Dark Green',       hex: '#184632' },
  { name: 'Bright Green',     hex: '#4B9F4A' },
  { name: 'Lime',             hex: '#BBE90B' },
  { name: 'Olive Green',      hex: '#9B9A5A' },
  { name: 'Sand Green',       hex: '#A0BCAC' },
  // Blues
  { name: 'Blue',             hex: '#0055BF' },
  { name: 'Dark Blue',        hex: '#003380' },
  { name: 'Medium Blue',      hex: '#5A93DB' },
  { name: 'Bright Light Blue',hex: '#9FC3E9' },
  { name: 'Sky Blue',         hex: '#7DBFDD' },
  { name: 'Dark Azure',       hex: '#078BC9' },
  { name: 'Cyan',             hex: '#00B0F0' },
  // Purples & Pinks
  { name: 'Purple',           hex: '#8320B7' },
  { name: 'Dark Purple',      hex: '#2E1A47' },
  { name: 'Medium Lavender',  hex: '#AC78BA' },
  { name: 'Lavender',         hex: '#E1D5ED' },
  { name: 'Magenta',          hex: '#C870A0' },
  { name: 'Pink',             hex: '#FC97AC' },
  // Browns
  { name: 'Brown',            hex: '#583927' },
  { name: 'Dark Brown',       hex: '#352100' },
  { name: 'Reddish Brown',    hex: '#82422A' },
  // Grays & Whites
  { name: 'White',            hex: '#FFFFFF' },
  { name: 'Light Bluish Gray',hex: '#AFB5C7' },
  { name: 'Dark Bluish Gray', hex: '#595D6B' },
  { name: 'Light Gray',       hex: '#9C9C9C' },
  { name: 'Dark Gray',        hex: '#6B5A5A' },
  { name: 'Black',            hex: '#1B2A34' },
  // Light
  { name: 'Licht (Weiß)',     hex: '#LIGHT_W', emissive: '#ffffff', emissiveColor: '#ffffff' },
  { name: 'Licht (Warm)',     hex: '#LIGHT_O', emissive: '#ffaa33', emissiveColor: '#ffaa33' },
  { name: 'Licht (Kalt)',     hex: '#LIGHT_B', emissive: '#aaccff', emissiveColor: '#aaccff' },
  // Special
  { name: 'Gold',             hex: '#DBAC34' },
  { name: 'Silver',           hex: '#A5A9B4' },
  { name: 'Trans-Clear',      hex: '#FCFCFC' },
  { name: 'Trans-Red',        hex: '#C91A09' },
  { name: 'Trans-Blue',       hex: '#0020A0' },
  { name: 'Trans-Yellow',     hex: '#F8F177' },
  { name: 'Trans-Green',      hex: '#84B68D' },
  { name: 'Trans-Orange',     hex: '#F08F1C' },
];

// ─── State ───────────────────────────────────────────────────────────────────
let mode         = 'place';
let currentColor = COLORS[0].hex;
let currentW     = 1;
let currentD     = 1;
let currentType  = 'brick'; // 'brick' | 'plate'
let currentPartId = null;   // null = parametrische Box; sonst Katalog-Teil (echte Geometrie)
let currentRot   = 0;       // Y-Rotation in Grad: 0 | 90 | 180 | 270
let bricks       = [];
let undoStack    = [];
let redoStack    = [];
let ghostMesh    = null;
let ghostValid   = false;


// ─── Scene Setup ─────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.008);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(20, 22, 28);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping     = true;
controls.dampingFactor     = 0.08;
controls.maxPolarAngle     = Math.PI / 2.05;
controls.minDistance       = 5;
controls.maxDistance       = 120;
controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
controls.mouseButtons.MIDDLE = THREE.MOUSE.DOLLY;

// ─── Lighting ────────────────────────────────────────────────────────────────
renderer.shadowMap.type = THREE.VSMShadowMap; // smoother penumbra

const ambient = new THREE.AmbientLight(0xffffff, 0.05);
scene.add(ambient);

// Sun — warm directional, shadows
const sun = new THREE.DirectionalLight(0xfff4d6, 2.2);
sun.position.set(28, 45, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 180;
sun.shadow.camera.left = sun.shadow.camera.bottom = -40;
sun.shadow.camera.right = sun.shadow.camera.top   =  40;
sun.shadow.bias         = -0.0005;
sun.shadow.normalBias   = 0.02;
sun.shadow.radius       = 2;
scene.add(sun);

// ─── Environment Map (for transmission / reflections) ────────────────────────
{
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  // Simple procedural room environment
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xdde8f0);
  const envAmbient = new THREE.AmbientLight(0xffffff, 1);
  envScene.add(envAmbient);
  const envTex = pmrem.fromScene(new RoomEnvironment()).texture;
  scene.environment = envTex;
  pmrem.dispose();
}

// ─── Baseplate ───────────────────────────────────────────────────────────────
function buildBaseplate() {
  const group = new THREE.Group();

  // Infinite ground plane
  const geo = new THREE.PlaneGeometry(2000, 2000);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x257a3e,
    roughness: 0.85,
    metalness: 0.0,
  });
  const slab = new THREE.Mesh(geo, mat);
  slab.receiveShadow = true;
  slab.rotation.x = -Math.PI / 2;
  slab.position.y = 0;
  group.add(slab);

  // Studs on baseplate
  const studGeo = new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 12);
  const studMat = new THREE.MeshStandardMaterial({ color: 0x1e6633, roughness: 0.7 });
  for (let x = 0; x < GRID; x++) {
    for (let z = 0; z < GRID; z++) {
      const s = new THREE.Mesh(studGeo, studMat);
      s.position.set(
        (x - GRID / 2 + 0.5) * STUD,
        STUD_H / 2,
        (z - GRID / 2 + 0.5) * STUD
      );
      s.receiveShadow = true;
      group.add(s);
    }
  }

  // Grid lines (subtle)
  const lineMat = new THREE.LineBasicMaterial({ color: 0x1e6633, transparent: true, opacity: 0.3 });
  for (let i = 0; i <= GRID; i++) {
    const pos = (i - GRID / 2) * STUD;
    const hLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-GRID / 2 * STUD, 0.02, pos),
      new THREE.Vector3( GRID / 2 * STUD, 0.02, pos),
    ]);
    const vLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(pos, 0.02, -GRID / 2 * STUD),
      new THREE.Vector3(pos, 0.02,  GRID / 2 * STUD),
    ]);
    group.add(new THREE.Line(hLine, lineMat));
    group.add(new THREE.Line(vLine, lineMat));
  }

  scene.add(group);
}
buildBaseplate();

// ─── Demo House ──────────────────────────────────────────────────────────────
function buildDemoHouse() {
  const WALL = '#82422A'; // Reddish Brown
  const WIN  = '#LIGHT_O'; // Warm light window
  const ROOF = '#720E0F';  // Dark Red

  // House center (cx, cz) on baseplate; 8 studs wide, 6 studs deep, 4 bricks tall
  const cx = 0, cz = 6, NW = 8, ND = 6, NL = 4;
  const H = BRICK_H, PH = PLATE_H_VAL;

  // Convert stud index → world coordinate (center of a 1×1 brick)
  const wx = xi => cx + xi - NW / 2 + 0.5;
  const wz = zi => cz + zi - ND / 2 + 0.5;

  function addBrick(x, z, y, w, d, col, type = 'brick') {
    const mesh = createBrickMesh(w, d, col, false, type);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    bricks.push({ mesh, gx: x, gz: z, w, d, color: col, type });
  }

  for (let l = 0; l < NL; l++) {
    const y = l * H;

    // ── Front wall (zi = 0) ──────────────────────────────────────────────────
    const fz = wz(0);
    if (l === 0) {
      // Door gap at xi 3–4
      addBrick(wx(0) + 0.5, fz, y, 2, 1, WALL);
      addBrick(wx(2),       fz, y, 1, 1, WALL);
      addBrick(wx(5),       fz, y, 1, 1, WALL);
      addBrick(wx(6) + 0.5, fz, y, 2, 1, WALL);
    } else if (l === 1) {
      // Two glowing windows
      addBrick(wx(0),       fz, y, 1, 1, WALL);
      addBrick(wx(1) + 0.5, fz, y, 2, 1, WIN);
      addBrick(wx(3) + 0.5, fz, y, 2, 1, WALL);
      addBrick(wx(5) + 0.5, fz, y, 2, 1, WIN);
      addBrick(wx(7),       fz, y, 1, 1, WALL);
    } else {
      for (let xi = 0; xi < NW; xi += 2)
        addBrick(wx(xi) + 0.5, fz, y, 2, 1, WALL);
    }

    // ── Back wall (zi = ND − 1) ──────────────────────────────────────────────
    const bkz = wz(ND - 1);
    if (l === 1) {
      addBrick(wx(0),       bkz, y, 1, 1, WALL);
      addBrick(wx(1) + 0.5, bkz, y, 2, 1, WIN);
      addBrick(wx(3) + 0.5, bkz, y, 2, 1, WALL);
      addBrick(wx(5) + 0.5, bkz, y, 2, 1, WIN);
      addBrick(wx(7),       bkz, y, 1, 1, WALL);
    } else {
      for (let xi = 0; xi < NW; xi += 2)
        addBrick(wx(xi) + 0.5, bkz, y, 2, 1, WALL);
    }

    // ── Side walls (inner rows only; corners handled by front/back wall) ─────
    for (let zi = 1; zi < ND - 1; zi++) {
      addBrick(wx(0),      wz(zi), y, 1, 1, WALL);
      addBrick(wx(NW - 1), wz(zi), y, 1, 1, WALL);
    }
  }

  // ── Roof – 3 plate layers of dark red ────────────────────────────────────
  const roofY = NL * H;
  for (let p = 0; p < 3; p++)
    for (let zi = 0; zi < ND; zi++)
      addBrick(cx, wz(zi), roofY + p * PH, NW, 1, ROOF, 'plate');

  // ── Chimney – 2×2, 3 bricks tall, slightly right of center ───────────────
  // 2×2 (gerade Maße) braucht ganzzahlige x/z-Mitte, damit die Studs aufs
  // Halbzahl-Raster fallen (Mitte ±0.5). cz=6 ist die Hausmitte (ganzzahlig).
  const chimY = roofY + 3 * PH;
  for (let cl = 0; cl < 3; cl++)
    addBrick(2, cz, chimY + cl * H, 2, 2, WALL);

  updateCount();
}

// ─── Brick Geometry ──────────────────────────────────────────────────────────
const BAR_H = 0.14; // thin horizontal bar / fence rail

function typeHeight(type) {
  if (type === 'plate' || type === 'tile') return PLATE_H_VAL;
  if (type === 'bar')                      return BAR_H;
  return BRICK_H;
}

// Slope prism: front is low (PLATE_H_VAL), back is full height (bh)
function makeSlopeGeo(bw, bh, bd) {
  const lo = PLATE_H_VAL;
  const p = (x, y, z) => [x, y, z];

  const fl  = p(-bw/2, 0,   -bd/2);
  const fr  = p( bw/2, 0,   -bd/2);
  const br  = p( bw/2, 0,    bd/2);
  const bl  = p(-bw/2, 0,    bd/2);
  const flt = p(-bw/2, lo,  -bd/2);
  const frt = p( bw/2, lo,  -bd/2);
  const brt = p( bw/2, bh,   bd/2);
  const blt = p(-bw/2, bh,   bd/2);

  const tris = [
    fl, fr, br,   fl, br, bl,     // bottom
    fl, frt, fr,  fl, flt, frt,   // front
    br, blt, bl,  br, brt, blt,   // back
    fl, blt, flt, fl, bl, blt,    // left
    fr, brt, br,  fr, frt, brt,   // right
    flt, brt, frt, flt, blt, brt, // top slope
  ];

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(
    new Float32Array(tris.flat()), 3
  ));
  geo.computeVertexNormals();
  return geo;
}

function getStudGeo() {
  return new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 12);
}

const LIGHT_COLORS = {
  '#LIGHT_W': { color: '#ffffff', emissive: '#ffffff', pointColor: 0xffffff },
  '#LIGHT_O': { color: '#ffcc77', emissive: '#ffaa33', pointColor: 0xffaa33 },
  '#LIGHT_B': { color: '#cce0ff', emissive: '#aaccff', pointColor: 0xaaccff },
};
const TRANS_HEXES = new Set(['#FCFCFC','#C91A09','#0020A0','#F8F177','#84B68D','#F08F1C']);

function isLightColor(hex) { return hex in LIGHT_COLORS; }
function isTransColor(hex) { return TRANS_HEXES.has(hex.toUpperCase()) || TRANS_HEXES.has(hex); }

function makeMat(color, isGhost) {
  if (isGhost) {
    const c = isLightColor(color) ? LIGHT_COLORS[color].color : color;
    return new THREE.MeshStandardMaterial({
      color: new THREE.Color(c), roughness: 0.45, metalness: 0.05,
      transparent: true, opacity: 0.4,
    });
  }
  if (isLightColor(color)) {
    const lc = LIGHT_COLORS[color];
    return new THREE.MeshStandardMaterial({
      color: new THREE.Color(lc.color),
      emissive: new THREE.Color(lc.emissive),
      emissiveIntensity: 6.0,
      roughness: 0.2,
      metalness: 0.0,
    });
  }
  if (isTransColor(color)) {
    return new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(color),
      roughness: 0.05, metalness: 0.0,
      transmission: 0.88, thickness: 0.8, ior: 1.46,
      transparent: true, opacity: 0.92,
    });
  }
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    roughness: 0.42, metalness: 0.0,
  });
}

function createBrickMesh(w, d, color, isGhost = false, type = 'brick', partId = null) {
  // Katalog-Teil mit echter gebakter Geometrie → verwenden statt parametrischer Box
  if (partId) {
    const cached = catalogGeoCache.get(partId);
    if (cached && cached.geo) {
      const group = new THREE.Group();
      group.userData.brickType = type;
      const mat = makeMat(color, isGhost);
      const m = new THREE.Mesh(cached.geo, mat);
      m.castShadow    = !isGhost && !isLightColor(color);
      m.receiveShadow = !isGhost;
      if (!isGhost && isTransColor(color)) m.renderOrder = 1;
      group.add(m);
      if (!isGhost && isLightColor(color)) {
        const lc = LIGHT_COLORS[color];
        const pt = new THREE.PointLight(lc.pointColor, 12, 56, 1.5);
        pt.position.set(0, (cached.height || BRICK_H) * 0.5, 0);
        pt.castShadow = false;
        group.add(pt);
      }
      return group;
    }
    // keine Geometrie vorhanden → Fallback unten (parametrische Box = L1-Proxy)
  }

  const group = new THREE.Group();
  group.userData.brickType = type;

  const fullH = typeHeight(type);
  const bw = w * STUD - 0.01;
  const bd = d * STUD - 0.01;
  const bh = fullH - 0.01;
  const trans   = !isGhost && isTransColor(color);
  const isLight = !isGhost && isLightColor(color);

  const mat     = makeMat(color, isGhost);
  const studMat = makeMat(color, isGhost);

  function addMesh(geo, posY = 0) {
    const m = new THREE.Mesh(geo, mat);
    m.castShadow    = !isGhost && !isLight;
    m.receiveShadow = !isGhost;
    if (trans) m.renderOrder = 1;
    m.position.y = posY;
    group.add(m);
    return m;
  }

  function addStuds() {
    const sGeo = getStudGeo();
    for (let sx = 0; sx < w; sx++) {
      for (let sz = 0; sz < d; sz++) {
        const stud = new THREE.Mesh(sGeo, studMat);
        stud.position.set(
          (sx - (w - 1) / 2) * STUD,
          fullH - 0.01 + STUD_H / 2,
          (sz - (d - 1) / 2) * STUD
        );
        stud.castShadow = !isGhost && !isLight;
        if (trans) stud.renderOrder = 1;
        group.add(stud);
      }
    }
  }

  if (type === 'tile') {
    // Plate height, no studs — smooth flat tile
    addMesh(new THREE.BoxGeometry(bw, bh, bd), bh / 2);

  } else if (type === 'bar') {
    // Very thin horizontal slab — fence rail / bar
    addMesh(new THREE.BoxGeometry(bw, bh, bd), bh / 2);

  } else if (type === 'panel') {
    // Full brick height, but very thin in depth — wall panel
    const panelD = Math.min(bd, 0.22);
    addMesh(new THREE.BoxGeometry(bw, bh, panelD), bh / 2);

  } else if (type === 'slope') {
    // Ramp: front = low, back = full height
    addMesh(makeSlopeGeo(bw, bh, bd));

  } else if (type === 'wedge') {
    // Same ramp, rotated 90° (tapers in X direction)
    const m = addMesh(makeSlopeGeo(bd, bh, bw));
    m.rotation.y = Math.PI / 2;

  } else if (type === 'round') {
    // Cylinder body + one center stud
    const r = Math.min(bw, bd) / 2;
    addMesh(new THREE.CylinderGeometry(r, r, bh, 16), bh / 2);
    const stud = new THREE.Mesh(getStudGeo(), studMat);
    stud.position.y = bh + STUD_H / 2;
    stud.castShadow = !isGhost && !isLight;
    if (trans) stud.renderOrder = 1;
    group.add(stud);

  } else {
    // brick / plate / panel / bar → box + studs
    addMesh(new THREE.BoxGeometry(bw, bh, bd), bh / 2);
    addStuds();
  }

  // PointLight für Licht-Steine
  if (!isGhost && isLightColor(color)) {
    const lc = LIGHT_COLORS[color];
    const pt = new THREE.PointLight(lc.pointColor, 12, 56, 1.5);
    pt.position.set(0, fullH * 0.5, 0);
    pt.castShadow = false;
    group.add(pt);
  }

  return group;
}

// ─── Katalog-Geometrie (echte LDraw-Bakes) ───────────────────────────────────
const LDU = 1 / 20;  // LDraw-Einheit → Builder-Einheit (20 LDU = 1 Stud, 24 = Brick-H)
const STUD_H_PROTRUDE = 0.2;  // Stud-Überstand (4 LDU) — zählt nicht zur Stapelhöhe
const catalogGeoCache = new Map();  // partId → { geo, height, fw, fd }

// Stapelhöhe: Stud-Überstand (0.2) abziehen, wenn das Teil oben Studs hat
// (erkennbar daran, dass die Höhe ohne Studs ein sauberes Plate-Vielfaches 0.4 ist)
function stackHeight(bboxH) {
  const noStud = bboxH - STUD_H_PROTRUDE;
  if (noStud > 0.05 && Math.abs(noStud / PLATE_H_VAL - Math.round(noStud / PLATE_H_VAL)) < 0.08) {
    return noStud;
  }
  return bboxH;
}

async function ensureCatalogGeo(partId) {
  if (catalogGeoCache.has(partId)) return catalogGeoCache.get(partId);
  let entry = { geo: null, height: null, fw: null, fd: null };
  try {
    const r = await fetch(`catalog/geo/${partId}.json`);
    if (r.ok) {
      const d = await r.json();
      if (d.positions && d.positions.length) {
        let geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(d.positions, 3));
        geo.setIndex(d.indices);
        // LDraw → Builder: uniform skalieren, dann 180° um X (Y/Z-Flip, wie Preview)
        geo.scale(LDU, LDU, LDU);
        geo.rotateX(Math.PI);
        geo.computeBoundingBox();
        const bb = geo.boundingBox;
        // x/z auf Footprint-Mitte, Unterseite auf y=0 (Origin unten-zentriert)
        const cx = (bb.min.x + bb.max.x) / 2;
        const cz = (bb.min.z + bb.max.z) / 2;
        geo.translate(-cx, -bb.min.y, -cz);
        // Flache (per-Face) Normalen: Vertices entmergen, dann berechnen — sonst
        // mittelt computeVertexNormals über harte Kanten/inkonsistentes Winding
        // → "wildes" Licht auf LEGO-Teilen.
        geo = geo.toNonIndexed();
        geo.computeVertexNormals();
        // Footprint aus echter Geometrie ableiten (NICHT aus Rebrickable w/d) —
        // löst den 90°-Achsen-Mismatch (LDraw-Orientierung ≠ w→X/d→Z-Konvention)
        const fw = Math.max(1, Math.round((bb.max.x - bb.min.x) / STUD));
        const fd = Math.max(1, Math.round((bb.max.z - bb.min.z) / STUD));
        entry = { geo, height: stackHeight(bb.max.y - bb.min.y), fw, fd };
      }
    }
  } catch (e) { /* Fallback = parametrische Box */ }
  catalogGeoCache.set(partId, entry);
  return entry;
}

// Höhe des aktuell gewählten Teils (echte bbox-Höhe oder Typ-Konstante)
function currentHeight() {
  if (currentPartId) {
    const c = catalogGeoCache.get(currentPartId);
    if (c && c.geo) return c.height;
  }
  return typeHeight(currentType);
}

// ─── Ghost Cursor ────────────────────────────────────────────────────────────
function updateGhost(w, d, color, type) {
  if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; }
  ghostMesh = createBrickMesh(w, d, color, true, type, currentPartId);
  ghostMesh.rotation.y = THREE.MathUtils.degToRad(currentRot);
  ghostMesh.visible = false;
  scene.add(ghostMesh);
}
updateGhost(currentW, currentD, currentColor, currentType);

// ─── Raycasting helpers ───────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

// Invisible floor plane for raycasting
const floorPlanes = [];
function getFloorPlane(y) {
  if (!floorPlanes[y]) {
    const geo = new THREE.PlaneGeometry(1000, 1000);
    geo.rotateX(-Math.PI / 2);
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide }));
    mesh.position.y = y;
    mesh.userData.isFloor = true;
    scene.add(mesh);
    floorPlanes[y] = mesh;
  }
  return floorPlanes[y];
}
getFloorPlane(0); // always have layer 0

// Effektiver Footprint (w,d nach Rotation getauscht bei 90°/270°)
function rotFootprint(w, d, rot) {
  return (rot === 90 || rot === 270) ? [d, w] : [w, d];
}
// Basis-Footprint des aktuellen Teils: echte Geometrie-Maße (Katalog) oder w/d (parametrisch)
function partFootprint() {
  if (currentPartId) {
    const c = catalogGeoCache.get(currentPartId);
    if (c && c.geo) return [c.fw, c.fd];
  }
  return [currentW, currentD];
}
function curFootprint() {
  const [w, d] = partFootprint();
  return rotFootprint(w, d, currentRot);
}

function snapToGrid(pos, w, d) {
  // Offset so brick center aligns to stud grid
  const halfW = (w % 2 === 0) ? 0 : 0.5;
  const halfD = (d % 2 === 0) ? 0 : 0.5;
  return {
    x: Math.round(pos.x - halfW) + halfW,
    z: Math.round(pos.z - halfD) + halfD,
  };
}

function getTopLayerAt(gx, gz, w, d) {
  let maxY = 0;
  for (const b of bricks) {
    const [bw, bd] = rotFootprint(b.w, b.d, b.rot || 0);
    if (rectsOverlap(gx, gz, w, d, b.gx, b.gz, bw, bd)) {
      const top = b.mesh.position.y + (b.height ?? typeHeight(b.type));
      if (top > maxY) maxY = top;
    }
  }
  return maxY;
}

function rectsOverlap(ax, az, aw, ad, bx, bz, bw, bd) {
  return !(ax + aw / 2 <= bx - bw / 2 ||
           ax - aw / 2 >= bx + bw / 2 ||
           az + ad / 2 <= bz - bd / 2 ||
           az - ad / 2 >= bz + bd / 2);
}

function isOnBaseplate(gx, gz, w, d) {
  const half = GRID / 2;
  return (gx - w / 2 >= -half && gx + w / 2 <= half &&
          gz - d / 2 >= -half && gz + d / 2 <= half);
}

// ─── Mouse tracking for ghost ────────────────────────────────────────────────
let lastGhostX = null, lastGhostZ = null;

function updateMousePos(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
}

function updateGhostFromMouse() {
  if (mode !== 'place') {
    if (ghostMesh) ghostMesh.visible = false;
    return;
  }
  raycaster.setFromCamera(mouse, camera);

  // Raycast against placed bricks + floor
  const brickMeshes = bricks.map(b => b.mesh).flatMap(g => {
    const arr = [];
    g.traverse(c => { if (c.isMesh) arr.push(c); });
    return arr;
  });
  const floorMesh = getFloorPlane(0);

  const hits = raycaster.intersectObjects([floorMesh, ...brickMeshes], false);
  if (!hits.length) { if (ghostMesh) ghostMesh.visible = false; return; }

  const hit = hits[0];
  let baseY = 0;
  // If we hit a brick top face, figure out the layer
  if (!hit.object.userData.isFloor) {
    // find owning brick
    for (const b of bricks) {
      let found = false;
      b.mesh.traverse(c => { if (c === hit.object) found = true; });
      if (found) { baseY = b.mesh.position.y + typeHeight(b.type); break; }
    }
    // make sure we only land on top
    if (Math.abs(hit.normal.y) < 0.5) { if (ghostMesh) ghostMesh.visible = false; return; }
  }

  const [ew, ed] = curFootprint();
  const snap = snapToGrid(hit.point, ew, ed);
  const stackY = getTopLayerAt(snap.x, snap.z, ew, ed);
  const y = Math.max(baseY, stackY);

  if (!isOnBaseplate(snap.x, snap.z, ew, ed)) {
    if (ghostMesh) ghostMesh.visible = false;
    return;
  }

  lastGhostX = snap.x;
  lastGhostZ = snap.z;
  if (ghostMesh) {
    ghostMesh.position.set(snap.x, y, snap.z);
    ghostMesh.visible = true;
    ghostValid = true;
  }
}

// ─── Place / Remove ───────────────────────────────────────────────────────────
function placeBrick() {
  if (!ghostMesh || !ghostMesh.visible || !ghostValid) return;
  const gx = lastGhostX, gz = lastGhostZ;
  const y  = ghostMesh.position.y;

  const mesh = createBrickMesh(currentW, currentD, currentColor, false, currentType, currentPartId);
  mesh.rotation.y = THREE.MathUtils.degToRad(currentRot);
  mesh.position.set(gx, y, gz);
  scene.add(mesh);

  const [fw, fd] = partFootprint();  // echter Footprint (Geometrie bei Katalog, w/d bei parametrisch)
  const entry = { mesh, gx, gz, w: fw, d: fd, color: currentColor,
                  type: currentType, partId: currentPartId, rot: currentRot, height: currentHeight() };
  bricks.push(entry);
  undoStack.push({ action: 'place', entry });
  redoStack.length = 0;
  updateCount();
}

function removeBrickAt(e) {
  raycaster.setFromCamera(mouse, camera);
  const brickMeshes = [];
  const meshToBrick = new Map();
  for (const b of bricks) {
    b.mesh.traverse(c => {
      if (c.isMesh) {
        brickMeshes.push(c);
        meshToBrick.set(c, b);
      }
    });
  }
  const hits = raycaster.intersectObjects(brickMeshes, false);
  if (!hits.length) return;
  const brick = meshToBrick.get(hits[0].object);
  if (!brick) return;

  scene.remove(brick.mesh);
  bricks = bricks.filter(b => b !== brick);
  undoStack.push({ action: 'remove', entry: brick });
  redoStack.length = 0;
  updateCount();
}

function undoLast() {
  if (!undoStack.length) return;
  const cmd = undoStack.pop();
  if (cmd.action === 'place') {
    scene.remove(cmd.entry.mesh);
    bricks = bricks.filter(b => b !== cmd.entry);
  } else if (cmd.action === 'remove') {
    scene.add(cmd.entry.mesh);
    bricks.push(cmd.entry);
  }
  redoStack.push(cmd);
  updateCount();
}

function redoLast() {
  if (!redoStack.length) return;
  const cmd = redoStack.pop();
  if (cmd.action === 'place') {
    scene.add(cmd.entry.mesh);
    bricks.push(cmd.entry);
  } else if (cmd.action === 'remove') {
    scene.remove(cmd.entry.mesh);
    bricks = bricks.filter(b => b !== cmd.entry);
  }
  undoStack.push(cmd);
  updateCount();
}

function updateCount() {
  document.getElementById('count').textContent = bricks.length;
}

// ─── Events ──────────────────────────────────────────────────────────────────
renderer.domElement.addEventListener('mousemove', e => {
  updateMousePos(e);
  updateGhostFromMouse();
});

let _mouseDownX = 0, _mouseDownY = 0;
renderer.domElement.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  _mouseDownX = e.clientX;
  _mouseDownY = e.clientY;
});
renderer.domElement.addEventListener('mouseup', e => {
  if (e.button !== 0) return;
  const dx = e.clientX - _mouseDownX, dy = e.clientY - _mouseDownY;
  if (Math.sqrt(dx*dx + dy*dy) > 4) return; // war ein Drag
  if (mode === 'place') placeBrick();
});

renderer.domElement.addEventListener('contextmenu', e => {
  e.preventDefault();
  updateMousePos(e);
  if (mode === 'place' || mode === 'remove') removeBrickAt(e);
});

// R = Teil um 90° drehen (Ghost dreht sofort, Footprint folgt im nächsten Frame)
document.addEventListener('keydown', e => {
  if (e.key !== 'r' && e.key !== 'R') return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  e.preventDefault();
  currentRot = (currentRot + 90) % 360;
  if (ghostMesh) ghostMesh.rotation.y = THREE.MathUtils.degToRad(currentRot);
});

const keys = {};
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoLast(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redoLast(); return; }
  if (['w','a','s','d','W','A','S','D'].includes(e.key)) { keys[e.key.toLowerCase()] = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Day / Night ─────────────────────────────────────────────────────────────
let isNight = false;
window.toggleDayNight = function() {
  isNight = !isNight;
  document.getElementById('btn-daynight').textContent = isNight ? '🌙' : '☀️';
  if (isNight) {
    scene.background = new THREE.Color(0x00010a);
    scene.fog = new THREE.FogExp2(0x00010a, 0.007);
    ambient.color.set(0x0a1a3a);
    ambient.intensity = 0.012;
    sun.color.set(0x1a2d66);
    sun.intensity = 0.025;
    scene.environmentIntensity = 0.0;
  } else {
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.008);
    ambient.color.set(0xffffff);
    ambient.intensity = 0.05;
    sun.color.set(0xfff4d6);
    sun.intensity = 2.2;
    scene.environmentIntensity = 1.0;
  }
};

  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));

// ─── UI wiring ───────────────────────────────────────────────────────────────
window.setMode = function(m) {
  mode = m;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  if (ghostMesh) ghostMesh.visible = (m === 'place');
};

window.clearAll = function() {
  if (!bricks.length) return;
  if (!confirm(`Alle ${bricks.length} Steine löschen?`)) return;
  for (const b of bricks) scene.remove(b.mesh);
  bricks = [];
  undoStack.length = 0;
  redoStack.length = 0;
  updateCount();
};

window.setType = function(t) {
  currentType = t;
  currentPartId = null;  // manuelle Auswahl → parametrische Box
  document.querySelectorAll('#dd-type-menu .dd-item').forEach(b => b.classList.remove('selected'));
  const match = document.querySelector(`#dd-type-menu .dd-item[data-type="${t}"]`);
  if (match) match.classList.add('selected');
  const label = t.charAt(0).toUpperCase() + t.slice(1);
  document.getElementById('dd-type-value').textContent = label;
  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  updateGhost(currentW, currentD, currentColor, currentType);
};

window.setSize = function(w, d) {
  currentW = w; currentD = d;
  currentPartId = null;  // manuelle Auswahl → parametrische Box
  document.querySelectorAll('#dd-size-menu .dd-item').forEach(b => b.classList.remove('selected'));
  const match = document.querySelector(`#dd-size-menu .dd-item[data-w="${w}"][data-d="${d}"]`);
  if (match) match.classList.add('selected');
  document.getElementById('dd-size-value').textContent = `${w}×${d}`;
  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  updateGhost(currentW, currentD, currentColor, currentType);
};

// ─── Render Loop ──────────────────────────────────────────────────────────────
const PAN_SPEED = 0.18;

function animate() {
  requestAnimationFrame(animate);

  if (keys['w'] || keys['a'] || keys['s'] || keys['d']) {
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();
    const right = new THREE.Vector3();
    right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    const delta = new THREE.Vector3();
    if (keys['w']) delta.addScaledVector(forward,  PAN_SPEED);
    if (keys['s']) delta.addScaledVector(forward, -PAN_SPEED);
    if (keys['a']) delta.addScaledVector(right,   -PAN_SPEED);
    if (keys['d']) delta.addScaledVector(right,    PAN_SPEED);

    controls.target.add(delta);
    camera.position.add(delta);
  }

  controls.update();
  renderer.render(scene, camera);
  tickPreview();
}
buildDemoHouse();

// ─── Part Browser ─────────────────────────────────────────────────────────────
let pbData        = null; // { categories: [...] }
let pbActiveCat   = 0;    // index into pbData.categories
let pbSearchVal   = '';
let pbDeduped     = [];   // current deduped+filtered parts list
let pbSelectedIdx = 0;    // selected index in pbDeduped
let pbFocusCol    = 'parts'; // 'cats' | 'parts' — welche Spalte per Tastatur aktiv ist

window.togglePartBrowser = function() {
  const panel = document.getElementById('part-browser');
  const btn   = document.getElementById('btn-parts');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('active', open);
  if (open) {
    if (!pbData) loadParts();
    setTimeout(initPreview, 0);
  }
};

async function loadParts() {
  try {
    const r = await fetch('data/parts.json');
    pbData = await r.json();
    renderCats();
    selectCat(0);
  } catch(e) {
    document.getElementById('pb-loading').textContent = 'Fehler beim Laden';
  }
}

function renderCats() {
  const el = document.getElementById('pb-cats');
  el.innerHTML = pbData.categories.map((c, i) =>
    `<div class="pb-cat${i===0?' active':''}" onclick="selectCat(${i})">${c.label}</div>`
  ).join('');
}

window.selectCat = function(i) {
  pbActiveCat = i;
  document.querySelectorAll('.pb-cat').forEach((el, j) =>
    el.classList.toggle('active', j === i));
  // scroll active cat into view
  document.querySelectorAll('.pb-cat')[i]?.scrollIntoView({ block: 'nearest' });
  pbSearchVal = '';
  document.getElementById('pb-search-input').value = '';
  pbSelectedIdx = 0;
  renderParts();
};

window.pbFilter = function(val) {
  pbSearchVal = val.toLowerCase();
  pbSelectedIdx = 0;
  renderParts();
};

function studSvg(w, d) {
  const S = 4, GAP = 1; // stud size + gap
  const cols = Math.min(w, 8), rows = Math.min(d, 8);
  const bw = cols * S + (cols - 1) * GAP, bh = rows * S + (rows - 1) * GAP;
  const scale = Math.min(28 / bw, 28 / bh, 1);
  const W = Math.round(bw * scale), H = Math.round(bh * scale);
  const sr = Math.max(1, Math.round(S * scale / 2) - 1);
  let dots = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cx = Math.round((c * (S + GAP) + S / 2) * scale);
      const cy = Math.round((r * (S + GAP) + S / 2) * scale);
      dots += `<circle cx="${cx}" cy="${cy}" r="${sr}" fill="rgba(255,255,255,0.35)"/>`;
    }
  }
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" rx="2" fill="rgba(255,255,255,0.12)"/>
    ${dots}
  </svg>`;
}

function renderParts() {
  const cat = pbData.categories[pbActiveCat];
  const el  = document.getElementById('pb-parts');
  document.getElementById('pb-cats').classList.toggle('kb-focus', pbFocusCol === 'cats');
  document.getElementById('pb-parts')?.classList.toggle('kb-focus', pbFocusCol === 'parts');

  // Deduplicate by w×d
  const seen = new Map();
  for (const p of cat.parts) {
    const key = `${p.w}x${p.d}`;
    if (!seen.has(key)) seen.set(key, p);
  }

  pbDeduped = [...seen.values()];
  if (pbSearchVal) {
    pbDeduped = pbDeduped.filter(p =>
      p.name.toLowerCase().includes(pbSearchVal) ||
      `${p.w}x${p.d}`.includes(pbSearchVal)
    );
  }

  if (!pbDeduped.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;color:rgba(255,255,255,0.3);font-size:12px;">Keine Teile</div>';
    return;
  }

  pbSelectedIdx = Math.max(0, Math.min(pbSelectedIdx, pbDeduped.length - 1));

  el.innerHTML = pbDeduped.map((p, i) =>
    `<div class="pb-part${i === pbSelectedIdx ? ' selected' : ''}" onclick="pbSelectByIdx(${i})">
      <div class="pb-preview">${studSvg(p.w, p.d)}</div>
      <div class="pb-info">
        <div class="pb-dim">${p.w}×${p.d}</div>
        <div class="pb-name">${p.name}</div>
      </div>
    </div>`
  ).join('');

  // Apply currently selected part
  const sel = pbDeduped[pbSelectedIdx];
  if (sel) {
    setType(sel.type);
    setSize(sel.w, sel.d);          // setzt currentPartId = null
    currentPartId = sel.id;          // ... danach echtes Katalog-Teil aktivieren
    ensureCatalogGeo(sel.id).then(() => {
      // nur refreshen, wenn dieses Teil noch ausgewählt ist
      if (currentPartId === sel.id) updateGhost(currentW, currentD, currentColor, currentType);
    });
    updatePreview();
  }
}

window.pbSelectByIdx = function(i) {
  pbSelectedIdx = i;
  renderParts();
  document.querySelectorAll('.pb-part')[i]?.scrollIntoView({ block: 'nearest' });
};

window.pbSelectPart = function(type, w, d) {
  const i = pbDeduped.findIndex(p => p.type === type && p.w === w && p.d === d);
  pbSelectByIdx(i >= 0 ? i : 0);
};

// ─── Keyboard navigation ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const panel = document.getElementById('part-browser');
  if (!panel.classList.contains('open')) return;
  if (document.activeElement === document.getElementById('pb-search-input')) return;

  const cats = pbData?.categories;
  if (!cats) return;

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    pbFocusCol = 'parts';
    renderParts();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    pbFocusCol = 'cats';
    renderParts();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (pbFocusCol === 'cats') {
      selectCat(Math.min(pbActiveCat + 1, cats.length - 1));
    } else {
      pbSelectedIdx = Math.min(pbSelectedIdx + 1, pbDeduped.length - 1);
      renderParts();
      document.querySelectorAll('.pb-part')[pbSelectedIdx]?.scrollIntoView({ block: 'nearest' });
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (pbFocusCol === 'cats') {
      selectCat(Math.max(pbActiveCat - 1, 0));
    } else {
      pbSelectedIdx = Math.max(pbSelectedIdx - 1, 0);
      renderParts();
      document.querySelectorAll('.pb-part')[pbSelectedIdx]?.scrollIntoView({ block: 'nearest' });
    }
  }
});

// ─── Part Browser 3D Preview ─────────────────────────────────────────────────
// ─── LDraw real-geometry preview ─────────────────────────────────────────────
const LDRAW_CDN = 'ldraw/';
let ldrawLoader = null, ldrawReady = false;
let pvLoadToken = 0; // cancel stale loads

async function ensureLDraw() {
  if (ldrawReady) return true;
  if (!ldrawLoader) {
    try {
      if (!LDrawLoader) {
        const mod = await import('three/addons/loaders/LDrawLoader.js');
        LDrawLoader = mod.LDrawLoader;
      }
      ldrawLoader = new LDrawLoader();
      ldrawLoader.setPartsLibraryPath(LDRAW_CDN);
      await ldrawLoader.preloadMaterials(LDRAW_CDN + 'LDConfig.ldr');
      ldrawReady = true;
    } catch(e) { return false; }
  }
  return ldrawReady;
}

async function loadLDrawPreview(partId, token) {
  const ok = await ensureLDraw();
  if (!ok || token !== pvLoadToken) return;

  const url = LDRAW_CDN + 'parts/' + partId + '.dat';
  ldrawLoader.load(url,
    group => {
      if (token !== pvLoadToken || !pvRenderer) return;
      // Replace fallback mesh with real LDraw model
      if (pvMesh) pvScene.remove(pvMesh);
      pvMesh = group;
      pvMesh.rotation.set(Math.PI, 0, 0);
      pvScene.add(pvMesh);
      fitPreviewCamera();
      pvAngle = 0;
    },
    undefined,
    () => { /* 404 → keep fallback */ }
  );
}

// ─── Part Browser 3D Preview ─────────────────────────────────────────────────
let pvRenderer = null, pvScene, pvCamera, pvMesh, pvAngle = 0;

function initPreview() {
  if (pvRenderer) return;
  const wrap   = document.getElementById('pb-3d-wrap');
  const canvas = document.getElementById('pb-3d-canvas');
  const W = wrap.clientWidth, H = 150;

  pvRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  pvRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  pvRenderer.setSize(W, H);
  pvRenderer.setClearColor(0x0a0a14);
  pvRenderer.shadowMap.enabled = false;

  pvScene = new THREE.Scene();
  pvScene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const sun = new THREE.DirectionalLight(0xfff4d6, 2.0);
  sun.position.set(4, 6, 3);
  pvScene.add(sun);
  const fill = new THREE.DirectionalLight(0x8899cc, 0.5);
  fill.position.set(-3, 2, -4);
  pvScene.add(fill);

  pvCamera = new THREE.PerspectiveCamera(40, W / H, 0.1, 2000);
  updatePreview();
}

function fitPreviewCamera() {
  if (!pvMesh) return;
  const box  = new THREE.Box3().setFromObject(pvMesh);
  const size = box.getSize(new THREE.Vector3());
  const ctr  = box.getCenter(new THREE.Vector3());
  const maxS = Math.max(size.x, size.y, size.z);
  const dist = maxS / Math.tan(THREE.MathUtils.degToRad(20));
  pvCamera.position.set(ctr.x + dist * 0.6, ctr.y + dist * 0.5, ctr.z + dist * 0.8);
  pvCamera.lookAt(ctr);
  pvCamera.far = dist * 10;
  pvCamera.updateProjectionMatrix();
}

function updatePreview() {
  if (!pvRenderer) { initPreview(); return; }
  if (pvMesh) { pvScene.remove(pvMesh); pvMesh = null; }

  // Sofort anzeigen (parametrische Box, falls Geometrie noch nicht geladen)
  const sel = pbDeduped[pbSelectedIdx];
  const pid = sel?.id || currentPartId;
  pvMesh = createBrickMesh(currentW, currentD, currentColor, false, currentType, pid);
  pvScene.add(pvMesh);
  fitPreviewCamera();

  const label = `${currentW}×${currentD} · ${currentType.charAt(0).toUpperCase() + currentType.slice(1)}`;
  document.getElementById('pb-3d-label').textContent = label;
  pvAngle = 0;

  // Echte gebakte Geometrie nachladen → Vorschau aktualisieren (gleicher Pfad
  // wie beim Platzieren, inkl. Flat-Normalen → kein "wildes" Licht)
  if (pid) {
    const tok = ++pvLoadToken;
    ensureCatalogGeo(pid).then(() => {
      if (tok !== pvLoadToken || !pvRenderer) return;
      if (pvMesh) pvScene.remove(pvMesh);
      pvMesh = createBrickMesh(currentW, currentD, currentColor, false, currentType, pid);
      pvScene.add(pvMesh);
      fitPreviewCamera();
      pvAngle = 0;
    });
  }
}

function tickPreview() {
  if (!pvRenderer || !pvMesh) return;
  pvAngle += 0.008;
  pvMesh.rotation.y = pvAngle;
  pvRenderer.render(pvScene, pvCamera);
}

animate();
