<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Builder – Markus Stuhr</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
  }

  /* Toolbar */
  #toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 12px;
    z-index: 100;
  }
  .toolbar-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .tool-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.16); }
  .tool-btn.active {
    background: rgba(255,200,0,0.25);
    border-color: rgba(255,200,0,0.6);
    color: #ffd700;
  }

  .separator { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }

  /* Color Picker */
  #color-strip {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .color-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: #fff; transform: scale(1.15); }

  /* Brick size selector */
  #size-selector {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    max-width: 220px;
  }
  .size-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc;
    border-radius: 6px;
    padding: 3px 7px;
    cursor: pointer;
    font-size: 11px;
    transition: background 0.15s;
    user-select: none;
  }
  .size-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .size-btn.active {
    background: rgba(255,200,0,0.2);
    border-color: rgba(255,200,0,0.5);
    color: #ffd700;
  }

  /* Type selector (Brick / Plate) */
  #type-selector { display: flex; gap: 5px; }
  .type-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
    user-select: none;
  }
  .type-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .type-btn.active {
    background: rgba(100,200,255,0.2);
    border-color: rgba(100,200,255,0.5);
    color: #7dd8ff;
  }

  /* Color palette panel */
  #color-panel {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 12px;
    display: none;
    flex-wrap: wrap;
    gap: 5px;
    max-width: 420px;
    z-index: 200;
  }
  #color-panel.open { display: flex; }
  .cp-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .cp-dot:hover { transform: scale(1.25); }
  .cp-dot.selected { border-color: #fff; }

  /* Info overlay */
  #info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Brick count */
  #brick-count {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    z-index: 100;
  }
  #brick-count span { color: #ffd700; font-weight: bold; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="toolbar">
  <!-- Row 1: Mode + Type + Color -->
  <div class="toolbar-row">
    <button class="tool-btn active" id="btn-place" onclick="setMode('place')">Platzieren</button>
    <button class="tool-btn" id="btn-remove" onclick="setMode('remove')">Entfernen</button>
    <div class="separator"></div>
    <div id="type-selector">
      <button class="type-btn active" id="btn-brick" onclick="setType('brick')">Brick</button>
      <button class="type-btn" id="btn-plate" onclick="setType('plate')">Plate</button>
    </div>
    <div class="separator"></div>
    <div id="color-strip"></div>
  </div>
  <!-- Row 2: Sizes -->
  <div class="toolbar-row">
    <div id="size-selector">
      <button class="size-btn active" data-w="1" data-d="1" onclick="setSize(1,1)">1×1</button>
      <button class="size-btn" data-w="1" data-d="2" onclick="setSize(1,2)">1×2</button>
      <button class="size-btn" data-w="1" data-d="3" onclick="setSize(1,3)">1×3</button>
      <button class="size-btn" data-w="1" data-d="4" onclick="setSize(1,4)">1×4</button>
      <button class="size-btn" data-w="1" data-d="6" onclick="setSize(1,6)">1×6</button>
      <button class="size-btn" data-w="1" data-d="8" onclick="setSize(1,8)">1×8</button>
      <button class="size-btn" data-w="2" data-d="2" onclick="setSize(2,2)">2×2</button>
      <button class="size-btn" data-w="2" data-d="3" onclick="setSize(2,3)">2×3</button>
      <button class="size-btn" data-w="2" data-d="4" onclick="setSize(2,4)">2×4</button>
      <button class="size-btn" data-w="2" data-d="6" onclick="setSize(2,6)">2×6</button>
      <button class="size-btn" data-w="2" data-d="8" onclick="setSize(2,8)">2×8</button>
      <button class="size-btn" data-w="4" data-d="4" onclick="setSize(4,4)">4×4</button>
    </div>
  </div>
</div>

<!-- Full color palette panel -->
<div id="color-panel"></div>

<div id="info">Linksklick: Brick setzen &nbsp;|&nbsp; Rechtsklick: Brick entfernen &nbsp;|&nbsp; WASD: Kamera bewegen &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; Ctrl+Z/Y: Undo/Redo</div>
<div id="brick-count">Steine: <span id="count">0</span></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Constants ───────────────────────────────────────────────────────────────
const STUD        = 1.0;   // 1 stud = 1 unit
const BRICK_H     = 1.2;   // standard brick height
const PLATE_H_VAL = 0.4;   // plate height (1/3 of brick)
const STUD_R      = 0.3;   // stud radius
const STUD_H      = 0.18;  // stud height
const GRID        = 32;    // baseplate size in studs

// ─── Colors (Rebrickable palette) ────────────────────────────────────────────
const COLORS = [
  // Reds
  { name: 'Red',              hex: '#B40000' },
  { name: 'Dark Red',         hex: '#720E0F' },
  { name: 'Coral',            hex: '#FF698F' },
  { name: 'Salmon',           hex: '#FF9494' },
  // Oranges & Yellows
  { name: 'Orange',           hex: '#FE8A18' },
  { name: 'Dark Orange',      hex: '#A95500' },
  { name: 'Yellow',           hex: '#F2CD37' },
  { name: 'Bright Light Yellow', hex: '#FFE001' },
  { name: 'Tan',              hex: '#DFC176' },
  { name: 'Dark Tan',         hex: '#958A73' },
  // Greens
  { name: 'Green',            hex: '#257A3E' },
  { name: 'Dark Green',       hex: '#184632' },
  { name: 'Bright Green',     hex: '#4B9F4A' },
  { name: 'Lime',             hex: '#BBE90B' },
  { name: 'Olive Green',      hex: '#9B9A5A' },
  { name: 'Sand Green',       hex: '#A0BCAC' },
  // Blues
  { name: 'Blue',             hex: '#0055BF' },
  { name: 'Dark Blue',        hex: '#003380' },
  { name: 'Medium Blue',      hex: '#5A93DB' },
  { name: 'Bright Light Blue',hex: '#9FC3E9' },
  { name: 'Sky Blue',         hex: '#7DBFDD' },
  { name: 'Dark Azure',       hex: '#078BC9' },
  { name: 'Cyan',             hex: '#00B0F0' },
  // Purples & Pinks
  { name: 'Purple',           hex: '#8320B7' },
  { name: 'Dark Purple',      hex: '#2E1A47' },
  { name: 'Medium Lavender',  hex: '#AC78BA' },
  { name: 'Lavender',         hex: '#E1D5ED' },
  { name: 'Magenta',          hex: '#C870A0' },
  { name: 'Pink',             hex: '#FC97AC' },
  // Browns
  { name: 'Brown',            hex: '#583927' },
  { name: 'Dark Brown',       hex: '#352100' },
  { name: 'Reddish Brown',    hex: '#82422A' },
  // Grays & Whites
  { name: 'White',            hex: '#FFFFFF' },
  { name: 'Light Bluish Gray',hex: '#AFB5C7' },
  { name: 'Dark Bluish Gray', hex: '#595D6B' },
  { name: 'Light Gray',       hex: '#9C9C9C' },
  { name: 'Dark Gray',        hex: '#6B5A5A' },
  { name: 'Black',            hex: '#1B2A34' },
  // Special
  { name: 'Gold',             hex: '#DBAC34' },
  { name: 'Silver',           hex: '#A5A9B4' },
  { name: 'Trans-Clear',      hex: '#FCFCFC' },
  { name: 'Trans-Red',        hex: '#C91A09' },
  { name: 'Trans-Blue',       hex: '#0020A0' },
  { name: 'Trans-Yellow',     hex: '#F8F177' },
  { name: 'Trans-Green',      hex: '#84B68D' },
  { name: 'Trans-Orange',     hex: '#F08F1C' },
];

// ─── State ───────────────────────────────────────────────────────────────────
let mode         = 'place';
let currentColor = COLORS[0].hex;
let currentW     = 1;
let currentD     = 1;
let currentType  = 'brick'; // 'brick' | 'plate'
let bricks       = [];
let undoStack    = [];
let redoStack    = [];
let ghostMesh    = null;
let ghostValid   = false;

// ─── Scene Setup ─────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.018);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(20, 22, 28);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping     = true;
controls.dampingFactor     = 0.08;
controls.maxPolarAngle     = Math.PI / 2.05;
controls.minDistance       = 5;
controls.maxDistance       = 120;
controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
controls.mouseButtons.MIDDLE = THREE.MOUSE.DOLLY;

// ─── Lighting ────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
sun.position.set(25, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 200;
sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
sun.shadow.camera.right = sun.shadow.camera.top   =  50;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xc8e0ff, 0.4);
fill.position.set(-20, 10, -15);
scene.add(fill);

// ─── Baseplate ───────────────────────────────────────────────────────────────
function buildBaseplate() {
  const group = new THREE.Group();

  // Slab
  const geo = new THREE.BoxGeometry(GRID * STUD, PLATE_H_VAL * 2, GRID * STUD);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x257a3e,
    roughness: 0.85,
    metalness: 0.0,
  });
  const slab = new THREE.Mesh(geo, mat);
  slab.receiveShadow = true;
  slab.position.y = -PLATE_H_VAL;
  group.add(slab);

  // Studs on baseplate
  const studGeo = new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 12);
  const studMat = new THREE.MeshStandardMaterial({ color: 0x1e6633, roughness: 0.7 });
  for (let x = 0; x < GRID; x++) {
    for (let z = 0; z < GRID; z++) {
      const s = new THREE.Mesh(studGeo, studMat);
      s.position.set(
        (x - GRID / 2 + 0.5) * STUD,
        STUD_H / 2,
        (z - GRID / 2 + 0.5) * STUD
      );
      s.receiveShadow = true;
      group.add(s);
    }
  }

  // Grid lines (subtle)
  const lineMat = new THREE.LineBasicMaterial({ color: 0x1e6633, transparent: true, opacity: 0.3 });
  for (let i = 0; i <= GRID; i++) {
    const pos = (i - GRID / 2) * STUD;
    const hLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-GRID / 2 * STUD, 0.02, pos),
      new THREE.Vector3( GRID / 2 * STUD, 0.02, pos),
    ]);
    const vLine = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(pos, 0.02, -GRID / 2 * STUD),
      new THREE.Vector3(pos, 0.02,  GRID / 2 * STUD),
    ]);
    group.add(new THREE.Line(hLine, lineMat));
    group.add(new THREE.Line(vLine, lineMat));
  }

  scene.add(group);
}
buildBaseplate();

// ─── Brick Geometry ──────────────────────────────────────────────────────────
function typeHeight(type) {
  return type === 'plate' ? PLATE_H_VAL : BRICK_H;
}

function getStudGeo() {
  return new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 12);
}

function createBrickMesh(w, d, color, isGhost = false, type = 'brick') {
  const group = new THREE.Group();
  group.userData.brickType = type;

  const fullH = typeHeight(type);
  const bw = w * STUD - 0.01;
  const bd = d * STUD - 0.01;
  const bh = fullH - 0.01;

  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    roughness: 0.45,
    metalness: 0.05,
    transparent: isGhost,
    opacity:     isGhost ? 0.45 : 1.0,
  });

  const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mat);
  body.castShadow  = !isGhost;
  body.receiveShadow = !isGhost;
  body.position.y = bh / 2;
  group.add(body);

  // Studs
  const studMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    roughness: 0.4,
    metalness: 0.05,
    transparent: isGhost,
    opacity:     isGhost ? 0.45 : 1.0,
  });
  const sGeo = getStudGeo();
  for (let sx = 0; sx < w; sx++) {
    for (let sz = 0; sz < d; sz++) {
      const stud = new THREE.Mesh(sGeo, studMat);
      stud.position.set(
        (sx - (w - 1) / 2) * STUD,
        fullH - 0.01 + STUD_H / 2,
        (sz - (d - 1) / 2) * STUD
      );
      stud.castShadow = !isGhost;
      group.add(stud);
    }
  }

  return group;
}

// ─── Ghost Cursor ────────────────────────────────────────────────────────────
function updateGhost(w, d, color, type) {
  if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; }
  ghostMesh = createBrickMesh(w, d, color, true, type);
  ghostMesh.visible = false;
  scene.add(ghostMesh);
}
updateGhost(currentW, currentD, currentColor, currentType);

// ─── Raycasting helpers ───────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

// Invisible floor plane for raycasting
const floorPlanes = [];
function getFloorPlane(y) {
  if (!floorPlanes[y]) {
    const geo = new THREE.PlaneGeometry(1000, 1000);
    geo.rotateX(-Math.PI / 2);
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide }));
    mesh.position.y = y;
    mesh.userData.isFloor = true;
    scene.add(mesh);
    floorPlanes[y] = mesh;
  }
  return floorPlanes[y];
}
getFloorPlane(0); // always have layer 0

function snapToGrid(pos, w, d) {
  // Offset so brick center aligns to stud grid
  const halfW = (w % 2 === 0) ? 0 : 0.5;
  const halfD = (d % 2 === 0) ? 0 : 0.5;
  return {
    x: Math.round(pos.x - halfW) + halfW,
    z: Math.round(pos.z - halfD) + halfD,
  };
}

function getTopLayerAt(gx, gz, w, d) {
  let maxY = 0;
  for (const b of bricks) {
    if (rectsOverlap(gx, gz, w, d, b.gx, b.gz, b.w, b.d)) {
      const top = b.mesh.position.y + typeHeight(b.type);
      if (top > maxY) maxY = top;
    }
  }
  return maxY;
}

function rectsOverlap(ax, az, aw, ad, bx, bz, bw, bd) {
  return !(ax + aw / 2 <= bx - bw / 2 ||
           ax - aw / 2 >= bx + bw / 2 ||
           az + ad / 2 <= bz - bd / 2 ||
           az - ad / 2 >= bz + bd / 2);
}

function isOnBaseplate(gx, gz, w, d) {
  const half = GRID / 2;
  return (gx - w / 2 >= -half && gx + w / 2 <= half &&
          gz - d / 2 >= -half && gz + d / 2 <= half);
}

// ─── Mouse tracking for ghost ────────────────────────────────────────────────
let lastGhostX = null, lastGhostZ = null;

function updateMousePos(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
}

function updateGhostFromMouse() {
  if (mode !== 'place') {
    if (ghostMesh) ghostMesh.visible = false;
    return;
  }
  raycaster.setFromCamera(mouse, camera);

  // Raycast against placed bricks + floor
  const brickMeshes = bricks.map(b => b.mesh).flatMap(g => {
    const arr = [];
    g.traverse(c => { if (c.isMesh) arr.push(c); });
    return arr;
  });
  const floorMesh = getFloorPlane(0);

  const hits = raycaster.intersectObjects([floorMesh, ...brickMeshes], false);
  if (!hits.length) { if (ghostMesh) ghostMesh.visible = false; return; }

  const hit = hits[0];
  let baseY = 0;
  // If we hit a brick top face, figure out the layer
  if (!hit.object.userData.isFloor) {
    // find owning brick
    for (const b of bricks) {
      let found = false;
      b.mesh.traverse(c => { if (c === hit.object) found = true; });
      if (found) { baseY = b.mesh.position.y + typeHeight(b.type); break; }
    }
    // make sure we only land on top
    if (Math.abs(hit.normal.y) < 0.5) { if (ghostMesh) ghostMesh.visible = false; return; }
  }

  const snap = snapToGrid(hit.point, currentW, currentD);
  const stackY = getTopLayerAt(snap.x, snap.z, currentW, currentD);
  const y = Math.max(baseY, stackY);

  if (!isOnBaseplate(snap.x, snap.z, currentW, currentD)) {
    if (ghostMesh) ghostMesh.visible = false;
    return;
  }

  lastGhostX = snap.x;
  lastGhostZ = snap.z;
  if (ghostMesh) {
    ghostMesh.position.set(snap.x, y, snap.z);
    ghostMesh.visible = true;
    ghostValid = true;
  }
}

// ─── Place / Remove ───────────────────────────────────────────────────────────
function placeBrick() {
  if (!ghostMesh || !ghostMesh.visible || !ghostValid) return;
  const gx = lastGhostX, gz = lastGhostZ;
  const y  = ghostMesh.position.y;

  const mesh = createBrickMesh(currentW, currentD, currentColor, false, currentType);
  mesh.position.set(gx, y, gz);
  scene.add(mesh);

  const entry = { mesh, gx, gz, w: currentW, d: currentD, color: currentColor, type: currentType };
  bricks.push(entry);
  undoStack.push({ action: 'place', entry });
  redoStack.length = 0;

  updateCount();
}

function removeBrickAt(e) {
  raycaster.setFromCamera(mouse, camera);
  const brickMeshes = [];
  const meshToBrick = new Map();
  for (const b of bricks) {
    b.mesh.traverse(c => {
      if (c.isMesh) {
        brickMeshes.push(c);
        meshToBrick.set(c, b);
      }
    });
  }
  const hits = raycaster.intersectObjects(brickMeshes, false);
  if (!hits.length) return;
  const brick = meshToBrick.get(hits[0].object);
  if (!brick) return;

  scene.remove(brick.mesh);
  bricks = bricks.filter(b => b !== brick);
  undoStack.push({ action: 'remove', entry: brick });
  redoStack.length = 0;
  updateCount();
}

function undoLast() {
  if (!undoStack.length) return;
  const cmd = undoStack.pop();
  if (cmd.action === 'place') {
    scene.remove(cmd.entry.mesh);
    bricks = bricks.filter(b => b !== cmd.entry);
  } else if (cmd.action === 'remove') {
    scene.add(cmd.entry.mesh);
    bricks.push(cmd.entry);
  }
  redoStack.push(cmd);
  updateCount();
}

function redoLast() {
  if (!redoStack.length) return;
  const cmd = redoStack.pop();
  if (cmd.action === 'place') {
    scene.add(cmd.entry.mesh);
    bricks.push(cmd.entry);
  } else if (cmd.action === 'remove') {
    scene.remove(cmd.entry.mesh);
    bricks = bricks.filter(b => b !== cmd.entry);
  }
  undoStack.push(cmd);
  updateCount();
}

function updateCount() {
  document.getElementById('count').textContent = bricks.length;
}

// ─── Events ──────────────────────────────────────────────────────────────────
renderer.domElement.addEventListener('mousemove', e => {
  updateMousePos(e);
  updateGhostFromMouse();
});

renderer.domElement.addEventListener('click', e => {
  if (e.button !== 0) return;
  if (mode === 'place') placeBrick();
});

renderer.domElement.addEventListener('contextmenu', e => {
  e.preventDefault();
  updateMousePos(e);
  if (mode === 'place' || mode === 'remove') removeBrickAt(e);
});

const keys = {};
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoLast(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redoLast(); return; }
  if (['w','a','s','d','W','A','S','D'].includes(e.key)) { keys[e.key.toLowerCase()] = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── UI wiring ───────────────────────────────────────────────────────────────
window.setMode = function(m) {
  mode = m;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  if (ghostMesh) ghostMesh.visible = (m === 'place');
};

window.setSize = function(w, d) {
  currentW = w; currentD = d;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.size-btn[data-w="${w}"][data-d="${d}"]`).classList.add('active');
  updateGhost(currentW, currentD, currentColor, currentType);
};

window.setType = function(t) {
  currentType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + t).classList.add('active');
  updateGhost(currentW, currentD, currentColor, currentType);
};

// ─── Color palette ────────────────────────────────────────────────────────────
// Swatch in toolbar shows current color, click opens full panel
const strip = document.getElementById('color-strip');
const panel = document.getElementById('color-panel');

const swatch = document.createElement('div');
swatch.className = 'color-dot selected';
swatch.style.background = currentColor;
swatch.style.width = '26px';
swatch.style.height = '26px';
swatch.style.borderRadius = '6px';
swatch.title = 'Farbe wählen';
swatch.onclick = (e) => { e.stopPropagation(); panel.classList.toggle('open'); };
strip.appendChild(swatch);

COLORS.forEach((c) => {
  const dot = document.createElement('div');
  dot.className = 'cp-dot' + (c.hex === currentColor ? ' selected' : '');
  dot.style.background = c.hex;
  dot.title = c.name;
  dot.onclick = () => {
    currentColor = c.hex;
    swatch.style.background = c.hex;
    document.querySelectorAll('.cp-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    updateGhost(currentW, currentD, currentColor, currentType);
    panel.classList.remove('open');
  };
  panel.appendChild(dot);
});

document.addEventListener('click', (e) => {
  if (!panel.contains(e.target) && e.target !== swatch) panel.classList.remove('open');
});

// ─── Render Loop ──────────────────────────────────────────────────────────────
const PAN_SPEED = 0.18;
function animate() {
  requestAnimationFrame(animate);

  if (keys['w'] || keys['a'] || keys['s'] || keys['d']) {
    // Move the OrbitControls target (and camera) along the ground plane
    // Use camera's horizontal forward/right vectors
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();
    const right = new THREE.Vector3();
    right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    const delta = new THREE.Vector3();
    if (keys['w']) delta.addScaledVector(forward,  PAN_SPEED);
    if (keys['s']) delta.addScaledVector(forward, -PAN_SPEED);
    if (keys['a']) delta.addScaledVector(right,   -PAN_SPEED);
    if (keys['d']) delta.addScaledVector(right,    PAN_SPEED);

    controls.target.add(delta);
    camera.position.add(delta);
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
